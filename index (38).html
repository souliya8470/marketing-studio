<script>
/* Robust barcode-library loader: the primary <script> tag above is the fast path.
   If it hasn't finished loading (or failed) by the time we need to draw a barcode,
   ensureBarcodeLib() injects a fallback CDN and waits вҖ” so a slow/blocked network
   never results in a silently-blank barcode on a real, physical shipping label. */
window.ensureBarcodeLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.JsBarcode){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.JsBarcode) resolve(); else reject(new Error("loaded but JsBarcode missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    // Poll briefly in case the original head <script> is still mid-flight (most common case).
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.JsBarcode){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){ // ~2s of polling before pulling in the fallback CDN
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};
</script>

/* ============================================================
   PERMANENT RULE (do not remove): the screen never auto-refreshes
   on a TIMER and there is NO background polling of Supabase at all.
   Data only refreshes when: (a) someone explicitly clicks
   "а»Ӯаә«аәјаә”аәӮа»Қа»үаәЎаә№аәҷа»ға»қа»Ҳ" (refreshAll()), or (b) immediately after that same
   user's own action that just wrote to the database (e.g. right after
   AI content generation is saved, or right after a product/pain point
   is added) via silentRefresh() below вҖ” this is still 100% action-
   triggered by a real click, never a setInterval/timer. A previous
   background polling mechanism (checking every 15s) was removed
   because it burned through the Supabase free-tier quota and made
   data appear to vanish. Do not add setInterval/polling back without
   explicit confirmation that the Supabase plan can sustain it.
   Any new feature/table added later must be included inside
   loadAllData() only вҖ” never in any auto-interval.
   ============================================================ */
async function refreshAll(){
  STATE.refreshing = true;
  render();
  try{
    // 1) Refresh all core data tables.
    const fresh = await loadAllData();
    STATE.data = fresh;

    // 2) Refresh the logged-in user's own approval/role status.
    if(STATE.currentUser){
      try{
        const {data} = await sb.from("users").select("*").eq("id", STATE.currentUser.id).limit(1);
        if(data && data.length>0){
          const u = {id:data[0].id, name:data[0].name, role:data[0].role, approved: !!data[0].approved};
          STATE.currentUser = u;
          saveSession(u);
        }
      }catch(e){}
    }

    // 3) Refresh the owner's user-management list.
    if(STATE.currentUser && isOwner()){
      try{ STATE.usersList = await dbListUsers(); }catch(e){}
    }

    // 4) Refresh the approved-user-names list (report "accused" dropdown).
    if(STATE.currentUser){
      try{ STATE.approvedUserNames = await dbListApprovedUserNames(); }catch(e){}
    }
  }catch(e){}
  STATE.refreshing = false;
  render();
}

/* Quiet version of refreshAll(): re-fetches the data tables in the background
   after the CURRENT user's own action just wrote something (content generated,
   product saved, pain point added, cost/admin/insight/report logged, etc.)
   so the UI is always up to date without anyone needing to press the manual
   reload button. Never shows the full "аәҒаәіаәҘаәұаәҮа»Ӯаә«аәјаә”..." overlay, and is only ever
   called right after a real click вҖ” never on a timer. */
async function silentRefresh(){
  try{
    const fresh = await loadAllData();
    STATE.data = fresh;
  }catch(e){ /* ignore вҖ” local optimistic state already reflects the change */ }
  render();
}

function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n){ return Number(n||0).toLocaleString(); }
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}

/* ====================== AI CALL ====================== */
async function callAI(prompt, system){
  const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-ai`, {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({ prompt, system: system || "" })
  });
  const data = await res.json();
  if(data.text){ return data.text; }
  if(data.error){ throw new Error(data.error); }
  throw new Error("аәҡа»Қа»Ҳа»„аә”а»үаә®аәұаәҡаә„аәіаә•аәӯаәҡаәҲаәІаәҒ AI вҖ” аәҒаә°аәҘаәёаәҷаәІаәҒаә§аә” Edge Function а»ғаәҷ Supabase");
}

function updateNavHighlight(){
  const navContainer = document.getElementById("nav-container");
  if(!navContainer) return;
  // Skip rebuilding if nav already reflects the current page (avoids
  // needless DOM churn on every 8-second poll when the page hasn't changed).
  if(navContainer.getAttribute("data-page")===STATE.page && navContainer.getAttribute("data-role")===(STATE.currentUser?.role||"")){
    return;
  }
  navContainer.setAttribute("data-page", STATE.page);
  navContainer.setAttribute("data-role", STATE.currentUser?.role||"");
  navContainer.innerHTML = getNav().map(n => `
    <button class="nav-btn ${STATE.page===n.id?'active':''}" data-nav="${n.id}">
      <span class="nav-icon">${n.icon}</span>${n.label}${n.id==="content" && STATE.data.contentHistory.length>0 ? `<span class="nav-badge">${STATE.data.contentHistory.length}</span>` : ""}
    </button>
  `).join("");
  navContainer.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.page = el.getAttribute("data-nav");
      STATE.output = ""; STATE.error = "";
      closeMobileMenu();
      render();
      if(STATE.page==="users") loadUsersList();
      if(STATE.page==="reports") loadApprovedUserNames();
      if(STATE.page==="loginHistory") loadLoginHistory();
    });
  });
}

/* ---------- Mobile hamburger drawer ---------- */
function openMobileMenu(){
  STATE.mobileMenuOpen = true;

  if(sidebarEl) sidebarEl.classList.add("open");

function closeMobileMenu(){
  STATE.mobileMenuOpen = false;
  const sidebarEl = document.getElementById("app-sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if(sidebarEl) sidebarEl.classList.remove("open");
  if(overlay) overlay.classList.remove("open");

function attachSidebarEvents(){
  const logoutBtn = document.getElementById("btn-logout");
  if(logoutBtn) logoutBtn.addEventListener("click", ()=>{
    STATE.currentUser = null;
    clearSession();
    STATE.page = "dashboard";
    closeMobileMenu();
    render();
  });

  const reloadBtn = document.getElementById("btn-reload-data");
  if(reloadBtn) reloadBtn.addEventListener("click", ()=>{ refreshAll(); });

  const hamBtn = document.getElementById("btn-mobile-menu");
  if(hamBtn) hamBtn.addEventListener("click", ()=>{
    STATE.mobileMenuOpen ? closeMobileMenu() : openMobileMenu();
  });
  const closeXBtn = document.getElementById("btn-close-mobile-menu");
  if(closeXBtn) closeXBtn.addEventListener("click", closeMobileMenu);
  const overlay = document.getElementById("sidebar-overlay");
  if(overlay) overlay.addEventListener("click", closeMobileMenu);
}

function updateMainContent(){
  const main = document.getElementById("main");
  if(!main) return;
  main.classList.remove("main-fade");
  void main.offsetWidth; // force reflow so the animation restarts every time
  main.innerHTML = renderPage();
  main.classList.add("main-fade");
  attachPageEvents();
}

function renderPage(){
  switch(STATE.page){
    case "dashboard": return renderDashboard();
    case "products": return renderProducts();
    case "content": return renderContent();
    case "productChat": return renderProductChat();
    case "costs": return renderCosts();
    case "admin": return renderAdmin();
    case "insights": return renderInsights();
    case "reports": return renderReports();
    case "attendance": return renderAttendance();
    case "labels": return renderLabels();
    case "scanOut": return renderScanOut();
    case "users": return isOwner() ? renderUsers() : renderDashboard();
    case "loginHistory": return isOwner() ? renderLoginHistory() : renderDashboard();
    default: return "";
  }
}

function linesToBullets(text){
  return (text||"").split("\n").map(l=>l.trim()).filter(l=>l.length>0);
}

async function sendProductChat(){
  const d = STATE.data;
  const product = d.products.find(p=>p.id===STATE.chatSelProduct);
  if(!product) return;
  const questionEl = document.getElementById("chat-input");
  const question = (questionEl ? questionEl.value : STATE.chatQuestion || "").trim();
  if(!question) return;

  const knowledge = d.productKnowledge[product.id];
  const faqList = d.productFaq[product.id] || [];
  const faqBlock = faqList.length>0
    ? `\nаә„аәіаә–аәІаәЎ-аә•аәӯаәҡаә”а»Ҳаә§аәҷаә—аәөа»Ҳаәҡаәұаәҷаә—аә¶аәҒа»„аә§а»ү (а»ғаә«а»үа»ғаәҠа»үаә„аәіаә•аәӯаәҡа»Җаә«аәјаә»а»ҲаәІаәҷаәөа»үа»Җаәӣаәұаәҷаә«аәјаәұаәҒ аә–а»үаәІаәҒаә»аәҮаәҒаәұаәҡаә„аәіаә–аәІаәЎ):\n${faqList.map(fq=>`- Q: ${fq.question}\n  A: ${fq.answer}`).join("\n")}`
    : "";
  const userMsg = {id:"pc"+Date.now(), productId:product.id, role:"admin", message:question, createdAt:new Date().toISOString()};
  STATE.data.productChat.push(userMsg);
  STATE.chatQuestion = "";
  STATE.chatSending = true;
  STATE.chatError = "";
  render();
  dbInsertChatMsg(userMsg).catch(e=>console.error(e));

  const system = `аә—а»ҲаәІаәҷа»ҒаәЎа»Ҳаәҷаә„аә»аәҷаәҘаәІаә§а»Ғаә—а»үа»Ҷ а»Җаәӣаәұаәҷаәңаә№а»үаәҠа»Ҳаә§аәҚаә”а»үаәІаәҷаәҒаәІаәҷаә•аә°аә«аәјаәІаә”аәӘаәіаәҘаәұаәҡаә®а»үаәІаәҷаә„а»үаәІаәӯаәӯаәҷаәҘаәІаәҚа»ғаәҷаәҘаәІаә§ аә•аәӯаәҡаә„аәіаә–аәІаәЎаәҒа»ҲаәҪаә§аәҒаәұаәҡаәӘаәҙаәҷаә„а»үаәІаә•а»Қа»Ҳа»„аәӣаәҷаәөа»үа»Ӯаә”аәҚаәӯаәөаәҮа»ғаәӘа»ҲаәӮа»Қа»үаәЎаә№аәҷаә—аәөа»Ҳа»ғаә«а»үа»„аә§а»үа»Җаә—аә»а»ҲаәІаәҷаәұа»үаәҷ аә«а»үаәІаәЎа»ғаәҠа»үаәӮа»Қа»үаәЎаә№аәҷаәӮаәӯаәҮаәӘаәҙаәҷаә„а»үаәІ/а»ҒаәҡаәЈаәҷаәӯаә·а»ҲаәҷаәЎаәІаә•аәӯаәҡа»Ғаә—аәҷа»Җаә”аәұаә”аәӮаәІаә” а»Җаә–аәҙаәҮаәҲаә°аә„а»үаәІаәҚаә„аә·аәҒаәұаәҷаәҒа»Қа»Ҳаә•аәІаәЎ аә–а»үаәІаәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷаәһаәҪаәҮаәһа»Қ а»ғаә«а»үаәҡаәӯаәҒаә•аәІаәЎаәҒаә»аәҮаә§а»ҲаәІаәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷ аәўа»ҲаәІаәҒаәёаәҒаәӮа»Қа»үаәЎаә№аәҷаәӮаә¶а»үаәҷа»ҖаәӯаәҮ. аә•аәӯаәҡа»ҖаәӣаәұаәҷаәһаәІаәӘаәІаәҘаәІаә§аәҘа»үаә§аәҷа»Ҷ а»Ғаәҡаәҡаә—аәөа»Ҳаә„аә»аәҷаәҘаәІаә§а»Ғаә—а»үа»Ҷа»Җаә§аә»а»үаәІаәҒаәұаәҷаәҲаәҙаәҮ аәҡа»Қа»Ҳа»Ғаәӣаә„аәіаә•а»Қа»Ҳаә„аәіаәҲаәІаәҒаәһаәІаәӘаәІаәӯаә·а»Ҳаәҷ аәҡа»Қа»Ҳаәӣаә»аәҷаә„аәіаәӘаәұаәҡ/а»„аә§аәҚаә°аәҒаәӯаәҷаәӮаәӯаәҮаәһаәІаәӘаәІа»„аә— аә«аәјаә·аәһаәІаәӘаәІаәӯаә·а»Ҳаәҷ аәӘаәұа»үаәҷ аәҒаә»аәҮаәӣаә°а»Җаә”аәұаәҷ аәӯа»ҲаәІаәҷа»ҒаәҘа»үаә§а»Җаәӣаәұаәҷаә—аәіаәЎаә°аәҠаәІаә” аәҷаәіа»ғаәҠа»үа»„аә”а»үаәҲаәҙаәҮаәӘаәіаәҘаәұаәҡа»Ғаәӯаәұаә”аәЎаәҙаәҷаә—аәөа»ҲаәҲаә°а»Җаәӯаә»аәІа»„аәӣа»Җаә®аәұаә”аәҒаәІаәҷаә•аә°аә«аәјаәІаә”.

аәҠаә·а»ҲаәӘаәҙаәҷаә„а»үаәІ: ${product.name}
а»қаә§аә”а»қаә№а»Ҳ: ${product.category}
аәҘаәІаәҚаәҘаә°аәӯаәҪаә”: ${product.desc}
аәҘаәІаә„аәІаәӮаәІаәҚ: ${product.price ? fmt(product.price)+" аәҒаәөаәҡ" : "аәҡа»Қа»Ҳа»„аә”а»үаәҡаәұаәҷаә—аә¶аәҒа»„аә§а»ү"}
${product.highlights ? `аәҲаәёаә”а»Җаә”аәұа»Ҳаәҷ/аәӘа»Ҳаә§аәҷаәӣаә°аәӘаә»аәЎ: ${product.highlights}` : ""}
${product.benefits ? `аәӣаә°а»Ӯаә«аәҚаә”аә«аәјаәұаәҒ: ${product.benefits}` : ""}
${product.usage ? `аә§аәҙаә—аәөа»ғаәҠа»ү: ${product.usage}` : ""}
аәҡаәұаәҷаә«аәІаәҘаә№аәҒаә„а»үаәІ (pain points) аә—аәөа»Ҳаәҡаәұаәҷаә—аә¶аәҒа»„аә§а»ү: ${product.painPoints}${faqBlock}
${knowledge && knowledge.content ? `\nаәӮа»Қа»үаәЎаә№аәҷаә„аә»а»үаәҷаә„аә§а»үаәІаәҲаәІаәҒаәӯаәҙаәҷа»Җаә•аәөа»Җаәҷаәұаә” (аә„аә»а»үаәҷаә„аә§а»үаәІа»„аә§а»үаәҘа»Ҳаә§аәҮа»ңа»үаәІ):\n${knowledge.content}` : ""}`;

  try{
    const answer = await callAI(question, system);
    const aiMsg = {id:"pc"+(Date.now()+1), productId:product.id, role:"ai", message:answer, createdAt:new Date().toISOString()};
    STATE.data.productChat.push(aiMsg);
    dbInsertChatMsg(aiMsg).catch(e=>console.error(e));
  }catch(e){
    STATE.chatError = "а»ҖаәҒаәөаә”аәӮа»Қа»үаәңаәҙаә”аәһаәІаә”: " + e.message;
  }

  render();
}

function attachProductChatEvents(){
  const sel = document.getElementById("chat-product");
  if(sel) sel.addEventListener("change", ()=>{
    STATE.chatSelProduct = sel.value;
    STATE.chatKnowledgeOpen = false;
    render();
  });
  const toggleKnowledge = document.getElementById("btn-toggle-knowledge");
  if(toggleKnowledge) toggleKnowledge.addEventListener("click", ()=>{
    STATE.chatKnowledgeOpen = !STATE.chatKnowledgeOpen;
    render();
  });
  const input = document.getElementById("chat-input");
  if(input) input.addEventListener("input", ()=>{ STATE.chatQuestion = input.value; });
  const sendBtn = document.getElementById("btn-chat-send");
  if(sendBtn) sendBtn.addEventListener("click", sendProductChat);
  if(input) input.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendProductChat(); }
  });
  const log = document.getElementById("chat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

      ${STATE.analysis ? `<div class="content-out">${esc(STATE.analysis)}</div>` : ""}

async function analyzeInsights(){
  const d = STATE.data;
  if(d.insights.length===0){ STATE.analyzeError = "аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷаәҡаәұаәҷаә—аә¶аәҒ аәҒаә°аәҘаәёаәҷаәІа»Җаәһаәөа»ҲаәЎаәҡаәұаәҷаә«аәІаәҘаә№аәҒаә„а»үаәІаәҒа»Ҳаәӯаәҷ"; render(); return; }
  STATE.analyzing = true; STATE.analyzeError = ""; STATE.analysis = "";
  render();
  try{
    const list = d.insights.slice(0,30).map((i,idx)=>`${idx+1}. аә„аәіаә–аәІаәЎ: ${i.question} | аә„аәіаә•аәӯаәҡ: ${i.answer} | аәӘаәҙаәҷаә„а»үаәІ: ${i.productRelated||"-"}`).join("\n");
    const prompt = `аәҷаәөа»үа»ҒаәЎа»Ҳаәҷаәҡаәұаәҷаә—аә¶аәҒаә„аәіаә–аәІаәЎ-аә„аәіаә•аәӯаәҡаәҲаәІаәҒаәҘаә№аәҒаә„а»үаәІаә—аәөа»Ҳа»ҒаәҠаәұаә”а»ҖаәӮаә»а»үаәІаәЎаәІа»ғаәҷаә®а»үаәІаәҷаәӯаәӯаәҷаәҘаәІаәҚ:

${list}

аәҒаә°аәҘаәёаәҷаәІаә§аәҙа»Җаә„аәІаә°:
1. аә®аә№аәҡа»Ғаәҡаәҡ/а»Ғаәҷаә§а»Ӯаәҷа»үаәЎаәҡаәұаәҷаә«аәІаә—аәөа»ҲаәҘаә№аәҒаә„а»үаәІаә–аәІаәЎа»ҖаәҘаә·а»үаәӯаәҚа»Ҷ
2. аәҲаәёаә”аә—аәөа»ҲаәӘаәҙаәҷаә„а»үаәІаәӣаә°аәҲаәёаәҡаәұаәҷаәҚаәұаәҮаә•аәӯаәҡаәӘаә°а»ңаәӯаәҮаәҡа»Қа»Ҳаәһа»Қ
3. а»Ғаәҷаә§аә„аәҙаә”аәӘаәҙаәҷаә„а»үаәІа»ға»қа»Ҳ аә«аәјаә· аәҒаәІаәҷа»Ғаә•аәҒаәҘаәІаәҚаәӘаәҙаәҷаә„а»үаәІаә—аәөа»ҲаәӯаәІаә”аә•аәӯаәҡа»ӮаәҲаә”аә„аә§аәІаәЎаә•а»үаәӯаәҮаәҒаәІаәҷа»Җаә«аәјаә»а»ҲаәІаәҷаәөа»үа»„аә”а»ү (аәӘаә°а»Җа»ңаәө 2-3 а»Ғаәҷаә§аә„аәҙаә”)
4. аә„аәіа»Ғаәҷаә°аәҷаәіаәӘаәіаәҘаәұаәҡаәҒаәІаәҷаәӘа»үаәІаәҮ content а»ға»қа»Ҳ а»Ӯаә”аәҚаәӯаәөаәҮа»ғаәӘа»Ҳаәҡаәұаәҷаә«аәІаә—аәөа»Ҳаәһаә»аәҡ

аәӮаәҪаәҷа»ҖаәӣаәұаәҷаәһаәІаәӘаәІаәҘаәІаә§ аәҲаәұаә”а»қаә§аә”а»қаә№а»Ҳа»ғаә«а»үаәҲаә°а»ҒаәҲа»үаәҮ.`;
    const result = await callAI(prompt, "аә—а»ҲаәІаәҷа»ҒаәЎа»ҲаәҷаәҷаәұаәҒаә§аәҙа»Җаә„аәІаә°аәҒаәІаәҷаә•аә°аә«аәјаәІаә” аәҠа»ҲаәҪаә§аәҠаәІаәҷа»ғаәҷаәҒаәІаәҷаәӯа»ҲаәІаәҷ pattern аәҲаәІаәҒаә„аәіаә–аәІаәЎаәҘаә№аәҒаә„а»үаәІ а»Җаәһаә·а»Ҳаәӯаә„аә»а»үаәҷаәһаә»аәҡа»ӮаәӯаәҒаәІаә”аәӘаәҙаәҷаә„а»үаәІа»ға»қа»Ҳ.");
    STATE.analysis = result;
  }catch(e){
    STATE.analyzeError = "а»ҖаәҒаәөаә”аәӮа»Қа»үаәңаәҙаә”аәһаәІаә”: "+e.message;
  }

}

function exportInsightsToExcel(){
  const d = STATE.data;
  const rows = d.insights.map(i => ({
    "аәңаә№а»үаәҘаәІаәҚаәҮаәІаәҷ": i.adminName || "",
    "аә§аәұаәҷаә—аәө": i.date || "",
    "аә„аәіаә–аәІаәЎ": i.question || "",
    "аә„аәіаә•аәӯаәҡаәӮаәӯаәҮа»Ғаәӯаәұаә”аәЎаәҙаәҷ": i.answer || "",
    "аәӘаәҙаәҷаә„а»үаәІаә—аәөа»ҲаәҒа»ҲаәҪаә§аәӮа»үаәӯаәҮ": i.productRelated || "",
    "аәЎаәөаә®аә№аәҡа»Ғаәҷаәҡ": i.imageUrl ? "аәЎаәө" : "аәҡа»Қа»ҲаәЎаәө",
    "аәӯа»ҲаәІаәҷа»ҒаәҘа»үаә§": i.readByOwner ? "аәӯа»ҲаәІаәҷа»ҒаәҘа»үаә§" : "аәҚаәұаәҮаәҡа»Қа»Ҳаәӯа»ҲаәІаәҷ"
  }));
  if(rows.length===0){
    STATE.importMsg = "аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷаәҡаәұаәҷаә—аә¶аәҒа»ғаә«а»үаәӘаә»а»ҲаәҮаәӯаәӯаәҒ";
    render();
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:14},{wch:40},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "аәҡаәұаәҷаә«аәІаәҘаә№аәҒаә„а»үаәІ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `customer-insights-${stamp}.xlsx`);
}

function importInsightsFromExcel(file){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const wb = XLSX.read(e.target.result, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
      const newItems = [];
      rows.forEach((r, idx) => {
        const question = r["аә„аәіаә–аәІаәЎ"] || r["question"] || r["Question"] || "";
        const answer = r["аә„аәіаә•аәӯаәҡ"] || r["answer"] || r["Answer"] || "";
        const productRelated = r["аәӘаәҙаәҷаә„а»үаәІаә—аәөа»ҲаәҒа»ҲаәҪаә§аәӮа»үаәӯаәҮ"] || r["product"] || r["Product"] || "";
        const date = r["аә§аәұаәҷаә—аәө"] || r["date"] || r["Date"] || new Date().toLocaleDateString("lo-LA", {timeZone: LAOS_TZ});
        if(String(question).trim()){
          newItems.push({
            id:"i"+Date.now()+"-"+idx,
            question:String(question), answer:String(answer),
            productRelated:String(productRelated), date:String(date)
          });
        }
      });
      if(newItems.length>0){
        STATE.data.insights.unshift(...newItems);
        await dbInsertInsightsBulk(newItems);
      }
      STATE.importMsg = newItems.length>0
        ? `аәҷаәіа»ҖаәӮаә»а»үаәІаәӘаәіа»ҖаәҘаәұаә”: а»Җаәһаәөа»ҲаәЎ ${newItems.length} аәҘаәІаәҚаәҒаәІаәҷа»ға»қа»Ҳ`
        : "аәҡа»Қа»Ҳаәһаә»аәҡа»Ғаә–аә§аә—аәөа»ҲаәЎаәөаә„аәіаә–аәІаәЎа»ғаәҷа»„аәҹаәҘа»Ң вҖ” аәҒаә°аәҘаәёаәҷаәІаәҒаә§аә”аә«аә»аә§аә„а»ҚаәҘаәІаәЎа»Ңа»ғаә«а»үаәҒаә»аәҮаәҒаәұаәҡ 'аә„аәіаә–аәІаәЎ', 'аә„аәіаә•аәӯаәҡ', 'аәӘаәҙаәҷаә„а»үаәІаә—аәөа»ҲаәҒа»ҲаәҪаә§аәӮа»үаәӯаәҮ', 'аә§аәұаәҷаә—аәө'";
    }catch(err){
      STATE.importMsg = "аәӯа»ҲаәІаәҷа»„аәҹаәҘа»Ңаәҡа»Қа»ҲаәӘаәіа»ҖаәҘаәұаә”: " + err.message;
    }
    render();
  };
  reader.readAsArrayBuffer(file);
}

function isOwner(){ return STATE.currentUser && STATE.currentUser.role==="owner"; }

    ? allMyReports.filter(r=>r.accusedName===filterAccused)
    : allMyReports;

  // Build accused-name options from actual reports data, so the filter always covers

      </div>
      <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
        ${owner ? `
        <select id="rep-filter-accused" style="margin-bottom:0; width:auto; min-width:180px;">
          <option value="">вҖ” аә„аә»аәҷа»Җаә®аәұаә”аәңаәҙаә”: аә—аәұаәҮа»қаә»аә” вҖ”</option>
          ${accusedOptions.map(n=>`<option value="${esc(n)}" ${filterAccused===n?'selected':''}>${esc(n)}</option>`).join("")}

          <button class="btn btn-sm ${viewMode==='list'?'':'btn-outline'}" style="${viewMode==='list'?'':'background:none; color:var(--muted); border:none;'}" data-report-view="list">вҳ° List</button>
        </div>
        ${owner ? `<button class="btn btn-outline btn-sm" id="btn-export-reports-excel">аәӘаә»а»ҲаәҮаәӯаәӯаәҒ Excel</button>` : ""}
      </div>
    </div>

    ${!owner ? `
    <div class="card">
      <h3>аәӘа»үаәІаәҮаәҘаәІаәҚаәҮаәІаәҷа»ға»қа»Ҳ</h3>
      <label>а»қаә§аә”а»қаә№а»ҲаәӮа»Қа»үаәңаәҙаә”аәһаәІаә”</label>
      <select id="rep-category">
        <option value="">вҖ” а»ҖаәҘаә·аәӯаәҒа»қаә§аә”а»қаә№а»Ҳ вҖ”</option>
        ${REPORT_CATEGORIES.map(c=>`<option value="${c}" ${f.category===c?'selected':''}>${c}</option>`).join("")}
      </select>
      <label>аә„аә»аәҷа»Җаә®аәұаә”аәңаәҙаә” (аәҡа»Қа»ҲаәҡаәұаәҮаә„аәұаәҡ)</label>
      <select id="rep-accused">
        <option value="">вҖ” аәҡа»Қа»ҲаәҘаә°аәҡаәё вҖ”</option>
        ${userNames.map(n=>`<option value="${esc(n)}" ${f.accusedName===n?'selected':''}>${esc(n)}</option>`).join("")}

          <button type="button" id="rep-image-remove" title="аәҘаә»аәҡаә®аә№аәҡ" style="position:absolute; top:-8px; right:-8px; width:26px; height:26px; border-radius:50%; background:var(--danger); color:#fff; border:2px solid #fff; font-size:14px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;">&#10005;</button>
        </div>` : ""}
      </div>
      <button class="btn" id="btn-submit-report">аәӘаә»а»ҲаәҮаәҘаәІаәҚаәҮаәІаәҷ</button>
    </div>

    <div class="card">
      <h3>${owner ? "аәҘаәІаәҚаәҮаәІаәҷ ("+myReports.length+(filterAccused?" / "+allMyReports.length+" аә—аәұаәҮа»қаә»аә”":"")+")" : "аәҘаәІаәҚаәҮаәІаәҷаәӮаәӯаәҮаәӮа»үаәӯаәҚ ("+myReports.length+")"}</h3>

function exportReportsToExcel(){
  const d = STATE.data;
  const rows = d.reports.map(r => ({
    "аәңаә№а»үаәҘаәІаәҚаәҮаәІаәҷ": r.adminName || "",
    "аә„аә»аәҷа»Җаә®аәұаә”аәңаәҙаә”": r.accusedName || "",
    "а»қаә§аә”а»қаә№а»Ҳ": r.category || "",
    "аәҘаәІаәҚаәҘаә°аәӯаәҪаә”": r.detail || "",
    "аә§аәұаәҷ-а»Җаә§аәҘаәІ": r.createdAt ? new Date(r.createdAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ}) : "",
    "аәЎаәөаә®аә№аәҡа»Ғаәҷаәҡ": r.imageUrl ? "аәЎаәө" : "аәҡа»Қа»ҲаәЎаәө",
    "аәӯа»ҲаәІаәҷа»ҒаәҘа»үаә§": r.readByOwner ? "аәӯа»ҲаәІаәҷа»ҒаәҘа»үаә§" : "аәҚаәұаәҮаәҡа»Қа»Ҳаәӯа»ҲаәІаәҷ"
  }));
  if(rows.length===0){ return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:16},{wch:22},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "аәҘаәІаәҚаәҮаәІаәҷаәӮа»Қа»үаәңаәҙаә”аәһаәІаә”");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `error-reports-${stamp}.xlsx`);
}

function attachReportEvents(){
  const exportRepBtn = document.getElementById("btn-export-reports-excel");
  if(exportRepBtn) exportRepBtn.addEventListener("click", exportReportsToExcel);
  document.querySelectorAll("[data-report-view]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.reportViewMode = el.getAttribute("data-report-view");
      render();
    });
  });

  const filterAccEl = document.getElementById("rep-filter-accused");
  if(filterAccEl) filterAccEl.addEventListener("change", ()=>{
    STATE.reportFilterAccused = filterAccEl.value;
    render();
  });

  const catEl = document.getElementById("rep-category");
  const accEl = document.getElementById("rep-accused");
  const detEl = document.getElementById("rep-detail");
  const imgEl = document.getElementById("rep-image-input");

  if(catEl) catEl.addEventListener("change", ()=>{ STATE.reportForm.category = catEl.value; });
  if(accEl) accEl.addEventListener("change", ()=>{ STATE.reportForm.accusedName = accEl.value; });
  if(detEl) detEl.addEventListener("input", ()=>{ STATE.reportForm.detail = detEl.value; });
  if(imgEl) imgEl.addEventListener("change", ()=>{
    const file = imgEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{ STATE.reportForm.imageBase64 = e.target.result; render(); };
    reader.readAsDataURL(file);
  });
  const imgRemoveBtn = document.getElementById("rep-image-remove");
  if(imgRemoveBtn) imgRemoveBtn.addEventListener("click", ()=>{
    STATE.reportForm.imageBase64 = "";
    if(imgEl) imgEl.value = "";
    render();
  });

  const submitBtn = document.getElementById("btn-submit-report");
  if(submitBtn) submitBtn.addEventListener("click", async ()=>{
    const f = STATE.reportForm;
    if(!f.category){ alert("аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒа»қаә§аә”а»қаә№а»ҲаәӮа»Қа»үаәңаәҙаә”аәһаәІаә”"); return; }
    const newReport = {
      id:"rep"+Date.now(),
      adminName: STATE.currentUser?.name || "",
      category: f.category,
      accusedName: f.accusedName || "",
      detail: f.detail,
      imageUrl: f.imageBase64 || "",
      createdAt: new Date().toISOString(),
      readByOwner: false
    };
    STATE.data.reports.unshift(newReport);
    STATE.reportForm = {category:"", detail:"", imageBase64:"", accusedName:""};
    render();
    dbInsertReport(newReport).catch(err=>console.error(err));
    silentRefresh();
  });

  document.querySelectorAll("[data-del-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-report");
      STATE.data.reports = STATE.data.reports.filter(r=>r.id!==id);
      render();
      dbDeleteReport(id).catch(err=>console.error(err));
    });
  });

  document.querySelectorAll("[data-view-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-view-report");
      const r = STATE.data.reports.find(x=>x.id===id);
      if(!r) return;
      STATE.viewingReport = r;
      render();
      if(isOwner() && !r.readByOwner){
        r.readByOwner = true;
        dbMarkReportRead(id).catch(err=>console.error(err));
      }
    });
  });
  const repModalBg = document.getElementById("report-modal-bg");
  if(repModalBg) repModalBg.addEventListener("click", (e)=>{
    if(e.target.id==="report-modal-bg"){ STATE.viewingReport=null; render(); }
  });
  const closeRepModal = document.getElementById("close-report-modal");
  if(closeRepModal) closeRepModal.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
  const closeRepModalBtn = document.getElementById("close-report-modal-btn");
  if(closeRepModalBtn) closeRepModalBtn.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
}

function fmtTime(ts){
  if(!ts) return "-";
  return new Date(ts).toLocaleTimeString("lo-LA", {hour:"2-digit", minute:"2-digit", second:"2-digit", timeZone: LAOS_TZ});
}
function fmtDuration(inTs, outTs){
  if(!inTs || !outTs) return "-";
  const ms = new Date(outTs) - new Date(inTs);
  if(ms<=0) return "-";
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${h} аәҠаәЎ ${m} аәҷаә— ${s} аә§`;
}

const PAPER_SIZES = {label:{w:100, h:150}, a4:{w:210, h:297}}; // physical page size in mm, used to keep the editor and print output true to the real paper
// Converts an old (v1.11-v1.13) block-array template вҖ” {id,field,x,y,w,h,fontSize,bold,align,border:bool} вҖ”
// into the new row/cell table format, so previously-saved templates keep working instead of breaking.
function normalizeLabelTemplate(raw){
  if(!raw || !raw.length) return null;
  if(raw[0] && Array.isArray(raw[0].cells)) return JSON.parse(JSON.stringify(raw)); // already new format
  return [...raw].sort((a,b)=>(a.y||0)-(b.y||0)).map(b=>({
    id: "row_"+b.id,
    heightMm: b.h || null,
    cells: [{
      id: "cell_"+b.id, field: b.field, widthPct: 100,
      fontSize: b.fontSize||3.2, bold: !!b.bold, align: b.align||"left",
      border: {top:"none", right:"none", bottom: b.border?"thin":"none", left:"none"}
    }]
  }));
}
function labelFieldValue(field, l, settings){
  switch(field){
    case "labelNumber": return String(l.labelNumber||"");
    case "shopName": return settings.shopName||"";
    case "shopPhone": return "а»Ӯаә—: " + (settings.shopPhone||"");
    case "createdTime": return "аә§аәұаәҷаә—аәөа»ҲаәӘа»үаәІаәҮ: " + new Date(l.createdAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ, hour:"2-digit", minute:"2-digit", day:"2-digit", month:"2-digit", year:"numeric"});
    case "courierName": return l.courierName ? "аәӮаә»аәҷаәӘаә»а»ҲаәҮ: "+l.courierName : "";
    case "recipient": return "аәңаә№а»үаә®аәұаәҡ: " + (l.recipientName||"") + "  " + (l.recipientPhone||"") + "\n" + (l.address||"");
    case "item": return (l.itemText||"") + (l.qty>1 ? " x "+l.qty : "");
    case "note": return l.note ? "а»қаәІаәҚа»Җаә«аә”: "+l.note : "";
    case "cod": return "а»ҖаәҒаәұаәҡа»ҖаәҮаәҙаәҷ(COD): " + fmt(l.codAmount) + " K   [" + (l.freeShipping?"аәқаәІаәҒаәҹаәЈаәө":"а»ҖаәҒаәұаәҡаәӣаәІаәҚаә—аәІаәҮ") + "]";
    case "footer": return settings.footerText||"";
    default: return "";
  }
}
function renderLabelCell(cell, l, settings, opts){
  opts = opts || {};
  const editable = !!opts.editable;
  const isRealPrint = !!opts.isRealPrint;
  const selected = editable && STATE.selectedCellIds.includes(cell.id);
  const b = cell.border || {top:"none",right:"none",bottom:"none",left:"none"};
  const borderCss = `border-top:${BORDER_WIDTH_CSS[b.top]||'none'}; border-right:${BORDER_WIDTH_CSS[b.right]||'none'}; border-bottom:${BORDER_WIDTH_CSS[b.bottom]||'none'}; border-left:${BORDER_WIDTH_CSS[b.left]||'none'};`;
  // flex-basis (not table/td) вҖ” each row lays its own cells out independently, so a 3-cell
  // row can never distort the column widths of a neighbouring 1-cell or 2-cell row.
  const style = `flex:0 0 ${cell.widthPct}%; max-width:${cell.widthPct}%; box-sizing:border-box; font-size:${cell.fontSize}mm; font-weight:${cell.bold?700:400}; text-align:${cell.align||'left'}; padding:1.1mm 1.6mm; white-space:pre-wrap; word-break:break-word; overflow-wrap:break-word; line-height:1.28; color:#111; display:flex; align-items:center; ${cell.align==='center'?'justify-content:center;':cell.align==='right'?'justify-content:flex-end;':''} ${borderCss} ${editable?`outline:1px dashed ${selected?'#c9683f':'#ccc'}; outline-offset:-1px; cursor:pointer; position:relative;`:'position:relative;'}`;
  const inner = cell.field==="barcode"
    ? (isRealPrint
        ? `<div style="text-align:center; width:100%;"><svg id="label-barcode" style="${STATE.barcodeStatus==='ready'?'':'display:none;'}"></svg>${STATE.barcodeStatus==="loading"?'<div class="no-print barcode-loading-indicator" style="font-size:10px; color:#888;">вҸі аәҒаәіаәҘаәұаәҮа»Ӯаә«аәјаә” barcode...</div>':''}${STATE.barcodeStatus==="error"?'<div class="no-print barcode-error-indicator" style="font-size:10px; color:red;">вҡ пёҸ Barcode аәӯаәӯаәҒаәҡа»Қа»Ҳа»„аә”а»ү вҖ” аәўа»ҲаәІаәһаәҙаәЎаәҒа»ҲаәӯаәҷаәҘаәӯаәҮа»ға»қа»Ҳ<br/><button class="btn btn-sm btn-outline" id="btn-retry-barcode" style="margin-top:6px;">рҹ”„ аәҘаәӯаәҮа»ға»қа»Ҳ</button></div>':''}</div>`
        : `<div style="text-align:center; width:100%;">${renderFakeBarcodeSvg()}</div>`)
    : `<div style="width:100%;">${esc(labelFieldValue(cell.field, l, settings))}</div>`;
  // A thin drag handle along the bottom edge of every editable cell вҖ” grabbing any cell
  // in a row lets you drag that row's height, since a row's cells always share one height.
  const resizeHandle = editable ? `<div class="tpl-row-resize-handle" data-row-id="${opts.rowId||''}" style="position:absolute; left:0; right:0; bottom:-3px; height:6px; cursor:ns-resize; z-index:5;" title="аәҘаәІаәҒа»Җаәһаә·а»Ҳаәӯаәӣаәұаәҡаә„аә§аәІаәЎаәӘаә№аәҮа»Ғаә–аә§"></div>` : "";
  return `<div class="tpl-cell" data-cell-id="${cell.id}" data-row-id="${opts.rowId||''}" style="${style}">${inner}${resizeHandle}</div>`;
}
function renderLabelTable(rows, l, settings, opts){
  return `<div style="display:flex; flex-direction:column; width:100%;">
    ${rows.map(row=>`<div class="tpl-row" data-row-id="${row.id}" style="display:flex; width:100%; ${row.heightMm?`min-height:${row.heightMm}mm;`:''}">${row.cells.map(c=>renderLabelCell(c, l, settings, {...opts, rowId:row.id})).join("")}</div>`).join("")}
  </div>`;
}
// Returns info for every currently-selected cell, in template order (row by row, left to right).
function getSelectedCellsInfo(){
  if(!STATE.labelTemplate) return [];
  const out = [];
  STATE.labelTemplate.forEach((row, ri)=>{
    row.cells.forEach((cell, ci)=>{
      if(STATE.selectedCellIds.includes(cell.id)) out.push({row, rowIndex:ri, cell, cellIndex:ci});
    });
  });
  return out;
}
// Flat, ordered list of every cell (for shift-click range selection).
function flatCellList(){
  const out = [];
  (STATE.labelTemplate||[]).forEach((row, ri)=>{
    row.cells.forEach((cell, ci)=>out.push({row, rowIndex:ri, cell, cellIndex:ci}));
  });
  return out;
}

// ---- Undo / redo for the template editor ----
function pushTemplateHistory(){
  if(!STATE.labelTemplate) return;
  STATE.templateUndoStack.push(JSON.stringify(STATE.labelTemplate));
  if(STATE.templateUndoStack.length>50) STATE.templateUndoStack.shift();
  STATE.templateRedoStack = [];
}
function undoTemplate(){
  if(STATE.templateUndoStack.length===0) return;
  STATE.templateRedoStack.push(JSON.stringify(STATE.labelTemplate));
  STATE.labelTemplate = JSON.parse(STATE.templateUndoStack.pop());
  STATE.selectedCellIds = [];
  render();
}
function redoTemplate(){
  if(STATE.templateRedoStack.length===0) return;
  STATE.templateUndoStack.push(JSON.stringify(STATE.labelTemplate));
  STATE.labelTemplate = JSON.parse(STATE.templateRedoStack.pop());
  STATE.selectedCellIds = [];
  render();
}

// Pulls an adjacent row's cells into the given row, side by side, and removes the now-empty
// adjacent row вҖ” e.g. select a cell in the "shop name" row and merge with the next row to
// get shop name + phone on one line, without manually re-splitting/reassigning fields.
function mergeRowWithNeighbor(rowIndex, direction){
  const neighborIndex = rowIndex + direction;
  if(!STATE.labelTemplate || neighborIndex<0 || neighborIndex>=STATE.labelTemplate.length) return;
  pushTemplateHistory();
  const row = STATE.labelTemplate[rowIndex];
  const neighbor = STATE.labelTemplate[neighborIndex];
  const mergedCells = direction<0 ? [...neighbor.cells, ...row.cells] : [...row.cells, ...neighbor.cells];
  const evenWidth = Math.floor(100/mergedCells.length);
  mergedCells.forEach((c,i)=>{ c.widthPct = (i===mergedCells.length-1) ? (100-evenWidth*(mergedCells.length-1)) : evenWidth; });
  const mergedRow = {id:"row"+Date.now(), heightMm:null, cells:mergedCells};
  STATE.labelTemplate.splice(Math.min(rowIndex, neighborIndex), 2, mergedRow);
  STATE.selectedCellIds = mergedCells.map(c=>c.id);
  render();
}

  {id:"top",     label:"аәӮаәӯаәҡа»Җаә—аәҙаәҮ"},
  {id:"left",    label:"аәӮаәӯаәҡаәҠа»үаәІаәҚ"},
  {id:"right",   label:"аәӮаәӯаәҡаәӮаә§аәІ"},
  {id:"none",    label:"аәҡа»Қа»ҲаәЎаәөа»ҖаәӘаәұа»үаәҷаәӮаәӯаәҡ"},
  {id:"all",     label:"аәӮаәӯаәҡаә—аәұаәҮа»қаә»аә”"},
  {id:"outside", label:"аәӮаәӯаәҡаәӯа»үаәӯаәЎаәҷаәӯаәҒ"},
  {id:"thickbox",label:"аәӮаәӯаәҡа»ңаәІаәӯа»үаәӯаәЎаәҷаәӯаәҒ"}
];
function applyBorderAction(actionId, thickness){
  const cells = getSelectedCellsInfo();
  if(cells.length===0) return;
  pushTemplateHistory();
  const w = thickness==="thick" ? "thick" : "thin";
  if(actionId==="none"){
    cells.forEach(({cell})=>{ cell.border = {top:"none",right:"none",bottom:"none",left:"none"}; });
  } else if(actionId==="all"){
    cells.forEach(({cell})=>{ cell.border = {top:w,right:w,bottom:w,left:w}; });
  } else if(actionId==="top" || actionId==="bottom" || actionId==="left" || actionId==="right"){
    cells.forEach(({cell})=>{ cell.border[actionId] = w; });
  } else if(actionId==="outside" || actionId==="thickbox"){
    const outsideW = actionId==="thickbox" ? "thick" : w;
    // Group selected cells by row, in template order, to work out which sides face
    // the outside edge of the selection block (top row / bottom row / first / last in row).
    const byRow = {};
    cells.forEach(info=>{ (byRow[info.rowIndex] = byRow[info.rowIndex]||[]).push(info); });
    const rowIndices = Object.keys(byRow).map(Number).sort((a,b)=>a-b);
    const minRow = rowIndices[0], maxRow = rowIndices[rowIndices.length-1];
    rowIndices.forEach(ri=>{
      const rowCells = byRow[ri].sort((a,b)=>a.cellIndex-b.cellIndex);
      rowCells.forEach((info, idx)=>{
        if(ri===minRow) info.cell.border.top = outsideW;
        if(ri===maxRow) info.cell.border.bottom = outsideW;
        if(idx===0) info.cell.border.left = outsideW;
        if(idx===rowCells.length-1) info.cell.border.right = outsideW;
      });
    });
  }
  render();
}

function renderFakeBarcodeSvg(){
  const widths = [2,1,3,1,2,3,1,1,2,3,1,2,1,3,2,1,1,3,2,1,2,1,3,1,2,3,1,1,2,1];
  let x = 0, bars = "";
  widths.forEach((w,i)=>{
    if(i%2===0) bars += `<rect x="${x}" y="0" width="${w*2}" height="46" fill="#000"/>`;
    x += w*2;
  });
  return `<svg viewBox="0 0 ${x} 46" style="width:180px; height:46px;">${bars}</svg>`;
}

function processScanCode(code){
  const trimmed = String(code).trim();
  if(!trimmed) return;
  const label = STATE.data.shippingLabels.find(l=>String(l.labelNumber)===trimmed);
  const scan = {
    id:"sc"+Date.now(),
    labelId: label ? label.id : "",
    scannedCode: trimmed,
    matched: !!label,
    recipientName: label ? label.recipientName : "",
    recipientPhone: label ? label.recipientPhone : "",
    address: label ? label.address : "",
    codAmount: label ? label.codAmount : 0,
    courierName: label ? label.courierName : "",
    scannedAt: new Date().toISOString(),
    scannedBy: STATE.currentUser ? STATE.currentUser.name : ""
  };
  STATE.data.packageScans.unshift(scan);
  STATE.lastScanResult = scan;
  STATE.scanInputValue = "";
  STATE.scanError = "";
  render();
  dbInsertPackageScan(scan).catch(err=>console.error(err));
  silentRefresh();
  setTimeout(()=>{
    const hw = document.getElementById("scan-hardware-input");
    if(hw) hw.focus();
  }, 50);
}

function stopCamera(){
  if(STATE.cameraScanInterval){ clearInterval(STATE.cameraScanInterval); STATE.cameraScanInterval = null; }
  if(STATE.cameraStream){ STATE.cameraStream.getTracks().forEach(t=>t.stop()); STATE.cameraStream = null; }
  STATE.cameraActive = false;
}

function attachScanOutEvents(){
  document.querySelectorAll("[data-scan-mode]").forEach(el=>{
    el.addEventListener("click", ()=>{
      stopCamera();
      STATE.scanMode = el.getAttribute("data-scan-mode");
      STATE.scanError = "";
      render();
    });
  });

  const hwInput = document.getElementById("scan-hardware-input");
  if(hwInput){
    hwInput.addEventListener("input", ()=>{ STATE.scanInputValue = hwInput.value; });
    hwInput.addEventListener("keydown", (e)=>{
      if(e.key==="Enter"){
        e.preventDefault();
        processScanCode(hwInput.value);
      }
    });
    hwInput.focus();
  }

  const manualInput = document.getElementById("scan-manual-input");
  if(manualInput) manualInput.addEventListener("input", ()=>{ STATE.scanInputValue = manualInput.value; });

  const manualSubmitBtn = document.getElementById("btn-scan-manual-submit");
  if(manualSubmitBtn) manualSubmitBtn.addEventListener("click", ()=>{ processScanCode(STATE.scanInputValue); });

  const startCameraBtn = document.getElementById("btn-start-camera");
  if(startCameraBtn) startCameraBtn.addEventListener("click", async ()=>{
    if(!window.BarcodeDetector){
      STATE.scanError = "аәӯаәёаәӣаә°аәҒаәӯаәҷ/browser аәҷаәөа»үаәҡа»Қа»Ҳаә®аәӯаәҮаә®аәұаәҡаәҒаәІаәҷаәӘаә°а»ҒаәҒаәҷаәңа»ҲаәІаәҷаәҒа»үаәӯаәҮ аәҒаә°аәҘаәёаәҷаәІа»ғаәҠа»үа»Җаә„аә·а»ҲаәӯаәҮаәӘаә°а»ҒаәҒаәҷ USB аә«аәјаә·аәһаәҙаәЎа»ҖаәҘаәҒа»ҖаәӯаәҮа»Ғаә—аәҷ";
      render();
      return;
    }
    STATE.scanError = "";
    STATE.cameraActive = true;
    render();
    try{
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      STATE.cameraStream = stream;
      const video = document.getElementById("scan-camera-video");
      if(!video){ stopCamera(); render(); return; }
      video.srcObject = stream;
      await video.play();
      const detector = new BarcodeDetector({formats:["code_128"]});
      STATE.cameraScanInterval = setInterval(async ()=>{
        if(!STATE.cameraActive) return;
        try{
          const codes = await detector.detect(video);
          if(codes && codes.length>0){
            const value = codes[0].rawValue;
            stopCamera();
            processScanCode(value);
          }
        }catch(e){ /* ignore per-frame detection errors */ }
      }, 400);
    }catch(e){
      STATE.scanError = "а»Җаәӣаәөаә”аәҒа»үаәӯаәҮаәҡа»Қа»Ҳа»„аә”а»ү: " + e.message;
      STATE.cameraActive = false;
      render();
    }
  });

  const stopCameraBtn = document.getElementById("btn-stop-camera");
  if(stopCameraBtn) stopCameraBtn.addEventListener("click", ()=>{
    stopCamera();
    render();
  });
}

function getLocation(highAccuracy, timeoutMs){
  // IMPORTANT: on some mobile browsers (notably iOS Safari when Location
  // Services are off at the OS level), getCurrentPosition() never calls
  // EITHER callback and ignores its own `timeout` option вҖ” leaving the
  // button stuck on "аәҒаәіаәҘаәұаәҮаә«аәІаә•аәіа»Ға»ңа»ҲаәҮ..." forever. We guard against that by
  // racing the browser API against our own hard timeout, so this function
  // is GUARANTEED to resolve within timeoutMs+2s no matter what.
  return new Promise((resolve)=>{
    let settled = false;
    const finish = (result)=>{
      if(settled) return;
      settled = true;
      resolve(result);
    };

    if(!navigator.geolocation){
      finish({lat:null, lng:null, error:"аәӯаәёаәӣаә°аәҒаәӯаәҷ аә«аәјаә· browser аәҷаәөа»үаәҡа»Қа»Ҳаә®аәӯаәҮаә®аәұаәҡ GPS", code:0});
      return;
    }
    if(location.protocol!=="https:" && location.hostname!=="localhost"){
      finish({lat:null, lng:null, error:"а»ңа»үаәІаәҷаәөа»үаә•а»үаәӯаәҮа»Җаәӣаәөаә”аәңа»ҲаәІаәҷ https аәҲаә¶а»ҲаәҮаәҲаә°аәӮа»Қаә•аәіа»Ға»ңа»ҲаәҮа»„аә”а»ү", code:0});
      return;
    }

    const hardTimeout = setTimeout(()=>{
      finish({lat:null, lng:null, error:"аә«аәІаә•аәіа»Ға»ңа»ҲаәҮаәҡа»Қа»Ҳа»„аә”а»үаәһаәІаәҚа»ғаәҷа»Җаә§аәҘаәІ", code:3});
    }, timeoutMs + 2000);

    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        clearTimeout(hardTimeout);
        finish({lat:pos.coords.latitude, lng:pos.coords.longitude, error:null, code:null});
      },
      (err)=>{
        clearTimeout(hardTimeout);
        let msg = "аәҡа»Қа»ҲаәӘаәІаәЎаәІаә”аә«аәІаә•аәіа»Ға»ңа»ҲаәҮа»„аә”а»ү";
        if(err.code===1) msg = "browser аәҡа»Қа»Ҳаәӯаә°аәҷаәёаәҚаәІаә”аә•аәіа»Ға»ңа»ҲаәҮ (Location) а»ғаә«а»үа»ңа»үаәІаәҷаәөа»ү";
        else if(err.code===2) msg = "аәӯаәёаәӣаә°аәҒаәӯаәҷаә«аәІаә•аәіа»Ға»ңа»ҲаәҮаәҡа»Қа»Ҳа»„аә”а»ү (Location Services аәӯаәІаә”аә–аә·аәҒаәӣаәҙаә”)";
        else if(err.code===3) msg = "аә«аәІаә•аәіа»Ға»ңа»ҲаәҮа»ғаәҠа»үа»Җаә§аәҘаәІаә”аә»аәҷа»ҖаәҒаәөаәҷа»„аәӣ";
        finish({lat:null, lng:null, error: msg, code: err.code});
      },
      {enableHighAccuracy: highAccuracy, timeout: timeoutMs, maximumAge:0}
    );
  });
}

// Tries a quick high-accuracy fix first, then falls back to a looser
// network-based fix if that fails. Many devices fail on high-accuracy GPS
// (indoors, GPS chip busy) but succeed instantly with network location.
async function getLocationWithFallback(){
  let loc = await getLocation(true, 8000);
  if(loc.error && loc.code!==1){ // don't bother retrying if permission was denied outright
    loc = await getLocation(false, 6000);
  }
  return loc;
}

// Purely client-side ticking clock (no Supabase calls whatsoever вҖ” safe
// under the no-polling rule). Updates one <div> textContent every second
// while the "clocked in, not out yet" card is on screen; stopped/cleared
// whenever the page re-renders or navigates away so it never stacks up.
if(!window.__attendanceTimerHandle) window.__attendanceTimerHandle = null;
function stopLiveElapsedTimer(){
  if(window.__attendanceTimerHandle){
    clearInterval(window.__attendanceTimerHandle);
    window.__attendanceTimerHandle = null;
  }
}
function startLiveElapsedTimer(){
  stopLiveElapsedTimer();
  const el = document.getElementById("live-elapsed-timer");
  if(!el) return;
  const clockInTs = el.getAttribute("data-clock-in");
  if(!clockInTs) return;
  const clockInMs = new Date(clockInTs).getTime();
  const tick = ()=>{
    const liveEl = document.getElementById("live-elapsed-timer");
    if(!liveEl){ stopLiveElapsedTimer(); return; }
    const ms = Math.max(0, Date.now() - clockInMs);
    const h = String(Math.floor(ms/3600000)).padStart(2,"0");
    const m = String(Math.floor((ms%3600000)/60000)).padStart(2,"0");
    const s = String(Math.floor((ms%60000)/1000)).padStart(2,"0");
    liveEl.textContent = `${h}:${m}:${s}`;
  };
  tick();
  window.__attendanceTimerHandle = setInterval(tick, 1000);
}

function attachTemplateEditorEvents(){
  const tplSettings = STATE.data.labelSettings || {paperSize:"label"};
  const paperMm = PAPER_SIZES[tplSettings.paperSize] || PAPER_SIZES.label;
  const addRowBtn = document.getElementById("btn-tpl-add-row");
  if(addRowBtn) addRowBtn.addEventListener("click", ()=>{
    if(!STATE.labelTemplate) return;
    pushTemplateHistory();
    const newRow = {id:"row"+Date.now(), cells:[{id:"cell"+Date.now(), field:"note", widthPct:100, fontSize:3.2, bold:false, align:"left", border:{top:"thin",right:"none",bottom:"none",left:"none"}}]};
    STATE.labelTemplate.push(newRow);
    STATE.selectedCellIds = [newRow.cells[0].id];
    STATE.selectionAnchorId = newRow.cells[0].id;
    render();
  });

  const undoBtn = document.getElementById("btn-tpl-undo");
  if(undoBtn) undoBtn.addEventListener("click", undoTemplate);
  const redoBtn = document.getElementById("btn-tpl-redo");
  if(redoBtn) redoBtn.addEventListener("click", redoTemplate);

  const thinBtn = document.getElementById("btn-thickness-thin");
  if(thinBtn) thinBtn.addEventListener("click", ()=>{ STATE.tplBorderThickness = "thin"; render(); });
  const thickBtn = document.getElementById("btn-thickness-thick");
  if(thickBtn) thickBtn.addEventListener("click", ()=>{ STATE.tplBorderThickness = "thick"; render(); });

  document.querySelectorAll(".tpl-border-action").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      applyBorderAction(btn.getAttribute("data-border-action"), STATE.tplBorderThickness);
    });
  });

  const clearSelBtn = document.getElementById("btn-tpl-clear-selection");
  if(clearSelBtn) clearSelBtn.addEventListener("click", ()=>{
    STATE.selectedCellIds = [];
    STATE.selectionAnchorId = "";
    render();
  });

  // Click a cell to select it вҖ” like Excel: plain click = select just this cell (and
  // becomes the range anchor), Shift+click = select every cell between the anchor and
  // this one, Ctrl/Cmd+click = add/remove just this cell from the current selection.
  const preview = document.getElementById("tpl-live-preview");
  if(preview) preview.addEventListener("click", (e)=>{
    if(e.target.closest(".tpl-row-resize-handle")) return;
    const td = e.target.closest("[data-cell-id]");
    if(!td) return;
    const id = td.getAttribute("data-cell-id");
    if(e.shiftKey && STATE.selectionAnchorId){
      const flat = flatCellList();
      const anchorIdx = flat.findIndex(f=>f.cell.id===STATE.selectionAnchorId);
      const clickIdx = flat.findIndex(f=>f.cell.id===id);
      if(anchorIdx!==-1 && clickIdx!==-1){
        const lo = Math.min(anchorIdx, clickIdx), hi = Math.max(anchorIdx, clickIdx);
        STATE.selectedCellIds = flat.slice(lo, hi+1).map(f=>f.cell.id);
      }
    } else if(e.ctrlKey || e.metaKey){
      if(STATE.selectedCellIds.includes(id)){
        STATE.selectedCellIds = STATE.selectedCellIds.filter(x=>x!==id);
      } else {
        STATE.selectedCellIds = [...STATE.selectedCellIds, id];
      }
      STATE.selectionAnchorId = id;
    } else {
      STATE.selectedCellIds = [id];
      STATE.selectionAnchorId = id;
    }
    render();
  });

  // Drag the handle along a row's bottom edge to set that row's height with the mouse,
  // instead of typing a number вҖ” the overall label canvas stays fixed to the paper size
  // set in "вҡҷпёҸ аә•аәұа»үаәҮаә„а»ҲаәІа»ғаәҡаәҡаәҙаәҷ" (100x150mm etc); only the individual row grows/shrinks.
  if(preview) preview.addEventListener("pointerdown", (e)=>{
    const handle = e.target.closest(".tpl-row-resize-handle");
    if(!handle) return;
    e.preventDefault();
    const rowId = handle.getAttribute("data-row-id");
    const row = STATE.labelTemplate && STATE.labelTemplate.find(r=>r.id===rowId);
    const rowEl = preview.querySelector(`.tpl-row[data-row-id="${rowId}"]`);
    if(!row || !rowEl) return;
    pushTemplateHistory();
    const pxPerMm = rowEl.getBoundingClientRect().width / paperMm.w;
    const startHeightPx = rowEl.getBoundingClientRect().height;
    const startY = e.clientY;
    const onMove = (ev)=>{
      const dyPx = ev.clientY - startY;
      const newHeightMm = Math.max(3, (startHeightPx + dyPx) / pxPerMm);
      row.heightMm = Math.round(newHeightMm*10)/10;
      updateTemplateLivePreview();
    };
    const onUp = ()=>{
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      render();
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  });

  const selCells = getSelectedCellsInfo();
  const single = selCells.length===1 ? selCells[0] : null;
  if(single){
    const fieldSel = document.getElementById("tpl-cell-field");
    if(fieldSel) fieldSel.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.field = fieldSel.value; render(); });

    const widthInp = document.getElementById("tpl-cell-width");
    if(widthInp){
      widthInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      widthInp.addEventListener("input", ()=>{
        single.cell.widthPct = Math.max(10, Math.min(100, parseFloat(widthInp.value)||100));
        updateTemplateLivePreview();
      });
    }

    const rowHeightInp = document.getElementById("tpl-row-height");
    if(rowHeightInp){
      rowHeightInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      rowHeightInp.addEventListener("input", ()=>{
        const v = parseFloat(rowHeightInp.value);
        single.row.heightMm = (rowHeightInp.value==="" || isNaN(v)) ? null : Math.max(2, Math.min(80, v));
        updateTemplateLivePreview();
      });
    }

    const fontInp = document.getElementById("tpl-cell-fontsize");
    if(fontInp){
      fontInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      fontInp.addEventListener("input", ()=>{
        single.cell.fontSize = parseFloat(fontInp.value)||3.2;
        updateTemplateLivePreview();
      });
    }

    const boldChk = document.getElementById("tpl-cell-bold");
    if(boldChk) boldChk.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.bold = boldChk.checked; render(); });

    const alignSel = document.getElementById("tpl-cell-align");
    if(alignSel) alignSel.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.align = alignSel.value; render(); });

    const splitCellInto = (n)=>{
      pushTemplateHistory();
      const each = single.cell.widthPct/n;
      single.cell.widthPct = each;
      const newCells = [];
      for(let i=1;i<n;i++){
        newCells.push({id:"cell"+Date.now()+"_"+i, field:"note", widthPct:each, fontSize:single.cell.fontSize, bold:false, align:"left", border:{...single.cell.border}});
      }
      single.row.cells.splice(single.cellIndex+1, 0, ...newCells);
      STATE.selectedCellIds = [newCells[0].id];
      STATE.selectionAnchorId = newCells[0].id;
      render();
    };
    const split2Btn = document.getElementById("btn-tpl-split-2");
    if(split2Btn) split2Btn.addEventListener("click", ()=>splitCellInto(2));
    const split3Btn = document.getElementById("btn-tpl-split-3");
    if(split3Btn) split3Btn.addEventListener("click", ()=>splitCellInto(3));

    const mergeBtn = document.getElementById("btn-tpl-merge-cell");
    if(mergeBtn) mergeBtn.addEventListener("click", ()=>{
      const nextCell = single.row.cells[single.cellIndex+1];
      if(!nextCell) return;
      pushTemplateHistory();
      single.cell.widthPct += nextCell.widthPct;
      single.row.cells.splice(single.cellIndex+1, 1);
      render();
    });

    const delCellBtn = document.getElementById("btn-tpl-delete-cell");
    if(delCellBtn) delCellBtn.addEventListener("click", ()=>{
      pushTemplateHistory();
      if(single.row.cells.length===1){
        STATE.labelTemplate = STATE.labelTemplate.filter(r=>r.id!==single.row.id);
      } else {
        single.row.cells.splice(single.cellIndex, 1);
        const neighbour = single.row.cells[single.cellIndex] || single.row.cells[single.cellIndex-1];
        if(neighbour) neighbour.widthPct += single.cell.widthPct;
      }
      STATE.selectedCellIds = [];
      render();
    });

    const rowUpBtn = document.getElementById("btn-tpl-row-up");
    if(rowUpBtn) rowUpBtn.addEventListener("click", ()=>{
      if(single.rowIndex===0) return;
      pushTemplateHistory();
      const [row] = STATE.labelTemplate.splice(single.rowIndex, 1);
      STATE.labelTemplate.splice(single.rowIndex-1, 0, row);
      render();
    });
    const rowDownBtn = document.getElementById("btn-tpl-row-down");
    if(rowDownBtn) rowDownBtn.addEventListener("click", ()=>{
      if(single.rowIndex===STATE.labelTemplate.length-1) return;
      pushTemplateHistory();
      const [row] = STATE.labelTemplate.splice(single.rowIndex, 1);
      STATE.labelTemplate.splice(single.rowIndex+1, 0, row);
      render();
    });
    const mergeRowPrevBtn = document.getElementById("btn-tpl-merge-row-prev");
    if(mergeRowPrevBtn) mergeRowPrevBtn.addEventListener("click", ()=>{
      mergeRowWithNeighbor(single.rowIndex, -1);
    });
    const mergeRowNextBtn = document.getElementById("btn-tpl-merge-row-next");
    if(mergeRowNextBtn) mergeRowNextBtn.addEventListener("click", ()=>{
      mergeRowWithNeighbor(single.rowIndex, 1);
    });
    const delRowBtn = document.getElementById("btn-tpl-delete-row");
    if(delRowBtn) delRowBtn.addEventListener("click", ()=>{
      pushTemplateHistory();
      STATE.labelTemplate = STATE.labelTemplate.filter(r=>r.id!==single.row.id);
      STATE.selectedCellIds = [];
      render();
    });
  }

  const saveTplBtn = document.getElementById("btn-tpl-save");
  if(saveTplBtn) saveTplBtn.addEventListener("click", ()=>{
    if(!STATE.labelTemplate) return;
    const base = STATE.data.labelSettings || {shopName:"", shopPhone:"", footerText:"", paperSize:"label"};
    const s = {...base, templateLayout: STATE.labelTemplate};
    STATE.savingTemplate = true;
    render();
    STATE.data.labelSettings = s;
    dbSaveLabelSettings(s).then(()=>{
      STATE.savingTemplate = false;
      render();
      silentRefresh();

function drawLabelBarcode(value){
  const svgEl = document.getElementById("label-barcode");
  if(!svgEl) return;
  // On success we deliberately do NOT call render(): a full render() replaces #main's
  // innerHTML, which would create a brand-new empty <svg id="label-barcode"> and throw
  // away the bars JsBarcode just drew into the old node вҖ” that was why the physical
  // print came out with a blank space where the barcode should be. Instead we patch
  // just the small bits of surrounding UI (loading/error text, print button) directly.
  const markReady = ()=>{
    STATE.barcodeStatus = "ready";
    svgEl.style.display = "";
    document.querySelectorAll(".barcode-loading-indicator, .barcode-error-indicator").forEach(el=>el.remove());
    const btn = document.getElementById("btn-do-print-label");
    if(btn) btn.disabled = false;
  };
  if(window.JsBarcode){
    try{
      JsBarcode(svgEl, String(value), {format:"CODE128", displayValue:false, width:2, height:50, margin:0});
      markReady();
      return;
    }catch(e){ console.error(e); }
  }
  STATE.barcodeStatus = "loading";
  window.ensureBarcodeLib().then(()=>{
    const svg2 = document.getElementById("label-barcode");
    if(!svg2 || !STATE.printingLabel) return;
    try{
      JsBarcode(svg2, String(STATE.printingLabel.labelNumber), {format:"CODE128", displayValue:false, width:2, height:50, margin:0});
      STATE.barcodeStatus = "ready";
      svg2.style.display = "";
      document.querySelectorAll(".barcode-loading-indicator, .barcode-error-indicator").forEach(el=>el.remove());
      const btn = document.getElementById("btn-do-print-label");
      if(btn) btn.disabled = false;
    }catch(e){
      console.error(e);
      STATE.barcodeStatus = "error";
      render();
    }
  }).catch(err=>{
    console.error(err);
    STATE.barcodeStatus = "error";
    render();
  });
}

function attachLoginEvents(){
  const tabLogin = document.getElementById("tab-login");
  const tabReg = document.getElementById("tab-register");
  if(tabLogin) tabLogin.addEventListener("click", ()=>{ STATE.loginMode="login"; STATE.loginError=""; render(); });
  if(tabReg) tabReg.addEventListener("click", ()=>{ STATE.loginMode="register"; STATE.loginError=""; render(); });

  const nameEl = document.getElementById("login-name");
  const passEl = document.getElementById("login-password");
  if(nameEl) nameEl.addEventListener("input", ()=>{ STATE.loginForm.name = nameEl.value; });
  if(passEl) passEl.addEventListener("input", ()=>{ STATE.loginForm.password = passEl.value; });

  const toggleBtn = document.getElementById("btn-toggle-password");
  if(toggleBtn && passEl){
    toggleBtn.addEventListener("click", ()=>{
      if(passEl.type==="password"){
        passEl.type = "text";
        toggleBtn.textContent = "рҹҷҲ";
      } else {
        passEl.type = "password";
        toggleBtn.textContent = "рҹ‘Ғ";
      }
    });
  }

  const submitBtn = document.getElementById("btn-login-submit");
  if(submitBtn) submitBtn.addEventListener("click", async ()=>{
    const name = STATE.loginForm.name.trim();
    const password = STATE.loginForm.password.trim();
    if(!name || !password){ STATE.loginError = "аәҒаә°аәҘаәёаәҷаәІа»ғаәӘа»ҲаәҠаә·а»Ҳ а»ҒаәҘаә° аәҘаә°аә«аәұаә”аәңа»ҲаәІаәҷ"; render(); return; }
    const isRegisterMode = STATE.loginMode === "register";
    const resetBtnLabel = isRegisterMode ? "аәҘаә»аәҮаә—аә°аәҡаәҪаәҷ а»ҒаәҘаә° а»ҖаәӮаә»а»үаәІа»ғаәҠа»ү" : "а»ҖаәӮаә»а»үаәІаәӘаә№а»ҲаәҘаә°аәҡаә»аәҡ";
    submitBtn.disabled = true;
    submitBtn.textContent = "аәҒаәіаәҘаәұаәҮаәҒаә§аә”аәӘаәӯаәҡ...";
    try{
      let user;
      if(isRegisterMode){
        user = await dbRegister(name, password);
      } else {
        user = await dbLogin(name, password);
      }

      // GPS is REQUIRED to enter the system вҖ” this is an explicit owner
      // decision (transparency: every login must be traceable to a real
      // location) over convenience. There is intentionally NO skip option
      // here, unlike the attendance clock-in button. Staff whose browser
      // blocks/spoofs location (commonly caused by a VPN extension being
      // installed, even if not actively connected) must use a Chrome
      // profile without such extensions to log in.
      submitBtn.textContent = "аәҒаәіаәҘаәұаәҮаәӮа»ҚаәӘаәҙаә”а»ҖаәӮаә»а»үаәІа»Җаә–аәҙаәҮаә•аәіа»Ға»ңа»ҲаәҮ GPS...";
      const loc = await getLocationWithFallback();
      if(loc.error){
        STATE.loginError = "вҡ пёҸ " + loc.error + " вҖ” аәҘаә°аәҡаә»аәҡаәҷаәөа»үаә•а»үаәӯаәҮаәҒаәІаәҷаәӯаә°аәҷаәёаәҚаәІаә” GPS аәҲаә¶а»ҲаәҮаәҲаә°а»ҖаәӮаә»а»үаәІа»ғаәҠа»үа»„аә”а»ү (аәҡа»Қа»ҲаәЎаәөаә—аәІаәҮа»ҖаәҘаә·аәӯаәҒаәӮа»үаәІаәЎ, а»Җаәһаә·а»Ҳаәӯаә„аә§аәІаәЎа»Ӯаәӣа»ҲаәҮа»ғаәӘ).\n\n" + gpsHelpText() + "\n\nаә«аәІаәҒ browser аәҷаәөа»үаәЎаәөаәҒаәІаәҷаә•аәҙаә”аә•аәұа»үаәҮ VPN extension а»„аә§а»ү (а»Җаә–аәҙаәҮа»ҒаәЎа»Ҳаәҷаәҡа»Қа»Ҳа»„аә”а»үа»Җаәӣаәөаә”а»ғаәҠа»ү) аәЎаәұаәҷаәӯаәІаә”аәҡаәҘаәұаәӯаәҒ GPS а»Ӯаә”аәҚаәӯаәұаә”аә•аә°а»ӮаәҷаәЎаәұаә” вҖ” а»ғаә«а»үаәҘаәӯаәҮа»ғаәҠа»ү Chrome аәӯаәөаәҒа»ӮаәӣаәЈа»„аәҹаәҘа»Ңаә—аәөа»Ҳаәҡа»Қа»ҲаәЎаәө VPN extension аә•аәҙаә”аә•аәұа»үаәҮ.";
        submitBtn.disabled = false;
        submitBtn.textContent = resetBtnLabel;
        render();
        return;
      }

      STATE.currentUser = user;
      saveSession(user);
      STATE.loginError = "";
      STATE.loginForm = {name:"", password:""};
      render();

      // Fire-and-forget: record this login for the owner's "login history" page.
      dbInsertLoginHistory({
        id: "lh"+Date.now(),
        userId: user.id,
        name: user.name,
        loginAt: new Date().toISOString(),
        lat: loc.lat, lng: loc.lng,
        device: (navigator.userAgent||"").slice(0,180)
      }).catch(()=>{});
    }catch(e){
      STATE.loginError = e.message;
      submitBtn.disabled = false;
      submitBtn.textContent = resetBtnLabel;
      render();
    }
  });
}

  document.querySelectorAll("#main [data-nav]").forEach(el=>{

      STATE.page = el.getAttribute("data-nav");
      STATE.output = ""; STATE.error = "";

    });
  });
  if(STATE.page==="products") attachProductEvents();
  if(STATE.page==="content") attachContentEvents();
  if(STATE.page==="productChat") attachProductChatEvents();
  if(STATE.page==="costs") attachCostEvents();
  if(STATE.page==="admin") attachAdminEvents();

  if(STATE.page==="reports") attachReportEvents();
  if(STATE.page==="attendance") attachAttendanceEvents();
  if(STATE.page==="users") attachUsersEvents();

  if(STATE.page==="scanOut") attachScanOutEvents();
}

function attachProductEvents(){
  document.querySelectorAll("[data-view-product]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      if(e.target.closest("[data-edit-product]") || e.target.closest("[data-del-product]")) return;
      STATE.viewingProduct = el.getAttribute("data-view-product");
      render();
    });
  });
  const backBtn = document.getElementById("btn-back-to-products") || document.querySelector("[data-back-to-products]");
  if(backBtn) backBtn.addEventListener("click", ()=>{
    STATE.viewingProduct = "";
    render();
  });
  const btnNew = document.getElementById("btn-new-product");
  if(btnNew) btnNew.addEventListener("click", ()=>{
    STATE.productForm = {name:"", category:"", price:"", costPrice:"", desc:"", painPoints:"", imageBase64:"", highlights:"", benefits:"", usage:""};
    STATE.editingProduct = null;
    STATE.knowledgeError = "";
    STATE.newPainPointText = "";
    STATE.aiPainSuggestions = [];
    STATE.aiPainError = "";
    STATE.showProductForm = true;
    render();
  });

  document.querySelectorAll("[data-edit-product]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const id = el.getAttribute("data-edit-product");
      const p = STATE.data.products.find(x=>x.id===id);
      if(p){
        STATE.productForm = {...p, imageBase64: p.imageUrl||""};
        STATE.editingProduct = id;
        STATE.knowledgeError = "";
        STATE.newPainPointText = "";
        STATE.aiPainSuggestions = [];
        STATE.aiPainError = "";
        STATE.newFaqQuestion = "";
        STATE.newFaqAnswer = "";
        STATE.showProductForm = true;
        render();
      }
    });
  });

  document.querySelectorAll("[data-del-product]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const id = el.getAttribute("data-del-product");
      STATE.data.products = STATE.data.products.filter(p=>p.id!==id);
      delete STATE.data.productKnowledge[id];
      render();
      dbDeleteProduct(id).catch(err=>console.error(err));
    });
  });

  const modalBg = document.getElementById("product-modal-bg");
  if(modalBg){
    modalBg.addEventListener("click", (e)=>{
      if(e.target.id==="product-modal-bg"){ STATE.showProductForm = false; render(); }
    });
  }
  const closeBtn = document.getElementById("close-product-modal");
  if(closeBtn) closeBtn.addEventListener("click", ()=>{ STATE.showProductForm = false; render(); });

  const imgEl = document.getElementById("pf-image-input");
  if(imgEl) imgEl.addEventListener("change", ()=>{
    const file = imgEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{ STATE.productForm.imageBase64 = e.target.result; render(); };
    reader.readAsDataURL(file);
  });
  const imgRemoveBtn = document.getElementById("pf-image-remove");
  if(imgRemoveBtn) imgRemoveBtn.addEventListener("click", ()=>{
    STATE.productForm.imageBase64 = "";
    if(imgEl) imgEl.value = "";
    render();
  });

  const saveBtn = document.getElementById("save-product");
  if(saveBtn){
    saveBtn.addEventListener("click", async ()=>{
      const f = {
        name: document.getElementById("pf-name").value,
        category: document.getElementById("pf-category").value,
        price: document.getElementById("pf-price").value,
        costPrice: document.getElementById("pf-costPrice").value,
        desc: document.getElementById("pf-desc").value,
        highlights: document.getElementById("pf-highlights").value,
        benefits: document.getElementById("pf-benefits").value,
        usage: document.getElementById("pf-usage").value,
        painPoints: document.getElementById("pf-painPoints").value,
        imageUrl: STATE.productForm.imageBase64 || ""
      };
      if(!f.name.trim()) return;
      if(STATE.editingProduct){
        const updated = {...f, id:STATE.editingProduct};
        STATE.data.products = STATE.data.products.map(p=>p.id===STATE.editingProduct ? updated : p);
        STATE.showProductForm = false;
        render();
        dbUpdateProduct(updated).catch(err=>console.error(err));
        silentRefresh();
      } else {
        const newProduct = {...f, id:"p"+Date.now()};
        STATE.data.products.push(newProduct);
        STATE.showProductForm = false;
        render();
        dbInsertProduct(newProduct).catch(err=>console.error(err));
        silentRefresh();
      }
    });
  }

  const pkFileEl = document.getElementById("pk-file-input");
  if(pkFileEl) pkFileEl.addEventListener("change", ()=>{
    const file = pkFileEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{
      const ta = document.getElementById("pk-content");
      if(ta) ta.value = e.target.result;
    };
    reader.readAsText(file);
  });

  const saveKnowledgeBtn = document.getElementById("btn-save-knowledge");
  if(saveKnowledgeBtn){
    saveKnowledgeBtn.addEventListener("click", async ()=>{
      const productId = STATE.editingProduct;
      if(!productId) return;
      const ta = document.getElementById("pk-content");
      const content = (ta ? ta.value : "").trim();
      STATE.savingKnowledge = true;
      STATE.knowledgeError = "";
      render();
      try{
        await dbUpsertProductKnowledge(productId, content);
        STATE.data.productKnowledge[productId] = {content, updatedAt: new Date().toISOString()};
      }catch(e){
        STATE.knowledgeError = "аәҡаәұаәҷаә—аә¶аәҒаәҡа»Қа»ҲаәӘаәіа»ҖаәҘаәұаә”: " + (e?.message||e);
      }
      STATE.savingKnowledge = false;
      render();
    });
  }

  document.querySelectorAll("[data-del-painpoint]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-painpoint");
      const productId = STATE.editingProduct;
      if(STATE.data.painPointsLib[productId]){
        STATE.data.painPointsLib[productId] = STATE.data.painPointsLib[productId].filter(pp=>pp.id!==id);
      }
      render();
      dbDeletePainPoint(id).catch(err=>console.error(err));
    });
  });

  const ppInput = document.getElementById("new-painpoint-text");
  if(ppInput) ppInput.addEventListener("input", ()=>{ STATE.newPainPointText = ppInput.value; });

  const addPpBtn = document.getElementById("btn-add-painpoint");
  if(addPpBtn) addPpBtn.addEventListener("click", ()=>{
    const productId = STATE.editingProduct;
    const text = (STATE.newPainPointText||"").trim();
    if(!productId || !text) return;
    const newPp = {id:"pp"+Date.now(), productId, text, icon:"", createdAt:new Date().toISOString(), createdBy: STATE.currentUser ? STATE.currentUser.name : ""};
    if(!STATE.data.painPointsLib[productId]) STATE.data.painPointsLib[productId] = [];
    STATE.data.painPointsLib[productId].push(newPp);
    STATE.newPainPointText = "";
    render();
    dbInsertPainPoint(newPp).catch(err=>console.error(err));
    silentRefresh();
  });

  const aiSuggestBtn = document.getElementById("btn-ai-suggest-painpoints");
  if(aiSuggestBtn){
    aiSuggestBtn.addEventListener("click", async ()=>{
      const productId = STATE.editingProduct;
      const p = STATE.data.products.find(x=>x.id===productId);
      if(!p) return;
      STATE.aiPainLoading = true;
      STATE.aiPainError = "";
      STATE.aiPainSuggestions = [];
      render();
      try{
        const prompt = `аәҷаәөа»үа»ҒаәЎа»ҲаәҷаәӮа»Қа»үаәЎаә№аәҷаәӘаәҙаәҷаә„а»үаәІ:
аәҠаә·а»ҲаәӘаәҙаәҷаә„а»үаәІ: ${p.name}
а»қаә§аә”а»қаә№а»Ҳ: ${p.category}
аәҘаәІаәҚаәҘаә°аәӯаәҪаә”: ${p.desc}
${p.painPoints ? "аәҡаәұаәҷаә«аәІаәҘаә№аәҒаә„а»үаәІаә—аәөа»Ҳаәҡаәұаәҷаә—аә¶аәҒа»„аә§а»үа»ҒаәҘа»үаә§: "+p.painPoints : ""}

        const prompt = `аәӘа»үаәІаәҮ hashtag 10-15 аәӯаәұаәҷ аәӘаәіаәҘаәұаәҡа»ӮаәһаәӘаәӮаәІаәҚаәӘаәҙаәҷаә„а»үаәІ "${p.name}" (${p.category}) аәҒа»ҲаәҪаә§аәҒаәұаәҡаә«аә»аә§аәӮа»Қа»ү: "${topic}" аәӣаә°аәӘаә»аәЎаәҘаә°аә«аә§а»ҲаәІаәҮаәһаәІаәӘаәІаәҘаәІаә§ а»ҒаәҘаә° аәһаәІаәӘаәІаәӯаәұаәҮаәҒаәҙаә” а»ғаә«а»ү output а»ҖаәӣаәұаәҷаәҘаәІаәҚаәҒаәІаәҷ hashtag аәӮаә¶а»үаәҷаә•аә»а»үаәҷаә”а»үаә§аәҚ # а»Җаә—аә»а»ҲаәІаәҷаәұа»үаәҷ аәҡа»Қа»Ҳаә•а»үаәӯаәҮаәЎаәөаә„аәіаәӯаә°аә—аәҙаәҡаәІаәҚаәӯаә·а»Ҳаәҷ`;
        const result = await callAI(prompt, "аә—а»ҲаәІаәҷа»ҒаәЎа»Ҳаәҷаәңаә№а»үаәҠа»ҲаәҪаә§аәҠаәІаәҷаә”а»үаәІаәҷаәҒаәІаәҷаә•аә°аә«аәјаәІаә”аәӯаәӯаәҷаәҘаәІаәҚаәӘаәіаәҘаәұаәҡаә•аә°аә«аәјаәІаә”аәҘаәІаә§.");
        STATE.hashtagAiResult = result;
      }catch(e){
        STATE.hashtagError = "а»ҖаәҒаәөаә”аәӮа»Қа»үаәңаәҙаә”аәһаәІаә”: " + e.message;
      }
      STATE.hashtagLoading = false;
      render();
    });
  }

  const csCopyAiHashtagBtn = document.getElementById("cs-btn-copy-ai-hashtag");
  if(csCopyAiHashtagBtn) csCopyAiHashtagBtn.addEventListener("click", ()=>{
    copyText(STATE.hashtagAiResult);
  });

  const csNewHashtagEl = document.getElementById("cs-new-hashtag");
  if(csNewHashtagEl) csNewHashtagEl.addEventListener("input", ()=>{ STATE.newHashtagText = csNewHashtagEl.value; });

  const csAddHashtagBtn = document.getElementById("cs-btn-add-hashtag");
  if(csAddHashtagBtn) csAddHashtagBtn.addEventListener("click", ()=>{
    const productId = STATE.selProduct;
    let tag = (STATE.newHashtagText||"").trim();
    if(!productId || !tag) return;
    if(!tag.startsWith("#")) tag = "#"+tag;
    const newHt = {id:"ht"+Date.now(), productId, tag, createdAt:new Date().toISOString(), createdBy: STATE.currentUser ? STATE.currentUser.name : ""};
    if(!STATE.data.productHashtags[productId]) STATE.data.productHashtags[productId] = [];
    STATE.data.productHashtags[productId].push(newHt);
    STATE.newHashtagText = "";
    render();
    dbInsertHashtag(newHt).catch(err=>console.error(err));
    silentRefresh();
  });

  document.querySelectorAll("[data-cs-del-hashtag]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-cs-del-hashtag");
      const productId = STATE.selProduct;
      if(STATE.data.productHashtags[productId]){
        STATE.data.productHashtags[productId] = STATE.data.productHashtags[productId].filter(h=>h.id!==id);
      }
      render();
      dbDeleteHashtag(id).catch(err=>console.error(err));
      silentRefresh();
    });
  });
}

function exportCostsToExcel(){
  const d = STATE.data;
  if(d.costs.length===0){ render(); return; }
  const rows = d.costs.map(c => {
    const profit = (Number(c.revenue)||0)-(Number(c.productCost)||0)-(Number(c.adCost)||0)-(Number(c.opCost)||0);
    return {
      "аәҘаәІаәҚаәҒаәІаәҷ": c.label || "",
      "аәҘаәІаәҚаә®аәұаәҡ": Number(c.revenue)||0,
      "аә•аә»а»үаәҷаә—аә¶аәҷаәӘаәҙаәҷаә„а»үаәІ": Number(c.productCost)||0,
      "аә„а»ҲаәІа»Ӯаә„аәӘаә°аәҷаәІ": Number(c.adCost)||0,
      "аә„а»ҲаәІаәҡа»ҚаәҘаәҙаә«аәІаәҷ": Number(c.opCost)||0,
      "аәҒаәіа»„аәҘ": profit
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:28},{wch:12},{wch:14},{wch:12},{wch:12},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "аә•аә»а»үаәҷаә—аә¶аәҷ-аәҒаәіа»„аәҘ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `cost-profit-${stamp}.xlsx`);
}

  ["name","role"].forEach(k=>{

    STATE.adminForm = {name:"", role:"", status:"аәҒаәіаәҘаәұаәҮа»Җаә®аәұаә”аә§аәҪаәҒ"};
    render();

    silentRefresh();
  });

  document.querySelectorAll("[data-del-admin]").forEach(el=>{
    el.addEventListener("click", ()=>{

      STATE.data.admins = STATE.data.admins.filter(a=>a.id!==id);
      render();
      dbDeleteAdmin(id).catch(err=>console.error(err));
    });
  });

  document.querySelectorAll("[data-cycle-status]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-cycle-status");
      const order = ["аәҒаәіаәҘаәұаәҮа»Җаә®аәұаә”аә§аәҪаәҒ","аәһаәұаәҒ","аәҡа»Қа»Ҳаәўаә№а»Ҳ"];
      let newStatus = "";
      STATE.data.admins = STATE.data.admins.map(a=>{
        if(a.id!==id) return a;
        const idx = order.indexOf(a.status);
        newStatus = order[(idx+1)%order.length];
        return {...a, status: newStatus};
      });
      render();
      dbUpdateAdminStatus(id, newStatus).catch(err=>console.error(err));
    });
  });
}

function attachInsightEvents(){

    reader.readAsDataURL(file);
  });

      STATE.insightViewMode = el.getAttribute("data-insight-view");
      render();
    });

  document.querySelectorAll("[data-view-insight]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-view-insight");
      const ins = STATE.data.insights.find(i=>i.id===id) || null;
      STATE.viewingInsight = ins;
      render();
      if(ins && isOwner() && !ins.readByOwner){

  const modalBg = document.getElementById("insight-modal-bg");
  if(modalBg) modalBg.addEventListener("click", (e)=>{

  });
  const closeModal = document.getElementById("close-insight-modal");
  if(closeModal) closeModal.addEventListener("click", ()=>{ STATE.viewingInsight=null; render(); });
  const closeModalBtn = document.getElementById("close-insight-modal-btn");
  if(closeModalBtn) closeModalBtn.addEventListener("click", ()=>{ STATE.viewingInsight=null; render(); });

  const addBtn = document.getElementById("btn-add-insight");
  if(addBtn) addBtn.addEventListener("click", ()=>{
    const f = STATE.insightForm;
    if(!f.question.trim()) return;
    const newInsight = {
      question: f.question,
      answer: f.answer,
      productRelated: f.productRelated,
      imageUrl: f.imageBase64 || "",
      id:"i"+Date.now(),
      date:new Date().toLocaleDateString("lo-LA", {timeZone: LAOS_TZ}),
      adminName: STATE.currentUser?.name || "",
      readByOwner: false

    STATE.data.insights.unshift(newInsight);
    STATE.insightForm = {question:"", answer:"", productRelated:"", imageBase64:""};
    render();
    dbInsertInsight(newInsight).catch(err=>console.error(err));

  });

  document.querySelectorAll("[data-del-insight]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-insight");
      STATE.data.insights = STATE.data.insights.filter(i=>i.id!==id);
      render();
      dbDeleteInsight(id).catch(err=>console.error(err));
    });
  });

  const analyzeBtn = document.getElementById("btn-analyze");
  if(analyzeBtn) analyzeBtn.addEventListener("click", analyzeInsights);

  const exportBtn = document.getElementById("btn-export-excel");
  if(exportBtn) exportBtn.addEventListener("click", exportInsightsToExcel);

  const importTrigger = document.getElementById("btn-import-excel-trigger");
  const importInput = document.getElementById("import-excel-input");
  if(importTrigger && importInput){
    importTrigger.addEventListener("click", ()=> importInput.click());
    importInput.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(file) importInsightsFromExcel(file);
      importInput.value = "";
    });
  }
}

/* ====================== SESSION PERSISTENCE ====================== */
const SESSION_KEY = "mkt_studio_session_v1";
function saveSession(user){
  try{ localStorage.setItem(SESSION_KEY, JSON.stringify(user)); }catch(e){}
}
function clearSession(){
  try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
}
function loadSavedSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

function isUserTyping(){
  const el = document.activeElement;
  if(!el) return false;
  const tag = el.tagName;
  if(tag==="TEXTAREA") return true;
  if(tag==="INPUT"){
    // Only text-entry input types actually block updates. A <select> or a
    // file/checkbox input can keep "focus" indefinitely after one click
    // without the person actively typing, which would otherwise freeze
    // auto-refresh forever вҖ” so those are deliberately excluded.
    const t = (el.type||"text").toLowerCase();
    return ["text","password","number","email","search","tel","url"].includes(t);
  }
  return false;
}

/* ====================== INIT ====================== */
async function init(){
  render();
  STATE.data = await loadAllData();
  STATE.ready = true;

  // Restore session if one was saved, but re-verify against DB for fresh role/approved
  const saved = loadSavedSession();
  if(saved && saved.id){
    try{
      const {data} = await sb.from("users").select("*").eq("id", saved.id).limit(1);
      if(data && data.length>0){
        STATE.currentUser = {id:data[0].id, name:data[0].name, role:data[0].role, approved: !!data[0].approved};
        saveSession(STATE.currentUser);
      } else {
        clearSession();
      }
    }catch(e){}
  }

  render();
  if(STATE.currentUser && isOwner() && STATE.page==="users"){ loadUsersList(); }
  // No background polling here on purpose вҖ” see the PERMANENT RULE note
  // above refreshAll(). Data loads once here, and after that only when
  // someone explicitly clicks "а»Ӯаә«аәјаә”аәӮа»Қа»үаәЎаә№аәҷа»ға»қа»Ҳ".
}
init();
