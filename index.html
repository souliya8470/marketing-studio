<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ຮ້ານຕຸກຕາ ສີໄຄ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Serif+Lao:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1F3D2E;
    --bg-deep-2:#27483A;
    --cream:#FAF6EE;
    --cream-2:#F1EAD9;
    --terracotta:#C9683F;
    --terracotta-dark:#A6502E;
    --sage:#A8C0A0;
    --sage-dark:#5F7D58;
    --ink:#23291F;
    --muted:#6F7268;
    --danger:#B0473B;
    --white:#FFFFFF;
    --radius:10px;
    --shadow:0 2px 10px rgba(31,61,46,0.08);
  }
  *{box-sizing:border-box;}
  html, body{
    max-width:100%;
    overflow-x:hidden;
  }
  body{
    margin:0;
    font-family:'Noto Sans Lao','Noto Sans',sans-serif;
    background:var(--cream-2);
    color:var(--ink);
  }
  h1,h2,h3,.serif{font-family:'Noto Serif Lao','Noto Sans Lao',serif;}
  .app{
    display:grid;
    grid-template-columns:240px 1fr;
    min-height:100vh;
  }
  .main-fade{
    animation: mainFadeIn 220ms ease;
  }
  @keyframes mainFadeIn{
    from{ opacity:0.85; }
    to{ opacity:1; }
  }
  .sidebar{
    background:var(--bg-deep);
    color:var(--cream);
    padding:24px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .brand{
    font-family:'Noto Serif Lao',serif;
    font-size:20px;
    font-weight:700;
    color:var(--cream);
    margin:0 8px 28px 8px;
    line-height:1.3;
  }
  .brand small{
    display:block;
    font-family:'Noto Sans Lao',sans-serif;
    font-size:12px;
    font-weight:400;
    color:var(--sage);
    margin-top:4px;
  }
  .nav-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:none;
    border:none;
    color:var(--cream);
    opacity:0.78;
    text-align:left;
    padding:11px 12px;
    border-radius:8px;
    font-size:14.5px;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s, opacity .15s;
    width:100%;
  }
  .nav-btn:hover{background:var(--bg-deep-2); opacity:1;}
  .nav-btn.active{background:var(--terracotta); opacity:1; font-weight:600;}
  .nav-icon{font-size:17px; width:20px; text-align:center;}
  .nav-badge{display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; margin-left:6px; background:var(--terracotta); color:#fff; border-radius:999px; font-size:10.5px; font-weight:700; vertical-align:middle;}
  .nav-btn.active .nav-badge{background:var(--cream); color:var(--terracotta-dark);}
  .sidebar-foot{
    margin-top:auto;
    padding:12px 8px 0 8px;
    font-size:11.5px;
    color:var(--sage);
    border-top:1px solid rgba(255,255,255,0.12);
    padding-top:14px;
  }
  .main{padding:32px 40px; max-width:1180px;}
  .page-head{margin-bottom:24px;}
  .page-head h1{font-size:24px; margin:0 0 4px 0; color:var(--bg-deep);}
  .page-head p{margin:0; color:var(--muted); font-size:14px;}
  .card{
    background:var(--white);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px 22px;
    margin-bottom:18px;
  }
  .card h3{margin:0 0 14px 0; font-size:16px; color:var(--bg-deep);}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .grid-4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  label{display:block; font-size:13px; color:var(--muted); margin:0 0 5px 0; font-weight:600;}
  input[type=text], input[type=number], textarea, select{
    width:100%;
    padding:9px 11px;
    border:1px solid #DCD6C4;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    background:var(--cream);
    color:var(--ink);
    margin-bottom:14px;
  }
  textarea{resize:vertical; min-height:80px;}
  input:focus, textarea:focus, select:focus{
    outline:none; border-color:var(--terracotta); background:var(--white);
  }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    background:var(--terracotta);
    color:var(--white);
    border:none;
    padding:10px 18px;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--terracotta-dark);}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{background:#C9B9A9; cursor:not-allowed;}
  .btn-outline{background:none; border:1.5px solid var(--bg-deep); color:var(--bg-deep);}
  .btn-outline:hover{background:var(--bg-deep); color:var(--cream);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}
  .btn-danger{background:var(--danger);}
  .btn-danger:hover{background:#8E382E;}
  .pill{display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600;}
  .pill-sage{background:#E4ECDF; color:var(--sage-dark);}
  .pill-terra{background:#F4E1D6; color:var(--terracotta-dark);}
  .pill-gray{background:#EAE7DC; color:var(--muted);}
  .product-card{
    border:1px solid #E9E3D3; border-radius:9px; padding:14px;
    display:flex; flex-direction:column; gap:6px; cursor:pointer; transition:border-color .15s;
  }
  .product-card:hover{border-color:var(--terracotta);}
  .product-card h4{margin:0; font-size:15px; color:var(--bg-deep);}
  .product-card .meta{font-size:12.5px; color:var(--muted);}
  .empty{text-align:center; padding:40px 20px; color:var(--muted);}
  .empty .nav-icon{font-size:32px; display:block; margin-bottom:8px; opacity:.5;}
  .stat{background:var(--cream); border-radius:9px; padding:14px; border:1px solid #EAE3D2;}
  .stat .label{font-size:12px; color:var(--muted); margin-bottom:4px;}
  .stat .value{font-size:21px; font-weight:700; color:var(--bg-deep);}
  .stat .value.danger{color:var(--danger);}
  .stat .value.good{color:var(--sage-dark);}
  .content-out{
    background:var(--cream); border:1px solid #E9E3D3; border-radius:8px;
    padding:14px 16px; white-space:pre-wrap; font-size:14px; line-height:1.65;
    margin-top:10px; max-height:420px; overflow-y:auto;
  }
  .toolbar{display:flex; gap:8px; margin-top:10px;}

  /* ---- Shipping label print preview ---- */
  .label-overlay{position:fixed; inset:0; background:rgba(20,15,10,0.6); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;}
  .label-sheet{background:#fff; color:#111; font-family:'Noto Sans Lao','Noto Sans',sans-serif; overflow-y:auto; max-height:90vh;}
  .label-sheet.size-label{width:100mm;}
  .label-sheet.size-a4{width:210mm;}
  .label-box{border:2px dashed #333; margin:14px;}
  .label-row{border-bottom:1px solid #333; padding:8px 10px;}
  .label-row:last-child{border-bottom:none;}
  .label-cod{font-size:20px; font-weight:800;}
  .label-footer{font-size:10.5px; text-align:center; padding:6px 10px; color:#333;}
  @media print{
    body *{visibility:hidden;}
    #print-label-area, #print-label-area *{visibility:visible;}
    #print-label-area{position:absolute; top:0; left:0; width:100%;}
    .label-overlay{position:static; background:none; padding:0;}
    .no-print{display:none !important;}
    /* Fill the physical paper exactly — the on-screen 340px/500px preview widths above
       are for the screen only; at print time the label must stretch to whatever page
       size is selected in the browser's print dialog, with no extra margin/border. */
    .label-sheet{width:100% !important; max-height:none !important; overflow:visible !important;}
    .label-box{margin:0 !important; border:none !important;}
    @page{ margin:0; }
  }

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; color:var(--muted); font-weight:600; padding:8px 10px; border-bottom:2px solid #EAE3D2;}
  td{padding:9px 10px; border-bottom:1px solid #F0EBDD; vertical-align:top;}
  tr:hover td{background:#FBF8F1;}
  .badge-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;}
  .loading{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13.5px; padding:10px 0;}
  .spinner{
    width:14px; height:14px; border:2px solid #D9D2BD; border-top-color:var(--terracotta);
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .tabs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; border-bottom:1px solid #E2DBC9;}

  /* ============ Marketing Studio — Yumiko-style scoped theme ============ */
  .mkt-wrap{
    --mkt-green-900:#16331f; --mkt-green-800:#1d4029; --mkt-green-700:#27532f;
    --mkt-gold:#cfa645; --mkt-gold-light:#e8d39a; --mkt-cream:#f7f4ea; --mkt-paper:#fffdf7;
    --mkt-ink:#23291f; --mkt-ink-soft:#5b6555; --mkt-line:#e1ddc8;
    background:var(--mkt-cream); margin:-32px -40px; padding-bottom:24px;
  }
  .mkt-header{
    background:linear-gradient(135deg,var(--mkt-green-900),var(--mkt-green-700));
    color:var(--mkt-cream); padding:20px 24px; display:flex; align-items:center; gap:14px;
    border-bottom:3px solid var(--mkt-gold);
  }
  .mkt-header .mkt-logo{
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 30% 30%,var(--mkt-gold-light),var(--mkt-gold));
    display:flex; align-items:center; justify-content:center; font-size:22px;
    box-shadow:0 0 0 3px rgba(255,255,255,.15);
  }
  .mkt-header h1{margin:0; font-size:19px; font-weight:700; letter-spacing:.3px; color:var(--mkt-cream); font-family:'Noto Serif Lao',serif;}
  .mkt-header p{margin:2px 0 0; font-size:12.5px; color:var(--mkt-gold-light);}
  .mkt-tabs{
    display:flex; flex-wrap:wrap; gap:6px; background:var(--mkt-green-800); padding:10px 20px; border:none; margin:0;
  }
  .mkt-tab-btn{
    background:transparent; border:1px solid transparent; color:#cfe0cd;
    padding:8px 14px; border-radius:999px; font-size:13px; cursor:pointer; white-space:nowrap; transition:.15s;
  }
  .mkt-tab-btn:hover{background:rgba(255,255,255,.08);}
  .mkt-tab-btn.active{background:var(--mkt-gold); color:var(--mkt-green-900); font-weight:700; border-color:var(--mkt-gold);}
  .mkt-body{padding:22px 24px 0;}
  .mkt-wrap .card{background:var(--mkt-paper); border:1px solid var(--mkt-line); box-shadow:0 6px 22px rgba(22,51,31,.08);}
  .mkt-wrap .card h2, .mkt-wrap .card h3{color:var(--mkt-green-900); font-family:'Noto Serif Lao',serif;}
  .mkt-wrap label{color:var(--mkt-ink-soft);}
  .mkt-wrap input, .mkt-wrap select, .mkt-wrap textarea{border-color:var(--mkt-line); background:var(--mkt-cream);}
  .mkt-wrap input:focus, .mkt-wrap select:focus, .mkt-wrap textarea:focus{border-color:var(--mkt-gold); outline:none;}
  .mkt-wrap .btn{background:var(--mkt-green-700); color:#fff;}
  .mkt-wrap .btn:hover{background:var(--mkt-green-800);}
  .mkt-wrap .btn-outline{background:transparent; border:1px solid var(--mkt-green-700); color:var(--mkt-green-700);}
  .mkt-wrap .pill-terra{background:var(--mkt-gold-light); color:var(--mkt-green-900);}
  .mkt-wrap .pill-sage{background:#E4ECDF; color:var(--mkt-green-800);}
  .mkt-wrap .content-out{background:var(--mkt-cream); border-color:var(--mkt-line);}
  @media (max-width: 760px){
    .mkt-wrap{margin:-12px -12px 0;}
    .mkt-header{padding:16px;}
    .mkt-tabs{padding:8px 12px;}
    .mkt-body{padding:16px 16px 0;}

  .tab{padding:9px 16px; cursor:pointer; font-size:14px; color:var(--muted); border-bottom:2px solid transparent; font-weight:600;}
  .tab.active{color:var(--terracotta-dark); border-bottom-color:var(--terracotta);}
  .modal-bg{
    position:fixed; inset:0; background:rgba(31,61,46,0.45);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:var(--white); border-radius:12px; padding:24px; width:100%; max-width:520px;
    max-height:88vh; overflow-y:auto;
  }
  .modal h3{margin-top:0;}
  .close-x{float:right; background:none; border:none; font-size:18px; cursor:pointer; color:var(--muted);}
  .flex-between{display:flex; justify-content:space-between; align-items:center;}
  .small-muted{font-size:12.5px; color:var(--muted);}

  .attendance-big-btn{
    width:100%; justify-content:center;
    font-size:20px; font-weight:700;
    padding:20px 24px; border-radius:14px;
  }
  .attendance-summary-grid{
    display:flex; justify-content:center; gap:28px; flex-wrap:wrap;
  }
  .attendance-summary-item{ min-width:90px; }

  .hamburger-btn{
    display:none;
    position:fixed; top:14px; left:14px; z-index:70;
    width:44px; height:44px; border-radius:10px;
    background:var(--bg-deep); color:var(--cream); border:none;
    font-size:20px; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 3px 12px rgba(0,0,0,0.3);
  }
  .sidebar-overlay{
    display:none;
    position:fixed; inset:0; background:rgba(20,30,24,0.5); z-index:65;
    opacity:0; transition:opacity .2s ease;
  }
  .sidebar-overlay.open{ display:block; opacity:1; }
  .mobile-close-x{
    display:none;
    background:none; border:none; color:var(--cream); font-size:20px;
    cursor:pointer; align-self:flex-end; margin-bottom:10px; opacity:.8;

    .hamburger-btn{ display:flex; }
    .app{grid-template-columns:1fr; max-width:100vw;}
    .sidebar{
      position:fixed; top:0; left:0; bottom:0; z-index:66;
      width:250px; max-width:82vw; height:100vh;
      flex-direction:column; overflow-y:auto; padding:20px 14px;
      transform:translateX(-104%); transition:transform .24s ease;
      box-shadow:4px 0 20px rgba(0,0,0,0.3);
    }
    .sidebar.open{ transform:translateX(0); }
    .mobile-close-x{ display:flex; }
    .brand{display:block; font-size:17px;}
    .nav-btn{white-space:normal; width:100%; padding:9px 10px; font-size:13.5px;}
    .nav-icon{font-size:15px; width:18px;}
    .sidebar-foot{display:block;}
    .main{padding:12px; padding-top:64px; max-width:100vw;}
    .grid-2, .grid-3, .grid-4{grid-template-columns:1fr;}

    /* Tighter page header + cards so more fits on one screen without pinch-zoom */
    .page-head{margin-bottom:14px;}
    .page-head h1{font-size:19px;}
    .page-head p{font-size:12.5px;}
    .card{padding:14px 14px; margin-bottom:12px; border-radius:9px;}
    .card h3{font-size:14.5px; margin-bottom:10px;}
    .btn{padding:9px 14px; font-size:13px;}
    label{font-size:12px;}
    input[type=text], input[type=number], textarea, select{padding:8px 10px; font-size:13.5px; margin-bottom:10px;}
    .stat{padding:11px;}
    .stat .label{font-size:11px;}
    .stat .value{font-size:18px;}
    .tabs{gap:2px; margin-bottom:12px;}
    .tab{padding:7px 10px; font-size:12.5px;}

    .attendance-clock-card{ padding:20px 12px !important; }
    .attendance-big-btn{ font-size:19px; padding:20px 18px; }
    .attendance-summary-grid{ gap:12px; }
    .attendance-summary-item{ min-width:74px; }

    /* Tables: keep readable but compact; scroll horizontally within their
       own card only (the page itself never scrolls sideways). */
    table{ font-size:12px; }
    th, td{ padding:6px 5px; }
  }

  @media (max-width: 400px){
    .page-head h1{font-size:17px;}
    .card{padding:12px;}
    .attendance-big-btn{ font-size:17px; padding:18px 14px; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.5/JsBarcode.all.min.js"></script>
<script>
/* Robust barcode-library loader: the primary <script> tag above is the fast path.
   If it hasn't finished loading (or failed) by the time we need to draw a barcode,
   ensureBarcodeLib() injects a fallback CDN and waits — so a slow/blocked network
   never results in a silently-blank barcode on a real, physical shipping label. */
window.ensureBarcodeLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.JsBarcode){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.JsBarcode) resolve(); else reject(new Error("loaded but JsBarcode missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    // Poll briefly in case the original head <script> is still mid-flight (most common case).
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.JsBarcode){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){ // ~2s of polling before pulling in the fallback CDN
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};
</script>

});
window.addEventListener("unhandledrejection", function(e){
  const root = document.getElementById("root");
  if(root) root.innerHTML = `<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:30px; background:#1a1a1a; color:#fff; font-family:monospace; font-size:13px; text-align:left; white-space:pre-wrap;">ເກີດຂໍ້ຜິດພາດ (Promise):\n\n${(e.reason && e.reason.message) || e.reason}</div>`;
});
</script>

async function loadAllData(){

/* ============================================================
   PERMANENT RULE (do not remove): the screen never auto-refreshes
   on a TIMER and there is NO background polling of Supabase at all.
   Data only refreshes when: (a) someone explicitly clicks
   "ໂຫຼດຂໍ້ມູນໃໝ່" (refreshAll()), or (b) immediately after that same
   user's own action that just wrote to the database (e.g. right after
   AI content generation is saved, or right after a product/pain point
   is added) via silentRefresh() below — this is still 100% action-
   triggered by a real click, never a setInterval/timer. A previous
   background polling mechanism (checking every 15s) was removed
   because it burned through the Supabase free-tier quota and made
   data appear to vanish. Do not add setInterval/polling back without
   explicit confirmation that the Supabase plan can sustain it.
   Any new feature/table added later must be included inside
   loadAllData() only — never in any auto-interval.
   ============================================================ */
async function refreshAll(){
  STATE.refreshing = true;
  render();
  try{
    // 1) Refresh all core data tables.
    const fresh = await loadAllData();
    STATE.data = fresh;

    // 2) Refresh the logged-in user's own approval/role status.
    if(STATE.currentUser){
      try{
        const {data} = await sb.from("users").select("*").eq("id", STATE.currentUser.id).limit(1);
        if(data && data.length>0){
          const u = {id:data[0].id, name:data[0].name, role:data[0].role, approved: !!data[0].approved};
          STATE.currentUser = u;
          saveSession(u);
        }
      }catch(e){}
    }

    // 3) Refresh the owner's user-management list.
    if(STATE.currentUser && isOwner()){
      try{ STATE.usersList = await dbListUsers(); }catch(e){}
    }

    // 4) Refresh the approved-user-names list (report "accused" dropdown).
    if(STATE.currentUser){
      try{ STATE.approvedUserNames = await dbListApprovedUserNames(); }catch(e){}
    }
  }catch(e){}
  STATE.refreshing = false;
  render();
}

/* Quiet version of refreshAll(): re-fetches the data tables in the background
   after the CURRENT user's own action just wrote something (content generated,
   product saved, pain point added, cost/admin/insight/report logged, etc.)
   so the UI is always up to date without anyone needing to press the manual
   reload button. Never shows the full "ກຳລັງໂຫຼດ..." overlay, and is only ever
   called right after a real click — never on a timer. */
async function silentRefresh(){
  try{
    const fresh = await loadAllData();
    STATE.data = fresh;
  }catch(e){ /* ignore — local optimistic state already reflects the change */ }
  render();
}

function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n){ return Number(n||0).toLocaleString(); }
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}

async function callAI(prompt, system){
  const res = await fetch(`${SUPABASE_URL}/functions/v1/generate-ai`, {
    method: "POST",
    headers: {
      "Content-Type":"application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({ prompt, system: system || "" })
  });
  const data = await res.json();
  if(data.text){ return data.text; }
  if(data.error){ throw new Error(data.error); }
  throw new Error("ບໍ່ໄດ້ຮັບຄຳຕອບຈາກ AI — ກະລຸນາກວດ Edge Function ໃນ Supabase");
}

/* ====================== RENDER ====================== */

          <div style="font-size:13px; color:var(--muted); margin-top:4px;">ລະບົບການຕະຫຼາດອັດຕະໂນມັດ</div>
        </div>

        <label>ລະຫັດຜ່ານ</label>
        <div style="position:relative; margin-bottom:14px;">
          <input type="password" id="login-password" value="${esc(f.password)}" placeholder="ໃສ່ລະຫັດຜ່ານ" style="margin-bottom:0; padding-right:44px;"/>
          <button type="button" id="btn-toggle-password" style="position:absolute; right:10px; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:18px; color:var(--muted); padding:4px;">👁</button>
        </div>
        ${STATE.loginError ? `<p style="color:var(--danger); font-size:13px; margin:0 0 12px 0; white-space:pre-wrap; line-height:1.5;">${esc(STATE.loginError)}</p>` : ""}
        <button class="btn" style="width:100%; justify-content:center;" id="btn-login-submit">
          ${isRegister ? "ລົງທະບຽນ ແລະ ເຂົ້າໃຊ້" : "ເຂົ້າສູ່ລະບົບ"}

function render(){
  const root = document.getElementById("root");
  if(!STATE.ready){
    root.innerHTML = `
      <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; background:var(--cream-2);">
        <div class="spinner" style="width:28px; height:28px; border-width:3px;"></div>
        <div style="color:var(--muted); font-size:14px;">ກຳລັງໂຫຼດຂໍ້ມູນ...</div>
        ${STATE.connError ? `<div style="color:var(--danger); font-size:13px; max-width:400px; text-align:center;">${esc(STATE.connError)}</div>` : ""}
      </div>
    `;
    attachLoginEvents();
    return;
  }
  if(!STATE.currentUser){
    root.innerHTML = renderLoginPage();
    attachLoginEvents();
    return;
  }
  if(!STATE.currentUser.approved && STATE.currentUser.role!=="owner"){
    root.innerHTML = `
      <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-deep); padding:20px;">
        <div style="background:var(--white); border-radius:14px; padding:36px 28px; width:100%; max-width:380px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.25);">
          <div style="font-size:52px; margin-bottom:14px;">⏳</div>
          <div style="font-family:'Noto Serif Lao',serif; font-size:19px; font-weight:700; color:var(--bg-deep); margin-bottom:8px;">ລໍຖ້າການອະນຸມັດ</div>
          <div style="font-size:14px; color:var(--muted); margin-bottom:24px;">ບັນຊີ "${esc(STATE.currentUser.name)}" ຍັງບໍ່ໄດ້ຮັບການອະນຸມັດຈາກເຈົ້າຂອງຮ້ານ ກະລຸນາຕິດຕໍ່ເຈົ້າຂອງຮ້ານ ຫຼື ລໍຖ້າ</div>
          <button class="btn btn-outline" style="width:100%; justify-content:center;" id="btn-pending-logout">ອອກຈາກລະບົບ</button>
        </div>
      </div>
    `;
    const pendLogout = document.getElementById("btn-pending-logout");
    if(pendLogout) pendLogout.addEventListener("click", ()=>{ STATE.currentUser=null; clearSession(); render(); });
    return;
  }
  // Build the outer shell (sidebar + main container) only once per login session.
  // On every subsequent render, only #main's content is replaced — this is the
  // key to a flicker-free auto-refresh: the sidebar (logo, nav, user name,
  // logout button) never gets torn down and rebuilt, so only the part of the
  // screen whose data actually changed visibly updates.
  const existingApp = document.querySelector(".app");
  if(!existingApp || existingApp.getAttribute("data-user")!==String(STATE.currentUser?.id||"")){
    root.innerHTML = `
      <button class="hamburger-btn" id="btn-mobile-menu" aria-label="ເປີດເມນູ">&#9776;</button>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <div class="app" data-user="${esc(STATE.currentUser?.id||"")}">
        <div class="sidebar" id="app-sidebar">
          <button class="mobile-close-x" id="btn-close-mobile-menu" aria-label="ປິດເມນູ">&#10005;</button>
          <div class="brand">ຮ້ານຕຸກຕາ ສີໄຄ<small>ລະບົບການຕະຫຼາດອັດຕະໂນມັດ</small></div>
          <button class="btn btn-sm" style="width:100%; justify-content:center; margin-bottom:14px;" id="btn-reload-data">
            <span id="reload-btn-label">🔄 ໂຫຼດຂໍ້ມູນໃໝ່</span>
          </button>
          <div id="nav-container"></div>
          <div class="sidebar-foot">
            <div style="margin-bottom:8px;">👤 <span id="sidebar-username">${esc(STATE.currentUser?.name||"")}</span></div>
            <button class="btn btn-sm btn-outline" style="width:100%; justify-content:center; color:var(--cream); border-color:rgba(255,255,255,0.3);" id="btn-logout">ອອກຈາກລະບົບ</button>
            <div style="margin-top:10px; opacity:.5; font-size:10.5px; text-align:center;">v${APP_VERSION}</div>
          </div>
        </div>
        <div class="main" id="main"></div>
      </div>
    `;
    attachSidebarEvents();
  }
  const reloadBtn = document.getElementById("btn-reload-data");
  const reloadLabel = document.getElementById("reload-btn-label");
  if(reloadBtn){
    reloadBtn.disabled = !!STATE.refreshing;
  }
  if(reloadLabel){
    reloadLabel.textContent = STATE.refreshing ? "⏳ ກຳລັງໂຫຼດ..." : "🔄 ໂຫຼດຂໍ້ມູນໃໝ່";
  }
  updateNavHighlight();
  updateMainContent();
}

function updateNavHighlight(){
  const navContainer = document.getElementById("nav-container");
  if(!navContainer) return;
  // Skip rebuilding if nav already reflects the current page (avoids
  // needless DOM churn on every 8-second poll when the page hasn't changed).
  if(navContainer.getAttribute("data-page")===STATE.page && navContainer.getAttribute("data-role")===(STATE.currentUser?.role||"")){
    return;
  }
  navContainer.setAttribute("data-page", STATE.page);
  navContainer.setAttribute("data-role", STATE.currentUser?.role||"");
  navContainer.innerHTML = getNav().map(n => `
    <button class="nav-btn ${STATE.page===n.id?'active':''}" data-nav="${n.id}">
      <span class="nav-icon">${n.icon}</span>${n.label}${n.id==="content" && STATE.data.contentHistory.length>0 ? `<span class="nav-badge">${STATE.data.contentHistory.length}</span>` : ""}
    </button>
  `).join("");
  navContainer.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.page = el.getAttribute("data-nav");
      STATE.output = ""; STATE.error = "";
      closeMobileMenu();
      render();
      if(STATE.page==="users") loadUsersList();
      if(STATE.page==="reports") loadApprovedUserNames();
      if(STATE.page==="loginHistory") loadLoginHistory();
    });
  });
}

async function loadLoginHistory(){
  STATE.loginHistoryList = await dbListLoginHistory().catch(()=>[]);
  render();
}

/* ---------- Mobile hamburger drawer ---------- */
function openMobileMenu(){
  STATE.mobileMenuOpen = true;
  const sidebarEl = document.getElementById("app-sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if(sidebarEl) sidebarEl.classList.add("open");
  if(overlay) overlay.classList.add("open");
}
function closeMobileMenu(){
  STATE.mobileMenuOpen = false;
  const sidebarEl = document.getElementById("app-sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if(sidebarEl) sidebarEl.classList.remove("open");
  if(overlay) overlay.classList.remove("open");
}

function attachSidebarEvents(){
  const logoutBtn = document.getElementById("btn-logout");
  if(logoutBtn) logoutBtn.addEventListener("click", ()=>{
    STATE.currentUser = null;
    clearSession();
    STATE.page = "dashboard";
    closeMobileMenu();
    render();
  });

  const reloadBtn = document.getElementById("btn-reload-data");
  if(reloadBtn) reloadBtn.addEventListener("click", ()=>{ refreshAll(); });

  const hamBtn = document.getElementById("btn-mobile-menu");
  if(hamBtn) hamBtn.addEventListener("click", ()=>{
    STATE.mobileMenuOpen ? closeMobileMenu() : openMobileMenu();
  });
  const closeXBtn = document.getElementById("btn-close-mobile-menu");
  if(closeXBtn) closeXBtn.addEventListener("click", closeMobileMenu);
  const overlay = document.getElementById("sidebar-overlay");
  if(overlay) overlay.addEventListener("click", closeMobileMenu);
}

function updateMainContent(){
  const main = document.getElementById("main");
  if(!main) return;
  main.classList.remove("main-fade");
  void main.offsetWidth; // force reflow so the animation restarts every time
  main.innerHTML = renderPage();
  main.classList.add("main-fade");
  attachPageEvents();
}

function renderPage(){
  switch(STATE.page){
    case "dashboard": return renderDashboard();
    case "products": return renderProducts();
    case "content": return renderContent();
    case "productChat": return renderProductChat();
    case "costs": return renderCosts();
    case "admin": return renderAdmin();
    case "insights": return renderInsights();
    case "reports": return renderReports();
    case "attendance": return renderAttendance();
    case "labels": return renderLabels();
    case "scanOut": return renderScanOut();
    case "users": return isOwner() ? renderUsers() : renderDashboard();
    case "loginHistory": return isOwner() ? renderLoginHistory() : renderDashboard();
    default: return "";
  }
}

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  const d = STATE.data;
  const totalRevenue = d.costs.reduce((s,c)=>s+(Number(c.revenue)||0),0);
  const totalCost = d.costs.reduce((s,c)=>s+(Number(c.productCost)||0)+(Number(c.adCost)||0)+(Number(c.opCost)||0),0);
  const profit = totalRevenue - totalCost;
  return `
    <div class="page-head">
      <h1>ພາບລວມຮ້ານ</h1>
      <p>ສະຫຼຸບຂໍ້ມູນທັງໝົດຂອງລະບົບ automation</p>
    </div>
    <div class="grid-4">
      <div class="stat"><div class="label">ສິນຄ້າທັງໝົດ</div><div class="value">${d.products.length}</div></div>
      <div class="stat"><div class="label">Content ທີ່ສ້າງແລ້ວ</div><div class="value">${d.contentHistory.length}</div></div>
      <div class="stat"><div class="label">ກຳໄລລວມ</div><div class="value ${profit>=0?'good':'danger'}">${fmt(profit)} ກີບ</div></div>
      <div class="stat"><div class="label">ບັນຫາລູກຄ້າທີ່ບັນທຶກ</div><div class="value">${d.insights.length}</div></div>
    </div>
    <div class="card" style="margin-top:18px;">
      <h3>ເລີ່ມຕົ້ນໄວ</h3>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" data-nav="products">+ ເພີ່ມສິນຄ້າ</button>
        <button class="btn btn-outline" data-nav="content">Marketing Studio</button>
        <button class="btn btn-outline" data-nav="insights">ບັນທຶກບັນຫາລູກຄ້າ</button>
      </div>
    </div>
    ${d.products.length===0 ? `
      <div class="card empty">
        <span class="nav-icon">&#9638;</span>
        ຍັງບໍ່ມີສິນຄ້າໃນລະບົບ — ເລີ່ມໂດຍການເພີ່ມສິນຄ້າທຳອິດຂອງທ່ານ
      </div>` : ""}
  `;
}

/* ---------- PRODUCTS ---------- */
function renderProducts(){
  const d = STATE.data;
  if(STATE.viewingProduct){
    const p = d.products.find(x=>x.id===STATE.viewingProduct);
    if(p) return renderProductDetailPage(p);
    STATE.viewingProduct = "";
  }
  return `
    <div class="page-head flex-between">
      <div>
        <h1>ຄັງສິນຄ້າ</h1>
        <p>ລວມຂໍ້ມູນສິນຄ້າທັງໝົດໄວ້ບ່ອນດຽວ ໃຊ້ອ້າງອີງເວລາສ້າງ content — ກົດເບິ່ງລາຍລະອຽດເຕັມ</p>
      </div>
      <button class="btn" id="btn-new-product">+ ເພີ່ມສິນຄ້າ</button>
    </div>
    ${d.products.length===0 ? `
      <div class="card empty">
        <span class="nav-icon">&#9638;</span>
        ຍັງບໍ່ມີສິນຄ້າ — ກົດ "ເພີ່ມສິນຄ້າ" ເພື່ອເລີ່ມຕົ້ນ
      </div>` : `
      <div class="grid-3">
        ${d.products.map(p => `
          <div class="product-card" data-view-product="${p.id}" style="cursor:pointer;">
            ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%; height:120px; object-fit:cover; border-radius:7px; margin-bottom:2px;"/>` : ""}
            <h4>${esc(p.name)}</h4>
            <div class="meta">${esc(p.category)||"ບໍ່ມີໝວດໝູ່"}</div>
            <div class="badge-row">
              ${p.price ? `<span class="pill pill-terra">ລາຄາ ${fmt(p.price)} ກີບ</span>` : ""}
              ${d.productKnowledge[p.id] ? `<span class="pill pill-sage">📚 ມີຂໍ້ມູນຄວາມຮູ້ແລ້ວ</span>` : ""}
            </div>
            <div class="small-muted" style="margin-top:4px;">${esc((p.desc||"").slice(0,70))}${(p.desc||"").length>70?"...":""}</div>
            <div style="margin-top:8px; display:flex; gap:8px;">
              <button class="btn btn-sm btn-outline" data-edit-product="${p.id}">✎ ແກ້ໄຂ</button>
              <button class="btn btn-sm btn-danger" data-del-product="${p.id}">ລຶບ</button>
            </div>
          </div>
        `).join("")}
      </div>
    `}
    ${STATE.showProductForm ? renderProductModal() : ""}
  `;
}

function linesToBullets(text){
  return (text||"").split("\n").map(l=>l.trim()).filter(l=>l.length>0);
}

function renderProductDetailPage(p){
  const d = STATE.data;
  const highlights = linesToBullets(p.highlights);
  const benefits = linesToBullets(p.benefits);
  const pains = d.painPointsLib[p.id] || [];
  const faqs = d.productFaq[p.id] || [];
  return `
    <div class="page-head">
      <button class="btn btn-sm btn-outline" data-back-to-products="1">&larr; ກັບຄືນຄັງສິນຄ້າ</button>

    <div class="card" style="padding:0; overflow:hidden;">

      <div style="padding:24px;">
        <div class="flex-between" style="align-items:flex-start;">
          <div>
            <h1 style="margin-bottom:4px;">${esc(p.name)}</h1>

            </div>
          </div>
          <button class="btn btn-sm btn-outline" data-edit-product="${p.id}">✎ ແກ້ໄຂຂໍ້ມູນ</button>
        </div>
        ${p.desc ? `<p style="margin-top:16px; font-size:15px; line-height:1.7;">${esc(p.desc)}</p>` : ""}
      </div>
    </div>

    ${highlights.length>0 ? `
      <div class="card">
        <h3>✨ ຈຸດເດັ່ນ/ສ່ວນປະສົມ</h3>
        <ul style="margin:0; padding-left:20px; line-height:1.9;">
          ${highlights.map(h=>`<li>${esc(h)}</li>`).join("")}
        </ul>
      </div>
    ` : ""}

    ${benefits.length>0 ? `
      <div class="card">
        <h3>🌿 ປະໂຫຍດຫຼັກ</h3>
        <ul style="margin:0; padding-left:20px; line-height:1.9;">
          ${benefits.map(b=>`<li>${esc(b)}</li>`).join("")}
        </ul>
      </div>
    ` : ""}

    ${p.usage ? `
      <div class="card">
        <h3>📋 ວິທີໃຊ້/ວິທີກິນ-ທາ</h3>
        <p style="margin:0; line-height:1.8;">${esc(p.usage)}</p>
      </div>
    ` : ""}

    ${pains.length>0 ? `
      <div class="card">

      </div>

    ${faqs.length>0 ? `
      <div class="card">
        <h3>💬 ຄຳຖາມ-ຕອບດ່ວນ</h3>
        ${faqs.map(fq=>`
          <div style="margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid #E9E3D3;">

          </div>

      </div>

    ${(!highlights.length && !benefits.length && !p.usage && !pains.length && !faqs.length) ? `
      <div class="card empty">
        <span class="nav-icon">&#9998;</span>

async function generateContent(){
  const d = STATE.data;
  const product = d.products.find(p=>p.id===STATE.selProduct);
  if(!product){ STATE.error = "ກະລຸນາເລືອກສິນຄ້າກ່ອນ"; render(); return; }
  const tab = STATE.contentTab;
  if(tab==="analyzer" && !STATE.analyzerCurrent.trim()){
    STATE.error = "ກະລຸນາວາງຄອນເທນຕ໌ທີ່ຈະວິເຄາະກ່ອນ"; render(); return;
  }
  if(tab==="objection" && !STATE.objectionType){
    STATE.error = "ກະລຸນາເລືອກປະເພດຂໍ້ໂຕ້ແຍ້ງກ່ອນ"; render(); return;
  }
  STATE.loading = true; STATE.error = ""; STATE.output = "";
  render();

  let prompt = "";
  const knowledge = d.productKnowledge[product.id];
  const knowledgeBlock = (knowledge && knowledge.content)
    ? `\n\nຂໍ້ມູນຄົ້ນຄວ້າເພີ່ມເຕີມ (ຈາກອິນເຕີເນັດ, ໃຫ້ໃຊ້ອ້າງອີງເພື່ອໃຫ້ content ຕົງກັບຄວາມເປັນຈິງກ່ຽວກັບສິນຄ້ານີ້ຫຼາຍຂຶ້ນ):\n${knowledge.content}`
    : "";
  const selectedPains = (d.painPointsLib[product.id]||[]).filter(pp=>STATE.selectedPainPointIds.includes(pp.id));
  const selectedPainBlock = selectedPains.length>0
    ? `\nບັນຫາລູກຄ້າທີ່ຈະເນັ້ນເປັນພິເສດ: ${selectedPains.map(p=>p.text).join(", ")}`
    : "";

  if(tab==="createPost"){
    prompt = `ສ້າງໂພສຂາຍສິນຄ້າ ເປັນພາສາລາວ ສຳລັບສິນຄ້າຕໍ່ໄປນີ້:

function renderProductChat(){
  const d = STATE.data;
  if(!STATE.chatSelProduct && d.products.length>0) STATE.chatSelProduct = d.products[0].id;
  const product = d.products.find(p=>p.id===STATE.chatSelProduct);
  const knowledge = product ? d.productKnowledge[product.id] : null;
  const messages = product ? d.productChat.filter(m=>m.productId===product.id) : [];

  return `
    <div class="page-head">
      <h1>ຖາມ AI ກ່ຽວກັບສິນຄ້າ</h1>
      <p>ຖາມຫຍັງກໍ່ໄດ້ກ່ຽວກັບສິນຄ້າ — AI ຈະຕອບໂດຍອີງໃສ່ຖານຂໍ້ມູນທີ່ຄົ້ນຄວ້າໄວ້</p>
    </div>
    <div class="card">
      ${d.products.length===0 ? `<p class="small-muted">ກະລຸນາເພີ່ມສິນຄ້າກ່ອນ ໃນໜ້າ "ສິນຄ້າ"</p>` : `
        <label>ເລືອກສິນຄ້າ</label>
        <select id="chat-product">
          ${d.products.map(p=>`<option value="${p.id}" ${STATE.chatSelProduct===p.id?'selected':''}>${esc(p.name)}</option>`).join("")}
        </select>
        ${knowledge && knowledge.content ? `
          <div style="margin-top:6px; margin-bottom:14px;">
            <button type="button" class="btn btn-sm btn-outline" id="btn-toggle-knowledge">${STATE.chatKnowledgeOpen ? "▲ ເຊື່ອງຖານຂໍ້ມູນ" : "▼ ເບິ່ງຖານຂໍ້ມູນສິນຄ້ານີ້"}</button>
            ${STATE.chatKnowledgeOpen ? `<div class="content-out" style="max-height:220px; margin-top:8px;">${esc(knowledge.content)}</div>` : ""}
          </div>
        ` : `<p class="small-muted" style="margin:8px 0 14px 0;">⚠️ ສິນຄ້ານີ້ຍັງບໍ່ມີຂໍ້ມູນຄວາມຮູ້ — ໄປທີ່ໜ້າ "ສິນຄ້າ" → ແກ້ໄຂສິນຄ້ານີ້ → ໃສ່ຂໍ້ມູນໃນຊ່ອງ "ຄວາມຮູ້ສິນຄ້າ" ກ່ອນ (AI ຍັງຕອບໄດ້ ແຕ່ຈະອີງໃສ່ຂໍ້ມູນທີ່ພິມໄວ້ໃນ ລາຍລະອຽດ/pain points ເທົ່ານັ້ນ)</p>`}

        <div id="chat-log" style="max-height:400px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; margin-bottom:14px;">
          ${messages.length===0 ? `<p class="small-muted">ຍັງບໍ່ມີການສົນທະນາ — ພິມຄຳຖາມຂ້າງລຸ່ມເພື່ອເລີ່ມ</p>` : messages.map(m=>`
            <div style="align-self:${m.role==='admin'?'flex-end':'flex-start'}; max-width:80%;">
              <div style="font-size:11px; color:var(--muted); margin-bottom:2px; text-align:${m.role==='admin'?'right':'left'};">${m.role==='admin' ? '👤 ' + esc(STATE.currentUser?.name||'') : '🤖 AI'}</div>
              <div style="background:${m.role==='admin'?'var(--terracotta)':'var(--cream)'}; color:${m.role==='admin'?'#fff':'var(--ink)'}; border:1px solid ${m.role==='admin'?'transparent':'#E9E3D3'}; border-radius:10px; padding:10px 13px; font-size:14px; white-space:pre-wrap; line-height:1.55;">${esc(m.message)}</div>
            </div>
          `).join("")}
          ${STATE.chatSending ? `<div class="loading"><div class="spinner"></div>AI ກຳລັງຕອບ...</div>` : ""}
        </div>
        ${STATE.chatError ? `<p style="color:var(--danger); font-size:13.5px;">${esc(STATE.chatError)}</p>` : ""}
        <textarea id="chat-input" placeholder="ພິມຄຳຖາມ ເຊັ່ນ: ສິນຄ້ານີ້ເໝາະກັບກຸ່ມລູກຄ້າໃດ? / pain point ອັນໃດເດັ່ນສຸດ?" style="margin-bottom:8px;">${esc(STATE.chatQuestion)}</textarea>
        <button class="btn" id="btn-chat-send" ${STATE.chatSending?'disabled':''}>${STATE.chatSending?'ກຳລັງສົ່ງ...':'ສົ່ງຄຳຖາມ'}</button>
      `}
    </div>
  `;
}

async function sendProductChat(){
  const d = STATE.data;
  const product = d.products.find(p=>p.id===STATE.chatSelProduct);
  if(!product) return;
  const questionEl = document.getElementById("chat-input");
  const question = (questionEl ? questionEl.value : STATE.chatQuestion || "").trim();
  if(!question) return;

  const knowledge = d.productKnowledge[product.id];
  const faqList = d.productFaq[product.id] || [];
  const faqBlock = faqList.length>0
    ? `\nຄຳຖາມ-ຕອບດ່ວນທີ່ບັນທຶກໄວ້ (ໃຫ້ໃຊ້ຄຳຕອບເຫຼົ່ານີ້ເປັນຫຼັກ ຖ້າກົງກັບຄຳຖາມ):\n${faqList.map(fq=>`- Q: ${fq.question}\n  A: ${fq.answer}`).join("\n")}`
    : "";
  const userMsg = {id:"pc"+Date.now(), productId:product.id, role:"admin", message:question, createdAt:new Date().toISOString()};
  STATE.data.productChat.push(userMsg);
  STATE.chatQuestion = "";
  STATE.chatSending = true;
  STATE.chatError = "";
  render();
  dbInsertChatMsg(userMsg).catch(e=>console.error(e));

  const system = `ທ່ານແມ່ນຄົນລາວແທ້ໆ ເປັນຜູ້ຊ່ວຍດ້ານການຕະຫຼາດສຳລັບຮ້ານຄ້າອອນລາຍໃນລາວ ຕອບຄຳຖາມກ່ຽວກັບສິນຄ້າຕໍ່ໄປນີ້ໂດຍອີງໃສ່ຂໍ້ມູນທີ່ໃຫ້ໄວ້ເທົ່ານັ້ນ ຫ້າມໃຊ້ຂໍ້ມູນຂອງສິນຄ້າ/ແບຣນອື່ນມາຕອບແທນເດັດຂາດ ເຖິງຈະຄ້າຍຄືກັນກໍ່ຕາມ ຖ້າບໍ່ມີຂໍ້ມູນພຽງພໍ ໃຫ້ບອກຕາມກົງວ່າບໍ່ມີຂໍ້ມູນ ຢ່າກຸກຂໍ້ມູນຂຶ້ນເອງ. ຕອບເປັນພາສາລາວລ້ວນໆ ແບບທີ່ຄົນລາວແທ້ໆເວົ້າກັນຈິງ ບໍ່ແປຄຳຕໍ່ຄຳຈາກພາສາອື່ນ ບໍ່ປົນຄຳສັບ/ໄວຍະກອນຂອງພາສາໄທ ຫຼືພາສາອື່ນ ສັ້ນ ກົງປະເດັນ ອ່ານແລ້ວເປັນທຳມະຊາດ ນຳໃຊ້ໄດ້ຈິງສຳລັບແອັດມິນທີ່ຈະເອົາໄປເຮັດການຕະຫຼາດ.

ຊື່ສິນຄ້າ: ${product.name}
ໝວດໝູ່: ${product.category}
ລາຍລະອຽດ: ${product.desc}
ລາຄາຂາຍ: ${product.price ? fmt(product.price)+" ກີບ" : "ບໍ່ໄດ້ບັນທຶກໄວ້"}
${product.highlights ? `ຈຸດເດັ່ນ/ສ່ວນປະສົມ: ${product.highlights}` : ""}
${product.benefits ? `ປະໂຫຍດຫຼັກ: ${product.benefits}` : ""}
${product.usage ? `ວິທີໃຊ້: ${product.usage}` : ""}
ບັນຫາລູກຄ້າ (pain points) ທີ່ບັນທຶກໄວ້: ${product.painPoints}${faqBlock}
${knowledge && knowledge.content ? `\nຂໍ້ມູນຄົ້ນຄວ້າຈາກອິນເຕີເນັດ (ຄົ້ນຄວ້າໄວ້ລ່ວງໜ້າ):\n${knowledge.content}` : ""}`;

  try{
    const answer = await callAI(question, system);
    const aiMsg = {id:"pc"+(Date.now()+1), productId:product.id, role:"ai", message:answer, createdAt:new Date().toISOString()};
    STATE.data.productChat.push(aiMsg);
    dbInsertChatMsg(aiMsg).catch(e=>console.error(e));
  }catch(e){
    STATE.chatError = "ເກີດຂໍ້ຜິດພາດ: " + e.message;
  }
  STATE.chatSending = false;
  render();
}

function attachProductChatEvents(){
  const sel = document.getElementById("chat-product");
  if(sel) sel.addEventListener("change", ()=>{
    STATE.chatSelProduct = sel.value;
    STATE.chatKnowledgeOpen = false;
    render();
  });
  const toggleKnowledge = document.getElementById("btn-toggle-knowledge");
  if(toggleKnowledge) toggleKnowledge.addEventListener("click", ()=>{
    STATE.chatKnowledgeOpen = !STATE.chatKnowledgeOpen;
    render();
  });
  const input = document.getElementById("chat-input");
  if(input) input.addEventListener("input", ()=>{ STATE.chatQuestion = input.value; });
  const sendBtn = document.getElementById("btn-chat-send");
  if(sendBtn) sendBtn.addEventListener("click", sendProductChat);
  if(input) input.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendProductChat(); }
  });
  const log = document.getElementById("chat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

      <div class="grid-4">
        <div><label>ລາຍຮັບ (ກີບ)</label><input type="number" id="cf-revenue" value="${esc(f.revenue)}"/></div>
        <div><label>ຕົ້ນທຶນສິນຄ້າ</label><input type="number" id="cf-productCost" value="${esc(f.productCost)}"/></div>

    </div>
    <div class="card">
      <h3>ລາຍການທັງໝົດ</h3>
      ${d.costs.length===0 ? `<p class="small-muted">ຍັງບໍ່ມີລາຍການ</p>` : `

                <td>${fmt(c.adCost)}</td>

async function analyzeInsights(){
  const d = STATE.data;
  if(d.insights.length===0){ STATE.analyzeError = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກ ກະລຸນາເພີ່ມບັນຫາລູກຄ້າກ່ອນ"; render(); return; }
  STATE.analyzing = true; STATE.analyzeError = ""; STATE.analysis = "";
  render();
  try{
    const list = d.insights.slice(0,30).map((i,idx)=>`${idx+1}. ຄຳຖາມ: ${i.question} | ຄຳຕອບ: ${i.answer} | ສິນຄ້າ: ${i.productRelated||"-"}`).join("\n");
    const prompt = `ນີ້ແມ່ນບັນທຶກຄຳຖາມ-ຄຳຕອບຈາກລູກຄ້າທີ່ແຊັດເຂົ້າມາໃນຮ້ານອອນລາຍ:

${list}

ກະລຸນາວິເຄາະ:
1. ຮູບແບບ/ແນວໂນ້ມບັນຫາທີ່ລູກຄ້າຖາມເລື້ອຍໆ
2. ຈຸດທີ່ສິນຄ້າປະຈຸບັນຍັງຕອບສະໜອງບໍ່ພໍ
3. ແນວຄິດສິນຄ້າໃໝ່ ຫຼື ການແຕກລາຍສິນຄ້າທີ່ອາດຕອບໂຈດຄວາມຕ້ອງການເຫຼົ່ານີ້ໄດ້ (ສະເໜີ 2-3 ແນວຄິດ)
4. ຄຳແນະນຳສຳລັບການສ້າງ content ໃໝ່ ໂດຍອີງໃສ່ບັນຫາທີ່ພົບ

ຂຽນເປັນພາສາລາວ ຈັດໝວດໝູ່ໃຫ້ຈະແຈ້ງ.`;
    const result = await callAI(prompt, "ທ່ານແມ່ນນັກວິເຄາະການຕະຫຼາດ ຊ່ຽວຊານໃນການອ່ານ pattern ຈາກຄຳຖາມລູກຄ້າ ເພື່ອຄົ້ນພົບໂອກາດສິນຄ້າໃໝ່.");
    STATE.analysis = result;
  }catch(e){
    STATE.analyzeError = "ເກີດຂໍ້ຜິດພາດ: "+e.message;
  }
  STATE.analyzing = false;
  render();
}

function exportInsightsToExcel(){
  const d = STATE.data;
  const rows = d.insights.map(i => ({
    "ຜູ້ລາຍງານ": i.adminName || "",
    "ວັນທີ": i.date || "",
    "ຄຳຖາມ": i.question || "",
    "ຄຳຕອບຂອງແອັດມິນ": i.answer || "",
    "ສິນຄ້າທີ່ກ່ຽວຂ້ອງ": i.productRelated || "",
    "ມີຮູບແນບ": i.imageUrl ? "ມີ" : "ບໍ່ມີ",
    "ອ່ານແລ້ວ": i.readByOwner ? "ອ່ານແລ້ວ" : "ຍັງບໍ່ອ່ານ"
  }));
  if(rows.length===0){
    STATE.importMsg = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກໃຫ້ສົ່ງອອກ";
    render();
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:14},{wch:40},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ບັນຫາລູກຄ້າ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `customer-insights-${stamp}.xlsx`);
}

function importInsightsFromExcel(file){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const wb = XLSX.read(e.target.result, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
      const newItems = [];
      rows.forEach((r, idx) => {
        const question = r["ຄຳຖາມ"] || r["question"] || r["Question"] || "";
        const answer = r["ຄຳຕອບ"] || r["answer"] || r["Answer"] || "";
        const productRelated = r["ສິນຄ້າທີ່ກ່ຽວຂ້ອງ"] || r["product"] || r["Product"] || "";
        const date = r["ວັນທີ"] || r["date"] || r["Date"] || new Date().toLocaleDateString("lo-LA", {timeZone: LAOS_TZ});
        if(String(question).trim()){
          newItems.push({
            id:"i"+Date.now()+"-"+idx,
            question:String(question), answer:String(answer),
            productRelated:String(productRelated), date:String(date)
          });
        }
      });
      if(newItems.length>0){
        STATE.data.insights.unshift(...newItems);
        await dbInsertInsightsBulk(newItems);
      }
      STATE.importMsg = newItems.length>0
        ? `ນຳເຂົ້າສຳເລັດ: ເພີ່ມ ${newItems.length} ລາຍການໃໝ່`
        : "ບໍ່ພົບແຖວທີ່ມີຄຳຖາມໃນໄຟລ໌ — ກະລຸນາກວດຫົວຄໍລາມ໌ໃຫ້ກົງກັບ 'ຄຳຖາມ', 'ຄຳຕອບ', 'ສິນຄ້າທີ່ກ່ຽວຂ້ອງ', 'ວັນທີ'";
    }catch(err){
      STATE.importMsg = "ອ່ານໄຟລ໌ບໍ່ສຳເລັດ: " + err.message;
    }
    render();
  };
  reader.readAsArrayBuffer(file);
}

    "ຜູ້ລາຍງານ": r.adminName || "",
    "ຄົນເຮັດຜິດ": r.accusedName || "",
    "ໝວດໝູ່": r.category || "",
    "ລາຍລະອຽດ": r.detail || "",
    "ວັນ-ເວລາ": r.createdAt ? new Date(r.createdAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ}) : "",
    "ມີຮູບແນບ": r.imageUrl ? "ມີ" : "ບໍ່ມີ",
    "ອ່ານແລ້ວ": r.readByOwner ? "ອ່ານແລ້ວ" : "ຍັງບໍ່ອ່ານ"
  }));
  if(rows.length===0){ return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:16},{wch:22},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ລາຍງານຂໍ້ຜິດພາດ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `error-reports-${stamp}.xlsx`);
}

function attachReportEvents(){
  const exportRepBtn = document.getElementById("btn-export-reports-excel");
  if(exportRepBtn) exportRepBtn.addEventListener("click", exportReportsToExcel);
  document.querySelectorAll("[data-report-view]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.reportViewMode = el.getAttribute("data-report-view");
      render();
    });
  });

  const filterAccEl = document.getElementById("rep-filter-accused");
  if(filterAccEl) filterAccEl.addEventListener("change", ()=>{
    STATE.reportFilterAccused = filterAccEl.value;
    render();
  });

  const catEl = document.getElementById("rep-category");
  const accEl = document.getElementById("rep-accused");
  const detEl = document.getElementById("rep-detail");
  const imgEl = document.getElementById("rep-image-input");

  if(catEl) catEl.addEventListener("change", ()=>{ STATE.reportForm.category = catEl.value; });
  if(accEl) accEl.addEventListener("change", ()=>{ STATE.reportForm.accusedName = accEl.value; });
  if(detEl) detEl.addEventListener("input", ()=>{ STATE.reportForm.detail = detEl.value; });
  if(imgEl) imgEl.addEventListener("change", ()=>{
    const file = imgEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{ STATE.reportForm.imageBase64 = e.target.result; render(); };
    reader.readAsDataURL(file);
  });
  const imgRemoveBtn = document.getElementById("rep-image-remove");
  if(imgRemoveBtn) imgRemoveBtn.addEventListener("click", ()=>{
    STATE.reportForm.imageBase64 = "";
    if(imgEl) imgEl.value = "";
    render();
  });

  const submitBtn = document.getElementById("btn-submit-report");
  if(submitBtn) submitBtn.addEventListener("click", async ()=>{
    const f = STATE.reportForm;
    if(!f.category){ alert("ກະລຸນາເລືອກໝວດໝູ່ຂໍ້ຜິດພາດ"); return; }
    const newReport = {
      id:"rep"+Date.now(),
      adminName: STATE.currentUser?.name || "",
      category: f.category,
      accusedName: f.accusedName || "",
      detail: f.detail,
      imageUrl: f.imageBase64 || "",
      createdAt: new Date().toISOString(),
      readByOwner: false
    };
    STATE.data.reports.unshift(newReport);
    STATE.reportForm = {category:"", detail:"", imageBase64:"", accusedName:""};
    render();
    dbInsertReport(newReport).catch(err=>console.error(err));
    silentRefresh();
  });

  document.querySelectorAll("[data-del-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-report");
      STATE.data.reports = STATE.data.reports.filter(r=>r.id!==id);
      render();
      dbDeleteReport(id).catch(err=>console.error(err));
    });
  });

  document.querySelectorAll("[data-view-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-view-report");
      const r = STATE.data.reports.find(x=>x.id===id);
      if(!r) return;
      STATE.viewingReport = r;
      render();
      if(isOwner() && !r.readByOwner){
        r.readByOwner = true;
        dbMarkReportRead(id).catch(err=>console.error(err));
      }
    });
  });
  const repModalBg = document.getElementById("report-modal-bg");
  if(repModalBg) repModalBg.addEventListener("click", (e)=>{
    if(e.target.id==="report-modal-bg"){ STATE.viewingReport=null; render(); }
  });
  const closeRepModal = document.getElementById("close-report-modal");
  if(closeRepModal) closeRepModal.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
  const closeRepModalBtn = document.getElementById("close-report-modal-btn");
  if(closeRepModalBtn) closeRepModalBtn.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
}

function fmtTime(ts){
  if(!ts) return "-";
  return new Date(ts).toLocaleTimeString("lo-LA", {hour:"2-digit", minute:"2-digit", second:"2-digit", timeZone: LAOS_TZ});
}
function fmtDuration(inTs, outTs){
  if(!inTs || !outTs) return "-";
  const ms = new Date(outTs) - new Date(inTs);
  if(ms<=0) return "-";
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${h} ຊມ ${m} ນທ ${s} ວ`;
}
function todayStr(){ return new Date().toLocaleDateString("lo-LA", {timeZone: LAOS_TZ}); }

  {id:"row10",cells:[{id:"c10",field:"cod",         widthPct:100, fontSize:4.8, bold:true,  align:"left",   border:{top:"thin",right:"none",bottom:"thin",left:"none"}}]},
  {id:"row11",cells:[{id:"c11",field:"footer",      widthPct:100, fontSize:2.6, bold:false, align:"center", border:{top:"none",right:"none",bottom:"none",left:"none"}}]}
];
const BORDER_WIDTH_CSS = {none:"none", thin:"0.6px solid #333", thick:"1.8px solid #333"};
const PAPER_SIZES = {label:{w:100, h:150}, a4:{w:210, h:297}}; // physical page size in mm, used to keep the editor and print output true to the real paper
// Converts an old (v1.11-v1.13) block-array template — {id,field,x,y,w,h,fontSize,bold,align,border:bool} —
// into the new row/cell table format, so previously-saved templates keep working instead of breaking.
function normalizeLabelTemplate(raw){
  if(!raw || !raw.length) return null;
  if(raw[0] && Array.isArray(raw[0].cells)) return JSON.parse(JSON.stringify(raw)); // already new format
  return [...raw].sort((a,b)=>(a.y||0)-(b.y||0)).map(b=>({
    id: "row_"+b.id,
    heightMm: b.h || null,
    cells: [{
      id: "cell_"+b.id, field: b.field, widthPct: 100,
      fontSize: b.fontSize||3.2, bold: !!b.bold, align: b.align||"left",
      border: {top:"none", right:"none", bottom: b.border?"thin":"none", left:"none"}
    }]
  }));
}
function labelFieldValue(field, l, settings){
  switch(field){
    case "labelNumber": return String(l.labelNumber||"");
    case "shopName": return settings.shopName||"";
    case "shopPhone": return "ໂທ: " + (settings.shopPhone||"");
    case "createdTime": return "ວັນທີ່ສ້າງ: " + new Date(l.createdAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ, hour:"2-digit", minute:"2-digit", day:"2-digit", month:"2-digit", year:"numeric"});
    case "courierName": return l.courierName ? "ຂົນສົ່ງ: "+l.courierName : "";
    case "recipient": return "ຜູ້ຮັບ: " + (l.recipientName||"") + "  " + (l.recipientPhone||"") + "\n" + (l.address||"");
    case "item": return (l.itemText||"") + (l.qty>1 ? " x "+l.qty : "");
    case "note": return l.note ? "ໝາຍເຫດ: "+l.note : "";
    case "cod": return "ເກັບເງິນ(COD): " + fmt(l.codAmount) + " K   [" + (l.freeShipping?"ຝາກຟຣີ":"ເກັບປາຍທາງ") + "]";
    case "footer": return settings.footerText||"";
    default: return "";
  }
}
function renderLabelCell(cell, l, settings, opts){
  opts = opts || {};
  const editable = !!opts.editable;
  const isRealPrint = !!opts.isRealPrint;
  const selected = editable && STATE.selectedCellIds.includes(cell.id);
  const b = cell.border || {top:"none",right:"none",bottom:"none",left:"none"};
  const borderCss = `border-top:${BORDER_WIDTH_CSS[b.top]||'none'}; border-right:${BORDER_WIDTH_CSS[b.right]||'none'}; border-bottom:${BORDER_WIDTH_CSS[b.bottom]||'none'}; border-left:${BORDER_WIDTH_CSS[b.left]||'none'};`;
  const style = `width:${cell.widthPct}%; font-size:${cell.fontSize}mm; font-weight:${cell.bold?700:400}; text-align:${cell.align||'left'}; padding:1.1mm 1.6mm; vertical-align:middle; white-space:pre-wrap; word-break:break-word; line-height:1.28; color:#111; ${borderCss} ${editable?`outline:1px dashed ${selected?'#c9683f':'#ccc'}; outline-offset:-1px; cursor:pointer; position:relative;`:''}`;
  const inner = cell.field==="barcode"
    ? (isRealPrint
        ? `<div style="text-align:center;"><svg id="label-barcode" style="${STATE.barcodeStatus==='ready'?'':'display:none;'}"></svg>${STATE.barcodeStatus==="loading"?'<div class="no-print barcode-loading-indicator" style="font-size:10px; color:#888;">⏳ ກຳລັງໂຫຼດ barcode...</div>':''}${STATE.barcodeStatus==="error"?'<div class="no-print barcode-error-indicator" style="font-size:10px; color:red;">⚠️ Barcode ອອກບໍ່ໄດ້ — ຢ່າພິມກ່ອນລອງໃໝ່<br/><button class="btn btn-sm btn-outline" id="btn-retry-barcode" style="margin-top:6px;">🔄 ລອງໃໝ່</button></div>':''}</div>`
        : `<div style="text-align:center;">${renderFakeBarcodeSvg()}</div>`)
    : esc(labelFieldValue(cell.field, l, settings));
  // A thin drag handle along the bottom edge of every editable cell — grabbing any cell
  // in a row lets you drag that row's height, since a row's cells always share one height.
  const resizeHandle = editable ? `<div class="tpl-row-resize-handle" data-row-id="${opts.rowId||''}" style="position:absolute; left:0; right:0; bottom:-3px; height:6px; cursor:ns-resize; z-index:5;" title="ລາກເພື່ອປັບຄວາມສູງແຖວ"></div>` : "";
  return `<td class="tpl-cell" data-cell-id="${cell.id}" data-row-id="${opts.rowId||''}" style="${style}">${inner}${resizeHandle}</td>`;
}
function renderLabelTable(rows, l, settings, opts){
  return `<table style="width:100%; border-collapse:collapse; table-layout:fixed;"><tbody>
    ${rows.map(row=>`<tr data-row-id="${row.id}" style="${row.heightMm?`height:${row.heightMm}mm;`:''}">${row.cells.map(c=>renderLabelCell(c, l, settings, {...opts, rowId:row.id})).join("")}</tr>`).join("")}
  </tbody></table>`;
}
// Returns info for every currently-selected cell, in template order (row by row, left to right).
function getSelectedCellsInfo(){
  if(!STATE.labelTemplate) return [];
  const out = [];
  STATE.labelTemplate.forEach((row, ri)=>{
    row.cells.forEach((cell, ci)=>{
      if(STATE.selectedCellIds.includes(cell.id)) out.push({row, rowIndex:ri, cell, cellIndex:ci});
    });
  });
  return out;
}
// Flat, ordered list of every cell (for shift-click range selection).
function flatCellList(){
  const out = [];
  (STATE.labelTemplate||[]).forEach((row, ri)=>{
    row.cells.forEach((cell, ci)=>out.push({row, rowIndex:ri, cell, cellIndex:ci}));
  });
  return out;
}

// ---- Undo / redo for the template editor ----
function pushTemplateHistory(){
  if(!STATE.labelTemplate) return;
  STATE.templateUndoStack.push(JSON.stringify(STATE.labelTemplate));
  if(STATE.templateUndoStack.length>50) STATE.templateUndoStack.shift();
  STATE.templateRedoStack = [];
}
function undoTemplate(){
  if(STATE.templateUndoStack.length===0) return;
  STATE.templateRedoStack.push(JSON.stringify(STATE.labelTemplate));
  STATE.labelTemplate = JSON.parse(STATE.templateUndoStack.pop());
  STATE.selectedCellIds = [];
  render();
}
function redoTemplate(){
  if(STATE.templateRedoStack.length===0) return;
  STATE.templateUndoStack.push(JSON.stringify(STATE.labelTemplate));
  STATE.labelTemplate = JSON.parse(STATE.templateRedoStack.pop());
  STATE.selectedCellIds = [];
  render();
}

// ---- Excel-style "Borders" button actions, applied to every currently-selected cell ----
const BORDER_ACTIONS = [
  {id:"bottom",  label:"ຂອບລຸ່ມ"},
  {id:"top",     label:"ຂອບເທິງ"},
  {id:"left",    label:"ຂອບຊ້າຍ"},
  {id:"right",   label:"ຂອບຂວາ"},
  {id:"none",    label:"ບໍ່ມີເສັ້ນຂອບ"},
  {id:"all",     label:"ຂອບທັງໝົດ"},
  {id:"outside", label:"ຂອບອ້ອມນອກ"},
  {id:"thickbox",label:"ຂອບໜາອ້ອມນອກ"}
];
function applyBorderAction(actionId, thickness){
  const cells = getSelectedCellsInfo();
  if(cells.length===0) return;
  pushTemplateHistory();
  const w = thickness==="thick" ? "thick" : "thin";
  if(actionId==="none"){
    cells.forEach(({cell})=>{ cell.border = {top:"none",right:"none",bottom:"none",left:"none"}; });
  } else if(actionId==="all"){
    cells.forEach(({cell})=>{ cell.border = {top:w,right:w,bottom:w,left:w}; });
  } else if(actionId==="top" || actionId==="bottom" || actionId==="left" || actionId==="right"){
    cells.forEach(({cell})=>{ cell.border[actionId] = w; });
  } else if(actionId==="outside" || actionId==="thickbox"){
    const outsideW = actionId==="thickbox" ? "thick" : w;
    // Group selected cells by row, in template order, to work out which sides face
    // the outside edge of the selection block (top row / bottom row / first / last in row).
    const byRow = {};
    cells.forEach(info=>{ (byRow[info.rowIndex] = byRow[info.rowIndex]||[]).push(info); });
    const rowIndices = Object.keys(byRow).map(Number).sort((a,b)=>a-b);
    const minRow = rowIndices[0], maxRow = rowIndices[rowIndices.length-1];
    rowIndices.forEach(ri=>{
      const rowCells = byRow[ri].sort((a,b)=>a.cellIndex-b.cellIndex);
      rowCells.forEach((info, idx)=>{
        if(ri===minRow) info.cell.border.top = outsideW;
        if(ri===maxRow) info.cell.border.bottom = outsideW;
        if(idx===0) info.cell.border.left = outsideW;
        if(idx===rowCells.length-1) info.cell.border.right = outsideW;
      });
    });
  }
  render();
}

function renderFakeBarcodeSvg(){
  const widths = [2,1,3,1,2,3,1,1,2,3,1,2,1,3,2,1,1,3,2,1,2,1,3,1,2,3,1,1,2,1];

}

function processScanCode(code){
  const trimmed = String(code).trim();
  if(!trimmed) return;
  const label = STATE.data.shippingLabels.find(l=>String(l.labelNumber)===trimmed);
  const scan = {
    id:"sc"+Date.now(),
    labelId: label ? label.id : "",
    scannedCode: trimmed,
    matched: !!label,
    recipientName: label ? label.recipientName : "",
    recipientPhone: label ? label.recipientPhone : "",
    address: label ? label.address : "",
    codAmount: label ? label.codAmount : 0,
    courierName: label ? label.courierName : "",
    scannedAt: new Date().toISOString(),
    scannedBy: STATE.currentUser ? STATE.currentUser.name : ""
  };
  STATE.data.packageScans.unshift(scan);
  STATE.lastScanResult = scan;
  STATE.scanInputValue = "";
  STATE.scanError = "";
  render();
  dbInsertPackageScan(scan).catch(err=>console.error(err));
  silentRefresh();
  setTimeout(()=>{
    const hw = document.getElementById("scan-hardware-input");
    if(hw) hw.focus();
  }, 50);
}

function stopCamera(){
  if(STATE.cameraScanInterval){ clearInterval(STATE.cameraScanInterval); STATE.cameraScanInterval = null; }
  if(STATE.cameraStream){ STATE.cameraStream.getTracks().forEach(t=>t.stop()); STATE.cameraStream = null; }
  STATE.cameraActive = false;
}

function attachScanOutEvents(){
  document.querySelectorAll("[data-scan-mode]").forEach(el=>{
    el.addEventListener("click", ()=>{
      stopCamera();
      STATE.scanMode = el.getAttribute("data-scan-mode");
      STATE.scanError = "";
      render();
    });
  });

  const hwInput = document.getElementById("scan-hardware-input");
  if(hwInput){
    hwInput.addEventListener("input", ()=>{ STATE.scanInputValue = hwInput.value; });
    hwInput.addEventListener("keydown", (e)=>{
      if(e.key==="Enter"){
        e.preventDefault();
        processScanCode(hwInput.value);
      }
    });
    hwInput.focus();
  }

  const manualInput = document.getElementById("scan-manual-input");
  if(manualInput) manualInput.addEventListener("input", ()=>{ STATE.scanInputValue = manualInput.value; });

  const manualSubmitBtn = document.getElementById("btn-scan-manual-submit");
  if(manualSubmitBtn) manualSubmitBtn.addEventListener("click", ()=>{ processScanCode(STATE.scanInputValue); });

  const startCameraBtn = document.getElementById("btn-start-camera");
  if(startCameraBtn) startCameraBtn.addEventListener("click", async ()=>{
    if(!window.BarcodeDetector){
      STATE.scanError = "ອຸປະກອນ/browser ນີ້ບໍ່ຮອງຮັບການສະແກນຜ່ານກ້ອງ ກະລຸນາໃຊ້ເຄື່ອງສະແກນ USB ຫຼືພິມເລກເອງແທນ";
      render();
      return;
    }
    STATE.scanError = "";
    STATE.cameraActive = true;
    render();
    try{
      const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
      STATE.cameraStream = stream;
      const video = document.getElementById("scan-camera-video");
      if(!video){ stopCamera(); render(); return; }
      video.srcObject = stream;
      await video.play();
      const detector = new BarcodeDetector({formats:["code_128"]});
      STATE.cameraScanInterval = setInterval(async ()=>{
        if(!STATE.cameraActive) return;
        try{
          const codes = await detector.detect(video);
          if(codes && codes.length>0){
            const value = codes[0].rawValue;
            stopCamera();
            processScanCode(value);
          }
        }catch(e){ /* ignore per-frame detection errors */ }
      }, 400);
    }catch(e){
      STATE.scanError = "ເປີດກ້ອງບໍ່ໄດ້: " + e.message;
      STATE.cameraActive = false;
      render();
    }
  });

  const stopCameraBtn = document.getElementById("btn-stop-camera");
  if(stopCameraBtn) stopCameraBtn.addEventListener("click", ()=>{
    stopCamera();
    render();
  });
}

                  <td class="small-muted" style="max-width:280px; word-break:break-word;">${esc((r.device||"").slice(0,100))}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>
      `}
    </div>
  `;
}

function getLocation(highAccuracy, timeoutMs){
  // IMPORTANT: on some mobile browsers (notably iOS Safari when Location
  // Services are off at the OS level), getCurrentPosition() never calls
  // EITHER callback and ignores its own `timeout` option — leaving the
  // button stuck on "ກຳລັງຫາຕຳແໜ່ງ..." forever. We guard against that by
  // racing the browser API against our own hard timeout, so this function
  // is GUARANTEED to resolve within timeoutMs+2s no matter what.
  return new Promise((resolve)=>{
    let settled = false;
    const finish = (result)=>{
      if(settled) return;
      settled = true;
      resolve(result);
    };

    if(!navigator.geolocation){
      finish({lat:null, lng:null, error:"ອຸປະກອນ ຫຼື browser ນີ້ບໍ່ຮອງຮັບ GPS", code:0});
      return;
    }
    if(location.protocol!=="https:" && location.hostname!=="localhost"){
      finish({lat:null, lng:null, error:"ໜ້ານີ້ຕ້ອງເປີດຜ່ານ https ຈຶ່ງຈະຂໍຕຳແໜ່ງໄດ້", code:0});
      return;
    }

    const hardTimeout = setTimeout(()=>{
      finish({lat:null, lng:null, error:"ຫາຕຳແໜ່ງບໍ່ໄດ້ພາຍໃນເວລາ", code:3});
    }, timeoutMs + 2000);

    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        clearTimeout(hardTimeout);
        finish({lat:pos.coords.latitude, lng:pos.coords.longitude, error:null, code:null});
      },
      (err)=>{
        clearTimeout(hardTimeout);
        let msg = "ບໍ່ສາມາດຫາຕຳແໜ່ງໄດ້";
        if(err.code===1) msg = "browser ບໍ່ອະນຸຍາດຕຳແໜ່ງ (Location) ໃຫ້ໜ້ານີ້";
        else if(err.code===2) msg = "ອຸປະກອນຫາຕຳແໜ່ງບໍ່ໄດ້ (Location Services ອາດຖືກປິດ)";
        else if(err.code===3) msg = "ຫາຕຳແໜ່ງໃຊ້ເວລາດົນເກີນໄປ";
        finish({lat:null, lng:null, error: msg, code: err.code});
      },
      {enableHighAccuracy: highAccuracy, timeout: timeoutMs, maximumAge:0}
    );
  });
}

// Tries a quick high-accuracy fix first, then falls back to a looser
// network-based fix if that fails. Many devices fail on high-accuracy GPS
// (indoors, GPS chip busy) but succeed instantly with network location.
async function getLocationWithFallback(){
  let loc = await getLocation(true, 8000);
  if(loc.error && loc.code!==1){ // don't bother retrying if permission was denied outright
    loc = await getLocation(false, 6000);
  }
  return loc;
}

// Purely client-side ticking clock (no Supabase calls whatsoever — safe
// under the no-polling rule). Updates one <div> textContent every second
// while the "clocked in, not out yet" card is on screen; stopped/cleared
// whenever the page re-renders or navigates away so it never stacks up.
if(!window.__attendanceTimerHandle) window.__attendanceTimerHandle = null;
function stopLiveElapsedTimer(){
  if(window.__attendanceTimerHandle){
    clearInterval(window.__attendanceTimerHandle);
    window.__attendanceTimerHandle = null;
  }
}
function startLiveElapsedTimer(){
  stopLiveElapsedTimer();
  const el = document.getElementById("live-elapsed-timer");
  if(!el) return;
  const clockInTs = el.getAttribute("data-clock-in");
  if(!clockInTs) return;
  const clockInMs = new Date(clockInTs).getTime();
  const tick = ()=>{
    const liveEl = document.getElementById("live-elapsed-timer");
    if(!liveEl){ stopLiveElapsedTimer(); return; }
    const ms = Math.max(0, Date.now() - clockInMs);
    const h = String(Math.floor(ms/3600000)).padStart(2,"0");
    const m = String(Math.floor((ms%3600000)/60000)).padStart(2,"0");
    const s = String(Math.floor((ms%60000)/1000)).padStart(2,"0");
    liveEl.textContent = `${h}:${m}:${s}`;
  };
  tick();
  window.__attendanceTimerHandle = setInterval(tick, 1000);
}

function attachTemplateEditorEvents(){
  const tplSettings = STATE.data.labelSettings || {paperSize:"label"};
  const paperMm = PAPER_SIZES[tplSettings.paperSize] || PAPER_SIZES.label;
  const addRowBtn = document.getElementById("btn-tpl-add-row");
  if(addRowBtn) addRowBtn.addEventListener("click", ()=>{
    if(!STATE.labelTemplate) return;
    pushTemplateHistory();
    const newRow = {id:"row"+Date.now(), cells:[{id:"cell"+Date.now(), field:"note", widthPct:100, fontSize:3.2, bold:false, align:"left", border:{top:"thin",right:"none",bottom:"none",left:"none"}}]};
    STATE.labelTemplate.push(newRow);
    STATE.selectedCellIds = [newRow.cells[0].id];
    STATE.selectionAnchorId = newRow.cells[0].id;
    render();
  });

  const undoBtn = document.getElementById("btn-tpl-undo");
  if(undoBtn) undoBtn.addEventListener("click", undoTemplate);
  const redoBtn = document.getElementById("btn-tpl-redo");
  if(redoBtn) redoBtn.addEventListener("click", redoTemplate);

  const thinBtn = document.getElementById("btn-thickness-thin");
  if(thinBtn) thinBtn.addEventListener("click", ()=>{ STATE.tplBorderThickness = "thin"; render(); });
  const thickBtn = document.getElementById("btn-thickness-thick");
  if(thickBtn) thickBtn.addEventListener("click", ()=>{ STATE.tplBorderThickness = "thick"; render(); });

  document.querySelectorAll(".tpl-border-action").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      applyBorderAction(btn.getAttribute("data-border-action"), STATE.tplBorderThickness);
    });
  });

  const clearSelBtn = document.getElementById("btn-tpl-clear-selection");
  if(clearSelBtn) clearSelBtn.addEventListener("click", ()=>{
    STATE.selectedCellIds = [];
    STATE.selectionAnchorId = "";
    render();
  });

  // Click a cell to select it — like Excel: plain click = select just this cell (and
  // becomes the range anchor), Shift+click = select every cell between the anchor and
  // this one, Ctrl/Cmd+click = add/remove just this cell from the current selection.
  const preview = document.getElementById("tpl-live-preview");
  if(preview) preview.addEventListener("click", (e)=>{
    if(e.target.closest(".tpl-row-resize-handle")) return;
    const td = e.target.closest("[data-cell-id]");
    if(!td) return;
    const id = td.getAttribute("data-cell-id");
    if(e.shiftKey && STATE.selectionAnchorId){
      const flat = flatCellList();
      const anchorIdx = flat.findIndex(f=>f.cell.id===STATE.selectionAnchorId);
      const clickIdx = flat.findIndex(f=>f.cell.id===id);
      if(anchorIdx!==-1 && clickIdx!==-1){
        const lo = Math.min(anchorIdx, clickIdx), hi = Math.max(anchorIdx, clickIdx);
        STATE.selectedCellIds = flat.slice(lo, hi+1).map(f=>f.cell.id);
      }
    } else if(e.ctrlKey || e.metaKey){
      if(STATE.selectedCellIds.includes(id)){
        STATE.selectedCellIds = STATE.selectedCellIds.filter(x=>x!==id);
      } else {
        STATE.selectedCellIds = [...STATE.selectedCellIds, id];
      }
      STATE.selectionAnchorId = id;
    } else {
      STATE.selectedCellIds = [id];
      STATE.selectionAnchorId = id;
    }
    render();
  });

  // Drag the handle along a row's bottom edge to set that row's height with the mouse,
  // instead of typing a number — the overall label canvas stays fixed to the paper size
  // set in "⚙️ ຕັ້ງຄ່າໃບບິນ" (100x150mm etc); only the individual row grows/shrinks.
  if(preview) preview.addEventListener("pointerdown", (e)=>{
    const handle = e.target.closest(".tpl-row-resize-handle");
    if(!handle) return;
    e.preventDefault();
    const rowId = handle.getAttribute("data-row-id");
    const row = STATE.labelTemplate && STATE.labelTemplate.find(r=>r.id===rowId);
    const trEl = preview.querySelector(`tr[data-row-id="${rowId}"]`);
    if(!row || !trEl) return;
    pushTemplateHistory();
    const tableEl = preview.querySelector("table");
    const pxPerMm = tableEl.getBoundingClientRect().width / paperMm.w;
    const startHeightPx = trEl.getBoundingClientRect().height;
    const startY = e.clientY;
    const onMove = (ev)=>{
      const dyPx = ev.clientY - startY;
      const newHeightMm = Math.max(3, (startHeightPx + dyPx) / pxPerMm);
      row.heightMm = Math.round(newHeightMm*10)/10;
      updateTemplateLivePreview();
    };
    const onUp = ()=>{
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      render();
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  });

  const selCells = getSelectedCellsInfo();
  const single = selCells.length===1 ? selCells[0] : null;
  if(single){
    const fieldSel = document.getElementById("tpl-cell-field");
    if(fieldSel) fieldSel.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.field = fieldSel.value; render(); });

    const widthInp = document.getElementById("tpl-cell-width");
    if(widthInp){
      widthInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      widthInp.addEventListener("input", ()=>{
        single.cell.widthPct = Math.max(10, Math.min(100, parseFloat(widthInp.value)||100));
        updateTemplateLivePreview();
      });
    }

    const rowHeightInp = document.getElementById("tpl-row-height");
    if(rowHeightInp){
      rowHeightInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      rowHeightInp.addEventListener("input", ()=>{
        const v = parseFloat(rowHeightInp.value);
        single.row.heightMm = (rowHeightInp.value==="" || isNaN(v)) ? null : Math.max(2, Math.min(80, v));
        updateTemplateLivePreview();
      });
    }

    const fontInp = document.getElementById("tpl-cell-fontsize");
    if(fontInp){
      fontInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      fontInp.addEventListener("input", ()=>{
        single.cell.fontSize = parseFloat(fontInp.value)||3.2;
        updateTemplateLivePreview();
      });
    }

    const boldChk = document.getElementById("tpl-cell-bold");
    if(boldChk) boldChk.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.bold = boldChk.checked; render(); });

    const alignSel = document.getElementById("tpl-cell-align");
    if(alignSel) alignSel.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.align = alignSel.value; render(); });

    const splitBtn = document.getElementById("btn-tpl-split-cell");
    if(splitBtn) splitBtn.addEventListener("click", ()=>{
      pushTemplateHistory();
      const half = single.cell.widthPct/2;
      single.cell.widthPct = half;
      const newCell = {id:"cell"+Date.now(), field:"note", widthPct:half, fontSize:single.cell.fontSize, bold:false, align:"left", border:{...single.cell.border}};
      single.row.cells.splice(single.cellIndex+1, 0, newCell);
      STATE.selectedCellIds = [newCell.id];
      STATE.selectionAnchorId = newCell.id;
      render();
    });

    const mergeBtn = document.getElementById("btn-tpl-merge-cell");
    if(mergeBtn) mergeBtn.addEventListener("click", ()=>{
      const nextCell = single.row.cells[single.cellIndex+1];
      if(!nextCell) return;
      pushTemplateHistory();
      single.cell.widthPct += nextCell.widthPct;
      single.row.cells.splice(single.cellIndex+1, 1);
      render();
    });

    const delCellBtn = document.getElementById("btn-tpl-delete-cell");
    if(delCellBtn) delCellBtn.addEventListener("click", ()=>{
      pushTemplateHistory();
      if(single.row.cells.length===1){
        STATE.labelTemplate = STATE.labelTemplate.filter(r=>r.id!==single.row.id);
      } else {
        single.row.cells.splice(single.cellIndex, 1);
        const neighbour = single.row.cells[single.cellIndex] || single.row.cells[single.cellIndex-1];
        if(neighbour) neighbour.widthPct += single.cell.widthPct;
      }
      STATE.selectedCellIds = [];
      render();
    });

    const rowUpBtn = document.getElementById("btn-tpl-row-up");
    if(rowUpBtn) rowUpBtn.addEventListener("click", ()=>{
      if(single.rowIndex===0) return;
      pushTemplateHistory();
      const [row] = STATE.labelTemplate.splice(single.rowIndex, 1);
      STATE.labelTemplate.splice(single.rowIndex-1, 0, row);
      render();
    });
    const rowDownBtn = document.getElementById("btn-tpl-row-down");
    if(rowDownBtn) rowDownBtn.addEventListener("click", ()=>{
      if(single.rowIndex===STATE.labelTemplate.length-1) return;
      pushTemplateHistory();
      const [row] = STATE.labelTemplate.splice(single.rowIndex, 1);
      STATE.labelTemplate.splice(single.rowIndex+1, 0, row);
      render();
    });
    const delRowBtn = document.getElementById("btn-tpl-delete-row");
    if(delRowBtn) delRowBtn.addEventListener("click", ()=>{
      pushTemplateHistory();
      STATE.labelTemplate = STATE.labelTemplate.filter(r=>r.id!==single.row.id);
      STATE.selectedCellIds = [];
      render();
    });
  }

  const saveTplBtn = document.getElementById("btn-tpl-save");
  if(saveTplBtn) saveTplBtn.addEventListener("click", ()=>{
    if(!STATE.labelTemplate) return;
    const base = STATE.data.labelSettings || {shopName:"", shopPhone:"", footerText:"", paperSize:"label"};
    const s = {...base, templateLayout: STATE.labelTemplate};
    STATE.savingTemplate = true;
    render();
    STATE.data.labelSettings = s;
    dbSaveLabelSettings(s).then(()=>{
      STATE.savingTemplate = false;
      render();
      silentRefresh();
    }).catch(err=>{
      console.error(err);
      STATE.savingTemplate = false;
      render();
    });
  });

  const resetTplBtn = document.getElementById("btn-tpl-reset");
  if(resetTplBtn) resetTplBtn.addEventListener("click", ()=>{
    if(!confirm("ຄືນຄ່າ template ກັບເປັນແບບເລີ່ມຕົ້ນ? ການປ່ຽນແປງທີ່ຍັງບໍ່ໄດ້ບັນທຶກຈະຫາຍ")) return;
    pushTemplateHistory();
    STATE.labelTemplate = JSON.parse(JSON.stringify(DEFAULT_LABEL_TEMPLATE));
    STATE.selectedCellIds = [];
    render();
  });
}
