        "ຊົ່ວໂມງລວມ": recs.reduce((s,a)=>s+attendanceHours(a),0).toFixed(1),
        "ມາຊ້າ": recs.filter(isLateClockIn).length,
        "ອອກກ່ອນໂມງ": recs.filter(isEarlyClockOut).length,
        "ນອກເຂດ GPS": recs.filter(isOutOfRangeAttendance).length
      };
    });
    const ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = [{wch:18},{wch:16},{wch:12},{wch:10},{wch:14},{wch:12}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "ສະຫຼຸບເຂົ້າ-ອອກ");
    XLSX.writeFile(wb, `attendance-summary-${range.from}_to_${range.to}.xlsx`);
  });

  const exportBtn = document.getElementById("btn-export-attendance");
  if(exportBtn) exportBtn.addEventListener("click", ()=>{
    const rows = STATE.data.attendance.map(a=>({
      "ວັນທີ": a.date,
      "ພະນັກງານ": a.adminName,
      "ເຂົ້າວຽກ": a.clockIn ? new Date(a.clockIn).toLocaleTimeString("en-GB", {timeZone: LAOS_TZ}) : "",
      "ເລີກວຽກ": a.clockOut ? new Date(a.clockOut).toLocaleTimeString("en-GB", {timeZone: LAOS_TZ}) : "ຍັງຢູ່ວຽກ",
      "ຊົ່ວໂມງລວມ": fmtDuration(a.clockIn, a.clockOut)
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = [{wch:14},{wch:16},{wch:12},{wch:12},{wch:18}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "ລົງໂມງ");
    XLSX.writeFile(wb, `attendance-${new Date().toISOString().slice(0,10)}.xlsx`);
  });

  document.querySelectorAll("[data-del-attendance]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-attendance");
      STATE.data.attendance = STATE.data.attendance.filter(a=>a.id!==id);
      render();
      dbDeleteAttendance(id).catch(e=>{ console.error(e); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+e.message); });
    });
  });
}

    }catch(e){

      render();

  document.querySelectorAll("[data-approve-user]").forEach(el=>{
    el.addEventListener("click", async ()=>{

      await loadUsersList();
    });
  });
}

function gpsHelpText(){
  return "ວິທີແກ້ (ຄອມ/Chrome): ກົດໄອຄອນ 🔒 ຫຼື ⓘ ໜ້າ URL ➝ Site settings ➝ Location ➝ ເລືອກ Allow ➝ ແລ້ວກົດເຂົ້າສູ່ລະບົບຄືນ. (ຖ້າໃຊ້ Mac: System Settings ➝ Privacy & Security ➝ Location Services ➝ ເປີດໃຫ້ Chrome/Safari ນຳ). ອະນຸຍາດຄັ້ງດຽວ ຄັ້ງຕໍ່ໄປລະບົບຈະບໍ່ຖາມອີກ.";
}

function attachLoginEvents(){
  const tabLogin = document.getElementById("tab-login");
  const tabReg = document.getElementById("tab-register");
  if(tabLogin) tabLogin.addEventListener("click", ()=>{ STATE.loginMode="login"; STATE.loginError=""; render(); });
  if(tabReg) tabReg.addEventListener("click", ()=>{ STATE.loginMode="register"; STATE.loginError=""; render(); });

  const nameEl = document.getElementById("login-name");
  const passEl = document.getElementById("login-password");
  if(nameEl) nameEl.addEventListener("input", ()=>{ STATE.loginForm.name = nameEl.value; });
  if(passEl) passEl.addEventListener("input", ()=>{ STATE.loginForm.password = passEl.value; });

  const toggleBtn = document.getElementById("btn-toggle-password");
  if(toggleBtn && passEl){
    toggleBtn.addEventListener("click", ()=>{
      if(passEl.type==="password"){
        passEl.type = "text";
        toggleBtn.textContent = "🙈";
      } else {
        passEl.type = "password";
        toggleBtn.textContent = "👁";
      }
    });
  }

  const submitBtn = document.getElementById("btn-login-submit");
  if(submitBtn) submitBtn.addEventListener("click", async ()=>{
    const name = STATE.loginForm.name.trim();
    const password = STATE.loginForm.password.trim();
    if(!name || !password){ STATE.loginError = "ກະລຸນາໃສ່ຊື່ ແລະ ລະຫັດຜ່ານ"; render(); return; }
    const isRegisterMode = STATE.loginMode === "register";
    const resetBtnLabel = isRegisterMode ? "ລົງທະບຽນ ແລະ ເຂົ້າໃຊ້" : "ເຂົ້າສູ່ລະບົບ";
    submitBtn.disabled = true;
    submitBtn.textContent = "ກຳລັງກວດສອບ...";
    try{
      let user;
      if(isRegisterMode){
        user = await dbRegister(name, password);
      } else {
        user = await dbLogin(name, password);
      }

      // GPS is REQUIRED to enter the system — this is an explicit owner
      // decision (transparency: every login must be traceable to a real
      // location) over convenience. There is intentionally NO skip option
      // here, unlike the attendance clock-in button. Staff whose browser
      // blocks/spoofs location (commonly caused by a VPN extension being
      // installed, even if not actively connected) must use a Chrome
      // profile without such extensions to log in.
      submitBtn.textContent = "ກຳລັງຂໍສິດເຂົ້າເຖິງຕຳແໜ່ງ GPS...";
      const loc = await getLocationWithFallback();
      if(loc.error){
        STATE.loginError = "⚠️ " + loc.error + " — ລະບົບນີ້ຕ້ອງການອະນຸຍາດ GPS ຈຶ່ງຈະເຂົ້າໃຊ້ໄດ້ (ບໍ່ມີທາງເລືອກຂ້າມ, ເພື່ອຄວາມໂປ່ງໃສ).\n\n" + gpsHelpText() + "\n\nຫາກ browser ນີ້ມີການຕິດຕັ້ງ VPN extension ໄວ້ (ເຖິງແມ່ນບໍ່ໄດ້ເປີດໃຊ້) ມັນອາດບລັອກ GPS ໂດຍອັດຕະໂນມັດ — ໃຫ້ລອງໃຊ້ Chrome ອີກໂປຣໄຟລ໌ທີ່ບໍ່ມີ VPN extension ຕິດຕັ້ງ.";
        submitBtn.disabled = false;
        submitBtn.textContent = resetBtnLabel;
        render();
        return;
      }

      STATE.currentUser = user;
      saveSession(user);
      STATE.loginError = "";
      STATE.loginForm = {name:"", password:""};
      render();
      startIdleTracking();

      // Fire-and-forget: record this login for the owner's "login history" page.
      dbInsertLoginHistory({
        id: "lh"+Date.now(),
        userId: user.id,
        name: user.name,
        loginAt: new Date().toISOString(),
        lat: loc.lat, lng: loc.lng,
        device: (navigator.userAgent||"").slice(0,180)
      }).catch(()=>{});
    }catch(e){
      STATE.loginError = e.message;
      submitBtn.disabled = false;
      submitBtn.textContent = resetBtnLabel;
      render();
    }
  });
}

function attachPagePermissionsEvents(){
  document.querySelectorAll("[data-perm-toggle]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const pageId = el.getAttribute("data-perm-toggle");
      STATE.pagePermissionsForm[pageId] = el.checked;
    });
  });
  const saveBtn = document.getElementById("btn-save-page-permissions");

    saveBtn.disabled = true;
    saveBtn.textContent = "⏳ ກຳລັງບັນທຶກ...";
    try{
      const entries = Object.entries(STATE.pagePermissionsForm);
      await Promise.all(entries.map(([pageId, enabled])=>dbSetAdminPagePermission(pageId, enabled)));

      showToast("ບັນທຶກການຕັ້ງຄ່າສິດສຳເລັດແລ້ວ");

    saveBtn.textContent = "✓ ບັນທຶກ";
    render();

  const autoLogoutEl = document.getElementById("security-auto-logout-minutes");
  if(autoLogoutEl) autoLogoutEl.addEventListener("input", ()=>{ STATE.securityAutoLogoutInput = autoLogoutEl.value.replace(/[^0-9]/g,""); });
  const saveSecBtn = document.getElementById("btn-save-security-settings");
  if(saveSecBtn) saveSecBtn.addEventListener("click", async ()=>{
    const minutes = parseInt(STATE.securityAutoLogoutInput ?? STATE.data.securitySettings.autoLogoutMinutes, 10) || 0;
    STATE.securitySettingsSaving = true; STATE.securitySettingsSaved = false; render();
    try{
      await dbSaveSecuritySettings(minutes);
      STATE.data.securitySettings = {autoLogoutMinutes:minutes};
      STATE.securitySettingsSaved = true;
      resetIdleTimer();
    }catch(e){ showErrorToast("ບັນທຶກລົ້ມເຫຼວ: "+e.message); }
    STATE.securitySettingsSaving = false;
    render();
  });

  document.querySelectorAll("[data-nav-order]").forEach(el=>{
    el.addEventListener("input", ()=>{
      const pageId = el.getAttribute("data-nav-order");
      STATE.navOrderForm[pageId] = el.value.replace(/[^0-9]/g,"");
      STATE.navOrderSaved = false;
      render();
    });
  });
  const saveNavOrderBtn = document.getElementById("btn-save-nav-order");
  if(saveNavOrderBtn) saveNavOrderBtn.addEventListener("click", async ()=>{
    STATE.navOrderSaving = true; STATE.navOrderSaved = false; render();
    try{
      const entries = Object.entries(STATE.navOrderForm);
      await Promise.all(entries.map(([pageId, order])=>{
        const enabled = (pageId==="dashboard"||pageId==="users"||pageId==="loginHistory"||pageId==="pagePermissions")
          ? true
          : STATE.data.adminPagePermissions[pageId]!==false;
        return dbSetAdminPagePermission(pageId, enabled, Number(order)||0);
      }));
      const newOrderMap = {};
      entries.forEach(([pageId, order])=>{ newOrderMap[pageId] = Number(order)||0; });
      STATE.data.adminPageOrder = newOrderMap;
      STATE.navOrderSaved = true;
      showToast("ບັນທຶກລຳດັບເມນູສຳເລັດແລ້ວ");
    }catch(err){
      console.error(err);
      showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message);
    }
    STATE.navOrderSaving = false;
    render();
  });
}

function attachProductEvents(){

      render();
    });

  if(backBtn) backBtn.addEventListener("click", ()=>{
    STATE.viewingProduct = "";
    render();
  });
  const btnNew = document.getElementById("btn-new-product");
  if(btnNew) btnNew.addEventListener("click", ()=>{
    STATE.productForm = {name:"", category:"", price:"", costPrice:"", desc:"", painPoints:"", imageBase64:"", highlights:"", benefits:"", usage:""};
    STATE.editingProduct = null;
    STATE.knowledgeError = "";
    STATE.productKnowledgeDraft = null;
    STATE.newPainPointText = "";
    STATE.aiPainSuggestions = [];
    STATE.aiPainError = "";
    STATE.showProductForm = true;
    render();

  document.querySelectorAll("[data-edit-product]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const id = el.getAttribute("data-edit-product");
      const p = STATE.data.products.find(x=>x.id===id);
      if(p){
        STATE.productForm = {...p, imageBase64: p.imageUrl||""};
        STATE.editingProduct = id;
        STATE.knowledgeError = "";
        STATE.productKnowledgeDraft = null;
        STATE.newPainPointText = "";
        STATE.aiPainSuggestions = [];
        STATE.aiPainError = "";
        STATE.newFaqQuestion = "";
        STATE.newFaqAnswer = "";
        STATE.showProductForm = true;
        render();
      }
    });

  document.querySelectorAll("[data-del-product]").forEach(el=>{
    el.addEventListener("click", async (e)=>{
      e.stopPropagation();
      const id = el.getAttribute("data-del-product");
      const name = el.getAttribute("data-del-product-name") || "ສິນຄ້ານີ້";
      if(!(await customConfirm(`ຢືນຢັນລຶບ "${name}"? ຂໍ້ມູນ pain points, FAQ, ແລະ ຄວາມຮູ້ສິນຄ້າ ຈະຖືກລຶບໄປນຳ — ກູ້ຄືນບໍ່ໄດ້`, {okLabel:"🗑️ ລຶບ", danger:true}))) return;
      STATE.data.products = STATE.data.products.filter(p=>p.id!==id);
      delete STATE.data.productKnowledge[id];
      render();
      dbDeleteProduct(id, name).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });
    });
  });

  const productSearchEl = document.getElementById("product-search");
  if(productSearchEl) productSearchEl.addEventListener("input", ()=>{
    STATE.productSearch = productSearchEl.value;
    render();
    const el2 = document.getElementById("product-search");
    if(el2){ el2.focus(); el2.setSelectionRange(el2.value.length, el2.value.length); }
  });

  document.querySelectorAll("[data-product-view]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.productViewMode = el.getAttribute("data-product-view");
      render();
    });
  });

  const modalBg = document.getElementById("product-modal-bg");
  if(modalBg){
    modalBg.addEventListener("click", (e)=>{
      if(e.target.id==="product-modal-bg"){ STATE.showProductForm = false; render(); }
    });
  }
  const closeBtn = document.getElementById("close-product-modal");
  if(closeBtn) closeBtn.addEventListener("click", ()=>{ STATE.showProductForm = false; render(); });

  /* Keep STATE.productForm continuously in sync with what's typed, the same way
     reportForm/insightForm already do. Without this, selecting a product image
     (which triggers a render() to show the preview) would rebuild the modal from
     stale STATE.productForm values and wipe out anything typed but not yet saved —
     this was the "ຂໍ້ມູນລືບຫຼັງແນບຮູບ" bug. */
  const pfName = document.getElementById("pf-name");
  if(pfName) pfName.addEventListener("input", ()=>{ STATE.productForm.name = pfName.value; });
  const pfCategory = document.getElementById("pf-category");
  if(pfCategory) pfCategory.addEventListener("input", ()=>{ STATE.productForm.category = pfCategory.value; });
  const pfPrice = document.getElementById("pf-price");
  if(pfPrice) pfPrice.addEventListener("input", ()=>{ STATE.productForm.price = pfPrice.value; });
  const pfCostPrice = document.getElementById("pf-costPrice");
  if(pfCostPrice) pfCostPrice.addEventListener("input", ()=>{ STATE.productForm.costPrice = pfCostPrice.value; });
  const pfDesc = document.getElementById("pf-desc");
  if(pfDesc) pfDesc.addEventListener("input", ()=>{ STATE.productForm.desc = pfDesc.value; });
  const pfHighlights = document.getElementById("pf-highlights");
  if(pfHighlights) pfHighlights.addEventListener("input", ()=>{ STATE.productForm.highlights = pfHighlights.value; });
  const pfBenefits = document.getElementById("pf-benefits");
  if(pfBenefits) pfBenefits.addEventListener("input", ()=>{ STATE.productForm.benefits = pfBenefits.value; });
  const pfUsage = document.getElementById("pf-usage");
  if(pfUsage) pfUsage.addEventListener("input", ()=>{ STATE.productForm.usage = pfUsage.value; });
  const pfPainPoints = document.getElementById("pf-painPoints");
  if(pfPainPoints) pfPainPoints.addEventListener("input", ()=>{ STATE.productForm.painPoints = pfPainPoints.value; });

  const imgEl = document.getElementById("pf-image-input");
  if(imgEl) imgEl.addEventListener("change", ()=>{
    const file = imgEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{ STATE.productForm.imageBase64 = e.target.result; render(); };
    reader.readAsDataURL(file);
  });
  const imgRemoveBtn = document.getElementById("pf-image-remove");
  if(imgRemoveBtn) imgRemoveBtn.addEventListener("click", ()=>{
    STATE.productForm.imageBase64 = "";
    if(imgEl) imgEl.value = "";
    render();
  });

  const saveBtn = document.getElementById("save-product");
  if(saveBtn){
    saveBtn.addEventListener("click", async ()=>{
      const f = {
        name: document.getElementById("pf-name").value,
        category: document.getElementById("pf-category").value,
        price: document.getElementById("pf-price").value,
        costPrice: document.getElementById("pf-costPrice").value,
        desc: document.getElementById("pf-desc").value,
        highlights: document.getElementById("pf-highlights").value,
        benefits: document.getElementById("pf-benefits").value,
        usage: document.getElementById("pf-usage").value,
        painPoints: document.getElementById("pf-painPoints").value,
        imageUrl: STATE.productForm.imageBase64 || ""
      };
      if(!f.name.trim()) return;
      const prevProducts = STATE.data.products;
      saveBtn.disabled = true; saveBtn.textContent = "ກຳລັງບັນທຶກ...";
      if(STATE.editingProduct){
        const updated = {...f, id:STATE.editingProduct};
        STATE.data.products = STATE.data.products.map(p=>p.id===STATE.editingProduct ? updated : p);
        STATE.showProductForm = false;
        render();
        try{
          await dbUpdateProduct(updated);
          showToast("ບັນທຶກສິນຄ້າສຳເລັດແລ້ວ");
        }catch(err){
          console.error(err);
          STATE.data.products = prevProducts;
          STATE.productForm = {...updated, imageBase64: updated.imageUrl||""};
          STATE.editingProduct = updated.id;
          STATE.showProductForm = true;
          showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: " + err.message);
          render();
        }
      } else {
        const newProduct = {...f, id:"p"+Date.now()};
        STATE.data.products.push(newProduct);
        STATE.showProductForm = false;
        render();
        try{
          await dbInsertProduct(newProduct);
          showToast("ເພີ່ມສິນຄ້າສຳເລັດແລ້ວ");
        }catch(err){
          console.error(err);
          STATE.data.products = prevProducts;
          STATE.productForm = {...newProduct, imageBase64: newProduct.imageUrl||""};
          STATE.editingProduct = null;
          STATE.showProductForm = true;
          showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: " + err.message);
          render();
        }
      }
    });
  }

  const pkContentEl = document.getElementById("pk-content");
  if(pkContentEl) pkContentEl.addEventListener("input", ()=>{ STATE.productKnowledgeDraft = pkContentEl.value; });

  const pkFileEl = document.getElementById("pk-file-input");
  if(pkFileEl) pkFileEl.addEventListener("change", ()=>{
    const file = pkFileEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{
      const ta = document.getElementById("pk-content");
      if(ta) ta.value = e.target.result;
      STATE.productKnowledgeDraft = e.target.result;
    };
    reader.readAsText(file);
  });

  const saveKnowledgeBtn = document.getElementById("btn-save-knowledge");
  if(saveKnowledgeBtn){
    saveKnowledgeBtn.addEventListener("click", async ()=>{
      const productId = STATE.editingProduct;
      if(!productId) return;
      const ta = document.getElementById("pk-content");
      const content = (ta ? ta.value : "").trim();
      STATE.savingKnowledge = true;
      STATE.knowledgeError = "";
      render();
      try{
        await dbUpsertProductKnowledge(productId, content);
        STATE.data.productKnowledge[productId] = {content, updatedAt: new Date().toISOString()};
        STATE.productKnowledgeDraft = null;
        showToast("ບັນທຶກຄວາມຮູ້ສິນຄ້າສຳເລັດແລ້ວ");
      }catch(e){
        STATE.knowledgeError = "ບັນທຶກບໍ່ສຳເລັດ: " + (e?.message||e);
        showErrorToast("ບັນທຶກຄວາມຮູ້ສິນຄ້າລົ້ມເຫຼວ: " + (e?.message||e));
      }
      STATE.savingKnowledge = false;
      render();
    });
  }

  document.querySelectorAll("[data-del-painpoint]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-painpoint");
      const productId = STATE.editingProduct;
      if(STATE.data.painPointsLib[productId]){
        STATE.data.painPointsLib[productId] = STATE.data.painPointsLib[productId].filter(pp=>pp.id!==id);
      }
      render();
      dbDeletePainPoint(id).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });
    });
  });

  const ppInput = document.getElementById("new-painpoint-text");
  if(ppInput) ppInput.addEventListener("input", ()=>{ STATE.newPainPointText = ppInput.value; });

  const addPpBtn = document.getElementById("btn-add-painpoint");
  if(addPpBtn) addPpBtn.addEventListener("click", ()=>{
    const productId = STATE.editingProduct;
    const text = (STATE.newPainPointText||"").trim();
    if(!productId || !text) return;
    const newPp = {id:"pp"+Date.now(), productId, text, icon:"", createdAt:new Date().toISOString(), createdBy: STATE.currentUser ? STATE.currentUser.name : ""};
    if(!STATE.data.painPointsLib[productId]) STATE.data.painPointsLib[productId] = [];
    STATE.data.painPointsLib[productId].push(newPp);
    STATE.newPainPointText = "";
    render();
    dbInsertPainPoint(newPp).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });
  });

  const aiSuggestBtn = document.getElementById("btn-ai-suggest-painpoints");
  if(aiSuggestBtn){
    aiSuggestBtn.addEventListener("click", async ()=>{
      const productId = STATE.editingProduct;
      const p = STATE.data.products.find(x=>x.id===productId);
      if(!p) return;
      STATE.aiPainLoading = true;
      STATE.aiPainError = "";
      STATE.aiPainSuggestions = [];
      render();
      try{
        const prompt = `ນີ້ແມ່ນຂໍ້ມູນສິນຄ້າ:
ຊື່ສິນຄ້າ: ${p.name}
ໝວດໝູ່: ${p.category}
ລາຍລະອຽດ: ${p.desc}
${p.painPoints ? "ບັນຫາລູກຄ້າທີ່ບັນທຶກໄວ້ແລ້ວ: "+p.painPoints : ""}

ກະລຸນາວິເຄາະ ແລະ ແນະນຳ "ບັນຫາລູກຄ້າ (pain points)" ທີ່ສິນຄ້ານີ້ຊ່ວຍແກ້ໄຂໄດ້ 6-8 ຂໍ້ ເປັນພາສາລາວ, ແຕ່ລະຂໍ້ສັ້ນໆ 1 ປະໂຫຍກ, ອອກຄຳຕອບເປັນລາຍການ (ແຕ່ລະຂໍ້ຂຶ້ນແຖວໃໝ່, ຂຶ້ນຕົ້ນດ້ວຍ "- ") ບໍ່ຕ້ອງມີຄຳອະທິບາຍອື່ນ.`;
        const result = await callAI(prompt, "ທ່ານແມ່ນຜູ້ຊ່ຽວຊານດ້ານການຕະຫຼາດເຄື່ອງສຳອາງ ແລະ ອາຫານເສີມສຳລັບຕະຫຼາດລາວ. ຕອບເປັນພາສາລາວລ້ວນໆ ແບບທຳມະຊາດ.");
        const lines = result.split("\n").map(l=>l.replace(/^[-•*]\s*/, "").trim()).filter(l=>l.length>0);
        STATE.aiPainSuggestions = lines.map(text=>({text, selected:true}));
      }catch(e){
        STATE.aiPainError = "ເກີດຂໍ້ຜິດພາດ: " + e.message;
      }
      STATE.aiPainLoading = false;
      render();
    });
  }

  document.querySelectorAll("[data-pain-suggestion-idx]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const idx = parseInt(el.getAttribute("data-pain-suggestion-idx"), 10);
      if(STATE.aiPainSuggestions[idx]) STATE.aiPainSuggestions[idx].selected = el.checked;
    });
  });

  const cancelSuggBtn = document.getElementById("btn-cancel-pain-suggestions");
  if(cancelSuggBtn) cancelSuggBtn.addEventListener("click", ()=>{
    STATE.aiPainSuggestions = [];
    render();
  });

  const saveSuggBtn = document.getElementById("btn-save-pain-suggestions");
  if(saveSuggBtn) saveSuggBtn.addEventListener("click", ()=>{
    const productId = STATE.editingProduct;
    if(!productId) return;
    const chosen = STATE.aiPainSuggestions.filter(s=>s.selected);
    if(!STATE.data.painPointsLib[productId]) STATE.data.painPointsLib[productId] = [];
    chosen.forEach(s=>{
      const newPp = {id:"pp"+Date.now()+Math.random().toString(36).slice(2,6), productId, text:s.text, icon:"", createdAt:new Date().toISOString(), createdBy: STATE.currentUser ? STATE.currentUser.name : ""};
      STATE.data.painPointsLib[productId].push(newPp);
      dbInsertPainPoint(newPp).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });
    });
    STATE.aiPainSuggestions = [];
    render();
  });

  const faqQEl = document.getElementById("new-faq-question");
  if(faqQEl) faqQEl.addEventListener("input", ()=>{ STATE.newFaqQuestion = faqQEl.value; });
  const faqAEl = document.getElementById("new-faq-answer");
  if(faqAEl) faqAEl.addEventListener("input", ()=>{ STATE.newFaqAnswer = faqAEl.value; });

  const addFaqBtn = document.getElementById("btn-add-faq");
  if(addFaqBtn) addFaqBtn.addEventListener("click", ()=>{
    const productId = STATE.editingProduct;
    const q = (STATE.newFaqQuestion||"").trim();
    const a = (STATE.newFaqAnswer||"").trim();
    if(!productId || !q || !a) return;
    const newFaq = {id:"fq"+Date.now(), productId, question:q, answer:a, createdAt:new Date().toISOString(), createdBy: STATE.currentUser ? STATE.currentUser.name : ""};
    if(!STATE.data.productFaq[productId]) STATE.data.productFaq[productId] = [];
    STATE.data.productFaq[productId].push(newFaq);
    STATE.newFaqQuestion = "";
    STATE.newFaqAnswer = "";
    render();
    dbInsertProductFaq(newFaq).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });
  });

  document.querySelectorAll("[data-del-faq]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-faq");
      const productId = STATE.editingProduct;
      if(STATE.data.productFaq[productId]){
        STATE.data.productFaq[productId] = STATE.data.productFaq[productId].filter(fq=>fq.id!==id);
      }
      render();
      dbDeleteProductFaq(id).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });
    });
  });

function exportHistoryToExcel(){
  const d = STATE.data;
  if(d.contentHistory.length===0){ return; }
  const rows = d.contentHistory.map(c => ({
    "ວັນທີ": c.date || "",
    "ປະເພດ": TAB_LABELS[c.type] || c.type,
    "ສິນຄ້າ": c.productName || "",
    "ເນື້ອຫາ": c.content || ""
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:16},{wch:24},{wch:60}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ປະຫວັດ Content");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `content-history-${stamp}.xlsx`);
}

function exportCostsToExcel(){
  const d = STATE.data;
  if(d.costs.length===0){ render(); return; }
  const rows = d.costs.map(c => {
    const profit = (Number(c.revenue)||0)-(Number(c.productCost)||0)-(Number(c.adCost)||0)-(Number(c.opCost)||0);
    return {
      "ລາຍການ": c.label || "",
      "ລາຍຮັບ": Number(c.revenue)||0,
      "ຕົ້ນທຶນສິນຄ້າ": Number(c.productCost)||0,
      "ຄ່າໂຄສະນາ": Number(c.adCost)||0,
      "ຄ່າບໍລິຫານ": Number(c.opCost)||0,
      "ກຳໄລ": profit
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:28},{wch:12},{wch:14},{wch:12},{wch:12},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ຕົ້ນທຶນ-ກຳໄລ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `cost-profit-${stamp}.xlsx`);
}

/* ====================== AUTO LOGOUT (IDLE TIMER) ======================
   Client-side, no polling/querying of Supabase (doesn't touch the "no auto-polling" rule).

   A plain setTimeout alone isn't enough: if the computer sleeps (lid closed, screen lock),
   the browser freezes JS entirely — the timer doesn't "keep counting" through the sleep. On
   wake, the first mouse/key touch would just reset the timer as if nothing happened, so a
   laptop left logged in overnight never actually gets logged out.

   Fix: the last-activity timestamp is also written to localStorage (survives the sleep/freeze
   since it's just a stored value, not a running timer). Every time the tab becomes visible/
   focused again (covers waking the computer, switching back to the tab, or reopening the
   browser entirely) we compare "now" against that stored timestamp directly and log out
   immediately if too much real-world time has passed — instead of restarting the count. */
const LAST_ACTIVITY_KEY = "mkt_studio_last_activity_v1";
let idleTimer = null;
let lastActivityWriteAt = 0;
const IDLE_ACTIVITY_EVENTS = ["mousemove", "mousedown", "keydown", "touchstart", "scroll", "wheel"];

function getAutoLogoutMinutes(){
  return Number(STATE.data.securitySettings && STATE.data.securitySettings.autoLogoutMinutes) || 0;
}
function recordActivityTimestamp(){
  const now = Date.now();
  if(now - lastActivityWriteAt < 4000) return;  // throttle — no need to hit localStorage on every mousemove
  lastActivityWriteAt = now;
  try{ localStorage.setItem(LAST_ACTIVITY_KEY, String(now)); }catch(e){}
}
function onIdleActivity(){
  recordActivityTimestamp();
  resetIdleTimer();
}
// Returns true if it just logged the person out.
function checkIdleSinceLastSeen(){
  if(!STATE.currentUser) return false;
  const minutes = getAutoLogoutMinutes();
  if(!minutes) return false;
  let last = null;
  try{ last = localStorage.getItem(LAST_ACTIVITY_KEY); }catch(e){}
  if(!last) return false;
  const elapsedMs = Date.now() - Number(last);
  if(elapsedMs >= minutes*60*1000){ doLogout(true); return true; }
  return false;
}
function resetIdleTimer(){
  if(idleTimer){ clearTimeout(idleTimer); idleTimer = null; }
  if(!STATE.currentUser) return;
  const minutes = getAutoLogoutMinutes();
  if(!minutes) return;
  idleTimer = setTimeout(()=>{ doLogout(true); }, minutes*60*1000);
}
function handleIdleVisibilityOrFocus(){
  if(document.hidden) return;  // only relevant when the tab is becoming visible/focused again
  if(checkIdleSinceLastSeen()) return;  // already logged out — nothing left to reset
  recordActivityTimestamp();
  resetIdleTimer();
}
function startIdleTracking(){
  // Must check staleness BEFORE recordActivityTimestamp() — otherwise this call itself
  // overwrites the old (possibly very stale) timestamp with "now" and the overnight gap
  // that should have triggered a logout is lost before it's ever checked.
  if(checkIdleSinceLastSeen()) return;
  recordActivityTimestamp();
  IDLE_ACTIVITY_EVENTS.forEach(evt=> document.addEventListener(evt, onIdleActivity, {passive:true}));
  document.addEventListener("visibilitychange", handleIdleVisibilityOrFocus);
  window.addEventListener("focus", handleIdleVisibilityOrFocus);
  resetIdleTimer();
}
function stopIdleTracking(){
  if(idleTimer){ clearTimeout(idleTimer); idleTimer = null; }
  IDLE_ACTIVITY_EVENTS.forEach(evt=> document.removeEventListener(evt, onIdleActivity));
  document.removeEventListener("visibilitychange", handleIdleVisibilityOrFocus);
  window.removeEventListener("focus", handleIdleVisibilityOrFocus);
}

function isUserTyping(){
  const el = document.activeElement;
  if(!el) return false;
  const tag = el.tagName;
  if(tag==="TEXTAREA") return true;
  if(tag==="INPUT"){
    // Only text-entry input types actually block updates. A <select> or a
    // file/checkbox input can keep "focus" indefinitely after one click
    // without the person actively typing, which would otherwise freeze
    // auto-refresh forever — so those are deliberately excluded.
    const t = (el.type||"text").toLowerCase();
    return ["text","password","number","email","search","tel","url"].includes(t);
  }
  return false;
}

/* ====================== INIT ====================== */
function mapPackageScanRow(r){
  return {
    id:r.id, labelId:r.label_id||"", scannedCode:r.scanned_code||"", matched: !!r.matched,
    recipientName:r.recipient_name||"", recipientPhone:r.recipient_phone||"", address:r.address||"",
    codAmount:r.cod_amount||0, courierName:r.courier_name||"", freeShipping: !!r.free_shipping,
    scannedAt:r.created_at||"", scannedBy:r.scanned_by||""
  };
}

/* ====================== REAL-TIME SCAN-OUT SYNC ======================
   This is a Supabase Realtime (websocket) subscription — NOT polling. It's a single
   persistent push connection that only sends data when a row actually changes, so it does
   not violate the "no auto-polling" rule (that rule is about repeated HTTP fetch() calls on
   a timer, which is what burned the egress quota before; a websocket that sits idle until a
   real change happens is a fundamentally different, much cheaper thing).
   REQUIRES ONE-TIME SETUP: in Supabase Dashboard → Database → Replication (or the toggle on
   the package_scans table in Table Editor), Realtime must be switched ON for package_scans.
   Without that toggle, this subscribes successfully but will simply never receive anything. */
function subscribeToPackageScanUpdates(){
  sb.channel("package_scans_live")
    .on("postgres_changes", {event:"*", schema:"public", table:"package_scans"}, (payload)=>{
      if(payload.eventType==="INSERT"){
        if(!STATE.data.packageScans.some(p=>p.id===payload.new.id)){
          STATE.data.packageScans.unshift(mapPackageScanRow(payload.new));
        }
      } else if(payload.eventType==="UPDATE"){
        const idx = STATE.data.packageScans.findIndex(p=>p.id===payload.new.id);
        if(idx>=0) STATE.data.packageScans[idx] = mapPackageScanRow(payload.new);
      } else if(payload.eventType==="DELETE"){
        STATE.data.packageScans = STATE.data.packageScans.filter(p=>p.id!==payload.old.id);
      }
      if(STATE.page==="scanOut" || STATE.page==="scanOutPancake") updateScanOutUI();
    })
    .subscribe((status, err)=>{
      // Logged so a "still not live" report can be diagnosed from the browser console:
      // "SUBSCRIBED" means it's working; anything else (CHANNEL_ERROR / TIMED_OUT / CLOSED)
      // almost always means Realtime hasn't been switched on for this table in the Supabase
      // dashboard yet (Database → Replication) — that toggle is required and can't be done
      // from application code.
      console.log("package_scans realtime status:", status, err||"");
      STATE.scanRealtimeStatus = status;
      if(STATE.page==="scanOut" || STATE.page==="scanOutPancake") render();
    });
}

function mapShippingLabelRow(r){
  return {
    id:r.id, labelNumber:r.label_number||"", recipientName:r.recipient_name||"", recipientPhone:r.recipient_phone||"",
    address:r.address||"", itemText:r.item_text||"", qty:r.qty||1, note:r.note||"", codAmount:r.cod_amount||0,
    courierName:r.courier_name||"", freeShipping: !!r.free_shipping,
    format:r.format||"normal", quickText:r.quick_text||"", direction:r.direction||"", customFooter:r.custom_footer||"",
    printCount:r.print_count||0, status: r.status ?? 0,
    createdAt:r.created_at||"", createdBy:r.created_by||""
  };
}
function subscribeToShippingLabelUpdates(){
  sb.channel("shipping_labels_live")
    .on("postgres_changes", {event:"*", schema:"public", table:"shipping_labels"}, (payload)=>{
      if(payload.eventType==="INSERT"){
        if(!STATE.data.shippingLabels.some(l=>l.id===payload.new.id)){
          STATE.data.shippingLabels.push(mapShippingLabelRow(payload.new));
        }
      } else if(payload.eventType==="UPDATE"){
        const idx = STATE.data.shippingLabels.findIndex(l=>l.id===payload.new.id);
        if(idx>=0) STATE.data.shippingLabels[idx] = mapShippingLabelRow(payload.new);
      } else if(payload.eventType==="DELETE"){
        STATE.data.shippingLabels = STATE.data.shippingLabels.filter(l=>l.id!==payload.old.id);
      }
      if(STATE.page==="scanOut" || STATE.page==="scanOutPancake") updateScanOutUI();
      else if(STATE.page==="labels") render();
    })
    .subscribe((status, err)=>{
      console.log("shipping_labels realtime status:", status, err||"");
    });
}

/* ---------- WhatsApp Realtime ----------
   Two channels: one for the conversations list (so new chats / updated previews show up
   without a manual refresh) and one for messages (so an open thread updates live when a
   reply comes in, or when Tar types a message from the phone app itself — the "echo" case
   that Coexistence syncs back through the whatsapp-webhook Edge Function).
   REQUIRES ONE-TIME SETUP: Supabase Dashboard → Database → Replication → switch Realtime ON
   for both whatsapp_conversations and whatsapp_messages. */
function subscribeToWaConversationUpdates(){
  sb.channel("wa_conversations_live")
    .on("postgres_changes", {event:"*", schema:"public", table:"whatsapp_conversations"}, (payload)=>{
      if(payload.eventType==="INSERT"){
        if(!STATE.data.waConversations.some(c=>c.id===payload.new.id)){
          STATE.data.waConversations.unshift(mapWaConversationRow(payload.new));
        }
      } else if(payload.eventType==="UPDATE"){
        const idx = STATE.data.waConversations.findIndex(c=>c.id===payload.new.id);
        if(idx>=0) STATE.data.waConversations[idx] = mapWaConversationRow(payload.new);
        else STATE.data.waConversations.unshift(mapWaConversationRow(payload.new));
      } else if(payload.eventType==="DELETE"){
        STATE.data.waConversations = STATE.data.waConversations.filter(c=>c.id!==payload.old.id);
      }
      STATE.data.waConversations.sort((a,b)=> new Date(b.lastMessageAt||0) - new Date(a.lastMessageAt||0));
      if(STATE.page==="whatsapp") render();
    })
    .subscribe((status, err)=>{ console.log("whatsapp_conversations realtime status:", status, err||""); });
}
function subscribeToWaMessageUpdates(){
  sb.channel("wa_messages_live")
    .on("postgres_changes", {event:"INSERT", schema:"public", table:"whatsapp_messages"}, (payload)=>{
      const msg = mapWaMessageRow(payload.new);
      if(STATE.page==="whatsapp" && msg.conversationId===STATE.waConversationId){
        if(!STATE.waThreadMessages.some(m=>m.id===msg.id)){
          STATE.waThreadMessages.push(msg);
          render();
          const threadEl = document.getElementById("wa-thread");
          if(threadEl) threadEl.scrollTop = threadEl.scrollHeight;
        }
      }
    })
    .subscribe((status, err)=>{ console.log("whatsapp_messages realtime status:", status, err||""); });
}

async function init(){
  render();
  STATE.data = await loadAllData();
  STATE.ready = true;
  subscribeToPackageScanUpdates();
  subscribeToShippingLabelUpdates();
  subscribeToWaConversationUpdates();
  subscribeToWaMessageUpdates();

  // Restore session if one was saved, but re-verify against DB for fresh role/approved
  const saved = loadSavedSession();
  // If auto-logout is on and this browser/tab was closed for longer than the configured
  // threshold, don't restore the session at all — covers "closed the laptop lid over the
  // weekend, opened it back up Monday" just as well as leaving the tab open and idle.
  const autoLogoutMinutes = getAutoLogoutMinutes();
  let staleSession = false;
  if(saved && saved.id && autoLogoutMinutes){
    let lastSeen = null;
    try{ lastSeen = localStorage.getItem(LAST_ACTIVITY_KEY); }catch(e){}
    if(lastSeen && (Date.now()-Number(lastSeen)) >= autoLogoutMinutes*60*1000) staleSession = true;
  }
  if(staleSession){
    clearSession();
  } else if(saved && saved.id){
    try{
      const {data} = await sb.from("users").select("*").eq("id", saved.id).limit(1);
      if(data && data.length>0){
        STATE.currentUser = {id:data[0].id, name:data[0].name, role:data[0].role, approved: !!data[0].approved};
        saveSession(STATE.currentUser);
      } else {
        clearSession();
      }
    }catch(e){}
  }

  render();
  if(STATE.currentUser && isOwner() && STATE.page==="users"){ loadUsersList(); loadLoginHistory(); }
  if(STATE.currentUser) startIdleTracking();
  // No background polling here on purpose — see the PERMANENT RULE note
  // above refreshAll(). Data loads once here, and after that only when
  // someone explicitly clicks "ໂຫຼດຂໍ້ມູນໃໝ່".
}
init();
</script>
