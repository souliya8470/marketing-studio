<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ຮ້ານຕຸກຕາ ສີໄຄ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Serif+Lao:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1F3D2E;
    --bg-deep-2:#27483A;
    --cream:#FAF6EE;
    --cream-2:#F1EAD9;
    --terracotta:#C9683F;
    --terracotta-dark:#A6502E;
    --sage:#A8C0A0;
    --sage-dark:#5F7D58;
    --ink:#23291F;
    --muted:#6F7268;
    --danger:#B0473B;
    --white:#FFFFFF;
    --radius:10px;
    --shadow:0 2px 10px rgba(31,61,46,0.08);
  }
  *{box-sizing:border-box;}
  html, body{
    max-width:100%;
    overflow-x:hidden;
  }
  body{
    margin:0;
    font-family:'Noto Sans Lao','Noto Sans',sans-serif;
    background:var(--cream-2);
    color:var(--ink);
  }
  h1,h2,h3,.serif{font-family:'Noto Serif Lao','Noto Sans Lao',serif;}
  .app{
    display:block;
    min-height:100vh;
  }
  .main-fade{
    animation: mainFadeIn 220ms ease;
  }
  @keyframes mainFadeIn{
    from{ opacity:0.85; }
    to{ opacity:1; }
  }
  .sidebar{
    background:var(--bg-deep);
    color:var(--cream);
    padding:24px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
    /* Desktop: position:fixed pins the whole nav column to the viewport no matter what —
       this replaced an earlier position:sticky attempt that some browsers weren't
       honoring reliably (the whole green bar was still scrolling away with the page).
       Fixed is unambiguous: it's always relative to the viewport, full stop. Since fixed
       elements are taken out of normal document flow, .main gets margin-left:240px below
       to leave room for it. Overridden back to a slide-out drawer for mobile below. */
    position:fixed;
    top:0;
    left:0;
    width:240px;
    height:100vh;
    overflow-y:auto;
    z-index:10;
  }
  .brand{
    font-family:'Noto Serif Lao',serif;
    font-size:20px;
    font-weight:700;
    color:var(--cream);
    margin:0 8px 28px 8px;
    line-height:1.3;
  }
  .brand small{
    display:block;
    font-family:'Noto Sans Lao',sans-serif;
    font-size:12px;
    font-weight:400;
    color:var(--sage);
    margin-top:4px;
  }
  .nav-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:none;
    border:none;
    color:var(--cream);
    opacity:0.78;
    text-align:left;
    padding:11px 12px;
    border-radius:8px;
    font-size:14.5px;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s, opacity .15s;
    width:100%;
  }
  .nav-btn:hover{background:var(--bg-deep-2); opacity:1;}
  .nav-btn.active{background:var(--terracotta); opacity:1; font-weight:600;}
  .nav-icon{font-size:17px; width:20px; text-align:center;}
  .nav-badge{display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; margin-left:6px; background:var(--terracotta); color:#fff; border-radius:999px; font-size:10.5px; font-weight:700; vertical-align:middle;}
  .nav-btn.active .nav-badge{background:var(--cream); color:var(--terracotta-dark);}
  .sidebar-foot{
    margin-top:auto;
    padding:12px 8px 0 8px;
    font-size:11.5px;
    color:var(--sage);
    border-top:1px solid rgba(255,255,255,0.12);
    padding-top:14px;
  }
  .main{padding:32px 40px; max-width:1180px; margin-left:240px;}
  .page-head{margin-bottom:24px;}
  .page-head h1{font-size:24px; margin:0 0 4px 0; color:var(--bg-deep);}
  .page-head p{margin:0; color:var(--muted); font-size:14px;}
  .card{
    background:var(--white);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px 22px;
    margin-bottom:18px;
  }
  .card h3{margin:0 0 14px 0; font-size:16px; color:var(--bg-deep);}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .grid-4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  label{display:block; font-size:13px; color:var(--muted); margin:0 0 5px 0; font-weight:600;}
  input[type=text], input[type=number], textarea, select{
    width:100%;
    padding:9px 11px;
    border:1px solid #DCD6C4;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    background:var(--cream);
    color:var(--ink);
    margin-bottom:14px;
  }
  textarea{resize:vertical; min-height:80px;}
  input:focus, textarea:focus, select:focus{
    outline:none; border-color:var(--terracotta); background:var(--white);
  }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    background:var(--terracotta);
    color:var(--white);
    border:none;
    padding:10px 18px;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--terracotta-dark);}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{background:#C9B9A9; cursor:not-allowed;}
  .btn-outline{background:none; border:1.5px solid var(--bg-deep); color:var(--bg-deep);}
  .btn-outline:hover{background:var(--bg-deep); color:var(--cream);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}
  .btn-danger{background:var(--danger);}
  .btn-danger:hover{background:#8E382E;}
  .pill{display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600;}
  .pill-sage{background:#E4ECDF; color:var(--sage-dark);}
  .pill-terra{background:#F4E1D6; color:var(--terracotta-dark);}
  .pill-gray{background:#EAE7DC; color:var(--muted);}
  .product-card{
    border:1px solid #E9E3D3; border-radius:9px; padding:14px;
    display:flex; flex-direction:column; gap:6px; cursor:pointer; transition:border-color .15s;
    position:relative;
  }
  .product-card:hover{border-color:var(--terracotta);}
  .product-card h4{margin:0; font-size:15px; color:var(--bg-deep);}
  .product-card .meta{font-size:12.5px; color:var(--muted);}
  .product-card-del{
    position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%;
    background:rgba(255,255,255,.9); border:1px solid #E9E3D3; color:var(--muted);
    font-size:13px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .15s, background .15s, color .15s; z-index:2;
  }
  .product-card:hover .product-card-del{opacity:1;}
  .product-card-del:hover{background:var(--danger); color:#fff; border-color:var(--danger);}
  .view-toggle{display:flex; border:1px solid #E9E3D3; border-radius:8px; overflow:hidden;}
  .view-toggle-btn{
    padding:8px 14px; font-size:13px; font-weight:600; background:var(--paper); color:var(--muted);
    border:none; cursor:pointer; border-right:1px solid #E9E3D3;
  }
  .view-toggle-btn:last-child{border-right:none;}
  .view-toggle-btn.active{background:var(--terracotta); color:#fff;}
  .product-table-wrap{overflow-x:auto;}
  .product-table-wrap table{width:100%;}
  .product-table-wrap td{vertical-align:middle;}
  .product-row-thumb{width:52px; height:52px; object-fit:cover; border-radius:7px; border:1px solid #E9E3D3; display:block;}
  .product-row-thumb-placeholder{width:52px; height:52px; border-radius:7px; background:var(--cream); display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--muted); border:1px solid #E9E3D3;}
  .empty{text-align:center; padding:40px 20px; color:var(--muted);}
  .empty .nav-icon{font-size:32px; display:block; margin-bottom:8px; opacity:.5;}
  .stat{background:var(--cream); border-radius:9px; padding:14px; border:1px solid #EAE3D2;}
  .stat .label{font-size:12px; color:var(--muted); margin-bottom:4px;}
  .stat .value{font-size:21px; font-weight:700; color:var(--bg-deep);}
  .stat .value.danger{color:var(--danger);}
  .stat .value.good{color:var(--sage-dark);}
  .content-out{
    background:var(--cream); border:1px solid #E9E3D3; border-radius:8px;
    padding:14px 16px; white-space:pre-wrap; font-size:14px; line-height:1.65;
    margin-top:10px; max-height:420px; overflow-y:auto;
  }
  .toolbar{display:flex; gap:8px; margin-top:10px;}

  /* ---- Shipping label print preview ---- */
  .label-overlay{position:fixed; inset:0; background:rgba(20,15,10,0.6); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;}
  .label-sheet{background:#fff; color:#111; font-family:'Noto Sans Lao','Noto Sans',sans-serif; overflow-y:auto; max-height:90vh;}
  .label-sheet.size-label{width:100mm;}
  .label-sheet.size-label75{width:75mm;}
  .label-sheet.size-a4{width:210mm;}
  .label-box{border:2px dashed #333; margin:14px;}
  .label-row{border-bottom:1px solid #333; padding:8px 10px;}
  .label-row:last-child{border-bottom:none;}
  .label-cod{font-size:20px; font-weight:800;}
  .label-footer{font-size:10.5px; text-align:center; padding:6px 10px; color:#333;}
  .input-error{border-color:var(--danger) !important;}
  .input-error::placeholder{color:var(--danger); opacity:1;}
  .app-toast{position:fixed; bottom:24px; right:24px; background:#2e7d46; color:#fff; padding:14px 20px; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,.25); z-index:500; font-size:14px; display:flex; align-items:center; gap:10px; animation:toastIn .25s ease-out;}
  .app-toast-error{background:#a33b2b;}
  @keyframes toastIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  .label-preview-scroll{max-height:90vh; overflow-y:auto;}
  @media print{
    /* ROOT CAUSE of the "ເຈ້ຍເປົ່າ" phantom blank pages: visibility:hidden does NOT
       remove an element's box from the page's layout height — the sidebar, toolbar,
       toast container, and (most of all) the rest of the ໜ້າພິມໃບບິນ page content
       were all still occupying real vertical space in the document, just invisible.
       Chrome paginates print based on that full document height, so it kept printing
       extra blank pages for all that invisible-but-still-there height after the one
       page that actually had visible content. Fix: display:none (not just
       visibility:hidden) on every sibling container — display:none removes the box
       from layout entirely, so the document's real height becomes just the print
       area's own height. */
    .sidebar, .hamburger-btn, .sidebar-overlay, #global-toast-container, .labels-page-body{
      display:none !important;
    }
    body *{visibility:hidden;}
    #print-label-area, #print-label-area *{visibility:visible;}
    #print-label-area{position:absolute; top:0; left:0; width:100%; margin:0; padding:0;}
    /* display:block (not flex) at print time — a flex-centered overlay can make Chrome
       compute an extra blank page when there's only a single sheet inside it. */
    .label-overlay{position:static; background:none; padding:0; display:block !important; margin:0 !important;}
    .label-preview-scroll{display:block !important; margin:0 !important; padding:0 !important;}
    .no-print{display:none !important;}
    /* Fill the physical paper exactly — the on-screen 340px/500px preview widths above
       are for the screen only; at print time the label must stretch to whatever page
       size is selected in the browser's print dialog, with no extra margin/border.
       width/overflow here; exact height/overflow-hidden clipping is set per-print in the
       dynamic <style> block inside renderLabelPrintPreview (it knows the real paper mm),
       so we deliberately do NOT set height/max-height/overflow here to avoid the two
       rules fighting each other and producing unpredictable pagination. */
    .label-sheet{width:100% !important; margin:0 !important; break-inside:avoid; page-break-inside:avoid;}
    .label-sheet:last-child{break-after:avoid-page !important; page-break-after:avoid !important;}
    .label-preview-scroll{max-height:none !important; overflow:visible !important;}
    .label-box{margin:0 !important; border:none !important;}
    @page{ margin:0; }
  }

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; color:var(--muted); font-weight:600; padding:8px 10px; border-bottom:2px solid #EAE3D2;}
  td{padding:9px 10px; border-bottom:1px solid #F0EBDD; vertical-align:top;}
  tr:hover td{background:#FBF8F1;}
  .badge-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;}
  .loading{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13.5px; padding:10px 0;}
  .spinner{
    width:14px; height:14px; border:2px solid #D9D2BD; border-top-color:var(--terracotta);
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .tabs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; border-bottom:1px solid #E2DBC9;}

  /* ============ Marketing Studio — Yumiko-style scoped theme ============ */
  .mkt-wrap{
    --mkt-green-900:#16331f; --mkt-green-800:#1d4029; --mkt-green-700:#27532f;
    --mkt-gold:#cfa645; --mkt-gold-light:#e8d39a; --mkt-cream:#f7f4ea; --mkt-paper:#fffdf7;
    --mkt-ink:#23291f; --mkt-ink-soft:#5b6555; --mkt-line:#e1ddc8;
    background:var(--mkt-cream); margin:-32px -40px; padding-bottom:24px;
  }
  .mkt-header{
    background:linear-gradient(135deg,var(--mkt-green-900),var(--mkt-green-700));
    color:var(--mkt-cream); padding:20px 24px; display:flex; align-items:center; gap:14px;
    border-bottom:3px solid var(--mkt-gold);
  }
  .mkt-header .mkt-logo{
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 30% 30%,var(--mkt-gold-light),var(--mkt-gold));
    display:flex; align-items:center; justify-content:center; font-size:22px;
    box-shadow:0 0 0 3px rgba(255,255,255,.15); overflow:hidden;
  }
  .mkt-header .mkt-logo img{width:100%; height:100%; object-fit:cover; display:block;}
  .mkt-header h1{margin:0; font-size:19px; font-weight:700; letter-spacing:.3px; color:var(--mkt-cream); font-family:'Noto Serif Lao',serif;}
  .mkt-header p{margin:2px 0 0; font-size:12.5px; color:var(--mkt-gold-light);}
  .mkt-tabs{
    display:flex; flex-wrap:wrap; gap:6px; background:var(--mkt-green-800); padding:10px 20px; border:none; margin:0;
  }
  .mkt-tab-btn{
    background:transparent; border:1px solid transparent; color:#cfe0cd;
    padding:8px 14px; border-radius:999px; font-size:13px; cursor:pointer; white-space:nowrap; transition:.15s;
  }
  .mkt-tab-btn:hover{background:rgba(255,255,255,.08);}
  .mkt-tab-btn.active{background:var(--mkt-gold); color:var(--mkt-green-900); font-weight:700; border-color:var(--mkt-gold);}
  .mkt-body{padding:22px 24px 0;}
  .mkt-change-product-btn{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.35); color:var(--mkt-cream);
    padding:7px 14px; border-radius:999px; font-size:12.5px; cursor:pointer; white-space:nowrap; margin-left:auto; flex-shrink:0;
  }
  .mkt-change-product-btn:hover{background:rgba(255,255,255,.22);}
  .mkt-picker-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; padding-bottom:24px;
  }
  .mkt-picker-card{
    background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:12px; padding:14px;
    cursor:pointer; text-align:center; transition:.15s; box-shadow:0 4px 14px rgba(22,51,31,.06);
  }
  .mkt-picker-card:hover{border-color:var(--mkt-gold); transform:translateY(-2px); box-shadow:0 8px 20px rgba(22,51,31,.14);}
  .mkt-picker-img{
    width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:9px; margin-bottom:10px; background:var(--mkt-cream);
  }
  .mkt-picker-img-placeholder{display:flex; align-items:center; justify-content:center; font-size:30px;}
  .mkt-picker-name{font-weight:700; color:var(--mkt-green-900); font-size:14px; line-height:1.3;}
  .mkt-picker-cat{font-size:12px; color:var(--mkt-ink-soft); margin-top:2px;}
  .mkt-wrap .card{background:var(--mkt-paper); border:1px solid var(--mkt-line); box-shadow:0 6px 22px rgba(22,51,31,.08);}
  .mkt-wrap .card h2, .mkt-wrap .card h3{color:var(--mkt-green-900); font-family:'Noto Serif Lao',serif;}
  .mkt-wrap label{color:var(--mkt-ink-soft);}
  .mkt-wrap input, .mkt-wrap select, .mkt-wrap textarea{border-color:var(--mkt-line); background:var(--mkt-cream);}
  .mkt-wrap input:focus, .mkt-wrap select:focus, .mkt-wrap textarea:focus{border-color:var(--mkt-gold); outline:none;}
  .mkt-wrap .btn{background:var(--mkt-green-700); color:#fff;}
  .mkt-wrap .btn:hover{background:var(--mkt-green-800);}
  .mkt-wrap .btn-outline{background:transparent; border:1px solid var(--mkt-green-700); color:var(--mkt-green-700);}
  .mkt-wrap .pill-terra{background:var(--mkt-gold-light); color:var(--mkt-green-900);}
  .mkt-wrap .pill-sage{background:#E4ECDF; color:var(--mkt-green-800);}
  .mkt-wrap .content-out{background:var(--mkt-cream); border-color:var(--mkt-line);}
  /* ---- ອົງປະກອບໃໝ່ ສຳລັບ tab ທີ່ຕັ້ງຄ່າສະເພາະສິນຄ້າ (product_studio_configs) ---- */
  .mkt-wrap .pbtns{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:6px;}
  .mkt-wrap .pbtn{
    font-family:inherit; font-size:12.5px; font-weight:600; padding:8px 15px; border-radius:24px;
    border:2px solid var(--mkt-line); background:var(--mkt-cream); color:var(--mkt-ink-soft); cursor:pointer; transition:.15s;
  }
  .mkt-wrap .pbtn:hover{border-color:var(--mkt-gold); color:var(--mkt-green-800);}
  .mkt-wrap .pbtn.active{background:var(--mkt-gold); border-color:var(--mkt-gold); color:var(--mkt-green-900);}
  .mkt-wrap .qgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:16px;}
  .mkt-wrap .qc{
    background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:10px; padding:16px 14px;
    cursor:pointer; transition:.15s; box-shadow:0 2px 10px rgba(22,51,31,.05);
  }
  .mkt-wrap .qc:hover{transform:translateY(-2px); box-shadow:0 6px 16px rgba(22,51,31,.12); border-color:var(--mkt-gold);}
  .mkt-wrap .qi{font-size:24px; margin-bottom:6px;}
  .mkt-wrap .qt{font-size:13px; font-weight:700; color:var(--mkt-green-900); margin-bottom:2px;}
  .mkt-wrap .qd{font-size:11.5px; color:var(--mkt-ink-soft); line-height:1.4;}
  .mkt-wrap .cal-grid-wrap{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:16px;}
  .mkt-wrap .cday{background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:10px; padding:12px; min-height:100px;}
  .mkt-wrap .cdl{font-size:10px; font-weight:700; color:var(--mkt-ink-soft); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;}
  .mkt-wrap .cdt{display:inline-block; font-size:10px; background:var(--mkt-gold-light); color:var(--mkt-green-900); padding:2px 8px; border-radius:10px; margin-bottom:6px; font-weight:600;}
  .mkt-wrap .cdi{font-size:11.5px; color:var(--mkt-ink); line-height:1.45;}
  .mkt-wrap .pgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-bottom:20px;}
  .mkt-wrap .pc{background:var(--mkt-paper); border:1px solid var(--mkt-line); border-left:4px solid var(--mkt-gold); border-radius:10px; padding:14px;}
  .mkt-wrap .pp{font-size:13px; font-weight:700; margin-bottom:6px; color:var(--mkt-green-900);}
  .mkt-wrap .ps{font-size:12px; color:var(--mkt-green-800); padding-left:10px; border-left:2px solid var(--mkt-green-700); line-height:1.5;}
  .mkt-wrap .sc2{background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:10px; padding:16px; margin-bottom:12px;}
  .mkt-wrap .sct{font-size:11px; font-weight:700; color:var(--mkt-green-800); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;}
  .mkt-wrap .sctx{font-size:13px; line-height:1.8; color:var(--mkt-ink); background:var(--mkt-cream); border-radius:8px; padding:12px; white-space:pre-wrap; min-height:44px;}
  @media (max-width: 760px){
    .mkt-wrap{margin:-12px -12px 0;}
    .mkt-header{padding:16px; flex-wrap:wrap;}
    .mkt-change-product-btn{margin-left:0;}
    .mkt-tabs{padding:8px 12px;}
    .mkt-body{padding:16px 16px 0;}
    .mkt-picker-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px;}
  }

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
/* Robust barcode-library loader: the primary <script> tag above is the fast path.
   If it hasn't finished loading (or failed) by the time we need to draw a barcode,
   ensureBarcodeLib() injects a fallback CDN and waits — so a slow/blocked network
   never results in a silently-blank barcode on a real, physical shipping label. */
window.ensureBarcodeLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.JsBarcode){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.JsBarcode) resolve(); else reject(new Error("loaded but JsBarcode missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    // Poll briefly in case the original head <script> is still mid-flight (most common case).
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.JsBarcode){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){ // ~2s of polling before pulling in the fallback CDN
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};

/* Same robust-loader pattern for ZXing, the pure-JS barcode DECODER used by the camera
   scan-out page. Unlike the native window.BarcodeDetector API (Chrome-only — never
   available on any iPhone browser, since all iOS browsers run on Apple's WebKit),
   ZXing decodes frames itself in JS, so it works identically on iOS Safari, Chrome,
   Android, desktop — anywhere. */
window.ensureZXingLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.ZXing){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.ZXing) resolve(); else reject(new Error("loaded but ZXing missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.ZXing){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};
</script>

/* ====================== STATE & DATA LOADING ====================== */
function emptyData(){

    shippingLabels: [],     // list of created shipping/COD labels

    studioConfigs: {},      // map: productId -> per-product custom Marketing Studio config (tabs/options/quick-templates), see product_studio_configs table
    adminPagePermissions: {} // map: pageId -> boolean (false = hidden from "admin" role). Missing key = enabled/visible.
  };
}

async function loadAllData(){
  const d = emptyData();
  try{
    const [products, content, costs, admins, insights, reports, attendance, knowledge, chat, painPoints, faq, hashtags, labelSettingsRes, shippingLabelsRes, couriersRes, packageScansRes, ordersRes, pricingRes, studioConfigsRes, adminPermsRes] = await Promise.all([
      sb.from("products").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("content_history").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("costs").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("admins").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("insights").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("reports").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("attendance").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("product_knowledge").select("*"),
      sb.from("product_chat").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("pain_points").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("product_faq").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("product_hashtags").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("label_settings").select("*"),
      sb.from("shipping_labels").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("couriers").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("package_scans").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("orders").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("product_pricing").select("*"),
      sb.from("product_studio_configs").select("*"),
      sb.from("admin_page_permissions").select("*"),
    ]);
    d.products = (products.data||[]).map(rowToProduct);
    d.contentHistory = (content.data||[]).map(rowToContent);
    d.costs = (costs.data||[]).map(rowToCost);
    d.admins = (admins.data||[]).map(rowToAdmin);
    d.insights = (insights.data||[]).map(rowToInsight);
    d.reports = (reports.data||[]).map(rowToReport);
    d.attendance = (attendance.data||[]).map(rowToAttendance);
    const kMap = {};
    (knowledge.data||[]).forEach(r=>{ kMap[r.product_id] = {content:r.content||"", updatedAt:r.updated_at||r.created_at||""}; });
    d.productKnowledge = kMap;
    d.productChat = (chat.data||[]).map(rowToChatMsg);
    const ppMap = {};
    (painPoints.data||[]).forEach(r=>{
      if(!ppMap[r.product_id]) ppMap[r.product_id] = [];
      ppMap[r.product_id].push({id:r.id, text:r.text||"", icon:r.icon||"", createdAt:r.created_at||"", createdBy:r.created_by||""});
    });
    d.painPointsLib = ppMap;
    const faqMap = {};
    (faq.data||[]).forEach(r=>{
      if(!faqMap[r.product_id]) faqMap[r.product_id] = [];
      faqMap[r.product_id].push({id:r.id, question:r.question||"", answer:r.answer||"", createdAt:r.created_at||"", createdBy:r.created_by||""});
    });
    d.productFaq = faqMap;
    const htMap = {};
    (hashtags.data||[]).forEach(r=>{
      if(!htMap[r.product_id]) htMap[r.product_id] = [];
      htMap[r.product_id].push({id:r.id, tag:r.tag||"", createdAt:r.created_at||"", createdBy:r.created_by||""});
    });
    d.productHashtags = htMap;
    const lsRows = labelSettingsRes.data||[];
    function parseLsRow(row, fallbackFooter, fallbackPaper){
      let parsedTemplate = null;
      if(row && row.template_layout){
        try{ parsedTemplate = typeof row.template_layout==="string" ? JSON.parse(row.template_layout) : row.template_layout; }catch(e){ parsedTemplate = null; }
      }
      return row ? {
        shopName: row.shop_name||"", shopPhone: row.shop_phone||"",
        footerText: row.footer_text||fallbackFooter||"", paperSize: row.paper_size||fallbackPaper||"label",
        templateLayout: parsedTemplate
      } : null;
    }
    const normalRow = lsRows.find(r=>r.id==="normal") || lsRows.find(r=>r.id==="default");
    const quickRow = lsRows.find(r=>r.id==="quick");
    const normalSettings = parseLsRow(normalRow, "", "label");
    d.labelSettings = {
      normal: normalSettings,
      // ຖ້າຍັງບໍ່ໄດ້ຕັ້ງຄ່າ "ພິມດ່ວນ" ແຍກຕ່າງຫາກ, ໃຫ້ໃຊ້ຊື່ຮ້ານ/ເບີໂທດຽວກັນກັບ "ພິມທົ່ວໄປ" ໄປພາງກ່ອນ
      quick: parseLsRow(quickRow, DEFAULT_QUICK_FOOTER, "label") || (normalSettings ? {...normalSettings, footerText: DEFAULT_QUICK_FOOTER, templateLayout: null} : null)
    };
    d.shippingLabels = (shippingLabelsRes.data||[]).map(r=>({
      id:r.id, labelNumber:r.label_number||"", recipientName:r.recipient_name||"", recipientPhone:r.recipient_phone||"",
      address:r.address||"", itemText:r.item_text||"", qty:r.qty||1, note:r.note||"", codAmount:r.cod_amount||0,
      courierName:r.courier_name||"", freeShipping: !!r.free_shipping,
      format:r.format||"normal", quickText:r.quick_text||"", direction:r.direction||"", customFooter:r.custom_footer||"",
      printCount:r.print_count||0,
      createdAt:r.created_at||"", createdBy:r.created_by||""
    }));
    d.couriers = (couriersRes.data||[]).map(r=>({id:r.id, name:r.name||"", createdAt:r.created_at||"", createdBy:r.created_by||""}));
    d.packageScans = (packageScansRes.data||[]).map(r=>({
      id:r.id, labelId:r.label_id||"", scannedCode:r.scanned_code||"", matched: !!r.matched,
      recipientName:r.recipient_name||"", recipientPhone:r.recipient_phone||"", address:r.address||"",
      codAmount:r.cod_amount||0, courierName:r.courier_name||"", freeShipping: !!r.free_shipping,
      scannedAt:r.created_at||"", scannedBy:r.scanned_by||""
    }));
    d.orders = (ordersRes.data||[]).map(r=>({
      id:r.id, productId:r.product_id||"", name:r.customer_name||"", phone:r.phone||"",
      productLabel:r.product_label||"", qty:r.qty||"1", price:r.price||0, note:r.note||"",
      status:r.status||"ລໍຖ້າ", createdAt:r.created_at||""
    }));
    const pricingMap = {};
    (pricingRes.data||[]).forEach(r=>{
      pricingMap[r.product_id] = {
        costA:r.cost_a||0, sellA:r.sell_a||0, labelA:r.label_a||"ແພັກນ້ອຍ",
        costB:r.cost_b||0, sellB:r.sell_b||0, labelB:r.label_b||"ແພັກໃຫຍ່",
        discountPct:r.discount_pct||0, updatedAt:r.updated_at||""
      };
    });
    d.productPricing = pricingMap;
    const cfgMap = {};
    (studioConfigsRes.data||[]).forEach(r=>{
      let parsed = null;
      try{ parsed = typeof r.config==="string" ? JSON.parse(r.config) : r.config; }catch(e){ parsed = null; }
      if(parsed) cfgMap[r.product_id] = parsed;
    });
    d.studioConfigs = cfgMap;
    // Which nav pages are enabled for the "admin" role — owner is unaffected/always full
    // access. Missing row for a page = enabled (default open), so this only needs to
    // store the pages an owner has explicitly turned OFF.
    const permMap = {};
    (adminPermsRes.data||[]).forEach(r=>{ permMap[r.page_id] = !!r.enabled; });
    d.adminPagePermissions = permMap;
  }catch(e){
    STATE.connError = "ເຊື່ອມຕໍ່ database ບໍ່ໄດ້: " + e.message;
  }
  return d;
}

// row <-> app object mappers (db columns are lowercase, no underscores for product fields)
function rowToProduct(r){ return {id:r.id, name:r.name, category:r.category, price:r.price, costPrice:r.costprice, desc:r.description, painPoints:r.painpoints, imageUrl:r.image_url||"", highlights:r.highlights||"", benefits:r.benefits||"", usage:r.usage_info||""}; }
function rowToChatMsg(r){ return {id:r.id, productId:r.product_id, role:r.role, message:r.message, createdAt:r.created_at||""}; }
function rowToContent(r){ return {id:r.id, type:r.type, productName:r.productname, content:r.content, date:r.date, createdAt:r.created_at||""}; }
function rowToCost(r){ return {id:r.id, label:r.label, revenue:r.revenue, productCost:r.productcost, adCost:r.adcost, opCost:r.opcost}; }
function rowToAdmin(r){ return {id:r.id, name:r.name, role:r.role, status:r.status}; }
function rowToInsight(r){ return {id:r.id, question:r.question, answer:r.answer, productRelated:r.productrelated, date:r.date, adminName:r.adminname||"", imageUrl:r.image_url||"", readByOwner: !!r.read_by_owner}; }
function rowToReport(r){ return {id:r.id, adminName:r.adminname||"", category:r.category||"", detail:r.detail||"", imageUrl:r.image_url||"", createdAt:r.created_at||"", accusedName:r.accused_name||"", readByOwner: !!r.read_by_owner}; }
function rowToAttendance(r){ return {id:r.id, adminName:r.adminname||"", clockIn:r.clock_in||null, clockOut:r.clock_out||null, date:r.date||"", clockInLat:r.clock_in_lat, clockInLng:r.clock_in_lng, clockOutLat:r.clock_out_lat, clockOutLng:r.clock_out_lng}; }

async function dbInsertReport(rep){ const {error} = await sb.from("reports").insert({id:rep.id, adminname:rep.adminName, category:rep.category, detail:rep.detail, image_url:rep.imageUrl||"", accused_name:rep.accusedName||""}); if(error) throw error; }
/* ---------- System-wide deletion log (audit trail: "what got deleted, when, by whom") ----------
   One shared table logs every delete across the whole app, so the owner can filter by day
   on a calendar and see everything that was removed system-wide (products, orders, labels,
   couriers, reports, etc) without needing a separate log per feature. Logging never blocks
   or fails the actual delete — if the log insert fails we just console.error it. */
async function logDeletion(entityType, entityId, label){
  try{
    const {error} = await sb.from("deletion_log").insert({
      id:"dl"+Date.now()+Math.random().toString(36).slice(2,7),
      entity_type: entityType, entity_id: String(entityId||""), entity_label: label||"",
      deleted_by: STATE.currentUser ? STATE.currentUser.name : ""
    });
    if(error) console.error("deletion_log insert failed:", error);

/* Studio-created labels get a number starting at 900,000,001 instead of a bare small number.
   This guarantees they can never collide with Pancake order ids synced into this same table
   (Pancake ids are currently ~61,000 and growing slowly — nowhere near 900 million) — no matter
   how high either counter climbs over time. Pure digits ONLY (no letter prefix): a hardware
   USB barcode scanner emulates a keyboard, and if the scanning computer's OS keyboard layout
   isn't set to English, letters get mistyped into the wrong characters as they're "typed" —
   digits are unaffected by keyboard layout, so this is what actually makes the barcode reliable
   with a physical scanner gun (a phone camera scan doesn't have this problem since it reads the
   barcode image directly, which is why only the hardware scanner was failing before this).
   The next number is derived from the highest existing 900,000,000+ number already in the
   table, NOT from the total row count, so importing Pancake orders never skews it. */
/* Studio-created labels get a "TOUK"-prefixed number (TOUK100001, TOUK100002, ...) — this is
   safe to use letters for despite the earlier hardware-scanner problem, because that problem
   turned out to be a simple Caps Lock mismatch (scanner sent "touk100029" lowercase against a
   stored "TOUK100029"), which is now fully handled by the case-insensitive match in
   processScanCode — not a Lao-keyboard-layout issue as first suspected. The number itself still
   guarantees no collision with Pancake order ids (always pure digits, e.g. 61179) regardless of
   how high either counter climbs. The next number is derived from the highest existing
   TOUK-number already in the table, NOT from the total row count, so importing Pancake orders
   never skews it. */
function nextStudioLabelNumber(){
  let maxNum = 100000;
  STATE.data.shippingLabels.forEach(l=>{
    const m = /^TOUK(\d+)$/i.exec(String(l.labelNumber||""));
    if(m){ const n = parseInt(m[1],10); if(n>maxNum) maxNum = n; }
  });
  return "TOUK" + (maxNum+1);
}

/* ============================================================
   PERMANENT RULE (do not remove): the screen never auto-refreshes
   on a TIMER and there is NO background polling of Supabase at all.
   Data only refreshes when: (a) someone explicitly clicks
   "ໂຫຼດຂໍ້ມູນໃໝ່" (refreshAll()), or (b) immediately after that same
   user's own action that just wrote to the database (e.g. right after
   AI content generation is saved, or right after a product/pain point
   is added) via silentRefresh() below — this is still 100% action-
   triggered by a real click, never a setInterval/timer. A previous
   background polling mechanism (checking every 15s) was removed
   because it burned through the Supabase free-tier quota and made
   data appear to vanish. Do not add setInterval/polling back without
   explicit confirmation that the Supabase plan can sustain it.
   Any new feature/table added later must be included inside
   loadAllData() only — never in any auto-interval.
   ============================================================ */
async function refreshAll(){
  STATE.refreshing = true;
  render();
  try{
    // 1) Refresh all core data tables.
    const fresh = await loadAllData();
    STATE.data = fresh;

    // 2) Refresh the logged-in user's own approval/role status.
    if(STATE.currentUser){
      try{
        const {data} = await sb.from("users").select("*").eq("id", STATE.currentUser.id).limit(1);
        if(data && data.length>0){
          const u = {id:data[0].id, name:data[0].name, role:data[0].role, approved: !!data[0].approved};
          STATE.currentUser = u;
          saveSession(u);
        }
      }catch(e){}
    }

    // 3) Refresh the owner's user-management list.
    if(STATE.currentUser && isOwner()){
      try{ STATE.usersList = await dbListUsers(); }catch(e){}
    }

    // 4) Refresh the approved-user-names list (report "accused" dropdown).
    if(STATE.currentUser){
      try{ STATE.approvedUserNames = await dbListApprovedUserNames(); }catch(e){}
    }
  }catch(e){}
  STATE.refreshing = false;
  render();
}

/* Quiet version of refreshAll(): re-fetches the data tables in the background
   after the CURRENT user's own action just wrote something (content generated,
   product saved, pain point added, cost/admin/insight/report logged, etc.)
   so the UI is always up to date without anyone needing to press the manual
   reload button. Never shows the full "ກຳລັງໂຫຼດ..." overlay, and is only ever
   called right after a real click — never on a timer. */
async function silentRefresh(onDone){
  try{
    const fresh = await loadAllData();
    STATE.data = fresh;
  }catch(e){ /* ignore — local optimistic state already reflects the change */ }
  if(typeof onDone === "function") onDone(); else render();
}

/* Targeted refresh for the scan-out page only — pulls just shipping_labels + package_scans,
   NOT the full loadAllData() (~17 tables), since this needs to be cheap enough to run every
   single time someone opens this specific page (which happens constantly during a packing
   session), not just on an explicit manual "ໂຫຼດຂໍ້ມູນໃໝ່" click. This is what actually fixes
   "label created yesterday on one device isn't found when scanned today on another" — that
   device's in-memory shipping_labels was stale from whenever it was last loaded, and nothing
   before this refreshed it short of the realtime subscription (which needs Realtime switched
   on for the table in Supabase, and only helps while both devices are already on this page —
   it can't retroactively fetch something that changed while this device was somewhere else). */
async function refreshScanOutData(){
  try{
    const [labelsRes, scansRes] = await Promise.all([
      sb.from("shipping_labels").select("*"),
      sb.from("package_scans").select("*").order("created_at", {ascending:false}).order("id", {ascending:false})
    ]);
    if(labelsRes.error) throw labelsRes.error;
    if(scansRes.error) throw scansRes.error;
    STATE.data.shippingLabels = (labelsRes.data||[]).map(r=>({
      id:r.id, labelNumber:r.label_number||"", recipientName:r.recipient_name||"", recipientPhone:r.recipient_phone||"",
      address:r.address||"", itemText:r.item_text||"", qty:r.qty||1, note:r.note||"", codAmount:r.cod_amount||0,
      courierName:r.courier_name||"", freeShipping: !!r.free_shipping,
      format:r.format||"normal", quickText:r.quick_text||"", direction:r.direction||"", customFooter:r.custom_footer||"",
      printCount:r.print_count||0,
      createdAt:r.created_at||"", createdBy:r.created_by||""
    }));
    STATE.data.packageScans = (scansRes.data||[]).map(mapPackageScanRow);
    if(STATE.page==="scanOut") render();
  }catch(err){ console.error("refreshScanOutData failed:", err); }
}

function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
let toastTimer = null;
let scanAlertTimer = null;   // auto-clears the big red scan-out alert banner
let scanAudioCtx = null;     // lazily-created Web Audio context for scan beep feedback
let lastCamScanCode = "";    // debounce: ignore the same barcode firing repeatedly while it's still in camera view
let lastCamScanAt = 0;
function showToast(msg, type){
  STATE.toastMessage = msg;
  STATE.toastType = type || "success";
  render();
  if(toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ STATE.toastMessage = ""; render(); }, type==="error" ? 5000 : 3200);
}

function showErrorToast(msg){
  showToast(msg, "error");
}

/* Renders the persistent global toast (success or error) into its own fixed
   container so it is visible no matter which page is currently on screen —
   unlike the old page-scoped toast that only showed up on the Labels page. */
function updateGlobalToast(){
  const el = document.getElementById("global-toast-container");
  if(!el) return;
  el.innerHTML = STATE.toastMessage ? `
    <div class="app-toast no-print ${STATE.toastType==='error' ? 'app-toast-error' : ''}" id="app-toast">
      ${STATE.toastType==='error' ? '⚠️' : '✅'} ${esc(STATE.toastMessage)}
    </div>
  ` : "";
}

/* Scan-out audio feedback — 3 clearly distinct beep patterns, synthesized with the Web
   Audio API (no external sound files, works identically on desktop and mobile). */
function playScanSound(type){
  try{
    if(!scanAudioCtx) scanAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(scanAudioCtx.state==="suspended") scanAudioCtx.resume();
    const ctx = scanAudioCtx;
    const patterns = {
      success:  [{freq:1400, dur:0.09}],
      duplicate:[{freq:520, dur:0.11},{freq:520, dur:0.11, gap:0.07}],
      notfound: [{freq:280, dur:0.20},{freq:220, dur:0.26, gap:0.06}]
    };
    let t = ctx.currentTime;
    (patterns[type]||patterns.success).forEach(p=>{
      if(p.gap) t += p.gap;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = p.freq;
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.exponentialRampToValueAtTime(0.3, t+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t+p.dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+p.dur+0.02);
      t += p.dur;
    });
  }catch(e){ /* audio not available on this device/browser — fail silently */ }
}
function fmt(n){ return Number(n||0).toLocaleString(); }
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}

/* ====================== PANCAKE ORDER SYNC ======================
   Pulls orders from Pancake POS (status=8 "ກຳລັງແພັກຂອງ") via the sync-pancake-orders
   Edge Function and inserts them into shipping_labels using the Pancake order id as both
   the row id AND the label_number — this makes the barcode printed by Pancake itself match
   the number scan-out looks up, and makes re-syncing safe (duplicate ids are skipped
   server-side, no new columns needed to track "already imported"). */
async function syncPancakeOrders(){
  if(STATE.pancakeSyncing) return;
  STATE.pancakeSyncing = true;
  STATE.pancakeSyncStatus = "⏳ ກຳລັງດຶງບິນຈາກ Pancake...";
  updateLabelHistorySyncUI();
  try{
    const res = await fetch(`${SUPABASE_URL}/functions/v1/sync-pancake-orders`, {
      method: "POST",
      headers: {
        "Content-Type":"application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    STATE.pancakeSyncStatus = `✅ ດຶງແລ້ວ ${data.inserted||0} ບິນໃໝ່ (ຂ້າມ ${data.skipped||0} ບິນທີ່ມີແລ້ວ)`;
    await silentRefresh();
  }catch(err){
    console.error(err);
    STATE.pancakeSyncStatus = "❌ ດຶງບໍ່ສຳເລັດ: " + (err && err.message ? err.message : "unknown error");
  }
  STATE.pancakeSyncing = false;
  updateLabelHistorySyncUI();
}
function updateLabelHistorySyncUI(){
  if(STATE.page==="labels") render();
}

/* ====================== PANCAKE CRM (TELESALES) ======================
   Unlike the scan-out sync (which only pulls "packing" orders into shipping_labels),
   this pulls EVERY order ever placed in Pancake — across all statuses, all time — into its
   own dedicated crm_purchases table, purely as a purchase-history log for telesales/retarget
   (name, phone, what they bought, when, how much). It is intentionally NOT loaded into the
   app's normal startup data fetch (that table can grow to tens of thousands of rows and this
   app already loads ~17 tables on every login) — it's loaded on demand only when this page is
   opened, and searched directly against the database rather than pulled entirely into memory. */
async function loadCrmCount(){
  try{
    const { count, error } = await sb.from("crm_purchases").select("id", {count:"exact", head:true});
    if(error) throw error;
    STATE.crmTotalCount = count||0;
  }catch(err){
    console.error(err);
    STATE.crmTotalCount = null;
  }
  if(STATE.page==="pancakeCrm") render();
}

async function loadCrmResults(){
  STATE.crmSearching = true;
  STATE.crmHasSearched = true;
  render();
  try{
    let query = sb.from("crm_purchases").select("*").order("order_date", {ascending:false}).limit(STATE.crmPageSize||100);
    const q = (STATE.crmSearchQuery||"").trim();
    if(q) query = query.or(`customer_phone.ilike.%${q}%,customer_name.ilike.%${q}%`);
    const productQ = (STATE.crmFilterProduct||"").trim();
    if(productQ) query = query.ilike("items_text", `%${productQ}%`);
    if(STATE.crmFilterDateFrom) query = query.gte("order_date", STATE.crmFilterDateFrom+"T00:00:00");
    if(STATE.crmFilterDateTo) query = query.lte("order_date", STATE.crmFilterDateTo+"T23:59:59");
    if(STATE.crmFilterMinAmount) query = query.gte("amount", Number(STATE.crmFilterMinAmount));
    const { data, error } = await query;
    if(error) throw error;
    STATE.crmSearchResults = data||[];
  }catch(err){
    console.error(err);
    showErrorToast("ຄົ້ນຫາບໍ່ສຳເລັດ: "+err.message);
    STATE.crmSearchResults = [];
  }
  STATE.crmSearching = false;
  render();
}

async function syncPancakeCrmAll(){
  if(STATE.crmSyncing) return;
  STATE.crmSyncing = true;
  let pageNumber = 1;
  let totalImported = 0;
  let totalEntries = null;
  try{
    while(true){
      STATE.crmSyncStatus = totalEntries
        ? `⏳ ກຳລັງດຶງ... ${totalImported} / ${totalEntries}`
        : `⏳ ກຳລັງດຶງ... ${totalImported} ອໍເດີແລ້ວ`;
      render();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/sync-pancake-crm`, {
        method: "POST",
        headers: {
          "Content-Type":"application/json",
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        },
        body: JSON.stringify({ page_number: pageNumber })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      totalImported += data.processed_this_call||0;
      totalEntries = data.total_entries;
      if(data.done){
        STATE.crmSyncStatus = data.caught_up
          ? `✅ ດຶງອໍເດີໃໝ່ແລ້ວ (${totalImported} ອໍເດີ) — ໄລ່ທັນຂໍ້ມູນເກົ່າແລ້ວ ບໍ່ຕ້ອງໄລ່ຕໍ່`
          : `✅ ດຶງຄົບແລ້ວ — ທັງໝົດ ${totalEntries} ອໍເດີ`;
        break;
      }
      pageNumber = data.next_page_number;
    }
    await loadCrmCount();
  }catch(err){
    console.error(err);
    STATE.crmSyncStatus = "❌ ດຶງບໍ່ສຳເລັດ: " + (err && err.message ? err.message : "unknown error") + " — ກົດ \"ດຶງຕໍ່\" ເພື່ອສືບຕໍ່ຈາກຈຸດທີ່ຄ້າງ";
  }
  STATE.crmSyncing = false;
  render();
}

function attachPancakeCrmEvents(){
  const btnSync = document.getElementById("btn-sync-crm-all");
  if(btnSync) btnSync.addEventListener("click", syncPancakeCrmAll);

  const pageSizeEl = document.getElementById("crm-page-size");
  if(pageSizeEl) pageSizeEl.addEventListener("change", ()=>{ STATE.crmPageSize = Number(pageSizeEl.value); loadCrmResults(); });

  const searchInput = document.getElementById("crm-search-input");
  if(searchInput){
    searchInput.addEventListener("input", ()=>{ STATE.crmSearchQuery = searchInput.value; });
    searchInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadCrmResults(); });
  }
  const productInput = document.getElementById("crm-filter-product");
  if(productInput){
    productInput.addEventListener("input", ()=>{ STATE.crmFilterProduct = productInput.value; });
    productInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadCrmResults(); });
  }
  const dateFromInput = document.getElementById("crm-filter-date-from");
  if(dateFromInput) dateFromInput.addEventListener("change", ()=>{ STATE.crmFilterDateFrom = dateFromInput.value; loadCrmResults(); });
  const dateToInput = document.getElementById("crm-filter-date-to");
  if(dateToInput) dateToInput.addEventListener("change", ()=>{ STATE.crmFilterDateTo = dateToInput.value; loadCrmResults(); });
  const minAmountInput = document.getElementById("crm-filter-min-amount");
  if(minAmountInput){
    minAmountInput.addEventListener("input", ()=>{ STATE.crmFilterMinAmount = minAmountInput.value; });
    minAmountInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadCrmResults(); });
  }
  const btnSearch = document.getElementById("btn-crm-search");
  if(btnSearch) btnSearch.addEventListener("click", loadCrmResults);

  const btnClear = document.getElementById("btn-crm-clear-filters");
  if(btnClear) btnClear.addEventListener("click", ()=>{
    STATE.crmSearchQuery = ""; STATE.crmFilterProduct = ""; STATE.crmFilterDateFrom = ""; STATE.crmFilterDateTo = ""; STATE.crmFilterMinAmount = "";
    loadCrmResults();
  });

  // Drag-to-resize: dragging a header's handle resizes that <col> in the shared <colgroup>,
  // which (with table-layout:fixed) is what every row's cell in that column actually follows —
  // so the whole column resizes together, not just the header cell being dragged.
  const crmTable = document.getElementById("crm-table");
  if(crmTable){
    const cols = crmTable.querySelectorAll("colgroup col");
    crmTable.querySelectorAll(".col-resizer").forEach(handle=>{
      handle.addEventListener("mousedown", (e)=>{
        e.preventDefault();
        const idx = Number(handle.getAttribute("data-resizer"));
        const col = cols[idx];
        const startX = e.clientX;
        const startWidth = col.offsetWidth;
        handle.classList.add("resizing");
        function onMove(ev){
          const newWidth = Math.max(50, startWidth + (ev.clientX - startX));
          col.style.width = newWidth + "px";
        }
        function onUp(){
          handle.classList.remove("resizing");
          if(!STATE.crmColWidths.length) STATE.crmColWidths = CRM_COL_WIDTHS.slice();
          STATE.crmColWidths[idx] = col.offsetWidth;
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
        }
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });
    });
  }
}

/* ====================== PROFIT / LOSS DASHBOARD ======================
   Two calculation modes, both explained to Tar up front:
   - "daily": includes every order EXCEPT cancelled(6) and returned(5) — a live/provisional
     read on a day's activity, useful for a quick pulse-check, but numbers for the last ~10
     days can still shift (a "packing"/"shipped" order can still end up returned later).
   - "actual": counts ONLY orders that have reached a truly final state — completed(3) counts
     full revenue+cost, returned(5) counts as zero revenue/cost (a confirmed lost sale) so it
     doesn't disappear from the picture, but items still in flight (1,2,8) are excluded
     entirely since their outcome isn't known yet. This is the "real, settled" number, best
     used for anything more than ~10 days in the past.
   Cost per line item is Pancake's own last_imported_price captured AT THE TIME OF SALE (see
   sync-pancake-crm), not recalculated from today's product settings.
   Ad spend is intentionally not wired in yet (pending Meta Ads API access) — profit shown here
   is "profit before ad spend" until that's added. */
function profitDateRange(){
  const today = new Date();
  const fmtDate = (d)=>d.toISOString().slice(0,10);
  if(STATE.profitDateMode==="today") return {from: fmtDate(today), to: fmtDate(today)};
  if(STATE.profitDateMode==="week"){
    const d = new Date(today); d.setDate(d.getDate()-6);
    return {from: fmtDate(d), to: fmtDate(today)};
  }
  if(STATE.profitDateMode==="month"){
    const d = new Date(today.getFullYear(), today.getMonth(), 1);
    return {from: fmtDate(d), to: fmtDate(today)};
  }
  return {from: STATE.profitDateFrom, to: STATE.profitDateTo};
}

async function loadReturnCostMap(){
  try{
    const { data, error } = await sb.from("courier_return_costs").select("order_id, shipping_fee");
    if(error) throw error;
    const map = {};
    (data||[]).forEach(r=>{ map[r.order_id] = (map[r.order_id]||0) + (r.shipping_fee||0); });
    STATE.returnCostMap = map;
  }catch(err){
    console.error(err);
  }
}

async function loadProfitData(){
  STATE.profitLoading = true;
  STATE.profitError = "";
  render();
  try{
    const {from, to} = profitDateRange();
    let query = sb.from("crm_order_items").select("*")
      .gte("order_date", from+"T00:00:00")
      .lte("order_date", to+"T23:59:59");
    if(STATE.profitCalcMode==="daily"){
      query = query.not("pancake_status", "in", "(5,6)");
    } else {
      query = query.in("pancake_status", [3,5]);
    }
    const [{ data, error }] = await Promise.all([query, loadReturnCostMap()]);
    if(error) throw error;
    STATE.profitRows = data||[];
  }catch(err){
    console.error(err);
    STATE.profitError = "ໂຫຼດຂໍ້ມູນບໍ່ສຳເລັດ: "+err.message;
    STATE.profitRows = [];
  }
  STATE.profitLoading = false;
  render();
}

/* ====================== RETURNED-PACKAGE SHIPPING COST IMPORT ======================
   Pancake itself has NO data on what the courier actually charges for a returned package
   (confirmed by inspecting a real returned order's JSON — return_fee/shipping_fee/surcharge
   were all 0/false). That cost only exists in the courier's OWN system (e.g. Anousith
   Express's exported returned-package report). This parses that export (an HTML table saved
   with an .xls extension — read as text, not a real spreadsheet binary) entirely in the
   browser and matches each row to a Pancake order two ways:
     1. If the courier's "ຊື່ຜູ້ຮັບ" field was filled in with the Pancake order id (Tar's
        normal convention) and that id exists among status=5 (returned) orders — direct match.
     2. Otherwise, fall back to matching on (customer phone + COD amount) against status=5
        orders. If that matches more than one order, ALL of them get the fee applied (per
        Tar's instruction) rather than being skipped — a customer can legitimately have
        multiple separate returned orders with the same phone/amount coincidence, and it's
        better to slightly over-count a rare coincidence than silently drop real matches.
   Unmatched rows are still imported (so nothing is silently lost) but contribute no
   deduction until Tar reviews the raw list.  */
function parseLaoCourierNumber(text){
  if(!text) return 0;
  const cleaned = String(text).replace(/,/g, "").replace(/[^\d.]/g, "");
  return cleaned ? Number(cleaned) : 0;
}
function parseLaoCourierDate(text){
  // Format seen: "06-07-2026, 12:15" (DD-MM-YYYY, HH:mm)
  const m = /(\d{2})-(\d{2})-(\d{4}),?\s*(\d{2}):(\d{2})/.exec(String(text||""));
  if(!m) return null;
  const [, dd, mm, yyyy, hh, min] = m;
  return `${yyyy}-${mm}-${dd}T${hh}:${min}:00`;
}

async function importReturnedPackagesFile(file){
  STATE.returnImporting = true;
  STATE.returnImportStatus = "⏳ ກຳລັງອ່ານໄຟລ໌...";
  render();
  try{
    const text = await file.text();
    const doc = new DOMParser().parseFromString(text, "text/html");
    const table = doc.querySelector("table");
    if(!table) throw new Error("ບໍ່ພົບຕາຕະລາງໃນໄຟລ໌ — ອາດບໍ່ແມ່ນໄຟລ໌ export ຈາກລະບົບຂົນສົ່ງ");
    const trs = Array.from(table.querySelectorAll("tr"));
    const dataRows = trs
      .map(tr=>Array.from(tr.querySelectorAll("td")).map(td=>td.textContent.trim()))
      .filter(cols=>cols.length>=14 && cols[1] && cols[1]!=="ເລກບິນ" && /^\d+$/.test(cols[1]));

    if(dataRows.length===0) throw new Error("ອ່ານໄດ້ 0 ແຖວ — ກວດຄືນວ່າໄຟລ໌ຖືກຕ້ອງ");

    STATE.returnImportStatus = `⏳ ພົບ ${dataRows.length} ແຖວ, ກຳລັງດຶງລາຍການອໍເດີຕີກັບຈາກ Pancake ເພື່ອຈັບຄູ່...`;
    render();

    // Load every returned(5) Pancake order once, match everything in memory — far cheaper
    // than one DB round-trip per row.
    const { data: returnedOrders, error: roErr } = await sb.from("crm_purchases")
      .select("id, customer_phone, amount")
      .eq("pancake_status", 5);
    if(roErr) throw roErr;
    const byId = new Map(returnedOrders.map(o=>[String(o.id), o]));
    const byPhoneAmount = new Map();
    returnedOrders.forEach(o=>{
      const k = `${o.customer_phone}|${Math.round(o.amount||0)}`;
      if(!byPhoneAmount.has(k)) byPhoneAmount.set(k, []);
      byPhoneAmount.get(k).push(String(o.id));
    });

    let matchedByOrderId = 0, matchedByPhoneCod = 0, unmatched = 0;
    const rowsToUpsert = [];
    dataRows.forEach(cols=>{
      const billNumber = cols[1];
      const rawRecipient = cols[4];
      const phone = cols[5];
      const returnDateStr = cols[8];
      const codStr = cols[10];
      const details = cols[13]||"";
      const feeMatch = /ຄ່າບໍລິການ[:\s]*([\d,]+)/.exec(details);
      const shippingFee = feeMatch ? parseLaoCourierNumber(feeMatch[1]) : 0;
      const codAmount = parseLaoCourierNumber(codStr);
      const returnDate = parseLaoCourierDate(returnDateStr);

      let matchedIds = [];
      let matchMethod = "unmatched";
      if(/^\d+$/.test(rawRecipient) && byId.has(rawRecipient)){
        matchedIds = [rawRecipient];
        matchMethod = "order_id";
      } else {
        const key = `${phone}|${Math.round(codAmount)}`;
        if(byPhoneAmount.has(key)){
          matchedIds = byPhoneAmount.get(key);
          matchMethod = "phone_cod";
        }
      }

      if(matchedIds.length===0){
        unmatched++;
        rowsToUpsert.push({
          id: billNumber+"-unmatched", order_id: null, bill_number: billNumber,
          shipping_fee: shippingFee, return_date: returnDate, match_method: "unmatched"
        });
      } else {
        if(matchMethod==="order_id") matchedByOrderId++; else matchedByPhoneCod += matchedIds.length;
        matchedIds.forEach(oid=>{
          rowsToUpsert.push({
            id: billNumber+"-"+oid, order_id: oid, bill_number: billNumber,
            shipping_fee: shippingFee, return_date: returnDate, match_method: matchMethod
          });
        });
      }
    });

    // Upsert in chunks to stay well under any request-size limits.
    for(let i=0; i<rowsToUpsert.length; i+=200){
      const chunk = rowsToUpsert.slice(i, i+200);
      const { error: upErr } = await sb.from("courier_return_costs").upsert(chunk, {onConflict:"id"});
      if(upErr) throw upErr;
    }

    STATE.returnImportStatus = `✅ ນຳເຂົ້າແລ້ວ ${dataRows.length} ແຖວ — ຈັບຄູ່ດ້ວຍເລກອໍເດີ ${matchedByOrderId}, ຈັບຄູ່ດ້ວຍເບີ+ຍອດ ${matchedByPhoneCod}, ຈັບຄູ່ບໍ່ໄດ້ ${unmatched}`;
    await loadReturnCostMap();
  }catch(err){
    console.error(err);
    STATE.returnImportStatus = "❌ ນຳເຂົ້າບໍ່ສຳເລັດ: "+err.message;
  }
  STATE.returnImporting = false;
  render();
}

function computeProfitSummary(){
  const rows = STATE.profitRows||[];
  const groups = {};
  const key = (r)=>{
    if(STATE.profitGroupBy==="page") return r.page_name||"(ບໍ່ຮູ້ Page)";
    if(STATE.profitGroupBy==="product") return r.product_name||"(ບໍ່ຮູ້ສິນຄ້າ)";
    return "ລວມທັງໝົດ";
  };
  rows.forEach(r=>{
    const k = key(r);
    if(!groups[k]) groups[k] = {label:k, revenue:0, cost:0, qty:0, orderIds:new Set(), returnedOrderIds:new Set()};
    // A returned(5) order in "actual" mode contributes zero revenue/cost — it's a confirmed
    // lost sale, kept in the tally for visibility — but the return shipping fee (if we managed
    // to match this order against an imported Anousith/courier returned-package report) is a
    // real cost that DID happen, so it comes out of profit separately below.
    const isReturned = r.pancake_status===5;
    if(!isReturned){
      groups[k].revenue += (r.unit_price||0) * (r.quantity||0);
      groups[k].cost += (r.unit_cost||0) * (r.quantity||0);
      groups[k].qty += (r.quantity||0);
    } else {
      groups[k].returnedOrderIds.add(r.order_id);
    }
    groups[k].orderIds.add(r.order_id);
  });
  return Object.values(groups).map(g=>{
    let returnShippingCost = 0;
    g.returnedOrderIds.forEach(oid=>{ returnShippingCost += STATE.returnCostMap[oid] || 0; });
    const profit = g.revenue - g.cost - returnShippingCost;
    return {
      label:g.label, revenue:g.revenue, cost:g.cost, returnShippingCost, profit,
      margin: g.revenue>0 ? (profit/g.revenue*100) : 0,
      qty:g.qty, orderCount:g.orderIds.size
    };
  }).sort((a,b)=>b.revenue-a.revenue);
}

/* ---------- Deterministic fallback parser (no AI, cannot silently fail) ----------
   Runs synchronously the instant a quick label is saved, so recipientPhone/codAmount/
   address/courierName/recipientName are populated immediately — no waiting on a network
   call that might be slow, blocked, or return text the AI step below can't parse. The AI
   parse afterward only REFINES these (fills gaps), it never blanks out what this found. */
function regexParseQuickText(quickText){
  const text = String(quickText||"");
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const out = {recipientName:"", recipientPhone:"", address:"", courierName:"", codAmount:0};

  const phoneMatch = text.match(/0\d{1,2}[\s\-]?\d{3,4}[\s\-]?\d{2,4}[\s\-]?\d{0,3}/);
  if(phoneMatch) out.recipientPhone = phoneMatch[0].replace(/[\s\-]/g,"").trim();

  let codMatch = text.match(/(?:COD|ຄອດ)[^\d]{0,12}([\d][\d,\.]{2,})/i);
  if(!codMatch) codMatch = text.match(/([\d]{1,3}(?:,\d{3})+|\d{4,})\s*(?:ກີບ|kip)/i);
  if(codMatch) out.codAmount = Number(String(codMatch[1]).replace(/[,\.]/g,"")) || 0;

  const addrLine = lines.find(l=>/ບ້ານ|ເມືອງ|ແຂວງ|ນະຄອນຫຼວງ|ນະຄອນ/.test(l));
  if(addrLine) out.address = addrLine;

  const nameLine = lines.find(l=> l!==addrLine && !/\d{5,}/.test(l) && !/COD|ກີບ/i.test(l));
  if(nameLine) out.recipientName = nameLine;

  const couriers = (STATE.data.couriers||[]);
  const foundCourier = couriers.find(c=>c.name && text.includes(c.name));
  if(foundCourier) out.courierName = foundCourier.name;

  return out;
}

/* ---------- Parse "ພິມດ່ວນ" pasted chat text into structured fields with AI ----------
   Quick-print labels only ever stored one big blob of pasted chat text (quickText).
   That meant recipientName/recipientPhone/address/codAmount/courierName were always
   blank for quick labels — so the ສະແກນສິນຄ້າອອກ page (which reads exactly those
   fields) had nothing to show for them. This asks the AI to lift those same fields out
   of the pasted text, so the existing scan-out display works for quick labels too,
   with zero changes needed on the scan-out side. Runs in the background after a quick
   label is saved — never blocks the fast "save & next" workflow. */
async function parseQuickTextWithAI(quickText){
  const system = "ທ່ານແມ່ນຜູ້ຊ່ວຍແຍກຂໍ້ມູນ. ອ່ານຂໍ້ຄວາມທີ່ແອັດມິນຮ້ານກ໋ອບຈາກແຊັດລູກຄ້າ (ອາດຈະບໍ່ຮຽງລຳດັບ, ອາດມີ emoji/ຄຳຟຸ່ມເຟືອຍ) ແລ້ວດຶງອອກມາເປັນ JSON ລ້ວນໆເທົ່ານັ້ນ ບໍ່ມີຄຳອະທິບາຍ ບໍ່ມີ markdown code fence. ຮູບແບບ: {\"customerName\":\"\",\"phone\":\"\",\"address\":\"\",\"courierName\":\"\",\"codAmount\":0}. ຖ້າຫາຂໍ້ມູນໃດບໍ່ພົບ ໃຫ້ໃສ່ຄ່າຫວ່າງ \"\" (ຫຼື 0 ສຳລັບ codAmount). codAmount ເອົາສະເພາະຕົວເລກ (ບໍ່ມີ ' ກີບ' ຫຼືເຄື່ອງໝາຍຄັ່ນ).";
  const raw = await callAI(quickText, system);
  // The model doesn't always obey "JSON only" perfectly — it may add a stray
  // sentence before/after. Pull out just the {...} block instead of assuming
  // the whole response is clean JSON, so one extra word doesn't break everything.
  const jsonBlock = String(raw||"").match(/\{[\s\S]*\}/);
  const cleaned = jsonBlock ? jsonBlock[0] : String(raw||"").replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(cleaned);
  return {
    recipientName: String(parsed.customerName||"").trim(),
    recipientPhone: String(parsed.phone||"").trim(),
    address: String(parsed.address||"").trim(),
    courierName: String(parsed.courierName||"").trim(),
    codAmount: Number(parsed.codAmount)||0
  };
}
// Fire-and-forget: parse in background, then patch just those fields locally + in Supabase.
// Never surfaces an error to the person — worst case the scan-out page just stays blank
// for that one label, same as it always was before this feature existed.
function backgroundParseQuickLabel(labelId, quickText){
  parseQuickTextWithAI(quickText).then(aiFields=>{
    const idx = STATE.data.shippingLabels.findIndex(l=>l.id===labelId);
    if(idx===-1) return; // label was deleted/edited away already
    const current = STATE.data.shippingLabels[idx];
    // Only let the AI overwrite a field if it actually found something for it —
    // otherwise keep whatever the instant regex fallback already saved.
    const merged = {
      recipientName: aiFields.recipientName || current.recipientName || "",
      recipientPhone: aiFields.recipientPhone || current.recipientPhone || "",
      address: aiFields.address || current.address || "",
      courierName: aiFields.courierName || current.courierName || "",
      codAmount: aiFields.codAmount || current.codAmount || 0
    };
    STATE.data.shippingLabels[idx] = {...current, ...merged};
    if(STATE.page==="labels" || STATE.page==="scanOut") render();
    dbUpdateShippingLabelParsedFields(labelId, merged).catch(err=>console.error("background parse save failed:", err));
  }).catch(err=>{ console.error("AI parse of quick label failed (regex fallback values already saved):", err); });
}
async function dbUpdateShippingLabelParsedFields(id, fields){
  const {error} = await sb.from("shipping_labels").update({
    recipient_name:fields.recipientName, recipient_phone:fields.recipientPhone,
    address:fields.address, courier_name:fields.courierName, cod_amount:fields.codAmount
  }).eq("id", id);
  if(error) throw error;
}

          <button class="btn btn-outline" style="width:100%; justify-content:center;" id="btn-pending-logout">ອອກຈາກລະບົບ</button>
        </div>
      </div>
    `;
    const pendLogout = document.getElementById("btn-pending-logout");
    if(pendLogout) pendLogout.addEventListener("click", ()=>{ STATE.currentUser=null; clearSession(); render(); });
    return;
  }
  // Build the outer shell (sidebar + main container) only once per login session.
  // On every subsequent render, only #main's content is replaced — this is the
  // key to a flicker-free auto-refresh: the sidebar (logo, nav, user name,
  // logout button) never gets torn down and rebuilt, so only the part of the
  // screen whose data actually changed visibly updates.
  const existingApp = document.querySelector(".app");
  if(!existingApp || existingApp.getAttribute("data-user")!==String(STATE.currentUser?.id||"")){
    root.innerHTML = `
      <button class="hamburger-btn" id="btn-mobile-menu" aria-label="ເປີດເມນູ">&#9776;</button>
      <div class="sidebar-overlay" id="sidebar-overlay"></div>
      <div class="app" data-user="${esc(STATE.currentUser?.id||"")}">
        <div class="sidebar" id="app-sidebar">
          <button class="mobile-close-x" id="btn-close-mobile-menu" aria-label="ປິດເມນູ">&#10005;</button>
          <div class="brand">ຮ້ານຕຸກຕາ ສີໄຄ<small>ລະບົບການຕະຫຼາດອັດຕະໂນມັດ</small></div>
          <button class="btn btn-sm" style="width:100%; justify-content:center; margin-bottom:14px;" id="btn-reload-data">
            <span id="reload-btn-label">🔄 ໂຫຼດຂໍ້ມູນໃໝ່</span>
          </button>
          <div id="nav-container"></div>
          <div class="sidebar-foot">
            <div style="margin-bottom:8px;">👤 <span id="sidebar-username">${esc(STATE.currentUser?.name||"")}</span></div>
            <button class="btn btn-sm btn-outline" style="width:100%; justify-content:center; color:var(--cream); border-color:rgba(255,255,255,0.3);" id="btn-logout">ອອກຈາກລະບົບ</button>
            <div style="margin-top:10px; opacity:.5; font-size:10.5px; text-align:center;">v${APP_VERSION}</div>
          </div>
        </div>
        <div class="main" id="main"></div>
        <div id="global-toast-container"></div>
      </div>
    `;
    attachSidebarEvents();
  }
  const reloadBtn = document.getElementById("btn-reload-data");
  const reloadLabel = document.getElementById("reload-btn-label");
  if(reloadBtn){
    reloadBtn.disabled = !!STATE.refreshing;
  }
  if(reloadLabel){
    reloadLabel.textContent = STATE.refreshing ? "⏳ ກຳລັງໂຫຼດ..." : "🔄 ໂຫຼດຂໍ້ມູນໃໝ່";
  }
  updateNavHighlight();
  updateMainContent();
  updateGlobalToast();
}

function updateNavHighlight(){
  const navContainer = document.getElementById("nav-container");
  if(!navContainer) return;
  // Skip rebuilding if nav already reflects the current page (avoids
  // needless DOM churn on every 8-second poll when the page hasn't changed).
  if(navContainer.getAttribute("data-page")===STATE.page && navContainer.getAttribute("data-role")===(STATE.currentUser?.role||"")){
    return;
  }
  navContainer.setAttribute("data-page", STATE.page);
  navContainer.setAttribute("data-role", STATE.currentUser?.role||"");
  navContainer.innerHTML = getNav().map(n => `
    <button class="nav-btn ${STATE.page===n.id?'active':''}" data-nav="${n.id}">
      <span class="nav-icon">${n.icon}</span>${n.label}${n.id==="content" && STATE.data.contentHistory.length>0 ? `<span class="nav-badge">${STATE.data.contentHistory.length}</span>` : ""}
    </button>
  `).join("");
  navContainer.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.page = el.getAttribute("data-nav");
      if(STATE.page==="content") STATE.mktScreen = "picker";
      STATE.output = ""; STATE.error = "";
      closeMobileMenu();
      render();
      if(STATE.page==="users") loadUsersList();
      if(STATE.page==="reports") loadApprovedUserNames();
      if(STATE.page==="loginHistory") loadLoginHistory();
      if(STATE.page==="deletionLog") loadDeletionLog();
      if(STATE.page==="pancakeCrm"){ loadCrmCount(); loadCrmResults(); }
      if(STATE.page==="profitDashboard") loadProfitData();
      if(STATE.page==="scanOut") refreshScanOutData();
    });
  });
}

async function loadLoginHistory(){
  STATE.loginHistoryList = await dbListLoginHistory().catch(()=>[]);
  render();
}

async function loadDeletionLog(){
  STATE.deletionLogList = await dbListDeletionLog().catch(()=>[]);
  render();
}

/* ---------- Mobile hamburger drawer ---------- */
function openMobileMenu(){
  STATE.mobileMenuOpen = true;
  const sidebarEl = document.getElementById("app-sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if(sidebarEl) sidebarEl.classList.add("open");
  if(overlay) overlay.classList.add("open");
}
function closeMobileMenu(){
  STATE.mobileMenuOpen = false;
  const sidebarEl = document.getElementById("app-sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if(sidebarEl) sidebarEl.classList.remove("open");
  if(overlay) overlay.classList.remove("open");
}

function attachSidebarEvents(){
  const logoutBtn = document.getElementById("btn-logout");
  if(logoutBtn) logoutBtn.addEventListener("click", ()=>{
    STATE.currentUser = null;
    clearSession();
    STATE.page = "dashboard";
    closeMobileMenu();
    render();
  });

  const reloadBtn = document.getElementById("btn-reload-data");
  if(reloadBtn) reloadBtn.addEventListener("click", ()=>{ refreshAll(); });

  const hamBtn = document.getElementById("btn-mobile-menu");
  if(hamBtn) hamBtn.addEventListener("click", ()=>{
    STATE.mobileMenuOpen ? closeMobileMenu() : openMobileMenu();
  });
  const closeXBtn = document.getElementById("btn-close-mobile-menu");
  if(closeXBtn) closeXBtn.addEventListener("click", closeMobileMenu);
  const overlay = document.getElementById("sidebar-overlay");
  if(overlay) overlay.addEventListener("click", closeMobileMenu);
}

function updateMainContent(){
  const main = document.getElementById("main");
  if(!main) return;
  main.classList.remove("main-fade");
  void main.offsetWidth; // force reflow so the animation restarts every time
  main.innerHTML = renderPage();
  main.classList.add("main-fade");
  attachPageEvents();
}

function renderPage(){
  // Defense in depth: the nav already hides disabled pages, but also block direct
  // rendering in case STATE.page was left pointing at a page an owner just disabled.
  if(BASE_NAV.some(n=>n.id===STATE.page) && !isPageEnabledForCurrentUser(STATE.page)){
    return renderDashboard();
  }
  switch(STATE.page){
    case "dashboard": return renderDashboard();
    case "products": return renderProducts();
    case "content": return renderContent();
    case "productChat": return renderProductChat();
    case "costs": return renderCosts();
    case "admin": return renderAdmin();
    case "insights": return renderInsights();
    case "reports": return renderReports();
    case "attendance": return renderAttendance();
    case "labels": return renderLabels();
    case "scanOut": return renderScanOut();
    case "pancakeCrm": return renderPancakeCrm();
    case "profitDashboard": return renderProfitDashboard();
    case "users": return isOwner() ? renderUsers() : renderDashboard();
    case "loginHistory": return isOwner() ? renderLoginHistory() : renderDashboard();
    case "deletionLog": return renderDeletionLog();
    case "pagePermissions": return isOwner() ? renderPagePermissions() : renderDashboard();
    default: return "";
  }
}

/* ---------- DASHBOARD ---------- */
function renderDashboard(){
  const d = STATE.data;
  const totalRevenue = d.costs.reduce((s,c)=>s+(Number(c.revenue)||0),0);
  const totalCost = d.costs.reduce((s,c)=>s+(Number(c.productCost)||0)+(Number(c.adCost)||0)+(Number(c.opCost)||0),0);
  const profit = totalRevenue - totalCost;
  return `
    <div class="page-head">
      <h1>ພາບລວມຮ້ານ</h1>
      <p>ສະຫຼຸບຂໍ້ມູນທັງໝົດຂອງລະບົບ automation</p>

    <div class="grid-4">

      <div class="stat"><div class="label">Content ທີ່ສ້າງແລ້ວ</div><div class="value">${d.contentHistory.length}</div></div>
      <div class="stat"><div class="label">ກຳໄລລວມ</div><div class="value ${profit>=0?'good':'danger'}">${fmt(profit)} ກີບ</div></div>
      <div class="stat"><div class="label">ບັນຫາລູກຄ້າທີ່ບັນທຶກ</div><div class="value">${d.insights.length}</div></div>
    </div>
    <div class="card" style="margin-top:18px;">
      <h3>ເລີ່ມຕົ້ນໄວ</h3>
      <div style="display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" data-nav="products">+ ເພີ່ມສິນຄ້າ</button>
        <button class="btn btn-outline" data-nav="content">Marketing Studio</button>
        <button class="btn btn-outline" data-nav="insights">ບັນທຶກບັນຫາລູກຄ້າ</button>
      </div>
    </div>
    ${d.products.length===0 ? `
      <div class="card empty">
        <span class="nav-icon">&#9638;</span>
        ຍັງບໍ່ມີສິນຄ້າໃນລະບົບ — ເລີ່ມໂດຍການເພີ່ມສິນຄ້າທຳອິດຂອງທ່ານ
      </div>` : ""}

      </div>` : `
      <div class="flex-between" style="margin-bottom:16px; flex-wrap:wrap; gap:10px;">
        <input type="text" id="product-search" placeholder="🔍 ຄົ້ນຫາສິນຄ້າ (ຊື່ ຫຼື ໝວດໝູ່)..." value="${esc(STATE.productSearch)}" style="max-width:320px; margin-bottom:0;"/>

          ບໍ່ພົບສິນຄ້າທີ່ຄົ້ນຫາ "${esc(STATE.productSearch)}"

          <div class="flex-between" style="align-items:flex-start;">
            <div style="flex:1;">

              <div class="small-muted" style="margin-top:3px;">${esc(fq.answer)}</div>

        </div>
      `).join("")}
      <div class="grid-2" style="margin-top:8px;">
        <div>
          <label style="font-size:12.5px;">ຄຳຖາມ</label>

    </div>
  `;
}

  const revenue = d.orders.filter(o=>o.status==="ຈ່າຍແລ້ວ").reduce((s,o)=>s+(Number(o.price)||0), 0);

  return `
    <div class="card">

        <div class="stat"><div class="label">ອໍເດີທັງໝົດ</div><div class="value">${totalOrders}</div></div>
        <div class="stat"><div class="label">ຍອດຂາຍລວມ (ຈ່າຍແລ້ວ)</div><div class="value good">${fmt(revenue)}</div></div>

      <p class="small-muted" style="margin:6px 0 14px;">ກົດໄປແທັບທີ່ຕ້ອງການໄດ້ທັນທີ</p>

  const productId = STATE.selProduct;
  const product = d.products.find(p=>p.id===productId);
  const f = STATE.orderForm;
  const statuses = ["ລໍຖ້າ","ສົ່ງແລ້ວ","ຈ່າຍແລ້ວ","ຍົກເລີກ"];
  let items = d.orders.filter(o=>o.productId===productId);
  if(STATE.orderFilter) items = items.filter(o=>o.status===STATE.orderFilter);
  if(STATE.orderDateFilter) items = items.filter(o=>o.createdAt && new Date(o.createdAt).toLocaleDateString("en-CA", {timeZone: LAOS_TZ})===STATE.orderDateFilter);
  if(STATE.orderSearch){
    const q = STATE.orderSearch.toLowerCase();
    items = items.filter(o=>o.name.toLowerCase().includes(q) || (o.phone||"").toLowerCase().includes(q));
  }
  return `
    <div class="card">
      <label>ເລືອກສິນຄ້າ</label>
      <select id="cs-crm-product">
        ${d.products.map(p=>`<option value="${p.id}" ${STATE.selProduct===p.id?'selected':''}>${esc(p.name)}</option>`).join("")}
      </select>
