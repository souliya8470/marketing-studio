<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ຮ້ານຕຸກຕາ ສີໄຄ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Serif+Lao:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1F3D2E;
    --bg-deep-2:#27483A;
    --cream:#FAF6EE;
    --cream-2:#F1EAD9;
    --terracotta:#C9683F;
    --terracotta-dark:#A6502E;
    --sage:#A8C0A0;
    --sage-dark:#5F7D58;
    --ink:#23291F;
    --muted:#6F7268;
    --danger:#B0473B;
    --white:#FFFFFF;
    --radius:10px;
    --shadow:0 2px 10px rgba(31,61,46,0.08);
  }
  *{box-sizing:border-box;}
  html, body{
    max-width:100%;
  }
  body{
    margin:0;
    font-family:'Noto Sans Lao','Noto Sans',sans-serif;
    background:var(--cream-2);
    color:var(--ink);
  }
  h1,h2,h3,.serif{font-family:'Noto Serif Lao','Noto Sans Lao',serif;}
  .app{
    display:block;
    min-height:100vh;
  }
  .main-fade{
    animation: mainFadeIn 220ms ease;
  }
  @keyframes mainFadeIn{
    from{ opacity:0.85; }
    to{ opacity:1; }
  }
  .sidebar{
    background:var(--bg-deep);
    color:var(--cream);
    padding:24px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
    /* Desktop: position:fixed pins the whole nav column to the viewport no matter what —
       this replaced an earlier position:sticky attempt that some browsers weren't
       honoring reliably (the whole green bar was still scrolling away with the page).
       Fixed is unambiguous: it's always relative to the viewport, full stop. Since fixed
       elements are taken out of normal document flow, .main gets margin-left:240px below
       to leave room for it. Overridden back to a slide-out drawer for mobile below. */
    position:fixed;
    top:0;
    left:0;
    width:240px;
    height:100vh;
    overflow-y:auto;
    z-index:10;
  }
  .brand{
    font-family:'Noto Serif Lao',serif;
    font-size:20px;
    font-weight:700;
    color:var(--cream);
    margin:0 8px 28px 8px;
    line-height:1.3;
  }
  .brand small{
    display:block;
    font-family:'Noto Sans Lao',sans-serif;
    font-size:12px;
    font-weight:400;
    color:var(--sage);
    margin-top:4px;
  }
  .nav-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:none;
    border:none;
    color:var(--cream);
    opacity:0.78;
    text-align:left;
    padding:11px 12px;
    border-radius:8px;
    font-size:14.5px;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s, opacity .15s;
    width:100%;
  }
  .nav-btn:hover{background:var(--bg-deep-2); opacity:1;}
  .nav-btn.active{background:var(--terracotta); opacity:1; font-weight:600;}
  .nav-icon{font-size:17px; width:20px; text-align:center;}
  .nav-badge{display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; margin-left:6px; background:var(--terracotta); color:#fff; border-radius:999px; font-size:10.5px; font-weight:700; vertical-align:middle;}
  .nav-btn.active .nav-badge{background:var(--cream); color:var(--terracotta-dark);}
  .sidebar-foot{
    margin-top:auto;
    padding:12px 8px 0 8px;
    font-size:11.5px;
    color:var(--sage);
    border-top:1px solid rgba(255,255,255,0.12);
    padding-top:14px;
  }
  .main{padding:32px 40px; margin-left:240px;}
  .page-head{margin-bottom:24px;}
  .page-head h1{font-size:24px; margin:0 0 4px 0; color:var(--bg-deep);}
  .page-head p{margin:0; color:var(--muted); font-size:14px;}
  .card{
    background:var(--white);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px 22px;
    margin-bottom:18px;
  }
  .card h3{margin:0 0 14px 0; font-size:16px; color:var(--bg-deep);}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .grid-4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  label{display:block; font-size:13px; color:var(--muted); margin:0 0 5px 0; font-weight:600;}
  input[type=text], input[type=number], textarea, select{
    width:100%;
    padding:9px 11px;
    border:1px solid #DCD6C4;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    background:var(--cream);
    color:var(--ink);
    margin-bottom:14px;
  }
  textarea{resize:vertical; min-height:80px;}
  input:focus, textarea:focus, select:focus{
    outline:none; border-color:var(--terracotta); background:var(--white);
  }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    background:var(--terracotta);
    color:var(--white);
    border:none;
    padding:10px 18px;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--terracotta-dark);}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{background:#C9B9A9; cursor:not-allowed;}
  .btn-outline{background:none; border:1.5px solid var(--bg-deep); color:var(--bg-deep);}
  .btn-outline:hover{background:var(--bg-deep); color:var(--cream);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}
  .btn-danger{background:var(--danger);}
  .btn-danger:hover{background:#8E382E;}
  .pill{display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600;}
  .pill-sage{background:#E4ECDF; color:var(--sage-dark);}
  .pill-terra{background:#F4E1D6; color:var(--terracotta-dark);}
  .pill-gray{background:#EAE7DC; color:var(--muted);}
  .product-card{
    border:1px solid #E9E3D3; border-radius:9px; padding:14px;
    display:flex; flex-direction:column; gap:6px; cursor:pointer; transition:border-color .15s;
    position:relative;
  }
  .product-card:hover{border-color:var(--terracotta);}
  .product-card h4{margin:0; font-size:15px; color:var(--bg-deep);}
  .product-card .meta{font-size:12.5px; color:var(--muted);}
  .product-card-del{
    position:absolute; top:8px; right:8px; width:26px; height:26px; border-radius:50%;
    background:rgba(255,255,255,.9); border:1px solid #E9E3D3; color:var(--muted);
    font-size:13px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;
    opacity:0; transition:opacity .15s, background .15s, color .15s; z-index:2;
  }
  .product-card:hover .product-card-del{opacity:1;}
  .product-card-del:hover{background:var(--danger); color:#fff; border-color:var(--danger);}
  .view-toggle{display:flex; border:1px solid #E9E3D3; border-radius:8px; overflow:hidden;}
  .view-toggle-btn{
    padding:8px 14px; font-size:13px; font-weight:600; background:var(--paper); color:var(--muted);
    border:none; cursor:pointer; border-right:1px solid #E9E3D3;
  }
  .view-toggle-btn:last-child{border-right:none;}
  .view-toggle-btn.active{background:var(--terracotta); color:#fff;}
  .product-table-wrap{overflow-x:auto;}
  .product-table-wrap table{width:100%;}
  .product-table-wrap td{vertical-align:middle;}
  .product-row-thumb{width:52px; height:52px; object-fit:cover; border-radius:7px; border:1px solid #E9E3D3; display:block;}
  .product-row-thumb-placeholder{width:52px; height:52px; border-radius:7px; background:var(--cream); display:flex; align-items:center; justify-content:center; font-size:20px; color:var(--muted); border:1px solid #E9E3D3;}
  .empty{text-align:center; padding:40px 20px; color:var(--muted);}
  .empty .nav-icon{font-size:32px; display:block; margin-bottom:8px; opacity:.5;}
  .stat{background:var(--cream); border-radius:9px; padding:14px; border:1px solid #EAE3D2;}
  .stat .label{font-size:12px; color:var(--muted); margin-bottom:4px;}
  .stat .value{font-size:21px; font-weight:700; color:var(--bg-deep);}
  .stat .value.danger{color:var(--danger);}
  .stat .value.good{color:var(--sage-dark);}
  .content-out{
    background:var(--cream); border:1px solid #E9E3D3; border-radius:8px;
    padding:14px 16px; white-space:pre-wrap; font-size:14px; line-height:1.65;
    margin-top:10px; max-height:420px; overflow-y:auto;
  }
  .toolbar{display:flex; gap:8px; margin-top:10px;}

  /* ---- Shipping label print preview ---- */
  .label-overlay{position:fixed; inset:0; background:rgba(20,15,10,0.6); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;}
  .label-sheet{background:#fff; color:#111; font-family:'Noto Sans Lao','Noto Sans',sans-serif; overflow-y:auto; max-height:90vh;}
  .label-sheet.size-label{width:100mm;}
  .label-sheet.size-label75{width:75mm;}
  .label-sheet.size-a4{width:210mm;}
  .label-box{border:2px dashed #333; margin:14px;}
  .label-row{border-bottom:1px solid #333; padding:8px 10px;}
  .label-row:last-child{border-bottom:none;}
  .label-cod{font-size:20px; font-weight:800;}
  .label-footer{font-size:10.5px; text-align:center; padding:6px 10px; color:#333;}
  .input-error{border-color:var(--danger) !important;}
  .input-error::placeholder{color:var(--danger); opacity:1;}
  .app-toast{position:fixed; bottom:24px; right:24px; background:#2e7d46; color:#fff; padding:14px 20px; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,.25); z-index:500; font-size:14px; display:flex; align-items:center; gap:10px; animation:toastIn .25s ease-out;}
  .app-toast-error{background:#a33b2b;}
  @keyframes toastIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  /* Custom confirm/alert dialog — replaces the browser's native confirm()/alert() (which
     always renders top-of-viewport and can't be restyled) with a centered, on-brand modal. */
  .custom-dialog-overlay{position:fixed; inset:0; background:rgba(30,22,15,.55); display:flex; align-items:center; justify-content:center; z-index:600; padding:20px; animation:dialogFadeIn .15s ease-out;}
  .custom-dialog-box{background:var(--white); border-radius:16px; padding:28px 26px 22px; width:100%; max-width:380px; box-shadow:0 20px 50px rgba(0,0,0,.3); text-align:center; animation:dialogPopIn .18s ease-out;}
  .custom-dialog-icon{font-size:34px; margin-bottom:10px; line-height:1;}
  .custom-dialog-message{font-size:15px; color:var(--bg-deep); line-height:1.55; white-space:pre-wrap; margin-bottom:22px;}
  .custom-dialog-actions{display:flex; gap:10px; justify-content:center;}
  .custom-dialog-actions .btn{flex:1; justify-content:center; max-width:150px;}
  .custom-dialog-danger .custom-dialog-icon{color:var(--danger);}
  @keyframes dialogFadeIn{from{opacity:0;} to{opacity:1;}}
  @keyframes dialogPopIn{from{opacity:0; transform:scale(.92) translateY(8px);} to{opacity:1; transform:scale(1) translateY(0);}}
  .label-preview-scroll{max-height:90vh; overflow-y:auto;}
  .row-flash-highlight{animation:rowFlash 2.2s ease-out 1;}
  @keyframes rowFlash{
    0%{background-color:#FFE9B8;}
    100%{background-color:transparent;}
  }
  @media print{
    /* ROOT CAUSE of the "ເຈ້ຍເປົ່າ" phantom blank pages: visibility:hidden does NOT
       remove an element's box from the page's layout height — the sidebar, toolbar,
       toast container, and (most of all) the rest of the ໜ້າພິມໃບບິນ page content
       were all still occupying real vertical space in the document, just invisible.
       Chrome paginates print based on that full document height, so it kept printing
       extra blank pages for all that invisible-but-still-there height after the one
       page that actually had visible content. Fix: display:none (not just
       visibility:hidden) on every sibling container — display:none removes the box
       from layout entirely, so the document's real height becomes just the print
       area's own height. */
    .sidebar, .hamburger-btn, .sidebar-overlay, #global-toast-container, .labels-page-body{
      display:none !important;
    }
    body *{visibility:hidden;}
    #print-label-area, #print-label-area *{visibility:visible;}
    #print-label-area{position:absolute; top:0; left:0; width:100%; margin:0; padding:0;}
    /* display:block (not flex) at print time — a flex-centered overlay can make Chrome
       compute an extra blank page when there's only a single sheet inside it. */
    .label-overlay{position:static; background:none; padding:0; display:block !important; margin:0 !important;}
    .label-preview-scroll{display:block !important; margin:0 !important; padding:0 !important;}
    .no-print{display:none !important;}
    /* Fill the physical paper exactly — the on-screen 340px/500px preview widths above
       are for the screen only; at print time the label must stretch to whatever page
       size is selected in the browser's print dialog, with no extra margin/border.
       width/overflow here; exact height/overflow-hidden clipping is set per-print in the
       dynamic <style> block inside renderLabelPrintPreview (it knows the real paper mm),
       so we deliberately do NOT set height/max-height/overflow here to avoid the two
       rules fighting each other and producing unpredictable pagination. */
    .label-sheet{width:100% !important; margin:0 !important; break-inside:avoid; page-break-inside:avoid;}
    .label-sheet:last-child{break-after:avoid-page !important; page-break-after:avoid !important;}
    .label-preview-scroll{max-height:none !important; overflow:visible !important;}
    .label-box{margin:0 !important; border:none !important;}
    @page{ margin:0; }
  }

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; color:var(--muted); font-weight:600; padding:8px 10px; border-bottom:2px solid #EAE3D2;}
  td{padding:9px 10px; border-bottom:1px solid #F0EBDD; vertical-align:top;}
  tr:hover td{background:#FBF8F1;}
  .badge-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;}
  .loading{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13.5px; padding:10px 0;}
  .spinner{
    width:14px; height:14px; border:2px solid #D9D2BD; border-top-color:var(--terracotta);
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .tabs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; border-bottom:1px solid #E2DBC9;}

  /* ============ Marketing Studio — Yumiko-style scoped theme ============ */
  .mkt-wrap{
    --mkt-green-900:#16331f; --mkt-green-800:#1d4029; --mkt-green-700:#27532f;
    --mkt-gold:#cfa645; --mkt-gold-light:#e8d39a; --mkt-cream:#f7f4ea; --mkt-paper:#fffdf7;
    --mkt-ink:#23291f; --mkt-ink-soft:#5b6555; --mkt-line:#e1ddc8;
    background:var(--mkt-cream); margin:-32px -40px; padding-bottom:24px;
  }
  .mkt-header{
    background:linear-gradient(135deg,var(--mkt-green-900),var(--mkt-green-700));
    color:var(--mkt-cream); padding:20px 24px; display:flex; align-items:center; gap:14px;
    border-bottom:3px solid var(--mkt-gold);
  }
  .mkt-header .mkt-logo{
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 30% 30%,var(--mkt-gold-light),var(--mkt-gold));
    display:flex; align-items:center; justify-content:center; font-size:22px;
    box-shadow:0 0 0 3px rgba(255,255,255,.15); overflow:hidden;
  }
  .mkt-header .mkt-logo img{width:100%; height:100%; object-fit:cover; display:block;}
  .mkt-header h1{margin:0; font-size:19px; font-weight:700; letter-spacing:.3px; color:var(--mkt-cream); font-family:'Noto Serif Lao',serif;}
  .mkt-header p{margin:2px 0 0; font-size:12.5px; color:var(--mkt-gold-light);}
  .mkt-tabs{
    display:flex; flex-wrap:wrap; gap:6px; background:var(--mkt-green-800); padding:10px 20px; border:none; margin:0;
  }
  .mkt-tab-btn{
    background:transparent; border:1px solid transparent; color:#cfe0cd;
    padding:8px 14px; border-radius:999px; font-size:13px; cursor:pointer; white-space:nowrap; transition:.15s;
  }
  .mkt-tab-btn:hover{background:rgba(255,255,255,.08);}
  .mkt-tab-btn.active{background:var(--mkt-gold); color:var(--mkt-green-900); font-weight:700; border-color:var(--mkt-gold);}
  .mkt-body{padding:22px 24px 0;}
  .mkt-change-product-btn{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.35); color:var(--mkt-cream);
    padding:7px 14px; border-radius:999px; font-size:12.5px; cursor:pointer; white-space:nowrap; margin-left:auto; flex-shrink:0;
  }
  .mkt-change-product-btn:hover{background:rgba(255,255,255,.22);}
  .mkt-picker-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; padding-bottom:24px;
  }
  .mkt-picker-card{
    background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:12px; padding:14px;
    cursor:pointer; text-align:center; transition:.15s; box-shadow:0 4px 14px rgba(22,51,31,.06);
  }
  .mkt-picker-card:hover{border-color:var(--mkt-gold); transform:translateY(-2px); box-shadow:0 8px 20px rgba(22,51,31,.14);}
  .mkt-picker-img{
    width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:9px; margin-bottom:10px; background:var(--mkt-cream);
  }
  .mkt-picker-img-placeholder{display:flex; align-items:center; justify-content:center; font-size:30px;}
  .mkt-picker-name{font-weight:700; color:var(--mkt-green-900); font-size:14px; line-height:1.3;}
  .mkt-picker-cat{font-size:12px; color:var(--mkt-ink-soft); margin-top:2px;}
  .mkt-wrap .card{background:var(--mkt-paper); border:1px solid var(--mkt-line); box-shadow:0 6px 22px rgba(22,51,31,.08);}
  .mkt-wrap .card h2, .mkt-wrap .card h3{color:var(--mkt-green-900); font-family:'Noto Serif Lao',serif;}
  .mkt-wrap label{color:var(--mkt-ink-soft);}
  .mkt-wrap input, .mkt-wrap select, .mkt-wrap textarea{border-color:var(--mkt-line); background:var(--mkt-cream);}
  .mkt-wrap input:focus, .mkt-wrap select:focus, .mkt-wrap textarea:focus{border-color:var(--mkt-gold); outline:none;}
  .mkt-wrap .btn{background:var(--mkt-green-700); color:#fff;}
  .mkt-wrap .btn:hover{background:var(--mkt-green-800);}
  .mkt-wrap .btn-outline{background:transparent; border:1px solid var(--mkt-green-700); color:var(--mkt-green-700);}
  .mkt-wrap .pill-terra{background:var(--mkt-gold-light); color:var(--mkt-green-900);}
  .mkt-wrap .pill-sage{background:#E4ECDF; color:var(--mkt-green-800);}
  .mkt-wrap .content-out{background:var(--mkt-cream); border-color:var(--mkt-line);}
  /* ---- ອົງປະກອບໃໝ່ ສຳລັບ tab ທີ່ຕັ້ງຄ່າສະເພາະສິນຄ້າ (product_studio_configs) ---- */
  .mkt-wrap .pbtns{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:6px;}
  .mkt-wrap .pbtn{
    font-family:inherit; font-size:12.5px; font-weight:600; padding:8px 15px; border-radius:24px;
    border:2px solid var(--mkt-line); background:var(--mkt-cream); color:var(--mkt-ink-soft); cursor:pointer; transition:.15s;
  }
  .mkt-wrap .pbtn:hover{border-color:var(--mkt-gold); color:var(--mkt-green-800);}
  .mkt-wrap .pbtn.active{background:var(--mkt-gold); border-color:var(--mkt-gold); color:var(--mkt-green-900);}
  .mkt-wrap .qgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:16px;}
  .mkt-wrap .qc{
    background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:10px; padding:16px 14px;
    cursor:pointer; transition:.15s; box-shadow:0 2px 10px rgba(22,51,31,.05);
  }
  .mkt-wrap .qc:hover{transform:translateY(-2px); box-shadow:0 6px 16px rgba(22,51,31,.12); border-color:var(--mkt-gold);}
  .mkt-wrap .qi{font-size:24px; margin-bottom:6px;}
  .mkt-wrap .qt{font-size:13px; font-weight:700; color:var(--mkt-green-900); margin-bottom:2px;}
  .mkt-wrap .qd{font-size:11.5px; color:var(--mkt-ink-soft); line-height:1.4;}
  .mkt-wrap .cal-grid-wrap{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:16px;}
  .mkt-wrap .cday{background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:10px; padding:12px; min-height:100px;}
  .mkt-wrap .cdl{font-size:10px; font-weight:700; color:var(--mkt-ink-soft); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;}
  .mkt-wrap .cdt{display:inline-block; font-size:10px; background:var(--mkt-gold-light); color:var(--mkt-green-900); padding:2px 8px; border-radius:10px; margin-bottom:6px; font-weight:600;}
  .mkt-wrap .cdi{font-size:11.5px; color:var(--mkt-ink); line-height:1.45;}
  .mkt-wrap .pgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-bottom:20px;}

<script>
/* Robust barcode-library loader: the primary <script> tag above is the fast path.
   If it hasn't finished loading (or failed) by the time we need to draw a barcode,
   ensureBarcodeLib() injects a fallback CDN and waits — so a slow/blocked network
   never results in a silently-blank barcode on a real, physical shipping label. */
window.ensureBarcodeLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.JsBarcode){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.JsBarcode) resolve(); else reject(new Error("loaded but JsBarcode missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    // Poll briefly in case the original head <script> is still mid-flight (most common case).
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.JsBarcode){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){ // ~2s of polling before pulling in the fallback CDN
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};

/* Same robust-loader pattern for ZXing, the pure-JS barcode DECODER used by the camera
   scan-out page. Unlike the native window.BarcodeDetector API (Chrome-only — never
   available on any iPhone browser, since all iOS browsers run on Apple's WebKit),
   ZXing decodes frames itself in JS, so it works identically on iOS Safari, Chrome,
   Android, desktop — anywhere. */
window.ensureZXingLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.ZXing){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.ZXing) resolve(); else reject(new Error("loaded but ZXing missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.ZXing){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};
</script>

/* shipping_labels and package_scans have grown past Supabase's default per-request row cap
   (1000) now that Pancake sync volume is significant — a plain .select("*") silently returns
   only the newest 1000 rows, which meant older labels/scans were invisible to barcode lookups
   and, worse, made the Pancake-vs-Studio origin split on the two scan-out pages unreliable
   (a scan whose label fell outside that window couldn't be identified, so it could show up on
   the wrong page or neither). This loops with .range() until a page comes back short of a
   full page, so every row loads regardless of table size. */
async function fetchAllRows(table, applyOrder){
  let allRows = [];
  let from = 0;
  const pageSize = 1000;
  while(true){
    let q = sb.from(table).select("*");
    q = applyOrder(q).range(from, from+pageSize-1);
    const {data, error} = await q;
    if(error) return {data: allRows, error};
    allRows = allRows.concat(data||[]);
    if(!data || data.length < pageSize) break;
    from += pageSize;
    if(from > 500000) break; // sanity cap against a runaway loop
  }
  return {data: allRows, error: null};
}

/* ---------- System-wide deletion log (audit trail: "what got deleted, when, by whom") ----------

      id:"dl"+Date.now()+Math.random().toString(36).slice(2,7),
      entity_type: entityType, entity_id: String(entityId||""), entity_label: label||"",
      deleted_by: STATE.currentUser ? STATE.currentUser.name : ""
    });
    if(error) console.error("deletion_log insert failed:", error);
  }catch(e){ console.error("deletion_log insert failed:", e); }
}

// Haversine formula — straight-line distance in meters between two lat/lng points.
function distanceMeters(lat1, lng1, lat2, lng2){
  if(lat1==null||lng1==null||lat2==null||lng2==null) return null;
  const R = 6371000;
  const toRad = (v)=> v*Math.PI/180;
  const dLat = toRad(lat2-lat1), dLng = toRad(lng2-lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)**2;
  return R * 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}
// Returns null if we can't tell (missing shop location or missing point), otherwise true/false.
function isOutsideShopRadius(lat, lng){
  const loc = STATE.data.shopLocation;
  if(!loc || loc.lat==null || loc.lng==null || lat==null || lng==null) return null;
  const dist = distanceMeters(loc.lat, loc.lng, lat, lng);
  return dist!=null && dist > (loc.radiusM||150);
}
function outOfRangeBadge(lat, lng){
  const outside = isOutsideShopRadius(lat, lng);
  if(outside===true) return `<span class="pill" style="background:#FBEAEA; color:var(--danger); font-weight:700;" title="ຢູ່ນອກຂອບເຂດຮ້ານ">⚠️ ນອກເຂດ</span>`;
  if(outside===false) return `<span class="pill pill-sage" style="font-size:11px;" title="ຢູ່ໃນຂອບເຂດຮ້ານ">✓ ໃນເຂດ</span>`;
  return "";
}
// Small map thumbnail — click still opens full Google Maps. Renders a single raw satellite
// imagery tile (Esri World Imagery — free, no API key, no usage cap like OSM's raster tiles)
// cropped/positioned with plain CSS, plus a CSS-drawn pin. Esri's tile path order is
// {z}/{y}/{x} (row before column) rather than the {z}/{x}/{y} used by OSM/Google slippy maps.
function mapThumbnail(lat, lng, size){
  if(lat==null||lng==null) return "";
  const s = size||90;
  const zoom = 17;
  const n = Math.pow(2, zoom);
  const latRad = lat * Math.PI/180;
  const xPixel = (lng+180)/360*n*256;
  const yPixel = (1 - Math.log(Math.tan(latRad) + 1/Math.cos(latRad))/Math.PI)/2*n*256;
  const xTile = Math.floor(xPixel/256);
  const yTile = Math.floor(yPixel/256);
  const xOffsetInTile = xPixel - xTile*256;
  const yOffsetInTile = yPixel - yTile*256;
  const tileSrc = `https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/${zoom}/${yTile}/${xTile}`;
  const imgLeft = (s/2 - xOffsetInTile).toFixed(1);
  const imgTop = (s/2 - yOffsetInTile).toFixed(1);
  return `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" title="ກົດເພື່ອເບິ່ງແຜນທີ່ເຕັມ">
    <div style="position:relative; width:${s}px; height:${s}px; overflow:hidden; border-radius:8px; border:1px solid #E0DACB; background:#EDEAE0;">
      <img src="${tileSrc}" width="256" height="256" style="position:absolute; left:${imgLeft}px; top:${imgTop}px;" loading="lazy"/>
      <div style="position:absolute; left:50%; top:50%; width:12px; height:12px; margin:-16px 0 0 -6px; background:#FF3B30; border:2px solid #fff; border-radius:50% 50% 50% 0; transform:rotate(-45deg); box-shadow:0 1px 3px rgba(0,0,0,.45);"></div>
    </div>
  </a>`;
}

/* Studio-created labels get a "T"-prefixed number (T100001, T100002, ...) — shortened from
   the earlier "TOUK" prefix specifically so couriers typing this code by hand into their own
   tracking systems (e.g. Anousith Express staff keying it into the "ຊື່ຜູ້ຮັບ" field) have
   fewer characters to get wrong. Letters are safe to use despite the earlier hardware-scanner
   problem, because that problem turned out to be a simple Caps Lock mismatch (scanner sent
   lowercase against a stored uppercase code), which is fully handled by the case-insensitive
   match in processScanCode — not a Lao-keyboard-layout issue as first suspected. The number
   itself still guarantees no collision with Pancake order ids (always pure digits, e.g.
   61179) regardless of how high either counter climbs. The next number is derived from the
   highest existing T-number already in the table, NOT from the total row count, so importing
   Pancake orders never skews it. Old TOUK-prefixed labels already printed keep working exactly
   as before — this only changes what NEW labels get assigned. */
function nextStudioLabelNumber(){
  let maxNum = 100000;
  STATE.data.shippingLabels.forEach(l=>{
    const m = /^T(\d+)$/i.exec(String(l.labelNumber||""));
    if(m){ const n = parseInt(m[1],10); if(n>maxNum) maxNum = n; }
  });
  return "T" + (maxNum+1);
}

   Conversations + orders load with everything else in loadAllData() (small tables).
   Messages do NOT — a busy shop's message history could grow into the tens of thousands
   of rows, so the full thread is only fetched on demand when Tar opens a specific
   conversation (loadWaThread below), same spirit as the CRM page's on-demand queries. */
async function loadWaThread(conversationId){
  STATE.waMessagesLoading = true; render();
  try{
    const {data, error} = await sb.from("whatsapp_messages").select("*")
      .eq("conversation_id", conversationId)
      .order("created_at", {ascending:true});
    if(error) throw error;
    STATE.waThreadMessages = (data||[]).map(mapWaMessageRow);
    // Mark as read locally + in DB (best-effort — don't block the UI on it)
    const conv = STATE.data.waConversations.find(c=>c.id===conversationId);
    if(conv && conv.unreadCount>0){
      conv.unreadCount = 0;
      sb.from("whatsapp_conversations").update({unread_count:0}).eq("id", conversationId).then(()=>{});
    }
  }catch(e){
    showErrorToast("ໂຫຼດຂໍ້ຄວາມບໍ່ໄດ້: "+e.message);
  }
  STATE.waMessagesLoading = false; render();
}

async function sendWaMessage(){
  const conv = STATE.data.waConversations.find(c=>c.id===STATE.waConversationId);
  const text = (STATE.waMessageInput||"").trim();
  if(!conv || !text || STATE.waSending) return;
  STATE.waSending = true; render();
  try{
    const {data, error} = await sb.functions.invoke("whatsapp-send", {
      body: { to: conv.waId, phoneNumberId: conv.phoneNumberId, message: text, conversationId: conv.id }
    });
    if(error) throw error;
    if(data && data.error) throw new Error(data.error);
    STATE.waMessageInput = "";
    await loadWaThread(conv.id);
    STATE.data = await loadAllData(); // refresh conversation list (last_message_at/preview)
  }catch(e){
    showErrorToast("ສົ່ງຂໍ້ຄວາມບໍ່ໄດ້: "+e.message);
  }
  STATE.waSending = false; render();
}

/* ============================================================
   PERMANENT RULE (do not remove): the screen never auto-refreshes
   on a TIMER and there is NO background polling of Supabase at all.
   Data only refreshes when: (a) someone explicitly clicks
   "ໂຫຼດຂໍ້ມູນໃໝ່" (refreshAll()), or (b) immediately after that same
   user's own action that just wrote to the database (e.g. right after
   AI content generation is saved, or right after a product/pain point
   is added) via silentRefresh() below — this is still 100% action-
   triggered by a real click, never a setInterval/timer. A previous
   background polling mechanism (checking every 15s) was removed
   because it burned through the Supabase free-tier quota and made
   data appear to vanish. Do not add setInterval/polling back without
   explicit confirmation that the Supabase plan can sustain it.
   Any new feature/table added later must be included inside
   loadAllData() only — never in any auto-interval.
   ============================================================ */
async function refreshAll(){
  STATE.refreshing = true;
  render();
  try{
    // 1) Refresh all core data tables.
    const fresh = await loadAllData();
    STATE.data = fresh;

    // 2) Refresh the logged-in user's own approval/role status.
    if(STATE.currentUser){
      try{
        const {data} = await sb.from("users").select("*").eq("id", STATE.currentUser.id).limit(1);
        if(data && data.length>0){
          const u = {id:data[0].id, name:data[0].name, role:data[0].role, approved: !!data[0].approved};
          STATE.currentUser = u;
          saveSession(u);
        }
      }catch(e){}
    }

    // 3) Refresh the owner's user-management list.
    if(STATE.currentUser && isOwner()){
      try{ STATE.usersList = await dbListUsers(); }catch(e){}
    }

    // 4) Refresh the approved-user-names list (report "accused" dropdown).
    if(STATE.currentUser){
      try{ STATE.approvedUserNames = await dbListApprovedUserNames(); }catch(e){}
    }
  }catch(e){}
  STATE.refreshing = false;
  render();
}

/* Quiet version of refreshAll(): re-fetches the data tables in the background
   after the CURRENT user's own action just wrote something (content generated,
   product saved, pain point added, cost/admin/insight/report logged, etc.)
   so the UI is always up to date without anyone needing to press the manual
   reload button. Never shows the full "ກຳລັງໂຫຼດ..." overlay, and is only ever
   called right after a real click — never on a timer. */
async function silentRefresh(onDone){
  try{
    const fresh = await loadAllData();
    STATE.data = fresh;
  }catch(e){ /* ignore — local optimistic state already reflects the change */ }
  if(typeof onDone === "function") onDone(); else render();
}

/* Targeted refresh for the scan-out page only — pulls just shipping_labels + package_scans,
   NOT the full loadAllData() (~17 tables), since this needs to be cheap enough to run every
   single time someone opens this specific page (which happens constantly during a packing
   session), not just on an explicit manual "ໂຫຼດຂໍ້ມູນໃໝ່" click. This is what actually fixes
   "label created yesterday on one device isn't found when scanned today on another" — that
   device's in-memory shipping_labels was stale from whenever it was last loaded, and nothing
   before this refreshed it short of the realtime subscription (which needs Realtime switched
   on for the table in Supabase, and only helps while both devices are already on this page —
   it can't retroactively fetch something that changed while this device was somewhere else). */
async function refreshScanOutData(){
  try{
    const [labelsRes, scansRes] = await Promise.all([
      fetchAllRows("shipping_labels", q=>q),
      fetchAllRows("package_scans", q=>q.order("created_at", {ascending:false}).order("id", {ascending:false}))
    ]);
    if(labelsRes.error) throw labelsRes.error;
    if(scansRes.error) throw scansRes.error;
    STATE.data.shippingLabels = (labelsRes.data||[]).map(r=>({
      id:r.id, labelNumber:r.label_number||"", recipientName:r.recipient_name||"", recipientPhone:r.recipient_phone||"",
      address:r.address||"", itemText:r.item_text||"", qty:r.qty||1, note:r.note||"", codAmount:r.cod_amount||0,
      courierName:r.courier_name||"", freeShipping: !!r.free_shipping,
      format:r.format||"normal", quickText:r.quick_text||"", direction:r.direction||"", customFooter:r.custom_footer||"",
      printCount:r.print_count||0, status: r.status ?? 0,
      createdAt:r.created_at||"", createdBy:r.created_by||""
    }));
    STATE.data.packageScans = (scansRes.data||[]).map(mapPackageScanRow);
    if(STATE.page==="scanOut" || STATE.page==="scanOutPancake") render();
  }catch(err){ console.error("refreshScanOutData failed:", err); }
}

/* ---------- Custom confirm/alert dialog (replaces window.confirm / window.alert) ----------
   Native confirm()/alert() always render top-of-viewport and can't be restyled — this is a
   centered, on-brand replacement. Both are Promise-based since the native calls are
   synchronous but a custom overlay necessarily isn't; call sites become `await customConfirm(...)`
   / `await customAlert(...)` and their enclosing function needs to be async (same as any other
   await in this codebase). Every confirm()/alert() in the app now goes through this. */
function customConfirm(message, opts){
  return new Promise(resolve=>{
    STATE.customDialog = {type:"confirm", message, okLabel:(opts&&opts.okLabel), cancelLabel:(opts&&opts.cancelLabel), danger:(opts&&opts.danger), resolve};
    updateGlobalDialog();
  });
}
function customAlert(message, opts){
  return new Promise(resolve=>{
    STATE.customDialog = {type:"alert", message, okLabel:(opts&&opts.okLabel), danger:(opts&&opts.danger), resolve};
    updateGlobalDialog();
  });
}
function customPrompt(message, defaultValue, opts){
  return new Promise(resolve=>{
    STATE.customDialog = {type:"prompt", message, value:(defaultValue==null?"":String(defaultValue)), okLabel:(opts&&opts.okLabel), cancelLabel:(opts&&opts.cancelLabel), inputType:(opts&&opts.inputType)||"text", resolve};
    updateGlobalDialog();
  });
}
function renderCustomDialogHtml(d){
  return `
    <div class="custom-dialog-overlay no-print" id="custom-dialog-overlay">
      <div class="custom-dialog-box ${d.danger?'custom-dialog-danger':''}">
        <div class="custom-dialog-icon">${d.danger ? "⚠️" : (d.type==="alert" ? "ℹ️" : "❓")}</div>
        <div class="custom-dialog-message">${esc(d.message)}</div>
        ${d.type==="prompt" ? `<input type="${d.inputType==='number'?'text':'text'}" inputmode="${d.inputType==='number'?'decimal':'text'}" id="custom-dialog-input" value="${esc(d.value||'')}" style="margin-bottom:18px; text-align:center; font-size:16px;"/>` : ""}
        <div class="custom-dialog-actions">
          ${(d.type==="confirm" || d.type==="prompt") ? `
            <button class="btn btn-outline" id="custom-dialog-cancel">${esc(d.cancelLabel||"ຍົກເລີກ")}</button>
            <button class="btn ${d.danger?'btn-danger':''}" id="custom-dialog-ok">${esc(d.okLabel||"ຢືນຢັນ")}</button>
          ` : `
            <button class="btn" id="custom-dialog-ok">${esc(d.okLabel||"ຕົກລົງ")}</button>
          `}
        </div>
      </div>
    </div>
  `;
}
function updateGlobalDialog(){
  const el = document.getElementById("global-dialog-container");
  if(!el) return;
  el.innerHTML = STATE.customDialog ? renderCustomDialogHtml(STATE.customDialog) : "";
  if(!STATE.customDialog) return;
  const finish = (result)=>{
    const resolve = STATE.customDialog ? STATE.customDialog.resolve : null;
    STATE.customDialog = null;
    updateGlobalDialog();
    if(resolve) resolve(result);
  };
  const inputEl = document.getElementById("custom-dialog-input");
  if(inputEl){
    inputEl.focus();
    inputEl.select();
    inputEl.addEventListener("keydown", (e)=>{
      if(e.key==="Enter") finish(inputEl.value);
      if(e.key==="Escape") finish(null);
    });
  }
  const okBtn = document.getElementById("custom-dialog-ok");
  if(okBtn) okBtn.addEventListener("click", ()=>finish(inputEl ? inputEl.value : true));
  const cancelBtn = document.getElementById("custom-dialog-cancel");
  if(cancelBtn) cancelBtn.addEventListener("click", ()=>finish(STATE.customDialog.type==="prompt" ? null : false));
  const overlay = document.getElementById("custom-dialog-overlay");
  if(overlay) overlay.addEventListener("click", (e)=>{ if(e.target.id==="custom-dialog-overlay") finish(STATE.customDialog.type==="prompt" ? null : false); });
}

/* Scan-out audio feedback — 3 clearly distinct beep patterns, synthesized with the Web
   Audio API (no external sound files, works identically on desktop and mobile). */
function playScanSound(type){
  try{
    if(!scanAudioCtx) scanAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(scanAudioCtx.state==="suspended") scanAudioCtx.resume();
    const ctx = scanAudioCtx;
    const patterns = {
      success:  [{freq:1400, dur:0.09}],
      duplicate:[{freq:520, dur:0.11},{freq:520, dur:0.11, gap:0.07}],
      notfound: [{freq:280, dur:0.20},{freq:220, dur:0.26, gap:0.06}],
      blocked:  [{freq:200, dur:0.16},{freq:200, dur:0.16, gap:0.05},{freq:200, dur:0.22, gap:0.05}]
    };
    let t = ctx.currentTime;
    (patterns[type]||patterns.success).forEach(p=>{
      if(p.gap) t += p.gap;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = p.freq;
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.exponentialRampToValueAtTime(0.3, t+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t+p.dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+p.dur+0.02);
      t += p.dur;
    });
  }catch(e){ /* audio not available on this device/browser — fail silently */ }
}

/* Generic drag-to-resize for any table with a <colgroup> of <col> elements and a matching
   ".col-resizer" handle span inside each header cell (data-resizer="N" indexing into the
   colgroup) — this is the same mechanism the CRM table pioneered, now reusable everywhere
   instead of copy-pasted per table. Widths are stored by COLUMN KEY (not raw index) in
   whatever state object is passed in, so a table whose visible columns can change (like the
   status tracker's column picker) doesn't scramble its remembered widths when a column is
   toggled off and back on — only the index-to-key mapping (`keys`) needs to match whatever
   order the columns were actually rendered in for this call. */

   only has to learn one pattern. Purely client-side slicing for tables whose data is already
   loaded in STATE.data (unlike CRM's page size, which is a server-side query LIMIT). */
const PAGE_SIZE_OPTIONS = [10,20,30,50,100,200,300,500,1000];
function renderPageSizeSelect(id, current){

    ${PAGE_SIZE_OPTIONS.map(n=>`<option value="${n}" ${Number(current)===n?'selected':''}>${n} ລາຍການ</option>`).join("")}

/* Reusable numbered-page pagination (Pancake-style: "‹ 1 2 3 4 5 ... 487 ›" with the
   current page always visible plus a window of nearby pages, first, and last — instead
   of a bare First/Prev/[jump box]/Next/Last row). To use on a new table: register its
   STATE field name in PAGE_NAV_STATE_KEY under a short prefix, then call
   renderPageNumberNav(currentPage, totalPages, "thatPrefix") wherever the old pagination
   row was. The click handling is bound once globally (see attachPageNumberNavOnce). */
const PAGE_NAV_STATE_KEY = {
  adspendCampaign: {key:"adSpendCampaignPage"},
  crm: {key:"crmPageNumber", reload:"loadCrmResults"},
  labelStatus: {key:"labelStatusPage"},
  labelHistory: {key:"labelHistoryPage"},
  pancake: {key:"pancakePage"},
  scanHistory: {key:"scanHistoryPage", reload:"updateScanOutUI"},
  profitOrders: {key:"profitOrdersPage"}
};
function pageNumbersToShow(current, total){
  let start = Math.max(1, current-2);
  let end = Math.min(total, start+4);
  start = Math.max(1, end-4);
  const nums = new Set([1, total]);
  for(let i=start;i<=end;i++) nums.add(i);
  return [...nums].filter(n=>n>=1 && n<=total).sort((a,b)=>a-b);
}
function renderPageNumberNav(current, total, prefix){
  if(total<=1) return "";
  const nums = pageNumbersToShow(current, total);
  let html = `<div style="display:flex; align-items:center; gap:4px; flex-wrap:wrap; justify-content:center;">`;
  html += `<button class="btn btn-sm btn-outline" data-page-nav="${prefix}" data-page-nav-value="${Math.max(1,current-1)}" ${current<=1?'disabled':''} style="padding:4px 10px;">‹</button>`;
  let prev = null;
  nums.forEach(n=>{
    if(prev!==null && n-prev>1) html += `<span class="small-muted" style="padding:0 4px;">...</span>`;
    const active = n===current;
    html += `<button class="btn btn-sm ${active?'':'btn-outline'}" data-page-nav="${prefix}" data-page-nav-value="${n}" style="padding:4px 10px; min-width:34px; ${active?'font-weight:700;':''}" ${active?'disabled':''}>${n}</button>`;
    prev = n;
  });
  html += `<button class="btn btn-sm btn-outline" data-page-nav="${prefix}" data-page-nav-value="${Math.min(total,current+1)}" ${current>=total?'disabled':''} style="padding:4px 10px;">›</button>`;
  html += `</div>`;
  return html;
}
function attachPageNumberNavOnce(){
  if(window.__pageNavBound) return;
  window.__pageNavBound = true;
  document.addEventListener("click", (e)=>{
    const btn = e.target.closest("[data-page-nav]");
    if(!btn) return;
    const prefix = btn.getAttribute("data-page-nav");
    const val = Number(btn.getAttribute("data-page-nav-value"));
    const cfg = PAGE_NAV_STATE_KEY[prefix];
    if(!cfg) return;
    STATE[cfg.key] = val;
    if(cfg.reload && typeof window[cfg.reload]==="function"){ window[cfg.reload](false); }
    else { render(); }
  });
}
function attachTableColumnResize(tableId, widthsStateObj, keys){
  const table = document.getElementById(tableId);
  if(!table) return;
  const cols = table.querySelectorAll("colgroup col");
  table.querySelectorAll(".col-resizer").forEach(handle=>{
    handle.addEventListener("mousedown", (e)=>{
      e.preventDefault();
      const idx = Number(handle.getAttribute("data-resizer"));
      const col = cols[idx];
      if(!col) return;
      const startX = e.clientX;
      const startWidth = col.offsetWidth;
      handle.classList.add("resizing");
      function onMove(ev){
        const newWidth = Math.max(50, startWidth + (ev.clientX - startX));
        col.style.width = newWidth + "px";
      }
      function onUp(){
        handle.classList.remove("resizing");
        if(keys && keys[idx]) widthsStateObj[keys[idx]] = col.offsetWidth;
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      }
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", onUp);
    });
  });
}

/* Live-typing formatter for the COD input specifically — uses "." as the thousands
   separator per Tar's preference (2.159.000), distinct from fmt()'s comma-based display
   used everywhere else in the app for read-only totals. */
function formatThousands(raw){
  const digits = String(raw||"").replace(/\D/g, "");
  if(!digits) return "";
  return digits.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);

/* Builds the same filter chain for both the results query and the count query, so the two
   never drift out of sync with each other. */
function buildCrmFilterQuery(query){
  const q = (STATE.crmSearchQuery||"").trim();
  if(q) query = query.or(`customer_phone.ilike.%${q}%,customer_name.ilike.%${q}%`);
  const productQ = (STATE.crmFilterProduct||"").trim();
  if(productQ) query = query.ilike("items_text", `%${productQ}%`);
  const courierQ = (STATE.crmFilterCourier||"").trim();
  if(courierQ) query = query.ilike("courier_name", `%${courierQ}%`);
  const sourceQ = (STATE.crmFilterSource||"").trim();
  if(sourceQ) query = query.ilike("source_name", `%${sourceQ}%`);
  const crmRange = resolvePresetDateRange(STATE.crmFilterDateMode||"custom", STATE.crmFilterDateFrom, STATE.crmFilterDateTo);
  if(crmRange.from) query = query.gte("order_date", crmRange.from+"T00:00:00");
  if(crmRange.to) query = query.lte("order_date", crmRange.to+"T23:59:59");
  if(STATE.crmFilterMinAmount) query = query.gte("amount", Number(STATE.crmFilterMinAmount));
  return query;
}

async function loadCrmResults(resetToFirstPage){
  if(resetToFirstPage) STATE.crmPageNumber = 1;
  STATE.crmSearching = true;
  STATE.crmHasSearched = true;
  render();
  try{
    const pageSize = STATE.crmPageSize||50;
    const offset = (STATE.crmPageNumber-1)*pageSize;

    let countQuery = sb.from("crm_purchases").select("id", {count:"exact", head:true});
    countQuery = buildCrmFilterQuery(countQuery);
    const { count: filteredCount, error: countErr } = await countQuery;
    if(countErr) throw countErr;
    STATE.crmFilteredCount = filteredCount||0;

    // If the current page is now past the end (e.g. a filter just shrank the result set),
    // snap back to the last valid page instead of showing an empty page silently.
    const maxPage = Math.max(1, Math.ceil((STATE.crmFilteredCount||0)/pageSize));
    if(STATE.crmPageNumber > maxPage) STATE.crmPageNumber = maxPage;
    const finalOffset = (STATE.crmPageNumber-1)*pageSize;

    let query = sb.from("crm_purchases").select("*").order("order_date", {ascending:false}).range(finalOffset, finalOffset+pageSize-1);
    query = buildCrmFilterQuery(query);
    const { data, error } = await query;
    if(error) throw error;
    STATE.crmSearchResults = data||[];
  }catch(err){
    console.error(err);
    showErrorToast("ຄົ້ນຫາບໍ່ສຳເລັດ: "+err.message);
    STATE.crmSearchResults = [];
    STATE.crmFilteredCount = null;
  }
  STATE.crmSearching = false;
  render();
}

// For every configured product setting, find the most recent purchase per customer phone that
// is now overdue for a follow-up call, skipping ones already marked contacted for that exact
// purchase. Runs targeted queries against crm_purchases rather than pulling the whole table.
async function loadRepurchaseDueList(){
  STATE.repurchaseDueLoading = true; render();
  const settings = STATE.repurchaseSettings.length ? STATE.repurchaseSettings : await (async ()=>{ await loadRepurchaseSettings(); return STATE.repurchaseSettings; })();
  const due = [];
  try{
    for(const s of settings){
      const cutoffDate = new Date(Date.now() - (Number(s.days_after)||0)*24*60*60*1000).toISOString();
      const {data, error} = await sb.from("crm_purchases").select("*").ilike("items_text", `%${s.product_keyword}%`).lte("order_date", cutoffDate).order("order_date", {ascending:false});
      if(error) throw error;
      const latestByPhone = {};
      (data||[]).forEach(r=>{
        const phone = r.customer_phone||"";
        if(!phone) return;
        if(!latestByPhone[phone] || new Date(r.order_date) > new Date(latestByPhone[phone].order_date)) latestByPhone[phone] = r;
      });
      const {data: contactedRows} = await sb.from("repurchase_contacted").select("phone, purchase_date").eq("product_keyword", s.product_keyword);
      const contactedSet = new Set((contactedRows||[]).map(c=>c.phone+"|"+String(c.purchase_date).slice(0,10)));
      Object.values(latestByPhone).forEach(r=>{
        const purchaseDateKey = String(r.order_date).slice(0,10);
        if(contactedSet.has((r.customer_phone||"")+"|"+purchaseDateKey)) return;
        const dueDate = new Date(new Date(r.order_date).getTime() + (Number(s.days_after)||0)*24*60*60*1000);
        due.push({...r, _keyword:s.product_keyword, _daysAfter:s.days_after, _dueDate:dueDate.toISOString(), _overdueDays: Math.floor((Date.now()-dueDate.getTime())/(24*60*60*1000))});
      });
    }
    due.sort((a,b)=> b._overdueDays - a._overdueDays);
    STATE.repurchaseDueList = due;
  }catch(e){
    console.error(e);
    showErrorToast("ໂຫຼດລາຍການແຈ້ງເຕືອນບໍ່ສຳເລັດ: "+e.message);
    STATE.repurchaseDueList = [];
  }
  STATE.repurchaseDueLoading = false;
  STATE.repurchaseDueLoaded = true;
  render();
}

// Splits a [from,to] range into ≤30-day chunks. Needed because a single sync-ad-spend call
// pulling many months of DAILY insights across every campaign/account risks two failure modes:
// (1) the Supabase Edge Function's own wall-clock time limit, and (2) fetchAllPages()'s
// guard<50-pages cap silently truncating results with no error if a single request returns more
// than ~25,000 rows (a real risk over many months × many campaigns). Chunking keeps each call
// small enough to finish reliably and stay well under both limits.
function splitDateRangeIntoChunks(from, to, maxDays){
  const chunks = [];
  let start = new Date(from+"T00:00:00Z");
  const end = new Date(to+"T00:00:00Z");
  while(start<=end){
    const chunkEnd = new Date(start);
    chunkEnd.setUTCDate(chunkEnd.getUTCDate()+maxDays-1);
    const actualEnd = chunkEnd>end ? end : chunkEnd;
    chunks.push({from: start.toISOString().slice(0,10), to: actualEnd.toISOString().slice(0,10)});
    start = new Date(actualEnd);
    start.setUTCDate(start.getUTCDate()+1);
  }
  return chunks;
}

// dateRange: optional {from,to} (YYYY-MM-DD) to sync historical periods older than 30 days —
// the v3 Edge Function silently ignored anything past its hardcoded 30-day lookback, which was
// quietly feeding wrong (zero) ad cost into "ກຳໄລ-ຂາດທຶນ" for any period older than that. If
// omitted, defaults to whatever range is currently selected on the Ad Spend page itself, so the
// button always syncs what's actually on screen instead of a fixed silent window. Ranges longer
// than 30 days are automatically split into ≤30-day chunks (see splitDateRangeIntoChunks) and
// synced one at a time — this is what makes multi-month/37-month historical pulls actually work
// instead of timing out or silently truncating.
async function syncAdSpendAll(dateRange){
  STATE.adSpendSyncing = true; STATE.adSpendSyncMsg = ""; STATE.adSpendSyncErrors = []; render();
  try{
    const range = dateRange || adSpendDateRange();
    const chunks = splitDateRangeIntoChunks(range.from, range.to, 30);
    let totalCampaigns = 0, totalAccounts = 0;
    const allErrors = [];
    for(let i=0;i<chunks.length;i++){
      const chunk = chunks[i];
      if(chunks.length>1){
        STATE.adSpendSyncMsg = `⏳ ກຳລັງດຶງ ${chunk.from} → ${chunk.to} (ທ່ອນ ${i+1}/${chunks.length})...`;
        render();
      }
      const {data, error} = await sb.functions.invoke("sync-ad-spend", { body: chunk });
      if(error) throw error;
      if(data && data.ok===false && (!data.results || data.results.length===0)){
        throw new Error(data.error || "ດຶງຂໍ້ມູນບໍ່ສຳເລັດ");
      }
      const results = (data && data.results) || [];
      totalAccounts = results.length;
      totalCampaigns += results.reduce((s,r)=>s+(r.campaignCount||0),0);
      results.forEach(r=>{
        (r.errors||[]).forEach(msg=> allErrors.push(`[${chunk.from}→${chunk.to}] ${r.account}: ${msg}`));
      });
    }
    STATE.adSpendSyncErrors = allErrors;
    STATE.adSpendSyncMsg = `ດຶງແລ້ວ ${totalAccounts} ບັນຊີ, ${chunks.length>1?`${chunks.length} ທ່ອນວັນທີ່`:`${totalCampaigns} ແຄມເປນ`}${allErrors.length>0?`, ${allErrors.length} ຂໍ້ຜິດພາດ (ເບິ່ງລາຍລະອຽດຂ້າງລຸ່ມ)`:''} — ${new Date().toLocaleTimeString("en-GB",{timeZone:LAOS_TZ})}`;
    showToast(allErrors.length>0 ? "ດຶງຂໍ້ມູນສຳເລັດບາງສ່ວນ" : "ດຶງຂໍ້ມູນສຳເລັດ", allErrors.length>0?"error":"success");
    STATE.data = await loadAllData();
  }catch(e){
    STATE.adSpendSyncMsg = "ດຶງຂໍ້ມູນບໍ່ສຳເລັດ: " + (e.message||e);
    showErrorToast(STATE.adSpendSyncMsg);
  }
  STATE.adSpendSyncing = false; render();
}

async function syncPancakeCrmAll(){
  if(STATE.crmSyncing) return;
  STATE.crmSyncing = true;
  let pageNumber = 1;
  let totalImported = 0;
  let totalEntries = null;
  try{
    while(true){
      STATE.crmSyncStatus = totalEntries
        ? `⏳ ກຳລັງດຶງ... ${totalImported} / ${totalEntries}`
        : `⏳ ກຳລັງດຶງ... ${totalImported} ອໍເດີແລ້ວ`;
      render();
      const res = await fetch(`${SUPABASE_URL}/functions/v1/sync-pancake-crm`, {
        method: "POST",
        headers: {
          "Content-Type":"application/json",
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        },
        body: JSON.stringify({ page_number: pageNumber })
      });
      const data = await res.json();
      if(data.error) throw new Error(data.error);
      totalImported += data.processed_this_call||0;
      totalEntries = data.total_entries;
      if(data.done){
        STATE.crmSyncStatus = data.caught_up
          ? `✅ ດຶງອໍເດີໃໝ່ແລ້ວ (${totalImported} ອໍເດີ) — ໄລ່ທັນຂໍ້ມູນເກົ່າແລ້ວ ບໍ່ຕ້ອງໄລ່ຕໍ່`
          : `✅ ດຶງຄົບແລ້ວ — ທັງໝົດ ${totalEntries} ອໍເດີ`;
        STATE.crmLastSyncedAt = new Date().toISOString();
        break;
      }
      pageNumber = data.next_page_number;
    }
    await loadCrmCount();
    // Keep the "ກຳໄລ-ຂາດທຶນ" dashboard's numbers in sync with whatever this sync just pulled in
    // from Pancake — Tar's request: the two pages' refresh buttons should do the same underlying
    // work, so pressing either one updates both, instead of needing to visit CRM first then
    // separately hit Refresh on the profit page.
    await loadProfitData();
  }catch(err){
    console.error(err);
    STATE.crmSyncStatus = "❌ ດຶງບໍ່ສຳເລັດ: " + (err && err.message ? err.message : "unknown error") + " — ກົດ \"ດຶງຕໍ່\" ເພື່ອສືບຕໍ່ຈາກຈຸດທີ່ຄ້າງ";
  }
  STATE.crmSyncing = false;
  render();
}

function attachPancakeCrmEvents(){
  document.querySelectorAll("[data-crm-view]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.pancakeCrmView = el.getAttribute("data-crm-view");
      if(STATE.pancakeCrmView==="settings" && !STATE.repurchaseSettingsLoaded) loadRepurchaseSettings();
      if(STATE.pancakeCrmView==="reminders" && !STATE.repurchaseSettingsLoaded) loadRepurchaseSettings();
      render();
    });
  });

  const btnLoadDue = document.getElementById("btn-load-repurchase-due");
  if(btnLoadDue) btnLoadDue.addEventListener("click", loadRepurchaseDueList);

  document.querySelectorAll("[data-mark-repurchase-contacted]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const phone = el.getAttribute("data-mark-repurchase-contacted");
      const keyword = el.getAttribute("data-repurchase-keyword");
      const purchaseDate = el.getAttribute("data-repurchase-purchase-date");
      try{
        await dbMarkRepurchaseContacted(phone, keyword, purchaseDate);
        STATE.repurchaseDueList = STATE.repurchaseDueList.filter(r=>!(r.customer_phone===phone && r._keyword===keyword && String(r.order_date).slice(0,10)===purchaseDate));
        render();
      }catch(e){ showErrorToast("ບັນທຶກລົ້ມເຫຼວ: "+e.message); }
    });
  });

  const rpKeywordInput = document.getElementById("rp-new-keyword");
  if(rpKeywordInput) rpKeywordInput.addEventListener("input", ()=>{ STATE.repurchaseNewKeyword = rpKeywordInput.value; });
  const rpDaysInput = document.getElementById("rp-new-days");
  if(rpDaysInput) rpDaysInput.addEventListener("input", ()=>{ STATE.repurchaseNewDays = rpDaysInput.value; });

  document.querySelectorAll("[data-repurchase-source]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.repurchaseNewSource = el.getAttribute("data-repurchase-source");
      STATE.repurchaseNewKeyword = "";
      if(STATE.repurchaseNewSource==="pancake" && !STATE.pancakeProductsLoaded) loadPancakeProducts();
      render();
    });
  });
  const rpProductSelect = document.getElementById("rp-product-select");
  if(rpProductSelect) rpProductSelect.addEventListener("change", ()=>{ STATE.repurchaseNewKeyword = rpProductSelect.value; render(); });
  const btnSyncPancakeProducts = document.getElementById("btn-sync-pancake-products");
  if(btnSyncPancakeProducts) btnSyncPancakeProducts.addEventListener("click", syncPancakeProducts);

  const btnAddRp = document.getElementById("btn-add-repurchase-setting");
  if(btnAddRp) btnAddRp.addEventListener("click", async ()=>{
    const kw = STATE.repurchaseNewKeyword.trim(), days = Number(STATE.repurchaseNewDays);
    if(!kw || !days){ showErrorToast("ກະລຸນາເລືອກສິນຄ້າ ແລະ ໃສ່ຈຳນວນມື້ໃຫ້ຄົບ"); return; }
    try{
      const row = await dbAddRepurchaseSetting(kw, days);
      STATE.repurchaseSettings.push(row);
      STATE.repurchaseNewKeyword = ""; STATE.repurchaseNewDays = "";
      render();
    }catch(e){ showErrorToast("ບັນທຶກລົ້ມເຫຼວ: "+e.message); }
  });
  document.querySelectorAll("[data-del-repurchase-setting]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const id = el.getAttribute("data-del-repurchase-setting");
      if(!(await customConfirm("ລຶບການຕັ້ງຄ່ານີ້?", {okLabel:"🗑️ ລຶບ", danger:true}))) return;
      try{
        await dbDeleteRepurchaseSetting(id);
        STATE.repurchaseSettings = STATE.repurchaseSettings.filter(s=>s.id!==id);
        render();
      }catch(e){ showErrorToast("ລຶບລົ້ມເຫຼວ: "+e.message); }
    });
  });

  const btnSync = document.getElementById("btn-sync-crm-all");
  if(btnSync) btnSync.addEventListener("click", syncPancakeCrmAll);

  const pageSizeEl = document.getElementById("crm-page-size");
  if(pageSizeEl) pageSizeEl.addEventListener("change", ()=>{ STATE.crmPageSize = Number(pageSizeEl.value); loadCrmResults(true); });

  const searchInput = document.getElementById("crm-search-input");
  if(searchInput){
    searchInput.addEventListener("input", ()=>{ STATE.crmSearchQuery = searchInput.value; });
    searchInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadCrmResults(true); });
  }
  const productInput = document.getElementById("crm-filter-product");
  if(productInput){
    productInput.addEventListener("input", ()=>{ STATE.crmFilterProduct = productInput.value; });
    productInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadCrmResults(true); });
  }
  const courierFilterInput = document.getElementById("crm-filter-courier");
  if(courierFilterInput){
    courierFilterInput.addEventListener("input", ()=>{ STATE.crmFilterCourier = courierFilterInput.value; });
    courierFilterInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadCrmResults(true); });
  }
  const sourceFilterInput = document.getElementById("crm-filter-source");
  if(sourceFilterInput){
    sourceFilterInput.addEventListener("input", ()=>{ STATE.crmFilterSource = sourceFilterInput.value; });
    sourceFilterInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadCrmResults(true); });
  }
  attachDatePresetFilter("crm-filter-date", "crmFilterDateMode", "crmFilterDateFrom", "crmFilterDateTo", ()=>loadCrmResults(true));
  const minAmountInput = document.getElementById("crm-filter-min-amount");
  if(minAmountInput){
    minAmountInput.addEventListener("input", ()=>{ STATE.crmFilterMinAmount = minAmountInput.value; });
    minAmountInput.addEventListener("keydown", (e)=>{ if(e.key==="Enter") loadCrmResults(true); });
  }
  const btnSearch = document.getElementById("btn-crm-search");
  if(btnSearch) btnSearch.addEventListener("click", ()=>loadCrmResults(true));

  const btnClear = document.getElementById("btn-crm-clear-filters");
  if(btnClear) btnClear.addEventListener("click", ()=>{
    STATE.crmSearchQuery = ""; STATE.crmFilterProduct = ""; STATE.crmFilterDateMode = "all"; STATE.crmFilterDateFrom = ""; STATE.crmFilterDateTo = ""; STATE.crmFilterMinAmount = "";
    STATE.crmFilterCourier = ""; STATE.crmFilterSource = "";
    loadCrmResults(true);
  });

  attachPageNumberNavOnce(); // handles CRM's numbered pagination — see PAGE_NAV_STATE_KEY

  // Drag-to-resize: dragging a header's handle resizes that <col> in the shared <colgroup>,
  // which (with table-layout:fixed) is what every row's cell in that column actually follows —
  // so the whole column resizes together, not just the header cell being dragged.
  const crmTable = document.getElementById("crm-table");
  if(crmTable){
    const cols = crmTable.querySelectorAll("colgroup col");
    crmTable.querySelectorAll(".col-resizer").forEach(handle=>{
      handle.addEventListener("mousedown", (e)=>{
        e.preventDefault();
        const idx = Number(handle.getAttribute("data-resizer"));
        const col = cols[idx];
        const startX = e.clientX;
        const startWidth = col.offsetWidth;
        handle.classList.add("resizing");
        function onMove(ev){
          const newWidth = Math.max(50, startWidth + (ev.clientX - startX));
          col.style.width = newWidth + "px";
        }
        function onUp(){
          handle.classList.remove("resizing");
          if(!STATE.crmColWidths.length) STATE.crmColWidths = CRM_COL_WIDTHS.slice();
          STATE.crmColWidths[idx] = col.offsetWidth;
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
        }
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });
    });
  }
}

/* ====================== PROFIT / LOSS DASHBOARD ======================
   Two calculation modes, both explained to Tar up front:
   - "daily": includes every order EXCEPT cancelled(6) and returned(5) — a live/provisional
     read on a day's activity, useful for a quick pulse-check, but numbers for the last ~10
     days can still shift (a "packing"/"shipped" order can still end up returned later).
   - "actual": counts ONLY orders that have reached a truly final state — completed(3) counts
     full revenue+cost, returned(5) counts as zero revenue/cost (a confirmed lost sale) so it
     doesn't disappear from the picture, but items still in flight (1,2,8) are excluded
     entirely since their outcome isn't known yet. This is the "real, settled" number, best
     used for anything more than ~10 days in the past.
   Cost per line item is Pancake's own last_imported_price captured AT THE TIME OF SALE (see
   sync-pancake-crm), not recalculated from today's product settings.
   Ad spend is intentionally not wired in yet (pending Meta Ads API access) — profit shown here
   is "profit before ad spend" until that's added. */
function profitDateRange(){
  return resolvePresetDateRange(STATE.profitDateMode, STATE.profitDateFrom, STATE.profitDateTo);
}

async function loadReturnCostMap(){
  try{
    const { data, error } = await sb.from("courier_return_costs").select("order_id, shipping_fee");
    if(error) throw error;
    const map = {};
    (data||[]).forEach(r=>{ map[r.order_id] = (map[r.order_id]||0) + (r.shipping_fee||0); });
    STATE.returnCostMap = map;
  }catch(err){
    console.error(err);
  }
}

// Ad spend total for the given date range, converted to ກີບ (LAK). Reuses STATE.data.adSpendDaily
// (already loaded once at app startup by the main refreshAll()) rather than firing a new Supabase
// query. IMPORTANT: ad account spend from Meta comes back in whatever currency that ad account is
// billed in (confirmed: Tar's accounts are billed in THB, ad_accounts.currency holds it per account)
// — crm_order_items revenue/cost, on the other hand, is always ກີບ (Pancake's own currency). Mixing
// them without converting was the bug reported — so every spend row is converted using its OWN
// account's currency before summing, via campaignId -> ad_campaigns -> ad_accounts -> currency.
// The THB→LAK rate is a manual, editable number (see the input in the dashboard) rather than a
// live-fetched rate, consistent with the rest of the app never calling third-party APIs from the
// client — Tar updates it whenever it drifts noticeably from the real rate.
function adSpendTotalForRange(from, to){
  const rate = Number(STATE.profitExchangeRateThbToLak) || 0;
  const campaignById = {};
  (STATE.data.adCampaigns||[]).forEach(c=>{ campaignById[c.id] = c; });
  const accountById = {};
  (STATE.data.adAccounts||[]).forEach(a=>{ accountById[a.id] = a; });
  return (STATE.data.adSpendDaily||[])
    .filter(r=> r.date>=from && r.date<=to)
    .reduce((sum, r)=>{
      const camp = campaignById[r.campaignId];
      const acc = camp ? accountById[camp.adAccountId] : null;
      const currency = ((acc && acc.currency) || "").toUpperCase();
      const spendLak = currency==="THB" ? (r.spend||0) * rate : (r.spend||0);
      return sum + spendLak;
    }, 0);
}

// Fetches EVERY crm_order_items row matching the date range + status filter, in pages of 1000 —
// Supabase/PostgREST silently caps a single .select() at 1000 rows with no error, which was
// quietly truncating months with more than 1000 line items (confirmed: June 2026 has 6,061
// matching rows, but the old single-shot query only ever saw the first 1000 of them). Same class
// of bug already fixed elsewhere in this app for shipping_labels/package_scans — see fetchAllRows.
async function fetchAllProfitOrderItems(from, to){
  let allRows = [];
  let offset = 0;
  const pageSize = 1000;
  while(true){
    let q = sb.from("crm_order_items").select("*")
      .gte("order_date", from+"T00:00:00")
      .lte("order_date", to+"T23:59:59");
    if(STATE.profitCalcMode==="daily"){
      q = q.not("pancake_status", "in", "(5,6)");
    } else {
      q = q.in("pancake_status", [3,5]);
    }
    q = q.range(offset, offset+pageSize-1);
    const {data, error} = await q;
    if(error) throw error;
    allRows = allRows.concat(data||[]);
    if(!data || data.length < pageSize) break;
    offset += pageSize;
    if(offset > 500000) break; // sanity cap against a runaway loop
  }
  return allRows;
}

/* ====================== RETURNED-PACKAGE SHIPPING COST IMPORT ======================
   Pancake itself has NO data on what the courier actually charges for a returned package
   (confirmed by inspecting a real returned order's JSON — return_fee/shipping_fee/surcharge
   were all 0/false). That cost only exists in the courier's OWN system (e.g. Anousith
   Express's exported returned-package report). This parses that export (an HTML table saved
   with an .xls extension — read as text, not a real spreadsheet binary) entirely in the
   browser and matches each row to a Pancake order two ways:
     1. If the courier's "ຊື່ຜູ້ຮັບ" field was filled in with the Pancake order id (Tar's
        normal convention) and that id exists among status=5 (returned) orders — direct match.
     2. Otherwise, fall back to matching on (customer phone + COD amount) against status=5
        orders. If that matches more than one order, ALL of them get the fee applied (per
        Tar's instruction) rather than being skipped — a customer can legitimately have
        multiple separate returned orders with the same phone/amount coincidence, and it's
        better to slightly over-count a rare coincidence than silently drop real matches.
   Unmatched rows are still imported (so nothing is silently lost) but contribute no
   deduction until Tar reviews the raw list.  */
function parseLaoCourierNumber(text){
  if(!text) return 0;
  const cleaned = String(text).replace(/,/g, "").replace(/[^\d.]/g, "");
  return cleaned ? Number(cleaned) : 0;
}
function parseLaoCourierDate(text){
  // Format seen: "06-07-2026, 12:15" (DD-MM-YYYY, HH:mm)
  const m = /(\d{2})-(\d{2})-(\d{4}),?\s*(\d{2}):(\d{2})/.exec(String(text||""));
  if(!m) return null;
  const [, dd, mm, yyyy, hh, min] = m;
  return `${yyyy}-${mm}-${dd}T${hh}:${min}:00`;
}

async function importReturnedPackagesFile(file){
  STATE.returnImporting = true;
  STATE.returnImportStatus = "⏳ ກຳລັງອ່ານໄຟລ໌...";
  render();
  try{
    const text = await file.text();
    const doc = new DOMParser().parseFromString(text, "text/html");
    const table = doc.querySelector("table");
    if(!table) throw new Error("ບໍ່ພົບຕາຕະລາງໃນໄຟລ໌ — ອາດບໍ່ແມ່ນໄຟລ໌ export ຈາກລະບົບຂົນສົ່ງ");
    const trs = Array.from(table.querySelectorAll("tr"));
    const dataRows = trs
      .map(tr=>Array.from(tr.querySelectorAll("td")).map(td=>td.textContent.trim()))
      .filter(cols=>cols.length>=14 && cols[1] && cols[1]!=="ເລກບິນ" && /^\d+$/.test(cols[1]));

    if(dataRows.length===0) throw new Error("ອ່ານໄດ້ 0 ແຖວ — ກວດຄືນວ່າໄຟລ໌ຖືກຕ້ອງ");

    STATE.returnImportStatus = `⏳ ພົບ ${dataRows.length} ແຖວ, ກຳລັງດຶງລາຍການອໍເດີຕີກັບຈາກ Pancake ເພື່ອຈັບຄູ່...`;
    render();

    // Load every returned(5) Pancake order once, match everything in memory — far cheaper
    // than one DB round-trip per row.
    const { data: returnedOrders, error: roErr } = await sb.from("crm_purchases")
      .select("id, customer_phone, amount")
      .eq("pancake_status", 5);
    if(roErr) throw roErr;
    const byId = new Map(returnedOrders.map(o=>[String(o.id), o]));
    const byPhoneAmount = new Map();
    returnedOrders.forEach(o=>{
      const k = `${o.customer_phone}|${Math.round(o.amount||0)}`;
      if(!byPhoneAmount.has(k)) byPhoneAmount.set(k, []);
      byPhoneAmount.get(k).push(String(o.id));
    });

    let matchedByOrderId = 0, matchedByPhoneCod = 0, unmatched = 0;
    const rowsToUpsert = [];
    dataRows.forEach(cols=>{
      const billNumber = cols[1];
      const rawRecipient = cols[4];
      const phone = cols[5];
      const returnDateStr = cols[8];
      const codStr = cols[10];
      const details = cols[13]||"";
      const feeMatch = /ຄ່າບໍລິການ[:\s]*([\d,]+)/.exec(details);
      const shippingFee = feeMatch ? parseLaoCourierNumber(feeMatch[1]) : 0;
      const codAmount = parseLaoCourierNumber(codStr);
      const returnDate = parseLaoCourierDate(returnDateStr);

      let matchedIds = [];
      let matchMethod = "unmatched";
      if(/^\d+$/.test(rawRecipient) && byId.has(rawRecipient)){
        matchedIds = [rawRecipient];
        matchMethod = "order_id";
      } else {
        const key = `${phone}|${Math.round(codAmount)}`;
        if(byPhoneAmount.has(key)){
          matchedIds = byPhoneAmount.get(key);
          matchMethod = "phone_cod";
        }
      }

      if(matchedIds.length===0){
        unmatched++;
        rowsToUpsert.push({
          id: billNumber+"-unmatched", order_id: null, bill_number: billNumber,
          shipping_fee: shippingFee, return_date: returnDate, match_method: "unmatched"
        });
      } else {
        if(matchMethod==="order_id") matchedByOrderId++; else matchedByPhoneCod += matchedIds.length;
        matchedIds.forEach(oid=>{
          rowsToUpsert.push({
            id: billNumber+"-"+oid, order_id: oid, bill_number: billNumber,
            shipping_fee: shippingFee, return_date: returnDate, match_method: matchMethod
          });
        });
      }
    });

    // Upsert in chunks to stay well under any request-size limits.
    for(let i=0; i<rowsToUpsert.length; i+=200){
      const chunk = rowsToUpsert.slice(i, i+200);
      const { error: upErr } = await sb.from("courier_return_costs").upsert(chunk, {onConflict:"id"});
      if(upErr) throw upErr;
    }

    STATE.returnImportStatus = `✅ ນຳເຂົ້າແລ້ວ ${dataRows.length} ແຖວ — ຈັບຄູ່ດ້ວຍເລກອໍເດີ ${matchedByOrderId}, ຈັບຄູ່ດ້ວຍເບີ+ຍອດ ${matchedByPhoneCod}, ຈັບຄູ່ບໍ່ໄດ້ ${unmatched}`;
    await loadReturnCostMap();
  }catch(err){
    console.error(err);
    STATE.returnImportStatus = "❌ ນຳເຂົ້າບໍ່ສຳເລັດ: "+err.message;
  }
  STATE.returnImporting = false;
  render();
}

function computeProfitSummary(){
  const rows = STATE.profitRows||[];
  const groups = {};
  const key = (r)=>{
    if(STATE.profitGroupBy==="page") return r.page_name||"(ບໍ່ຮູ້ Page)";
    if(STATE.profitGroupBy==="product") return r.product_name||"(ບໍ່ຮູ້ສິນຄ້າ)";
    return "ລວມທັງໝົດ";
  };
  rows.forEach(r=>{
    const k = key(r);
    if(!groups[k]) groups[k] = {label:k, revenue:0, cost:0, qty:0, orderIds:new Set(), returnedOrderIds:new Set()};
    // A returned(5) order in "actual" mode contributes zero revenue/cost — it's a confirmed
    // lost sale, kept in the tally for visibility — but the return shipping fee (if we managed
    // to match this order against an imported Anousith/courier returned-package report) is a
    // real cost that DID happen, so it comes out of profit separately below.
    const isReturned = r.pancake_status===5;
    if(!isReturned){
      groups[k].revenue += (r.unit_price||0) * (r.quantity||0);
      groups[k].cost += (r.unit_cost||0) * (r.quantity||0);
      groups[k].qty += (r.quantity||0);
    } else {
      groups[k].returnedOrderIds.add(r.order_id);
    }
    groups[k].orderIds.add(r.order_id);
  });
  return Object.values(groups).map(g=>{
    let returnShippingCost = 0;
    g.returnedOrderIds.forEach(oid=>{ returnShippingCost += STATE.returnCostMap[oid] || 0; });
    const profit = g.revenue - g.cost - returnShippingCost;
    return {
      label:g.label, revenue:g.revenue, cost:g.cost, returnShippingCost, profit,
      margin: g.revenue>0 ? (profit/g.revenue*100) : 0,
      qty:g.qty, orderCount:g.orderIds.size
    };
  }).sort((a,b)=>b.revenue-a.revenue);
}

// Order-level (per-bill) view — groups the same crm_order_items rows by order_id instead of
// by page/product, so Tar can see exactly how many bills ("ຈັກບິນ") make up the totals above,
// with each bill's own revenue/cost/profit and item list. Sorted newest-first to match the
// CRM table's convention.
function computeProfitOrders(){
  const rows = STATE.profitRows||[];
  const orders = {};
  rows.forEach(r=>{
    const oid = r.order_id;
    if(!orders[oid]) orders[oid] = {
      orderId: oid, orderDate: r.order_date, pancakeStatus: r.pancake_status,
      pageName: r.page_name||"", items: [], revenue: 0, cost: 0
    };
    orders[oid].items.push(`${r.product_name||"ສິນຄ້າ"} x${r.quantity||0}`);
    const isReturned = r.pancake_status===5;
    if(!isReturned){
      orders[oid].revenue += (r.unit_price||0) * (r.quantity||0);
      orders[oid].cost += (r.unit_cost||0) * (r.quantity||0);
    }
    // Keep the earliest-seen order_date/page_name/status for the order (all line items of one
    // order share the same order-level fields anyway — this just guards against nulls on any row).
    if(!orders[oid].orderDate) orders[oid].orderDate = r.order_date;
    if(!orders[oid].pageName) orders[oid].pageName = r.page_name||"";
  });
  return Object.values(orders).map(o=>{
    const returnShippingCost = STATE.returnCostMap[o.orderId] || 0;
    const isReturned = o.pancakeStatus===5;
    const profit = o.revenue - o.cost - (isReturned?returnShippingCost:0);
    return {
      orderId: o.orderId, orderDate: o.orderDate, pancakeStatus: o.pancakeStatus,
      pageName: o.pageName, itemsText: o.items.join(", "), revenue: o.revenue, cost: o.cost,
      returnShippingCost: isReturned?returnShippingCost:0, profit, isReturned
    };
  }).sort((a,b)=> new Date(b.orderDate||0) - new Date(a.orderDate||0));
}
