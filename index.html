<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>аә®а»үаәІаәҷаә•аәёаәҒаә•аәІ аәӘаәөа»„аә„</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Serif+Lao:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1F3D2E;
    --bg-deep-2:#27483A;
    --cream:#FAF6EE;
    --cream-2:#F1EAD9;
    --terracotta:#C9683F;
    --terracotta-dark:#A6502E;
    --sage:#A8C0A0;
    --sage-dark:#5F7D58;
    --ink:#23291F;
    --muted:#6F7268;
    --danger:#B0473B;
    --white:#FFFFFF;
    --radius:10px;
    --shadow:0 2px 10px rgba(31,61,46,0.08);
  }
  *{box-sizing:border-box;}
  html, body{
    max-width:100%;
    overflow-x:hidden;
  }
  body{
    margin:0;
    font-family:'Noto Sans Lao','Noto Sans',sans-serif;
    background:var(--cream-2);
    color:var(--ink);
  }
  h1,h2,h3,.serif{font-family:'Noto Serif Lao','Noto Sans Lao',serif;}
  .app{
    display:grid;
    grid-template-columns:240px 1fr;
    min-height:100vh;
  }
  .main-fade{
    animation: mainFadeIn 220ms ease;
  }
  @keyframes mainFadeIn{
    from{ opacity:0.85; }
    to{ opacity:1; }
  }
  .sidebar{
    background:var(--bg-deep);
    color:var(--cream);
    padding:24px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .brand{
    font-family:'Noto Serif Lao',serif;
    font-size:20px;
    font-weight:700;
    color:var(--cream);
    margin:0 8px 28px 8px;
    line-height:1.3;
  }
  .brand small{
    display:block;
    font-family:'Noto Sans Lao',sans-serif;
    font-size:12px;
    font-weight:400;
    color:var(--sage);
    margin-top:4px;
  }
  .nav-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:none;
    border:none;
    color:var(--cream);
    opacity:0.78;
    text-align:left;
    padding:11px 12px;
    border-radius:8px;
    font-size:14.5px;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s, opacity .15s;
    width:100%;
  }
  .nav-btn:hover{background:var(--bg-deep-2); opacity:1;}
  .nav-btn.active{background:var(--terracotta); opacity:1; font-weight:600;}
  .nav-icon{font-size:17px; width:20px; text-align:center;}
  .nav-badge{display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; margin-left:6px; background:var(--terracotta); color:#fff; border-radius:999px; font-size:10.5px; font-weight:700; vertical-align:middle;}
  .nav-btn.active .nav-badge{background:var(--cream); color:var(--terracotta-dark);}
  .sidebar-foot{
    margin-top:auto;
    padding:12px 8px 0 8px;
    font-size:11.5px;
    color:var(--sage);
    border-top:1px solid rgba(255,255,255,0.12);
    padding-top:14px;
  }
  .main{padding:32px 40px; max-width:1180px;}
  .page-head{margin-bottom:24px;}
  .page-head h1{font-size:24px; margin:0 0 4px 0; color:var(--bg-deep);}
  .page-head p{margin:0; color:var(--muted); font-size:14px;}
  .card{
    background:var(--white);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px 22px;
    margin-bottom:18px;
  }
  .card h3{margin:0 0 14px 0; font-size:16px; color:var(--bg-deep);}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .grid-4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  label{display:block; font-size:13px; color:var(--muted); margin:0 0 5px 0; font-weight:600;}
  input[type=text], input[type=number], textarea, select{
    width:100%;
    padding:9px 11px;
    border:1px solid #DCD6C4;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    background:var(--cream);
    color:var(--ink);
    margin-bottom:14px;
  }
  textarea{resize:vertical; min-height:80px;}
  input:focus, textarea:focus, select:focus{
    outline:none; border-color:var(--terracotta); background:var(--white);
  }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    background:var(--terracotta);
    color:var(--white);
    border:none;
    padding:10px 18px;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--terracotta-dark);}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{background:#C9B9A9; cursor:not-allowed;}
  .btn-outline{background:none; border:1.5px solid var(--bg-deep); color:var(--bg-deep);}
  .btn-outline:hover{background:var(--bg-deep); color:var(--cream);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}
  .btn-danger{background:var(--danger);}
  .btn-danger:hover{background:#8E382E;}
  .pill{display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600;}
  .pill-sage{background:#E4ECDF; color:var(--sage-dark);}
  .pill-terra{background:#F4E1D6; color:var(--terracotta-dark);}
  .pill-gray{background:#EAE7DC; color:var(--muted);}
  .product-card{
    border:1px solid #E9E3D3; border-radius:9px; padding:14px;
    display:flex; flex-direction:column; gap:6px; cursor:pointer; transition:border-color .15s;
  }
  .product-card:hover{border-color:var(--terracotta);}
  .product-card h4{margin:0; font-size:15px; color:var(--bg-deep);}
  .product-card .meta{font-size:12.5px; color:var(--muted);}
  .empty{text-align:center; padding:40px 20px; color:var(--muted);}
  .empty .nav-icon{font-size:32px; display:block; margin-bottom:8px; opacity:.5;}
  .stat{background:var(--cream); border-radius:9px; padding:14px; border:1px solid #EAE3D2;}
  .stat .label{font-size:12px; color:var(--muted); margin-bottom:4px;}
  .stat .value{font-size:21px; font-weight:700; color:var(--bg-deep);}
  .stat .value.danger{color:var(--danger);}
  .stat .value.good{color:var(--sage-dark);}
  .content-out{
    background:var(--cream); border:1px solid #E9E3D3; border-radius:8px;
    padding:14px 16px; white-space:pre-wrap; font-size:14px; line-height:1.65;
    margin-top:10px; max-height:420px; overflow-y:auto;
  }
  .toolbar{display:flex; gap:8px; margin-top:10px;}

  /* ---- Shipping label print preview ---- */
  .label-overlay{position:fixed; inset:0; background:rgba(20,15,10,0.6); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;}
  .label-sheet{background:#fff; color:#111; font-family:'Noto Sans Lao','Noto Sans',sans-serif; overflow-y:auto; max-height:90vh;}
  .label-sheet.size-label{width:100mm;}
  .label-sheet.size-a4{width:210mm;}
  .label-box{border:2px dashed #333; margin:14px;}
  .label-row{border-bottom:1px solid #333; padding:8px 10px;}
  .label-row:last-child{border-bottom:none;}
  .label-cod{font-size:20px; font-weight:800;}
  .label-footer{font-size:10.5px; text-align:center; padding:6px 10px; color:#333;}
  .input-error{border-color:var(--danger) !important;}
  .input-error::placeholder{color:var(--danger); opacity:1;}
  .app-toast{position:fixed; bottom:24px; right:24px; background:#2e7d46; color:#fff; padding:14px 20px; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,.25); z-index:500; font-size:14px; display:flex; align-items:center; gap:10px; animation:toastIn .25s ease-out;}
  .app-toast-error{background:#a33b2b;}
  @keyframes toastIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  .label-preview-scroll{max-height:90vh; overflow-y:auto;}
  @media print{
    body *{visibility:hidden;}
    #print-label-area, #print-label-area *{visibility:visible;}
    #print-label-area{position:absolute; top:0; left:0; width:100%;}
    .label-overlay{position:static; background:none; padding:0;}
    .no-print{display:none !important;}
    /* Fill the physical paper exactly вҖ” the on-screen 340px/500px preview widths above
       are for the screen only; at print time the label must stretch to whatever page
       size is selected in the browser's print dialog, with no extra margin/border. */
    .label-sheet{width:100% !important; max-height:none !important; overflow:visible !important;}
    .label-preview-scroll{max-height:none !important; overflow:visible !important;}
    .label-box{margin:0 !important; border:none !important;}
    @page{ margin:0; }
  }

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; color:var(--muted); font-weight:600; padding:8px 10px; border-bottom:2px solid #EAE3D2;}
  td{padding:9px 10px; border-bottom:1px solid #F0EBDD; vertical-align:top;}
  tr:hover td{background:#FBF8F1;}
  .badge-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;}
  .loading{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13.5px; padding:10px 0;}
  .spinner{
    width:14px; height:14px; border:2px solid #D9D2BD; border-top-color:var(--terracotta);
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .tabs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; border-bottom:1px solid #E2DBC9;}

  /* ============ Marketing Studio вҖ” Yumiko-style scoped theme ============ */
  .mkt-wrap{
    --mkt-green-900:#16331f; --mkt-green-800:#1d4029; --mkt-green-700:#27532f;
    --mkt-gold:#cfa645; --mkt-gold-light:#e8d39a; --mkt-cream:#f7f4ea; --mkt-paper:#fffdf7;
    --mkt-ink:#23291f; --mkt-ink-soft:#5b6555; --mkt-line:#e1ddc8;
    background:var(--mkt-cream); margin:-32px -40px; padding-bottom:24px;
  }
  .mkt-header{
    background:linear-gradient(135deg,var(--mkt-green-900),var(--mkt-green-700));
    color:var(--mkt-cream); padding:20px 24px; display:flex; align-items:center; gap:14px;
    border-bottom:3px solid var(--mkt-gold);
  }
  .mkt-header .mkt-logo{
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 30% 30%,var(--mkt-gold-light),var(--mkt-gold));
    display:flex; align-items:center; justify-content:center; font-size:22px;
    box-shadow:0 0 0 3px rgba(255,255,255,.15);
  }
  .mkt-header h1{margin:0; font-size:19px; font-weight:700; letter-spacing:.3px; color:var(--mkt-cream); font-family:'Noto Serif Lao',serif;}
  .mkt-header p{margin:2px 0 0; font-size:12.5px; color:var(--mkt-gold-light);}
  .mkt-tabs{
    display:flex; flex-wrap:wrap; gap:6px; background:var(--mkt-green-800); padding:10px 20px; border:none; margin:0;
  }
  .mkt-tab-btn{
    background:transparent; border:1px solid transparent; color:#cfe0cd;
    padding:8px 14px; border-radius:999px; font-size:13px; cursor:pointer; white-space:nowrap; transition:.15s;
  }
  .mkt-tab-btn:hover{background:rgba(255,255,255,.08);}
  .mkt-tab-btn.active{background:var(--mkt-gold); color:var(--mkt-green-900); font-weight:700; border-color:var(--mkt-gold);}
  .mkt-body{padding:22px 24px 0;}
  .mkt-change-product-btn{
    background:rgba(255,255,255,.12); border:1px solid rgba(255,255,255,.35); color:var(--mkt-cream);
    padding:7px 14px; border-radius:999px; font-size:12.5px; cursor:pointer; white-space:nowrap; margin-left:auto; flex-shrink:0;
  }
  .mkt-change-product-btn:hover{background:rgba(255,255,255,.22);}
  .mkt-picker-grid{
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:14px; padding-bottom:24px;
  }
  .mkt-picker-card{
    background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:12px; padding:14px;
    cursor:pointer; text-align:center; transition:.15s; box-shadow:0 4px 14px rgba(22,51,31,.06);
  }
  .mkt-picker-card:hover{border-color:var(--mkt-gold); transform:translateY(-2px); box-shadow:0 8px 20px rgba(22,51,31,.14);}
  .mkt-picker-img{
    width:100%; aspect-ratio:1/1; object-fit:cover; border-radius:9px; margin-bottom:10px; background:var(--mkt-cream);
  }
  .mkt-picker-img-placeholder{display:flex; align-items:center; justify-content:center; font-size:30px;}
  .mkt-picker-name{font-weight:700; color:var(--mkt-green-900); font-size:14px; line-height:1.3;}
  .mkt-picker-cat{font-size:12px; color:var(--mkt-ink-soft); margin-top:2px;}
  .mkt-wrap .card{background:var(--mkt-paper); border:1px solid var(--mkt-line); box-shadow:0 6px 22px rgba(22,51,31,.08);}
  .mkt-wrap .card h2, .mkt-wrap .card h3{color:var(--mkt-green-900); font-family:'Noto Serif Lao',serif;}
  .mkt-wrap label{color:var(--mkt-ink-soft);}
  .mkt-wrap input, .mkt-wrap select, .mkt-wrap textarea{border-color:var(--mkt-line); background:var(--mkt-cream);}
  .mkt-wrap input:focus, .mkt-wrap select:focus, .mkt-wrap textarea:focus{border-color:var(--mkt-gold); outline:none;}
  .mkt-wrap .btn{background:var(--mkt-green-700); color:#fff;}
  .mkt-wrap .btn:hover{background:var(--mkt-green-800);}
  .mkt-wrap .btn-outline{background:transparent; border:1px solid var(--mkt-green-700); color:var(--mkt-green-700);}
  .mkt-wrap .pill-terra{background:var(--mkt-gold-light); color:var(--mkt-green-900);}
  .mkt-wrap .pill-sage{background:#E4ECDF; color:var(--mkt-green-800);}
  .mkt-wrap .content-out{background:var(--mkt-cream); border-color:var(--mkt-line);}
  /* ---- аәӯаә»аәҮаәӣаә°аәҒаәӯаәҡа»ға»қа»Ҳ аәӘаәіаәҘаәұаәҡ tab аә—аәөа»Ҳаә•аәұа»үаәҮаә„а»ҲаәІаәӘаә°а»ҖаәһаәІаә°аәӘаәҙаәҷаә„а»үаәІ (product_studio_configs) ---- */
  .mkt-wrap .pbtns{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:6px;}
  .mkt-wrap .pbtn{
    font-family:inherit; font-size:12.5px; font-weight:600; padding:8px 15px; border-radius:24px;
    border:2px solid var(--mkt-line); background:var(--mkt-cream); color:var(--mkt-ink-soft); cursor:pointer; transition:.15s;
  }
  .mkt-wrap .pbtn:hover{border-color:var(--mkt-gold); color:var(--mkt-green-800);}
  .mkt-wrap .pbtn.active{background:var(--mkt-gold); border-color:var(--mkt-gold); color:var(--mkt-green-900);}
  .mkt-wrap .qgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; margin-bottom:16px;}
  .mkt-wrap .qc{
    background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:10px; padding:16px 14px;
    cursor:pointer; transition:.15s; box-shadow:0 2px 10px rgba(22,51,31,.05);
  }
  .mkt-wrap .qc:hover{transform:translateY(-2px); box-shadow:0 6px 16px rgba(22,51,31,.12); border-color:var(--mkt-gold);}
  .mkt-wrap .qi{font-size:24px; margin-bottom:6px;}
  .mkt-wrap .qt{font-size:13px; font-weight:700; color:var(--mkt-green-900); margin-bottom:2px;}
  .mkt-wrap .qd{font-size:11.5px; color:var(--mkt-ink-soft); line-height:1.4;}
  .mkt-wrap .cal-grid-wrap{display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px; margin-bottom:16px;}
  .mkt-wrap .cday{background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:10px; padding:12px; min-height:100px;}
  .mkt-wrap .cdl{font-size:10px; font-weight:700; color:var(--mkt-ink-soft); text-transform:uppercase; letter-spacing:1px; margin-bottom:4px;}
  .mkt-wrap .cdt{display:inline-block; font-size:10px; background:var(--mkt-gold-light); color:var(--mkt-green-900); padding:2px 8px; border-radius:10px; margin-bottom:6px; font-weight:600;}
  .mkt-wrap .cdi{font-size:11.5px; color:var(--mkt-ink); line-height:1.45;}
  .mkt-wrap .pgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(230px,1fr)); gap:12px; margin-bottom:20px;}
  .mkt-wrap .pc{background:var(--mkt-paper); border:1px solid var(--mkt-line); border-left:4px solid var(--mkt-gold); border-radius:10px; padding:14px;}
  .mkt-wrap .pp{font-size:13px; font-weight:700; margin-bottom:6px; color:var(--mkt-green-900);}
  .mkt-wrap .ps{font-size:12px; color:var(--mkt-green-800); padding-left:10px; border-left:2px solid var(--mkt-green-700); line-height:1.5;}
  .mkt-wrap .sc2{background:var(--mkt-paper); border:1px solid var(--mkt-line); border-radius:10px; padding:16px; margin-bottom:12px;}
  .mkt-wrap .sct{font-size:11px; font-weight:700; color:var(--mkt-green-800); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px;}
  .mkt-wrap .sctx{font-size:13px; line-height:1.8; color:var(--mkt-ink); background:var(--mkt-cream); border-radius:8px; padding:12px; white-space:pre-wrap; min-height:44px;}
  @media (max-width: 760px){
    .mkt-wrap{margin:-12px -12px 0;}
    .mkt-header{padding:16px; flex-wrap:wrap;}
    .mkt-change-product-btn{margin-left:0;}
    .mkt-tabs{padding:8px 12px;}
    .mkt-body{padding:16px 16px 0;}
    .mkt-picker-grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px;}
  }

  .tab{padding:9px 16px; cursor:pointer; font-size:14px; color:var(--muted); border-bottom:2px solid transparent; font-weight:600;}
  .tab.active{color:var(--terracotta-dark); border-bottom-color:var(--terracotta);}
  .modal-bg{
    position:fixed; inset:0; background:rgba(31,61,46,0.45);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:var(--white); border-radius:12px; padding:24px; width:100%; max-width:520px;
    max-height:88vh; overflow-y:auto;
  }
  .modal h3{margin-top:0;}
  .close-x{float:right; background:none; border:none; font-size:18px; cursor:pointer; color:var(--muted);}
  .flex-between{display:flex; justify-content:space-between; align-items:center;}
  .small-muted{font-size:12.5px; color:var(--muted);}

  .attendance-big-btn{
    width:100%; justify-content:center;
    font-size:20px; font-weight:700;
    padding:20px 24px; border-radius:14px;
  }
  .attendance-summary-grid{
    display:flex; justify-content:center; gap:28px; flex-wrap:wrap;
  }
  .attendance-summary-item{ min-width:90px; }

  .hamburger-btn{
    display:none;
    position:fixed; top:14px; left:14px; z-index:70;
    width:44px; height:44px; border-radius:10px;
    background:var(--bg-deep); color:var(--cream); border:none;
    font-size:20px; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 3px 12px rgba(0,0,0,0.3);
  }
  .sidebar-overlay{
    display:none;
    position:fixed; inset:0; background:rgba(20,30,24,0.5); z-index:65;
    opacity:0; transition:opacity .2s ease;
  }
  .sidebar-overlay.open{ display:block; opacity:1; }
  .mobile-close-x{
    display:none;
    background:none; border:none; color:var(--cream); font-size:20px;
    cursor:pointer; align-self:flex-end; margin-bottom:10px; opacity:.8;
  }

  @media (max-width: 880px){
    .hamburger-btn{ display:flex; }
    .app{grid-template-columns:1fr; max-width:100vw;}
    .sidebar{
      position:fixed; top:0; left:0; bottom:0; z-index:66;
      width:250px; max-width:82vw; height:100vh;
      flex-direction:column; overflow-y:auto; padding:20px 14px;
      transform:translateX(-104%); transition:transform .24s ease;
      box-shadow:4px 0 20px rgba(0,0,0,0.3);
    }
    .sidebar.open{ transform:translateX(0); }
    .mobile-close-x{ display:flex; }
    .brand{display:block; font-size:17px;}
    .nav-btn{white-space:normal; width:100%; padding:9px 10px; font-size:13.5px;}
    .nav-icon{font-size:15px; width:18px;}
    .sidebar-foot{display:block;}
    .main{padding:12px; padding-top:64px; max-width:100vw;}
    .grid-2, .grid-3, .grid-4{grid-template-columns:1fr;}

    /* Tighter page header + cards so more fits on one screen without pinch-zoom */
    .page-head{margin-bottom:14px;}
    .page-head h1{font-size:19px;}

<script>
/* Robust barcode-library loader: the primary <script> tag above is the fast path.
   If it hasn't finished loading (or failed) by the time we need to draw a barcode,
   ensureBarcodeLib() injects a fallback CDN and waits вҖ” so a slow/blocked network
   never results in a silently-blank barcode on a real, physical shipping label. */
window.ensureBarcodeLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.JsBarcode){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.JsBarcode) resolve(); else reject(new Error("loaded but JsBarcode missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    // Poll briefly in case the original head <script> is still mid-flight (most common case).
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.JsBarcode){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){ // ~2s of polling before pulling in the fallback CDN
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};

/* Same robust-loader pattern for ZXing, the pure-JS barcode DECODER used by the camera
   scan-out page. Unlike the native window.BarcodeDetector API (Chrome-only вҖ” never
   available on any iPhone browser, since all iOS browsers run on Apple's WebKit),
   ZXing decodes frames itself in JS, so it works identically on iOS Safari, Chrome,
   Android, desktop вҖ” anywhere. */
window.ensureZXingLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.ZXing){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.ZXing) resolve(); else reject(new Error("loaded but ZXing missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.ZXing){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};
</script>

/* ============================================================
   PERMANENT RULE (do not remove): the screen never auto-refreshes
   on a TIMER and there is NO background polling of Supabase at all.
   Data only refreshes when: (a) someone explicitly clicks
   "а»Ӯаә«аәјаә”аәӮа»Қа»үаәЎаә№аәҷа»ға»қа»Ҳ" (refreshAll()), or (b) immediately after that same
   user's own action that just wrote to the database (e.g. right after
   AI content generation is saved, or right after a product/pain point
   is added) via silentRefresh() below вҖ” this is still 100% action-
   triggered by a real click, never a setInterval/timer. A previous
   background polling mechanism (checking every 15s) was removed
   because it burned through the Supabase free-tier quota and made
   data appear to vanish. Do not add setInterval/polling back without
   explicit confirmation that the Supabase plan can sustain it.
   Any new feature/table added later must be included inside
   loadAllData() only вҖ” never in any auto-interval.
   ============================================================ */
async function refreshAll(){
  STATE.refreshing = true;
  render();
  try{
    // 1) Refresh all core data tables.
    const fresh = await loadAllData();
    STATE.data = fresh;

    // 2) Refresh the logged-in user's own approval/role status.
    if(STATE.currentUser){
      try{
        const {data} = await sb.from("users").select("*").eq("id", STATE.currentUser.id).limit(1);
        if(data && data.length>0){
          const u = {id:data[0].id, name:data[0].name, role:data[0].role, approved: !!data[0].approved};
          STATE.currentUser = u;
          saveSession(u);
        }
      }catch(e){}
    }

    // 3) Refresh the owner's user-management list.
    if(STATE.currentUser && isOwner()){
      try{ STATE.usersList = await dbListUsers(); }catch(e){}
    }

    // 4) Refresh the approved-user-names list (report "accused" dropdown).
    if(STATE.currentUser){
      try{ STATE.approvedUserNames = await dbListApprovedUserNames(); }catch(e){}
    }
  }catch(e){}
  STATE.refreshing = false;
  render();
}

/* Quiet version of refreshAll(): re-fetches the data tables in the background
   after the CURRENT user's own action just wrote something (content generated,
   product saved, pain point added, cost/admin/insight/report logged, etc.)
   so the UI is always up to date without anyone needing to press the manual
   reload button. Never shows the full "аәҒаәіаәҘаәұаәҮа»Ӯаә«аәјаә”..." overlay, and is only ever
   called right after a real click вҖ” never on a timer. */
async function silentRefresh(onDone){
  try{
    const fresh = await loadAllData();
    STATE.data = fresh;
  }catch(e){ /* ignore вҖ” local optimistic state already reflects the change */ }
  if(typeof onDone === "function") onDone(); else render();
}

/* Scan-out audio feedback вҖ” 3 clearly distinct beep patterns, synthesized with the Web
   Audio API (no external sound files, works identically on desktop and mobile). */
function playScanSound(type){
  try{
    if(!scanAudioCtx) scanAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(scanAudioCtx.state==="suspended") scanAudioCtx.resume();
    const ctx = scanAudioCtx;
    const patterns = {
      success:  [{freq:1400, dur:0.09}],
      duplicate:[{freq:520, dur:0.11},{freq:520, dur:0.11, gap:0.07}],
      notfound: [{freq:280, dur:0.20},{freq:220, dur:0.26, gap:0.06}]
    };
    let t = ctx.currentTime;
    (patterns[type]||patterns.success).forEach(p=>{
      if(p.gap) t += p.gap;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = p.freq;
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.exponentialRampToValueAtTime(0.3, t+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t+p.dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+p.dur+0.02);
      t += p.dur;
    });
  }catch(e){ /* audio not available on this device/browser вҖ” fail silently */ }
}

function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}

}

        ${STATE.connError ? `<div style="color:var(--danger); font-size:13px; max-width:400px; text-align:center;">${esc(STATE.connError)}</div>` : ""}
      </div>
    `;
    attachLoginEvents();
    return;
  }
  if(!STATE.currentUser){
    root.innerHTML = renderLoginPage();
    attachLoginEvents();
    return;
  }
  if(!STATE.currentUser.approved && STATE.currentUser.role!=="owner"){

      <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--bg-deep); padding:20px;">
        <div style="background:var(--white); border-radius:14px; padding:36px 28px; width:100%; max-width:380px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,0.25);">
          <div style="font-size:52px; margin-bottom:14px;">вҸі</div>
          <div style="font-family:'Noto Serif Lao',serif; font-size:19px; font-weight:700; color:var(--bg-deep); margin-bottom:8px;">аәҘа»Қаә–а»үаәІаәҒаәІаәҷаәӯаә°аәҷаәёаәЎаәұаә”</div>
          <div style="font-size:14px; color:var(--muted); margin-bottom:24px;">аәҡаәұаәҷаәҠаәө "${esc(STATE.currentUser.name)}" аәҚаәұаәҮаәҡа»Қа»Ҳа»„аә”а»үаә®аәұаәҡаәҒаәІаәҷаәӯаә°аәҷаәёаәЎаәұаә”аәҲаәІаәҒа»ҖаәҲаә»а»үаәІаәӮаәӯаәҮаә®а»үаәІаәҷ аәҒаә°аәҘаәёаәҷаәІаә•аәҙаә”аә•а»Қа»Ҳа»ҖаәҲаә»а»үаәІаәӮаәӯаәҮаә®а»үаәІаәҷ аә«аәјаә· аәҘа»Қаә–а»үаәІ</div>
          <button class="btn btn-outline" style="width:100%; justify-content:center;" id="btn-pending-logout">аәӯаәӯаәҒаәҲаәІаәҒаәҘаә°аәҡаә»аәҡ</button>
        </div>
      </div>
    `;
    const pendLogout = document.getElementById("btn-pending-logout");
    if(pendLogout) pendLogout.addEventListener("click", ()=>{ STATE.currentUser=null; clearSession(); render(); });
    return;
  }
  // Build the outer shell (sidebar + main container) only once per login session.
  // On every subsequent render, only #main's content is replaced вҖ” this is the
  // key to a flicker-free auto-refresh: the sidebar (logo, nav, user name,
  // logout button) never gets torn down and rebuilt, so only the part of the
  // screen whose data actually changed visibly updates.
  const existingApp = document.querySelector(".app");
  if(!existingApp || existingApp.getAttribute("data-user")!==String(STATE.currentUser?.id||"")){
    root.innerHTML = `
      <button class="hamburger-btn" id="btn-mobile-menu" aria-label="а»Җаәӣаәөаә”а»ҖаәЎаәҷаә№">&#9776;</button>

      <div class="app" data-user="${esc(STATE.currentUser?.id||"")}">
        <div class="sidebar" id="app-sidebar">
          <button class="mobile-close-x" id="btn-close-mobile-menu" aria-label="аәӣаәҙаә”а»ҖаәЎаәҷаә№">&#10005;</button>
          <div class="brand">аә®а»үаәІаәҷаә•аәёаәҒаә•аәІ аәӘаәөа»„аә„<small>аәҘаә°аәҡаә»аәҡаәҒаәІаәҷаә•аә°аә«аәјаәІаә”аәӯаәұаә”аә•аә°а»ӮаәҷаәЎаәұаә”</small></div>
          <button class="btn btn-sm" style="width:100%; justify-content:center; margin-bottom:14px;" id="btn-reload-data">
            <span id="reload-btn-label">рҹ”„ а»Ӯаә«аәјаә”аәӮа»Қа»үаәЎаә№аәҷа»ға»қа»Ҳ</span>
          </button>
          <div id="nav-container"></div>
          <div class="sidebar-foot">
            <div style="margin-bottom:8px;">рҹ‘Ө <span id="sidebar-username">${esc(STATE.currentUser?.name||"")}</span></div>
            <button class="btn btn-sm btn-outline" style="width:100%; justify-content:center; color:var(--cream); border-color:rgba(255,255,255,0.3);" id="btn-logout">аәӯаәӯаәҒаәҲаәІаәҒаәҘаә°аәҡаә»аәҡ</button>
            <div style="margin-top:10px; opacity:.5; font-size:10.5px; text-align:center;">v${APP_VERSION}</div>
          </div>
        </div>
        <div class="main" id="main"></div>
        <div id="global-toast-container"></div>
      </div>
    `;
    attachSidebarEvents();
  }
  const reloadBtn = document.getElementById("btn-reload-data");
  const reloadLabel = document.getElementById("reload-btn-label");
  if(reloadBtn){
    reloadBtn.disabled = !!STATE.refreshing;
  }
  if(reloadLabel){
    reloadLabel.textContent = STATE.refreshing ? "вҸі аәҒаәіаәҘаәұаәҮа»Ӯаә«аәјаә”..." : "рҹ”„ а»Ӯаә«аәјаә”аәӮа»Қа»үаәЎаә№аәҷа»ға»қа»Ҳ";
  }
  updateNavHighlight();
  updateMainContent();
  updateGlobalToast();
}

function updateNavHighlight(){
  const navContainer = document.getElementById("nav-container");
  if(!navContainer) return;
  // Skip rebuilding if nav already reflects the current page (avoids
  // needless DOM churn on every 8-second poll when the page hasn't changed).
  if(navContainer.getAttribute("data-page")===STATE.page && navContainer.getAttribute("data-role")===(STATE.currentUser?.role||"")){
    return;
  }
  navContainer.setAttribute("data-page", STATE.page);
  navContainer.setAttribute("data-role", STATE.currentUser?.role||"");
  navContainer.innerHTML = getNav().map(n => `
    <button class="nav-btn ${STATE.page===n.id?'active':''}" data-nav="${n.id}">
      <span class="nav-icon">${n.icon}</span>${n.label}${n.id==="content" && STATE.data.contentHistory.length>0 ? `<span class="nav-badge">${STATE.data.contentHistory.length}</span>` : ""}
    </button>
  `).join("");
  navContainer.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.page = el.getAttribute("data-nav");
      if(STATE.page==="content") STATE.mktScreen = "picker";
      STATE.output = ""; STATE.error = "";
      closeMobileMenu();
      render();
      if(STATE.page==="users") loadUsersList();
      if(STATE.page==="reports") loadApprovedUserNames();
      if(STATE.page==="loginHistory") loadLoginHistory();
    });
  });
}

async function loadLoginHistory(){
  STATE.loginHistoryList = await dbListLoginHistory().catch(()=>[]);
  render();
}

/* ---------- Mobile hamburger drawer ---------- */
function openMobileMenu(){
  STATE.mobileMenuOpen = true;
  const sidebarEl = document.getElementById("app-sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if(sidebarEl) sidebarEl.classList.add("open");
  if(overlay) overlay.classList.add("open");
}
function closeMobileMenu(){
  STATE.mobileMenuOpen = false;
  const sidebarEl = document.getElementById("app-sidebar");
  const overlay = document.getElementById("sidebar-overlay");
  if(sidebarEl) sidebarEl.classList.remove("open");
  if(overlay) overlay.classList.remove("open");
}

function attachSidebarEvents(){
  const logoutBtn = document.getElementById("btn-logout");
  if(logoutBtn) logoutBtn.addEventListener("click", ()=>{
    STATE.currentUser = null;
    clearSession();
    STATE.page = "dashboard";
    closeMobileMenu();
    render();
  });

  const reloadBtn = document.getElementById("btn-reload-data");
  if(reloadBtn) reloadBtn.addEventListener("click", ()=>{ refreshAll(); });

  const hamBtn = document.getElementById("btn-mobile-menu");
  if(hamBtn) hamBtn.addEventListener("click", ()=>{
    STATE.mobileMenuOpen ? closeMobileMenu() : openMobileMenu();
  });
  const closeXBtn = document.getElementById("btn-close-mobile-menu");
  if(closeXBtn) closeXBtn.addEventListener("click", closeMobileMenu);
  const overlay = document.getElementById("sidebar-overlay");
  if(overlay) overlay.addEventListener("click", closeMobileMenu);
}

function updateMainContent(){
  const main = document.getElementById("main");
  if(!main) return;
  main.classList.remove("main-fade");
  void main.offsetWidth; // force reflow so the animation restarts every time
  main.innerHTML = renderPage();
  main.classList.add("main-fade");
  attachPageEvents();
}

function renderPage(){
  switch(STATE.page){
    case "dashboard": return renderDashboard();
    case "products": return renderProducts();
    case "content": return renderContent();
    case "productChat": return renderProductChat();
    case "costs": return renderCosts();
    case "admin": return renderAdmin();
    case "insights": return renderInsights();
    case "reports": return renderReports();
    case "attendance": return renderAttendance();
    case "labels": return renderLabels();
    case "scanOut": return renderScanOut();
    case "users": return isOwner() ? renderUsers() : renderDashboard();
    case "loginHistory": return isOwner() ? renderLoginHistory() : renderDashboard();
    default: return "";
  }
}

function linesToBullets(text){
  return (text||"").split("\n").map(l=>l.trim()).filter(l=>l.length>0);
}

function renderProductDetailPage(p){
  const d = STATE.data;
  const highlights = linesToBullets(p.highlights);
  const benefits = linesToBullets(p.benefits);
  const pains = d.painPointsLib[p.id] || [];
  const faqs = d.productFaq[p.id] || [];

function renderProductFaqManager(){
  const productId = STATE.editingProduct;
  const list = STATE.data.productFaq[productId] || [];
  return `
    <div style="margin-top:22px; padding-top:18px; border-top:1px solid #E9E3D3;">
      <label style="margin:0 0 8px 0;">рҹ’¬ аә„аәіаә–аәІаәЎ-аә•аәӯаәҡаә”а»Ҳаә§аәҷ (аә„аәіаә–аәІаәЎаә—аәөа»ҲаәҘаә№аәҒаә„а»үаәІаә–аәІаәЎа»ҖаәҘаә·а»үаәӯаәҚа»Ҷ вҖ” а»ғаәҠа»үаәӯа»үаәІаәҮаәӯаәөаәҮа»ғаәҷ AI а»ҒаәҠаәұаә” а»ҒаәҘаә° а»ңа»үаәІаәҘаәІаәҚаәҘаә°аәӯаәҪаә”аәӘаәҙаәҷаә„а»үаәІ)</label>

        <div class="card" style="background:var(--cream-2); padding:10px 14px; margin-bottom:8px;">
          <div class="flex-between" style="align-items:flex-start;">
            <div style="flex:1;">
              <div style="font-weight:700; font-size:13.5px;">вқ“ ${esc(fq.question)}</div>
              <div class="small-muted" style="margin-top:3px;">${esc(fq.answer)}</div>
            </div>
            <button type="button" data-del-faq="${fq.id}" style="border:none; background:none; cursor:pointer; color:var(--terracotta-dark); font-weight:700; padding:0 2px;">&#10005;</button>
          </div>
        </div>
      `).join("")}
      <div class="grid-2" style="margin-top:8px;">
        <div>
          <label style="font-size:12.5px;">аә„аәіаә–аәІаәЎ</label>

        </div>
        <div>
          <label style="font-size:12.5px;">аә„аәіаә•аәӯаәҡа»Ғаәҷаә°аәҷаәі</label>
          <input type="text" id="new-faq-answer" placeholder="аә„аәіаә•аәӯаәҡаә—аәөа»ҲаәҲаә°а»ғаәҠа»үаә•аәӯаәҡ" value="${esc(STATE.newFaqAnswer)}"/>
        </div>
      </div>
      <button class="btn btn-sm btn-outline" id="btn-add-faq" style="margin-top:8px;">+ а»Җаәһаәөа»ҲаәЎаә„аәіаә–аәІаәЎ-аә•аәӯаәҡ</button>
    </div>
  `;
}

    return t >= weekAgoMs;

  const revenue = d.orders.filter(o=>o.status==="аәҲа»ҲаәІаәҚа»ҒаәҘа»үаә§").reduce((s,o)=>s+(Number(o.price)||0), 0);

  return `
    <div class="card">
      <label>рҹ“Ҡ аәһаәІаәҡаәҘаә§аәЎаәҒаәІаәҷаәӮаәІаәҚ</label>

        <div class="stat"><div class="label">аәӘа»үаәІаәҮаәӯаәІаә—аәҙаә”аәҷаәөа»ү</div><div class="value">${weekCount}</div></div>
        <div class="stat"><div class="label">аәӯа»Қа»Җаә”аәөаә—аәұаәҮа»қаә»аә”</div><div class="value">${totalOrders}</div></div>

      </div>
    </div>

      <label>вҡЎ а»ҖаәҘаәөа»ҲаәЎа»„аә§</label>
      <p class="small-muted" style="margin:6px 0 14px;">аәҒаә»аә”а»„аәӣа»Ғаә—аәұаәҡаә—аәөа»Ҳаә•а»үаәӯаәҮаәҒаәІаәҷа»„аә”а»үаә—аәұаәҷаә—аәө</p>
      <div style="display:flex; flex-wrap:wrap; gap:10px;">
        <button class="btn btn-sm btn-outline" data-goto-tab="createPost">вңҚпёҸ аәӘа»үаәІаәҮа»ӮаәһаәӘ</button>

        <button class="btn btn-sm btn-outline" data-goto-tab="pricing">рҹ’° аә„аәіаәҷаә§аәҷаәҒаәіа»„аәҘ</button>
      </div>
    </div>

      <label>рҹ•җ аәҒаәҙаә”аәҲаә°аәҒаәіаәҘа»ҲаәІаәӘаәёаә”</label>

  const f = STATE.orderForm;
  const statuses = ["аәҘа»Қаә–а»үаәІ","аәӘаә»а»ҲаәҮа»ҒаәҘа»үаә§","аәҲа»ҲаәІаәҚа»ҒаәҘа»үаә§","аәҚаә»аәҒа»ҖаәҘаәөаәҒ"];

        <div><label style="font-size:12.5px;">аәҘаәІаәҚаәҘаә°аәӯаәҪаә”аәӘаәҙаәҷаә„а»үаәІ</label><input type="text" id="cs-order-productlabel" placeholder="${product?esc(product.name):'а»ҖаәҠаәұа»Ҳаәҷ: аәӮаә°а»ңаәІаә”/аә®аәёа»Ҳаәҷ'}" value="${esc(f.productLabel)}"/></div>

        <div><label style="font-size:12.5px;">а»қаәІаәҚа»Җаә«аә” (аәҡа»Қа»ҲаәҡаәұаәҮаә„аәұаәҡ)</label><input type="text" id="cs-order-note" placeholder="а»ҖаәҠаәұа»Ҳаәҷ: аәЎаәІаәҲаәІаәҒ TikTok" value="${esc(f.note)}"/></div>

      <div style="display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 14px;">

/* ============ Marketing Studio: рҹ’° аә„аәіаәҷаә§аәҷаәҒаәіа»„аәҘ (pricing calculator) ============ */
function renderPricingTab(d){
  if(d.products.length===0) return `<div class="card"><p class="small-muted">аәҒаә°аәҘаәёаәҷаәІа»Җаәһаәөа»ҲаәЎаәӘаәҙаәҷаә„а»үаәІаәҒа»Ҳаәӯаәҷ а»ғаәҷа»ңа»үаәІ "аәӘаәҙаәҷаә„а»үаәІ"</p></div>`;
  const productId = STATE.selProduct;
  if(STATE.pricingFormProduct !== productId){
    const saved = d.productPricing[productId];
    STATE.pricingForm = saved ? {
      costA:String(saved.costA||""), sellA:String(saved.sellA||""), labelA:saved.labelA||"а»ҒаәһаәұаәҒаәҷа»үаәӯаәҚ",
      costB:String(saved.costB||""), sellB:String(saved.sellB||""), labelB:saved.labelB||"а»ҒаәһаәұаәҒа»ғаә«аәҚа»Ҳ",
      discountPct:String(saved.discountPct||"")
    } : {costA:"", sellA:"", labelA:"а»ҒаәһаәұаәҒаәҷа»үаәӯаәҚ", costB:"", sellB:"", labelB:"а»ҒаәһаәұаәҒа»ғаә«аәҚа»Ҳ", discountPct:""};
    STATE.pricingFormProduct = productId;
    STATE.pricingSaved = false;
  }
  const f = STATE.pricingForm;
  const costA = parseFloat(f.costA)||0, sellA = parseFloat(f.sellA)||0;
  const costB = parseFloat(f.costB)||0, sellB = parseFloat(f.sellB)||0;
  const disc = parseFloat(f.discountPct)||0;
  const profitA = sellA-costA, marginA = sellA ? ((profitA/sellA)*100).toFixed(1) : "0.0";
  const profitB = sellB-costB, marginB = sellB ? ((profitB/sellB)*100).toFixed(1) : "0.0";
  const discPriceA = sellA*(1-disc/100), discProfitA = discPriceA-costA;
  return `
    <div class="card">
      <label>а»ҖаәҘаә·аәӯаәҒаәӘаәҙаәҷаә„а»үаәІ</label>
      <select id="cs-pricing-product">
        ${d.products.map(p=>`<option value="${p.id}" ${STATE.selProduct===p.id?'selected':''}>${esc(p.name)}</option>`).join("")}
      </select>
      <p class="small-muted" style="margin:10px 0 14px;">рҹ’° а»ғаәӘа»Ҳаә•аә»а»үаәҷаә—аә¶аәҷ а»ҒаәҘаә° аәҘаәІаә„аәІаәӮаәІаәҚ а»Җаәһаә·а»Ҳаәӯа»Җаәҡаәҙа»ҲаәҮаәҒаәіа»„аәҘ вҖ” аә•аәұа»үаәҮаәҠаә·а»Ҳа»ҒаәһаәұаәҒа»ҖаәӯаәҮа»„аә”а»ү (а»ҖаәҠаәұа»Ҳаәҷ аәӮаә°а»ңаәІаә”аәҷа»үаәӯаәҚ/а»ғаә«аәҚа»Ҳ)</p>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div>
          <label style="font-size:12.5px;">аәҠаә·а»Ҳа»ҒаәһаәұаәҒ A</label>
          <input type="text" id="cs-pc-labelA" value="${esc(f.labelA)}"/>
          <label style="font-size:12.5px; margin-top:8px;">аә•аә»а»үаәҷаә—аә¶аәҷ / ${esc(f.labelA)}</label>
          <input type="text" id="cs-pc-costA" placeholder="0" value="${esc(f.costA)}"/>
          <label style="font-size:12.5px; margin-top:8px;">аәҘаәІаә„аәІаәӮаәІаәҚ / ${esc(f.labelA)}</label>
          <input type="text" id="cs-pc-sellA" placeholder="0" value="${esc(f.sellA)}"/>
        </div>
        <div>
          <label style="font-size:12.5px;">аәҠаә·а»Ҳа»ҒаәһаәұаәҒ B</label>
          <input type="text" id="cs-pc-labelB" value="${esc(f.labelB)}"/>
          <label style="font-size:12.5px; margin-top:8px;">аә•аә»а»үаәҷаә—аә¶аәҷ / ${esc(f.labelB)}</label>
          <input type="text" id="cs-pc-costB" placeholder="0" value="${esc(f.costB)}"/>
          <label style="font-size:12.5px; margin-top:8px;">аәҘаәІаә„аәІаәӮаәІаәҚ / ${esc(f.labelB)}</label>
          <input type="text" id="cs-pc-sellB" placeholder="0" value="${esc(f.sellB)}"/>
        </div>
      </div>
      <label style="margin-top:10px;">аәӘа»Ҳаә§аәҷаә«аәјаәёаә”а»ӮаәӣаәЈа»ӮаәЎаәҠаәұаәҷ (%)</label>
      <input type="text" id="cs-pc-discount" placeholder="а»ҖаәҠаәұа»Ҳаәҷ 10" value="${esc(f.discountPct)}" style="max-width:160px;"/>
      <button class="btn btn-sm" id="cs-btn-save-pricing" style="margin-top:12px;">рҹ’ҫ аәҡаәұаәҷаә—аә¶аәҒ</button>
      ${STATE.pricingSaved ? `<span class="small-muted" style="margin-left:10px; color:var(--sage-dark);">вң“ аәҡаәұаәҷаә—аә¶аәҒа»ҒаәҘа»үаә§</span>` : ""}

async function generateContent(){
  const d = STATE.data;
  const product = d.products.find(p=>p.id===STATE.selProduct);
  if(!product){ STATE.error = "аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒаәӘаәҙаәҷаә„а»үаәІаәҒа»Ҳаәӯаәҷ"; render(); return; }
  const tab = STATE.contentTab;
  if(tab==="analyzer" && !STATE.analyzerCurrent.trim()){
    STATE.error = "аәҒаә°аәҘаәёаәҷаәІаә§аәІаәҮаә„аәӯаәҷа»Җаә—аәҷаә•а»Ңаә—аәөа»ҲаәҲаә°аә§аәҙа»Җаә„аәІаә°аәҒа»Ҳаәӯаәҷ"; render(); return;
  }
  if(tab==="objection" && !STATE.objectionType){
    STATE.error = "аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒаәӣаә°а»Җаәһаә”аәӮа»Қа»үа»Ӯаә•а»үа»ҒаәҚа»үаәҮаәҒа»Ҳаәӯаәҷ"; render(); return;
  }
  STATE.loading = true; STATE.error = ""; STATE.output = "";
  render();

  let prompt = "";

аәҡаәұаәҷаә«аәІаәҘаә№аәҒаә„а»үаәІ (pain points) аә—аәөа»Ҳаәҡаәұаәҷаә—аә¶аәҒа»„аә§а»ү: ${product.painPoints}${faqBlock}
${knowledge && knowledge.content ? `\nаәӮа»Қа»үаәЎаә№аәҷаә„аә»а»үаәҷаә„аә§а»үаәІаәҲаәІаәҒаәӯаәҙаәҷа»Җаә•аәөа»Җаәҷаәұаә” (аә„аә»а»үаәҷаә„аә§а»үаәІа»„аә§а»үаәҘа»Ҳаә§аәҮа»ңа»үаәІ):\n${knowledge.content}` : ""}`;

  try{
    const answer = await callAI(question, system);
    const aiMsg = {id:"pc"+(Date.now()+1), productId:product.id, role:"ai", message:answer, createdAt:new Date().toISOString()};
    STATE.data.productChat.push(aiMsg);
    dbInsertChatMsg(aiMsg).catch(e=>{ console.error(e); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+e.message); });
  }catch(e){
    STATE.chatError = "а»ҖаәҒаәөаә”аәӮа»Қа»үаәңаәҙаә”аәһаәІаә”: " + e.message;
  }
  STATE.chatSending = false;
  render();
}

function attachProductChatEvents(){
  const sel = document.getElementById("chat-product");
  if(sel) sel.addEventListener("change", ()=>{
    STATE.chatSelProduct = sel.value;
    STATE.chatKnowledgeOpen = false;
    render();
  });
  const toggleKnowledge = document.getElementById("btn-toggle-knowledge");
  if(toggleKnowledge) toggleKnowledge.addEventListener("click", ()=>{
    STATE.chatKnowledgeOpen = !STATE.chatKnowledgeOpen;
    render();
  });
  const input = document.getElementById("chat-input");
  if(input) input.addEventListener("input", ()=>{ STATE.chatQuestion = input.value; });
  const sendBtn = document.getElementById("btn-chat-send");
  if(sendBtn) sendBtn.addEventListener("click", sendProductChat);
  if(input) input.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendProductChat(); }
  });
  const log = document.getElementById("chat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

аәҒаә°аәҘаәёаәҷаәІаә§аәҙа»Җаә„аәІаә°:

    STATE.analysis = result;

  }
  STATE.analyzing = false;
  render();
}

    "аәӘаәҙаәҷаә„а»үаәІаә—аәөа»ҲаәҒа»ҲаәҪаә§аәӮа»үаәӯаәҮ": i.productRelated || "",

  }));
  if(rows.length===0){
    STATE.importMsg = "аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәӮа»Қа»үаәЎаә№аәҷаәҡаәұаәҷаә—аә¶аәҒа»ғаә«а»үаәӘаә»а»ҲаәҮаәӯаәӯаәҒ";
    render();
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:14},{wch:40},{wch:40},{wch:20},{wch:12},{wch:14}];

  XLSX.writeFile(wb, `customer-insights-${stamp}.xlsx`);
}

function importInsightsFromExcel(file){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const wb = XLSX.read(e.target.result, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
      const newItems = [];
      rows.forEach((r, idx) => {
        const question = r["аә„аәіаә–аәІаәЎ"] || r["question"] || r["Question"] || "";
        const answer = r["аә„аәіаә•аәӯаәҡ"] || r["answer"] || r["Answer"] || "";
        const productRelated = r["аәӘаәҙаәҷаә„а»үаәІаә—аәөа»ҲаәҒа»ҲаәҪаә§аәӮа»үаәӯаәҮ"] || r["product"] || r["Product"] || "";
        const date = r["аә§аәұаәҷаә—аәө"] || r["date"] || r["Date"] || new Date().toLocaleDateString("lo-LA", {timeZone: LAOS_TZ});
        if(String(question).trim()){
          newItems.push({
            id:"i"+Date.now()+"-"+idx,
            question:String(question), answer:String(answer),
            productRelated:String(productRelated), date:String(date)
          });
        }
      });
      if(newItems.length>0){
        STATE.data.insights.unshift(...newItems);
        await dbInsertInsightsBulk(newItems);
      }
      STATE.importMsg = newItems.length>0
        ? `аәҷаәіа»ҖаәӮаә»а»үаәІаәӘаәіа»ҖаәҘаәұаә”: а»Җаәһаәөа»ҲаәЎ ${newItems.length} аәҘаәІаәҚаәҒаәІаәҷа»ға»қа»Ҳ`
        : "аәҡа»Қа»Ҳаәһаә»аәҡа»Ғаә–аә§аә—аәөа»ҲаәЎаәөаә„аәіаә–аәІаәЎа»ғаәҷа»„аәҹаәҘа»Ң вҖ” аәҒаә°аәҘаәёаәҷаәІаәҒаә§аә”аә«аә»аә§аә„а»ҚаәҘаәІаәЎа»Ңа»ғаә«а»үаәҒаә»аәҮаәҒаәұаәҡ 'аә„аәіаә–аәІаәЎ', 'аә„аәіаә•аәӯаәҡ', 'аәӘаәҙаәҷаә„а»үаәІаә—аәөа»ҲаәҒа»ҲаәҪаә§аәӮа»үаәӯаәҮ', 'аә§аәұаәҷаә—аәө'";
    }catch(err){
      STATE.importMsg = "аәӯа»ҲаәІаәҷа»„аәҹаәҘа»Ңаәҡа»Қа»ҲаәӘаәіа»ҖаәҘаәұаә”: " + err.message;
    }
    render();
  };
  reader.readAsArrayBuffer(file);
}

function exportReportsToExcel(){
  const d = STATE.data;
  const rows = d.reports.map(r => ({
    "аәңаә№а»үаәҘаәІаәҚаәҮаәІаәҷ": r.adminName || "",
    "аә„аә»аәҷа»Җаә®аәұаә”аәңаәҙаә”": r.accusedName || "",
    "а»қаә§аә”а»қаә№а»Ҳ": r.category || "",
    "аәҘаәІаәҚаәҘаә°аәӯаәҪаә”": r.detail || "",
    "аә§аәұаәҷ-а»Җаә§аәҘаәІ": r.createdAt ? new Date(r.createdAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ}) : "",
    "аәЎаәөаә®аә№аәҡа»Ғаәҷаәҡ": r.imageUrl ? "аәЎаәө" : "аәҡа»Қа»ҲаәЎаәө",
    "аәӯа»ҲаәІаәҷа»ҒаәҘа»үаә§": r.readByOwner ? "аәӯа»ҲаәІаәҷа»ҒаәҘа»үаә§" : "аәҚаәұаәҮаәҡа»Қа»Ҳаәӯа»ҲаәІаәҷ"
  }));
  if(rows.length===0){ return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:16},{wch:22},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "аәҘаәІаәҚаәҮаәІаәҷаәӮа»Қа»үаәңаәҙаә”аәһаәІаә”");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `error-reports-${stamp}.xlsx`);
}

function attachReportEvents(){
  const exportRepBtn = document.getElementById("btn-export-reports-excel");
  if(exportRepBtn) exportRepBtn.addEventListener("click", exportReportsToExcel);
  document.querySelectorAll("[data-report-view]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.reportViewMode = el.getAttribute("data-report-view");
      render();
    });
  });

  const filterAccEl = document.getElementById("rep-filter-accused");
  if(filterAccEl) filterAccEl.addEventListener("change", ()=>{
    STATE.reportFilterAccused = filterAccEl.value;
    render();
  });

  const catEl = document.getElementById("rep-category");
  const accEl = document.getElementById("rep-accused");
  const detEl = document.getElementById("rep-detail");
  const imgEl = document.getElementById("rep-image-input");

  if(catEl) catEl.addEventListener("change", ()=>{ STATE.reportForm.category = catEl.value; });
  if(accEl) accEl.addEventListener("change", ()=>{ STATE.reportForm.accusedName = accEl.value; });
  if(detEl) detEl.addEventListener("input", ()=>{ STATE.reportForm.detail = detEl.value; });
  if(imgEl) imgEl.addEventListener("change", ()=>{
    const file = imgEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{ STATE.reportForm.imageBase64 = e.target.result; render(); };
    reader.readAsDataURL(file);
  });
  const imgRemoveBtn = document.getElementById("rep-image-remove");
  if(imgRemoveBtn) imgRemoveBtn.addEventListener("click", ()=>{
    STATE.reportForm.imageBase64 = "";
    if(imgEl) imgEl.value = "";
    render();
  });

  const submitBtn = document.getElementById("btn-submit-report");
  if(submitBtn) submitBtn.addEventListener("click", async ()=>{
    const f = STATE.reportForm;
    if(!f.category){ alert("аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒа»қаә§аә”а»қаә№а»ҲаәӮа»Қа»үаәңаәҙаә”аәһаәІаә”"); return; }
    const newReport = {
      id:"rep"+Date.now(),
      adminName: STATE.currentUser?.name || "",
      category: f.category,
      accusedName: f.accusedName || "",
      detail: f.detail,
      imageUrl: f.imageBase64 || "",
      createdAt: new Date().toISOString(),
      readByOwner: false
    };
    STATE.data.reports.unshift(newReport);
    STATE.reportForm = {category:"", detail:"", imageBase64:"", accusedName:""};
    render();
    dbInsertReport(newReport).catch(err=>{ console.error(err); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+err.message); });
  });

  document.querySelectorAll("[data-del-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-report");
      STATE.data.reports = STATE.data.reports.filter(r=>r.id!==id);
      render();
      dbDeleteReport(id).catch(err=>{ console.error(err); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+err.message); });
    });
  });

  document.querySelectorAll("[data-view-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-view-report");
      const r = STATE.data.reports.find(x=>x.id===id);
      if(!r) return;
      STATE.viewingReport = r;
      render();
      if(isOwner() && !r.readByOwner){
        r.readByOwner = true;
        dbMarkReportRead(id).catch(err=>{ console.error(err); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+err.message); });
      }
    });
  });
  const repModalBg = document.getElementById("report-modal-bg");
  if(repModalBg) repModalBg.addEventListener("click", (e)=>{
    if(e.target.id==="report-modal-bg"){ STATE.viewingReport=null; render(); }
  });
  const closeRepModal = document.getElementById("close-report-modal");
  if(closeRepModal) closeRepModal.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
  const closeRepModalBtn = document.getElementById("close-report-modal-btn");
  if(closeRepModalBtn) closeRepModalBtn.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
}

/* ---------- ATTENDANCE ---------- */
function fmtTime(ts){
  if(!ts) return "-";
  return new Date(ts).toLocaleTimeString("lo-LA", {hour:"2-digit", minute:"2-digit", second:"2-digit", timeZone: LAOS_TZ});
}
function fmtDuration(inTs, outTs){
  if(!inTs || !outTs) return "-";
  const ms = new Date(outTs) - new Date(inTs);
  if(ms<=0) return "-";
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${h} аәҠаәЎ ${m} аәҷаә— ${s} аә§`;
}
function todayStr(){ return new Date().toLocaleDateString("lo-LA", {timeZone: LAOS_TZ}); }

const TESTING_MODE = true;

  const d = STATE.data;
  const settings = d.labelSettings;
  return `
    <div class="page-head">
      <h1>рҹҸ·пёҸ аәһаәҙаәЎа»ғаәҡаәҡаәҙаәҷ</h1>

    </div>
    <div class="tabs">
      <div class="tab ${STATE.labelView==="create"?'active':''}" data-label-view="create">вһ• аәӘа»үаәІаәҮа»ғаәҡаәҡаәҙаәҷ</div>
      <div class="tab ${STATE.labelView==="history"?'active':''}" data-label-view="history">рҹ•җ аәӣаә°аә«аә§аәұаә” (${d.shippingLabels.length})</div>
      <div class="tab ${STATE.labelView==="template"?'active':''}" data-label-view="template">рҹҺЁ аәӯаәӯаәҒа»Ғаәҡаәҡа»ғаәҡаәҡаәҙаәҷ</div>
      <div class="tab ${STATE.labelView==="settings"?'active':''}" data-label-view="settings">вҡҷпёҸ аә•аәұа»үаәҮаә„а»ҲаәІа»ғаәҡаәҡаәҙаәҷ</div>
    </div>

    ${!settings && STATE.labelView!=="settings" ? `
      <div class="card empty">
        <span class="nav-icon">&#9881;</span>
        аәҚаәұаәҮаәҡа»Қа»Ҳа»„аә”а»үаә•аәұа»үаәҮаә„а»ҲаәІаәӮа»Қа»үаәЎаә№аәҷаә®а»үаәІаәҷаәӘаәіаәҘаәұаәҡа»ғаәҡаәҡаәҙаәҷ (аәҠаә·а»Ҳаә®а»үаәІаәҷ/а»Җаәҡаәөа»Ӯаә—/аәӮа»Қа»үаә„аә§аәІаәЎаә—а»үаәІаәҚаәҡаәҙаәҷ) вҖ” аәҒаә»аә” "вҡҷпёҸ аә•аәұа»үаәҮаә„а»ҲаәІа»ғаәҡаәҡаәҙаәҷ" а»Җаәһаә·а»Ҳаәӯаә•аәұа»үаәҮаәҒа»Ҳаәӯаәҷ
      </div>
    ` : ""}

    ${STATE.labelView==="create" && settings ? renderLabelCreateForm(d) : ""}
    ${STATE.labelView==="history" ? renderLabelHistory(d) : ""}
    ${STATE.labelView==="template" ? renderLabelTemplateEditor() : ""}
    ${STATE.labelView==="settings" ? renderLabelSettingsForm() : ""}

    ${STATE.printingLabels.length>0 ? renderLabelPrintPreview(STATE.printingLabels, settings) : ""}
  `;
}

function renderLabelCreateForm(d){
  const f = STATE.labelForm;
  const errs = STATE.labelFormErrors || {};
  const selectedProduct = d.products.find(p=>p.id===f.productId);
  const errCls = (key)=> errs[key] ? "input-error" : "";
  const errPh = (key, fallback)=> errs[key] ? "аәҒаә°аәҘаәёаәҷаәІа»Җаәһаәөа»ҲаәЎаәӮа»Қа»үаәЎаә№аәҷ" : (fallback||"");
  return `
    <div class="card">
      ${STATE.editingLabelId ? `<div class="small-muted" style="margin-bottom:10px; color:var(--terracotta-dark); font-weight:600;">вңҸпёҸ аәҒаәіаәҘаәұаәҮа»ҒаәҒа»үа»„аәӮа»ғаәҡаәҡаәҙаәҷ #${esc((d.shippingLabels.find(l=>l.id===STATE.editingLabelId)||{}).labelNumber||"")}</div>` : ""}
      <label>аәҘаәІаәҚаәҒаәІаәҷаәӘаәҙаәҷаә„а»үаәІ</label>
      <select id="lf-product">
        <option value="">вңҸпёҸ аәһаәҙаәЎа»ҖаәӯаәҮ</option>
        ${d.products.map(p=>`<option value="${p.id}" ${f.productId===p.id?'selected':''}>${esc(p.name)}${p.price?` (${fmt(p.price)} аәҒаәөаәҡ)`:""}</option>`).join("")}
      </select>
      ${!f.productId ? `
        <label>аәҠаә·а»ҲаәӘаәҙаәҷаә„а»үаәІ (аәһаәҙаәЎа»ҖаәӯаәҮ) вҖ” аәһаәҙаәЎа»„аә”а»үаә«аәјаәІаәҚаәҘаәІаәҚаәҒаәІаәҷ/аә«аәјаәІаәҚа»Ғаә–аә§</label>
        <textarea id="lf-custom-item" class="${errCls('item')}" placeholder="${errPh('item','а»ҖаәҠаәұа»Ҳаәҷ:\nаәҒаәІа»ҖаәҹаәңаәұаәҒ 60 аәҠаәӯаәҮ\nаәҠаәІа»ғаәҡаә«аәЎа»Ҳаәӯаәҷ 1 аә–аә»аәҮ')}" rows="3">${esc(f.customItemText)}</textarea>
      ` : ""}

      <div class="grid-2">
        <div>
          <label>аәҠаә·а»Ҳаәңаә№а»үаә®аәұаәҡ</label>
          <input type="text" id="lf-recipient-name" class="${errCls('recipientName')}" placeholder="${errPh('recipientName')}" value="${esc(f.recipientName)}"/>
        </div>
        <div>
          <label>а»Җаәҡаәөа»Ӯаә—аәңаә№а»үаә®аәұаәҡ</label>
          <input type="text" id="lf-recipient-phone" class="${errCls('recipientPhone')}" placeholder="${errPh('recipientPhone')}" value="${esc(f.recipientPhone)}"/>
        </div>
      </div>
      <label>аә—аәөа»Ҳаәўаә№а»ҲаәҲаәұаә”аәӘаә»а»ҲаәҮ</label>
      <textarea id="lf-address" class="${errCls('address')}" placeholder="${errPh('address','аәҡа»үаәІаәҷ, а»ҖаәЎаә·аәӯаәҮ, а»ҒаәӮаә§аәҮ')}">${esc(f.address)}</textarea>
      <label>аәҚаәӯаә”а»ҖаәҒаәұаәҡа»ҖаәҮаәҙаәҷ (COD) вҖ” аәҒаәөаәҡ</label>
      <input type="number" id="lf-cod" class="${errCls('codAmount')}" placeholder="${errPh('codAmount')}" value="${esc(f.codAmount)}"/>
      ${selectedProduct && selectedProduct.price ? `<p class="small-muted">аәҘаәІаә„аәІаәӘаәҙаәҷаә„а»үаәІаәҷаәөа»ү: ${fmt(selectedProduct.price)} аәҒаәөаәҡ/а»ңа»Ҳаә§аәҚ вҖ” а»ҒаәҒа»үаәҚаәӯаә” COD а»„аә”а»үаә•аәІаәЎаә•а»үаәӯаәҮаәҒаәІаәҷ</p>` : ""}

      <label>аәҡа»ҚаәҘаәҙаәӘаәұаә”аәӮаә»аәҷаәӘаә»а»ҲаәҮ</label>
      <select id="lf-courier" class="${errCls('courierId')}">
        <option value="">${errs.courierId ? 'вҡ пёҸ аәҒаә°аәҘаәёаәҷаәІа»ҖаәҘаә·аәӯаәҒ' : '-- а»ҖаәҘаә·аәӯаәҒ --'}</option>
        ${d.couriers.map(c=>`<option value="${c.id}" ${f.courierId===c.id?'selected':''}>${esc(c.name)}</option>`).join("")}
      </select>
      ${d.couriers.length===0 ? `<p class="small-muted">аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөаәҘаәІаәҚаәҠаә·а»ҲаәӮаә»аәҷаәӘаә»а»ҲаәҮ вҖ” а»„аәӣа»Җаәһаәөа»ҲаәЎа»„аә”а»үаә—аәөа»Ҳ tab "вҡҷпёҸ аә•аәұа»үаәҮаә„а»ҲаәІа»ғаәҡаәҡаәҙаәҷ"</p>` : ""}

      <label style="margin-top:14px;">аә„а»ҲаәІаәӮаә»аәҷаәӘаә»а»ҲаәҮ</label>
      <div style="display:flex; gap:8px;">
        <button type="button" class="btn btn-sm ${f.freeShipping?'':'btn-outline'}" data-set-shipping="free" style="flex:1;">рҹҡҡ аәқаәІаәҒаәҹаәЈаәө</button>
        <button type="button" class="btn btn-sm ${!f.freeShipping?'':'btn-outline'}" data-set-shipping="collect" style="flex:1;">рҹ’° а»ҖаәҒаәұаәҡаәӣаәІаәҚаә—аәІаәҮ</button>
      </div>

      <div style="display:flex; gap:8px; margin-top:16px;">
        <button class="btn" id="btn-create-label" style="flex:1; justify-content:center;">${STATE.editingLabelId?'рҹ’ҫ аәҡаәұаәҷаә—аә¶аәҒаәҒаәІаәҷа»ҒаәҒа»үа»„аәӮ':'рҹ’ҫ аәҡаәұаәҷаә—аә¶аәҒа»ғаәҡаәҡаәҙаәҷ'}</button>
        ${STATE.editingLabelId ? `<button class="btn btn-outline" id="btn-cancel-edit-label" style="justify-content:center;">вң–пёҸ аәҚаә»аәҒа»ҖаәҘаәөаәҒ</button>` : ""}
      </div>
    </div>
  `;
}

function renderLabelHistory(d){
  const q = (STATE.labelSearchQuery||"").toLowerCase();
  const fc = STATE.labelFilterCourier||"";
  const fd = STATE.labelFilterDate||"";
  const list = d.shippingLabels.filter(l=>{
    if(q && !(l.recipientName.toLowerCase().includes(q) || l.recipientPhone.includes(q) || String(l.labelNumber).includes(q))) return false;
    if(fc && l.courierName!==fc) return false;
    if(fd && new Date(l.createdAt).toLocaleDateString("en-CA", {timeZone: LAOS_TZ})!==fd) return false;
    return true;
  });
  const courierNames = [...new Set(d.couriers.map(c=>c.name))];
  const selectedCount = STATE.selectedLabelIds.length;
  const allVisibleSelected = list.length>0 && list.every(l=>STATE.selectedLabelIds.includes(l.id));
  return `
    <div class="card">
      <input type="text" id="label-search" placeholder="аә„аә»а»үаәҷаә«аәІаә•аәІаәЎаәҠаә·а»Ҳаәңаә№а»үаә®аәұаәҡ, а»Җаәҡаәөа»Ӯаә—, аә«аәјаә·а»ҖаәҘаәҒаә—аәөа»Ҳа»ғаәҡаәҡаәҙаәҷ..." value="${esc(STATE.labelSearchQuery)}"/>
      <div class="grid-2" style="margin-top:10px;">
        <div>
          <label style="font-size:12px;">рҹҡҡ аәҒаәӯаәҮаә•аәІаәЎаәӮаә»аәҷаәӘаә»а»ҲаәҮ</label>
          <select id="label-filter-courier">
            <option value="">-- аә—аәёаәҒаәӮаә»аәҷаәӘаә»а»ҲаәҮ --</option>
            ${courierNames.map(n=>`<option value="${esc(n)}" ${fc===n?'selected':''}>${esc(n)}</option>`).join("")}
          </select>
        </div>
        <div>
          <label style="font-size:12px;">рҹ“… аәҒаәӯаәҮаә•аәІаәЎаә§аәұаәҷаә—аәөа»Ҳ</label>
          <input type="date" id="label-filter-date" value="${esc(fd)}"/>
        </div>
      </div>
      ${(fc||fd) ? `<button class="btn btn-sm btn-outline" id="btn-clear-label-filters" style="margin-top:8px;">вң–пёҸ аәҘа»үаәІаәҮаәҒаәІаәҷаәҒаәӯаәҮ</button>` : ""}
    </div>
    ${selectedCount>0 ? `
      <div class="card" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
        <span>а»ҖаәҘаә·аәӯаәҒа»„аә§а»ү ${selectedCount} а»ғаәҡ</span>
        <div style="display:flex; gap:8px;">
          <button class="btn btn-sm" id="btn-bulk-print-labels">рҹ–ЁпёҸ аәһаәҙаәЎаә—аәөа»Ҳа»ҖаәҘаә·аәӯаәҒ (${selectedCount})</button>
          <button class="btn btn-sm btn-outline" id="btn-clear-label-selection">вң–пёҸ аәҚаә»аәҒа»ҖаәҘаәөаәҒ</button>
        </div>
      </div>
    ` : ""}
    ${list.length===0 ? `<div class="card empty"><span class="nav-icon">&#127991;</span>аәҚаәұаәҮаәҡа»Қа»ҲаәЎаәөа»ғаәҡаәҡаәҙаәҷ${(q||fc||fd)?"аә—аәөа»ҲаәҒаә»аәҮаәҒаәұаәҡаәҒаәІаәҷаә„аә»а»үаәҷаә«аәІ/аәҒаәІаәҷаәҒаәӯаәҮ":""}</div>` : `
      <div class="card">
        <table>
          <thead><tr><th style="width:36px;"><input type="checkbox" id="label-select-all" ${allVisibleSelected?'checked':''}/></th><th>а»ҖаәҘаәҒаә—аәөа»Ҳ</th><th>аә§аәұаәҷаә—аәө</th><th>аәңаә№а»үаә®аәұаәҡ</th><th>аәҘаәІаәҚаәҒаәІаәҷ</th><th>COD</th><th></th></tr></thead>
          <tbody>
            ${list.map(l=>`
              <tr>
                <td><input type="checkbox" class="label-row-checkbox" data-label-checkbox="${l.id}" ${STATE.selectedLabelIds.includes(l.id)?'checked':''}/></td>
                <td>#${esc(l.labelNumber)}</td>
                <td class="small-muted">${new Date(l.createdAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ})}</td>
                <td>${esc(l.recipientName)}<div class="small-muted">${esc(l.recipientPhone)}</div></td>
                <td>${esc(l.itemText)} x${l.qty}</td>
                <td>${fmt(l.codAmount)} аәҒаәөаәҡ</td>
                <td><button class="btn btn-sm btn-outline" data-edit-label="${l.id}">вңҸпёҸ а»ҒаәҒа»үа»„аәӮ</button> <button class="btn btn-sm btn-outline" data-reprint-label="${l.id}">рҹ–ЁпёҸ аәһаәҙаәЎаә„аә·аәҷ</button></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      </div>
    `}
  `;
}

function sampleLabelForPreview(){

    labelNumber: "10001", recipientName: "аә„аәі а»ҒаәӘаәҮаәЎаә°аәҷаәө", recipientPhone: "020 59998470",
    address: "аәҡа»үаәІаәҷ аәӘаәөа»„аә„аә—аә»а»ҲаәҮ а»ҖаәЎаә·аәӯаәҮаәӘаәөа»Ӯаә„аә”аә•аә°аәҡаәӯаәҮ аәҷаә°аә„аәӯаәҷаә«аәјаә§аәҮаә§аәҪаәҮаәҲаәұаәҷ", itemText: "аәҒаәІа»ҖаәҹаәңаәұаәҒ 60 аәҠаәӯаәҮ", qty: 1,

    courierName: (STATE.data.couriers[0]||{}).name || "", createdAt: new Date().toISOString()
  };

function renderLabelPreviewHtml(settingsForm){
  const normalized = normalizeLabelTemplate(settingsForm.templateLayout);
  if(normalized && normalized.length>0){
    return `
      <div class="label-sheet size-label" style="margin:0; padding:2mm; box-sizing:border-box;">
        ${renderLabelTable(normalized, sampleLabelForPreview(), settingsForm, {isRealPrint:false})}
      </div>
    `;
  }
  return `
    <div class="label-sheet ${settingsForm.paperSize==='a4'?'size-a4':'size-label'}" style="margin:0;">
      <div class="label-box">
        <div class="label-row" style="text-align:center; padding:14px 10px;">
          ${renderFakeBarcodeSvg()}
          <div style="font-size:15px; font-weight:700; margin-top:2px;">10001</div>
        </div>
        ${renderLabelInfoRows(sampleLabelForPreview(), settingsForm)}
      </div>
    </div>
  `;
}

// Converts an old (v1.11-v1.13) block-array template вҖ” {id,field,x,y,w,h,fontSize,bold,align,border:bool} вҖ”
// into the new row/cell table format, so previously-saved templates keep working instead of breaking.
function normalizeLabelTemplate(raw){
  if(!raw || !raw.length) return null;
  if(raw[0] && Array.isArray(raw[0].cells)) return JSON.parse(JSON.stringify(raw)); // already new format
  return [...raw].sort((a,b)=>(a.y||0)-(b.y||0)).map(b=>({
    id: "row_"+b.id,
    heightMm: b.h || null,
    cells: [{
      id: "cell_"+b.id, field: b.field, widthPct: 100,
      fontSize: b.fontSize||3.2, bold: !!b.bold, align: b.align||"left",
      border: {top:"none", right:"none", bottom: b.border?"thin":"none", left:"none"}
    }]
  }));
}
function labelFieldValue(field, l, settings){
  switch(field){
    case "labelNumber": return String(l.labelNumber||"");
    case "shopName": return settings.shopName||"";
    case "shopPhone": return "а»Ӯаә—: " + (settings.shopPhone||"");
    case "createdTime": return "аә§аәұаәҷаә—аәөа»ҲаәӘа»үаәІаәҮ: " + new Date(l.createdAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ, hour:"2-digit", minute:"2-digit", day:"2-digit", month:"2-digit", year:"numeric"});
    case "courierName": return l.courierName ? "аәӮаә»аәҷаәӘаә»а»ҲаәҮ: "+l.courierName : "";
    case "recipient": return "аәңаә№а»үаә®аәұаәҡ: " + (l.recipientName||"") + "  " + (l.recipientPhone||"") + "\n" + (l.address||"");
    case "item": return (l.itemText||"") + (l.qty>1 ? " x "+l.qty : "");
    case "note": return l.note ? "а»қаәІаәҚа»Җаә«аә”: "+l.note : "";
    case "cod": return "а»ҖаәҒаәұаәҡа»ҖаәҮаәҙаәҷ(COD): " + fmt(l.codAmount) + " K   [" + (l.freeShipping?"аәқаәІаәҒаәҹаәЈаәө":"а»ҖаәҒаәұаәҡаәӣаәІаәҚаә—аәІаәҮ") + "]";
    case "footer": return settings.footerText||"";
    default: return "";
  }
}

  const resizeHandle = editable ? `<div class="tpl-row-resize-handle" data-row-id="${opts.rowId||''}" style="position:absolute; left:0; right:0; bottom:-3px; height:6px; cursor:ns-resize; z-index:5;" title="аәҘаәІаәҒа»Җаәһаә·а»Ҳаәӯаәӣаәұаәҡаә„аә§аәІаәЎаәӘаә№аәҮа»Ғаә–аә§"></div>` : "";
  return `<div class="tpl-cell" data-cell-id="${cell.id}" data-row-id="${opts.rowId||''}" style="${style}">${inner}${resizeHandle}</div>`;
}
function renderLabelTable(rows, l, settings, opts){

// Returns info for every currently-selected cell, in template order (row by row, left to right).
function getSelectedCellsInfo(){
  if(!STATE.labelTemplate) return [];
  const out = [];
  STATE.labelTemplate.forEach((row, ri)=>{
    row.cells.forEach((cell, ci)=>{
      if(STATE.selectedCellIds.includes(cell.id)) out.push({row, rowIndex:ri, cell, cellIndex:ci});
    });
  });
  return out;
}
// Flat, ordered list of every cell (for shift-click range selection).
function flatCellList(){
  const out = [];
  (STATE.labelTemplate||[]).forEach((row, ri)=>{
    row.cells.forEach((cell, ci)=>out.push({row, rowIndex:ri, cell, cellIndex:ci}));
  });
  return out;
}

// ---- Undo / redo for the template editor ----
function pushTemplateHistory(){
  if(!STATE.labelTemplate) return;
  STATE.templateUndoStack.push(JSON.stringify(STATE.labelTemplate));
  if(STATE.templateUndoStack.length>50) STATE.templateUndoStack.shift();
  STATE.templateRedoStack = [];
}
function undoTemplate(){
  if(STATE.templateUndoStack.length===0) return;
  STATE.templateRedoStack.push(JSON.stringify(STATE.labelTemplate));
  STATE.labelTemplate = JSON.parse(STATE.templateUndoStack.pop());
  STATE.selectedCellIds = [];
  render();
}
function redoTemplate(){
  if(STATE.templateRedoStack.length===0) return;
  STATE.templateUndoStack.push(JSON.stringify(STATE.labelTemplate));
  STATE.labelTemplate = JSON.parse(STATE.templateRedoStack.pop());
  STATE.selectedCellIds = [];
  render();
}

// Pulls an adjacent row's cells into the given row, side by side, and removes the now-empty
// adjacent row вҖ” e.g. select a cell in the "shop name" row and merge with the next row to
// get shop name + phone on one line, without manually re-splitting/reassigning fields.
function mergeRowWithNeighbor(rowIndex, direction){
  const neighborIndex = rowIndex + direction;
  if(!STATE.labelTemplate || neighborIndex<0 || neighborIndex>=STATE.labelTemplate.length) return;
  pushTemplateHistory();
  const row = STATE.labelTemplate[rowIndex];
  const neighbor = STATE.labelTemplate[neighborIndex];
  const mergedCells = direction<0 ? [...neighbor.cells, ...row.cells] : [...row.cells, ...neighbor.cells];
  const evenWidth = Math.floor(100/mergedCells.length);
  mergedCells.forEach((c,i)=>{ c.widthPct = (i===mergedCells.length-1) ? (100-evenWidth*(mergedCells.length-1)) : evenWidth; });
  const mergedRow = {id:"row"+Date.now(), heightMm:null, cells:mergedCells};
  STATE.labelTemplate.splice(Math.min(rowIndex, neighborIndex), 2, mergedRow);
  STATE.selectedCellIds = mergedCells.map(c=>c.id);
  render();
}

// ---- Excel-style "Borders" button actions, applied to every currently-selected cell ----
const BORDER_ACTIONS = [
  {id:"bottom",  label:"аәӮаәӯаәҡаәҘаәёа»ҲаәЎ"},
  {id:"top",     label:"аәӮаәӯаәҡа»Җаә—аәҙаәҮ"},
  {id:"left",    label:"аәӮаәӯаәҡаәҠа»үаәІаәҚ"},
  {id:"right",   label:"аәӮаәӯаәҡаәӮаә§аәІ"},
  {id:"none",    label:"аәҡа»Қа»ҲаәЎаәөа»ҖаәӘаәұа»үаәҷаәӮаәӯаәҡ"},
  {id:"all",     label:"аәӮаәӯаәҡаә—аәұаәҮа»қаә»аә”"},
  {id:"outside", label:"аәӮаәӯаәҡаәӯа»үаәӯаәЎаәҷаәӯаәҒ"},
  {id:"thickbox",label:"аәӮаәӯаәҡа»ңаәІаәӯа»үаәӯаәЎаәҷаәӯаәҒ"}
];
function applyBorderAction(actionId, thickness){
  const cells = getSelectedCellsInfo();
  if(cells.length===0) return;
  pushTemplateHistory();
  const w = thickness==="thick" ? "thick" : "thin";
  if(actionId==="none"){
    cells.forEach(({cell})=>{ cell.border = {top:"none",right:"none",bottom:"none",left:"none"}; });
  } else if(actionId==="all"){
    cells.forEach(({cell})=>{ cell.border = {top:w,right:w,bottom:w,left:w}; });
  } else if(actionId==="top" || actionId==="bottom" || actionId==="left" || actionId==="right"){
    cells.forEach(({cell})=>{ cell.border[actionId] = w; });
  } else if(actionId==="outside" || actionId==="thickbox"){
    const outsideW = actionId==="thickbox" ? "thick" : w;
    // Group selected cells by row, in template order, to work out which sides face
    // the outside edge of the selection block (top row / bottom row / first / last in row).
    const byRow = {};
    cells.forEach(info=>{ (byRow[info.rowIndex] = byRow[info.rowIndex]||[]).push(info); });
    const rowIndices = Object.keys(byRow).map(Number).sort((a,b)=>a-b);
    const minRow = rowIndices[0], maxRow = rowIndices[rowIndices.length-1];
    rowIndices.forEach(ri=>{
      const rowCells = byRow[ri].sort((a,b)=>a.cellIndex-b.cellIndex);
      rowCells.forEach((info, idx)=>{
        if(ri===minRow) info.cell.border.top = outsideW;
        if(ri===maxRow) info.cell.border.bottom = outsideW;
        if(idx===0) info.cell.border.left = outsideW;
        if(idx===rowCells.length-1) info.cell.border.right = outsideW;
      });
    });
  }
  render();
}

function updateTemplateLivePreview(){

  el.innerHTML = renderLabelTable(STATE.labelTemplate, sampleLabelForPreview(), settings, {editable:true});
  checkTemplateOverflow();
}

// Warns in the editor when the stacked row heights add up to more than the physical
// paper вҖ” this is what causes a label to silently print across 2-3 pages.
function checkTemplateOverflow(){
  const el = document.getElementById("tpl-live-preview");
  const warn = document.getElementById("tpl-overflow-warning");
  if(!el || !warn) return;
  const settings = STATE.data.labelSettings || {paperSize:"label"};
  const paperMm = PAPER_SIZES[settings.paperSize] || PAPER_SIZES.label;
  const rect = el.getBoundingClientRect();
  if(rect.width<=0){ warn.style.display = "none"; return; }
  const pxPerMm = rect.width / paperMm.w;
  const contentHeightMm = el.scrollHeight / pxPerMm;
  if(contentHeightMm > paperMm.h + 1){
    warn.style.display = "block";
    warn.textContent = `вҡ пёҸ а»Җаәҷаә·а»үаәӯаә«аәІаәҘаә§аәЎаәӘаә№аәҮаәӣаә°аәЎаәІаәҷ ${contentHeightMm.toFixed(1)}mm а»Ғаә•а»Ҳа»ңа»үаәІа»ҖаәҲа»үаәҚаәӘаә№аәҮ ${paperMm.h}mm вҖ” аәҲаә°аәһаәҙаәЎаәҘаә»а»үаәҷаәӯаәӯаәҒа»Җаәӣаәұаәҷаә«аәјаәІаәҚа»ңа»үаәІ, аәҘаәӯаәҮаә«аәјаәёаә”аә„аә§аәІаәЎаәӘаә№аәҮаәҡаәІаәҮа»Ғаә–аә§`;
  } else {
    warn.style.display = "none";
  }
}

function renderFakeBarcodeSvg(){
  const widths = [2,1,3,1,2,3,1,1,2,3,1,2,1,3,2,1,1,3,2,1,2,1,3,1,2,3,1,1,2,1];
  let x = 0, bars = "";
  widths.forEach((w,i)=>{
    if(i%2===0) bars += `<rect x="${x}" y="0" width="${w*2}" height="46" fill="#000"/>`;
    x += w*2;
  });
  return `<svg viewBox="0 0 ${x} 46" style="width:180px; height:46px;">${bars}</svg>`;
}

function renderLabelPrintPreview(labels, settings){
  const normalized = normalizeLabelTemplate(settings.templateLayout);
  const useTemplate = normalized && normalized.length>0;
  const paperMm = PAPER_SIZES[settings.paperSize] || PAPER_SIZES.label;
  const allReady = labels.every(l=>(STATE.barcodeStatusMap[l.id]||"loading")==="ready");
  const sheetsHtml = labels.map((l, idx)=>`
    <div class="label-sheet ${settings.paperSize==='a4'?'size-a4':'size-label'}" style="${idx<labels.length-1?'page-break-after:always;':''}">
      ${useTemplate ? `
        <div class="label-box" style="margin:14px; padding:2mm; box-sizing:border-box;">
          ${renderLabelTable(normalized, l, settings, {isRealPrint:true})}
        </div>
      ` : (()=>{
        const bcStatus = STATE.barcodeStatusMap[l.id] || "loading";
        return `
        <div class="label-box">
          <div class="label-row" style="text-align:center; padding:14px 10px; position:relative;">
            <svg id="label-barcode-${l.id}" style="${bcStatus==='ready'?'':'display:none;'}"></svg>
            ${bcStatus==="loading" ? `<div class="no-print barcode-loading-indicator" style="padding:16px; color:#888; font-size:13px;">вҸі аәҒаәіаәҘаәұаәҮа»Ӯаә«аәјаә” barcode...</div>` : ""}
            ${bcStatus==="error" ? `<div class="no-print barcode-error-indicator" style="padding:12px; color:var(--danger); font-size:13px;">вҡ пёҸ Barcode аәӯаәӯаәҒаәҡа»Қа»Ҳа»„аә”а»ү (аәӯаәҙаәҷа»Җаә•аәөа»Җаәҷаәұаә”аәҠа»үаәІ/аәӮаәІаә”) вҖ” аәўа»ҲаәІаәһаәҙаәЎаәҒа»ҲаәӯаәҷаәҘаәӯаәҮа»ға»қа»Ҳ<br/><button class="btn btn-sm btn-outline" data-retry-barcode="${l.id}" style="margin-top:8px;">рҹ”„ аәҘаәӯаәҮа»ға»қа»Ҳ</button></div>` : ""}
            <div style="font-size:15px; font-weight:700; margin-top:2px;">${esc(l.labelNumber)}</div>
          </div>
          ${renderLabelInfoRows(l, settings)}
        </div>`;
      })()}
    </div>
  `).join("");
  return `
    <style>
      @page{ size:${paperMm.w}mm ${paperMm.h}mm; margin:0; }
      /* Force each label sheet to exactly one physical page at print time. Without this,
         any sub-millimeter rounding/padding overflow makes Chrome silently spill a blank
         extra page per label (root cause of the "2 а»Ғаәңа»Ҳаәҷ" phantom blank-page bug). */
      @media print{
        .label-sheet{ height:${paperMm.h}mm !important; max-height:${paperMm.h}mm !important; overflow:hidden !important; }
      }
    </style>
    <div class="label-overlay" id="label-print-overlay">
      <div class="label-preview-scroll">
        <div id="print-label-area">
          ${sheetsHtml}
        </div>
      </div>
    </div>
    <div class="no-print" style="position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:201; display:flex; gap:10px;">
      <button class="btn" id="btn-do-print-label" ${allReady?'':'disabled'}>рҹ–ЁпёҸ аәһаәҙаәЎ${labels.length>1?` (${labels.length} а»ғаәҡ)`:''}</button>
      <button class="btn btn-outline" id="btn-close-label-preview" style="background:#fff;">аәӣаәҙаә”</button>
    </div>
  `;
}

function renderScanAlertHtml(){
  let html = "";
  if(STATE.scanAlert){
    const a = STATE.scanAlert;
    const isDup = a.type==="duplicate";
    const isSuccess = a.type==="success";
    const bg = isSuccess ? "#E9F1E6" : (isDup ? "#FBEAEA" : "#FCF3E3");
    const color = isSuccess ? "var(--sage-dark)" : "var(--danger)";
    const label = isSuccess ? "вң… аәӘаәіа»ҖаәҘаәұаә”" : (isDup ? "вҡ пёҸ а»Җаә„аә·а»ҲаәӯаәҮаәҷаәөа»үаә–аә·аәҒаәӘаә°а»ҒаәҒаәҷа»ҒаәҘа»үаә§" : "вқҢ аәҡа»Қа»Ҳаәһаә»аәҡаәӮа»Қа»үаәЎаә№аәҷа»ғаәҡаәҡаәҙаәҷаәҷаәөа»үа»ғаәҷаәҘаә°аәҡаә»аәҡ");
    html += `
      <div style="background:${bg}; border:2px solid ${color}; border-radius:10px; padding:8px 12px; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:6px; box-shadow:0 3px 10px rgba(0,0,0,.3); margin-bottom:10px;">
        <span style="font-size:14.5px; font-weight:800; color:${color}; line-height:1.2;">${label}</span>
        <span style="font-size:12px; color:${color}; opacity:.85;">(${esc(a.code)})</span>
      </div>
    `;
  }
  if(STATE.scanError){
    html += `<p style="color:var(--danger); font-size:13.5px; margin-bottom:16px;">вҡ пёҸ ${esc(STATE.scanError)}</p>`;
  }
  return html;
}

function scanTimeStr(iso){
  return new Date(iso).toLocaleTimeString("lo-LA", {timeZone: LAOS_TZ, hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false});
}

function getFilteredScans(){
  const d = STATE.data;
  const todayStr = new Date().toLocaleDateString("lo-LA", {timeZone: LAOS_TZ});
  let items = d.packageScans;
  if(STATE.scanHistDateFilter==="today"){
    items = items.filter(s=>new Date(s.scannedAt).toLocaleDateString("lo-LA", {timeZone: LAOS_TZ})===todayStr);
  }
  if(STATE.scanHistFilter==="matched") items = items.filter(s=>s.matched);
  else if(STATE.scanHistFilter==="notfound") items = items.filter(s=>!s.matched);
  if(STATE.scanHistSearch){
    const q = STATE.scanHistSearch.toLowerCase();
    items = items.filter(s=>s.scannedCode.toLowerCase().includes(q));
  }
  return items;
}
