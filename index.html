/* ====================== AD SPEND (FACEBOOK ADS) ======================
   Aggregates ad_spend_daily (synced by the sync-ad-spend Edge Function) across
   however many ad accounts/BMs Tar has connected. Sync is manual-only (button
   press → sb.functions.invoke) — no auto-polling, consistent with the rest of
   the app. Staged rollout: this page is hidden from "admin" role via a row in
   admin_page_permissions (see migration_v1.86.sql) — owner always sees it. */
// Preset list mirrors the reference dashboard's date picker (ໃຊ້ລ່າສຸດ/ວັນນີ້/ອາທິດ/ເດືອນ/ກຳນົດເອງ etc).
// Week starts on Sunday to match the calendar shown (อา=Sun first column).
// Generic version — every date-range filter in the app (14 locations) shares this same
// resolver instead of each having its own bespoke today/yesterday/7d/etc math.
function resolvePresetDateRange(mode, customFrom, customTo){
  const fmtDate = (d)=>d.toISOString().slice(0,10);
  // Bug fix: the old code did `new Date(); setHours(0,0,0,0)` (browser-local midnight) then
  // formatted via toISOString() (UTC) — for Laos (UTC+7), local midnight is 17:00 UTC the
  // PREVIOUS day, so "today" silently became "yesterday". Anchoring to the Asia/Vientiane
  // calendar date string first, then treating that as UTC midnight for arithmetic, sidesteps
  // the mismatch entirely (safe since Laos has no DST — fixed UTC+7 year-round).
  const todayStr = new Intl.DateTimeFormat("en-CA", {timeZone: LAOS_TZ}).format(new Date());
  const today = new Date(todayStr + "T00:00:00Z");
  const startOfWeek = (d)=>{ const x=new Date(d); x.setUTCDate(x.getUTCDate()-x.getUTCDay()); return x; };

  if(mode==="today") return {from: fmtDate(today), to: fmtDate(today)};
  if(mode==="yesterday"){ const y=new Date(today); y.setUTCDate(y.getUTCDate()-1); return {from: fmtDate(y), to: fmtDate(y)}; }
  if(mode==="today_yesterday"){ const y=new Date(today); y.setUTCDate(y.getUTCDate()-1); return {from: fmtDate(y), to: fmtDate(today)}; }
  if(mode==="7d"){ const d=new Date(today); d.setUTCDate(d.getUTCDate()-6); return {from: fmtDate(d), to: fmtDate(today)}; }
  if(mode==="14d"){ const d=new Date(today); d.setUTCDate(d.getUTCDate()-13); return {from: fmtDate(d), to: fmtDate(today)}; }
  if(mode==="28d"){ const d=new Date(today); d.setUTCDate(d.getUTCDate()-27); return {from: fmtDate(d), to: fmtDate(today)}; }
  if(mode==="30d"){ const d=new Date(today); d.setUTCDate(d.getUTCDate()-29); return {from: fmtDate(d), to: fmtDate(today)}; }
  if(mode==="this_week") return {from: fmtDate(startOfWeek(today)), to: fmtDate(today)};
  if(mode==="last_week"){ const s=startOfWeek(today); s.setUTCDate(s.getUTCDate()-7); const e=new Date(s); e.setUTCDate(e.getUTCDate()+6); return {from: fmtDate(s), to: fmtDate(e)}; }
  if(mode==="this_month") return {from: fmtDate(new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), 1))), to: fmtDate(today)};
  if(mode==="last_month"){ const s=new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth()-1, 1)); const e=new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), 0)); return {from: fmtDate(s), to: fmtDate(e)}; }
  if(mode==="all") return {from:"", to:""};
  return {from: customFrom||"", to: customTo||""}; // "custom"
}

// Renders the dropdown + (when "custom") the two date inputs, sharing one look everywhere.
// idPrefix must be unique per filter instance on the page (e.g. "crm-filter-date").
function renderDatePresetFilter(idPrefix, mode, customFrom, customTo){
  const range = resolvePresetDateRange(mode, customFrom, customTo);
  return `

      <select id="${idPrefix}-mode" style="width:auto; margin-bottom:0;">
        <option value="today" ${mode==="today"?'selected':''}>ວັນນີ້</option>
        <option value="yesterday" ${mode==="yesterday"?'selected':''}>ເມື່ອວານນີ້</option>
        <option value="today_yesterday" ${mode==="today_yesterday"?'selected':''}>ວັນນີ້ ແລະ ເມື່ອວານນີ້</option>
        <option value="7d" ${mode==="7d"?'selected':''}>7 ວັນທີ່ຜ່ານມາ</option>
        <option value="14d" ${mode==="14d"?'selected':''}>14 ວັນທີ່ຜ່ານມາ</option>
        <option value="28d" ${mode==="28d"?'selected':''}>28 ວັນທີ່ຜ່ານມາ</option>
        <option value="30d" ${mode==="30d"?'selected':''}>30 ວັນທີ່ຜ່ານມາ</option>
        <option value="this_week" ${mode==="this_week"?'selected':''}>ອາທິດນີ້</option>
        <option value="last_week" ${mode==="last_week"?'selected':''}>ອາທິດທີ່ແລ້ວ</option>
        <option value="this_month" ${mode==="this_month"?'selected':''}>ເດືອນນີ້</option>
        <option value="last_month" ${mode==="last_month"?'selected':''}>ເດືອນທີ່ແລ້ວ</option>
        <option value="all" ${mode==="all"?'selected':''}>ທັງໝົດ</option>
        <option value="custom" ${mode==="custom"?'selected':''}>ກຳນົດເອງ</option>
      </select>
      ${mode==="custom" ? `
        <input type="date" id="${idPrefix}-from" value="${esc(customFrom||'')}" style="margin-bottom:0; width:auto;"/>
        <span class="small-muted">ຫາ</span>

    </div>
  `;
}

// Wires the dropdown + custom inputs above to three flat STATE keys (mode/from/to), calling
// render() (and an optional extra callback, e.g. to re-fetch server-side data) on any change.
function attachDatePresetFilter(idPrefix, stateModeKey, stateFromKey, stateToKey, onChange){
  const modeEl = document.getElementById(idPrefix+"-mode");

    render();

  if(fromEl) fromEl.addEventListener("change", ()=>{
    STATE[stateFromKey] = fromEl.value;
    if(onChange) onChange();
    render();
  });
  const toEl = document.getElementById(idPrefix+"-to");
  if(toEl) toEl.addEventListener("change", ()=>{
    STATE[stateToKey] = toEl.value;
    if(onChange) onChange();
    render();
  });
}

function adSpendDateRange(){
  return resolvePresetDateRange(STATE.adSpendDateMode, STATE.adSpendDateFrom, STATE.adSpendDateTo);
}

// Joins ad_spend_daily -> ad_campaigns -> ad_accounts and aggregates it three ways
// (per account / per campaign / per day) for whatever date range is currently selected.
// Shared aggregation core — filters STATE.data.adSpendDaily by [from,to] and rolls it up
// by account / campaign / day. Used both by the main summary (user-selected range) and by
// the fixed 4-period comparison table (today/yesterday/7d/30d) below.
function aggregateAdSpendRows(rows, campaignById, accountById){
  const grand = {spend:0, impressions:0, clicks:0, purchases:0, purchaseValue:0, leads:0, messages:0};
  const byAccount = {}, byCampaign = {}, byDay = {};

  rows.forEach(r=>{
    const camp = campaignById[r.campaignId];
    const accId = camp ? camp.adAccountId : "";
    const acc = accountById[accId];

    ["spend","impressions","clicks","purchases","purchaseValue","leads","messages"].forEach(k=>{ grand[k] += r[k]||0; });

    if(!byAccount[accId]) byAccount[accId] = {id:accId, name: acc?acc.name:"(ບໍ່ຮູ້ຈັກບັນຊີ)", businessManager: acc?acc.businessManager:"", campaignIds:new Set(), spend:0, impressions:0, clicks:0, purchases:0, purchaseValue:0, leads:0, messages:0};
    ["spend","impressions","clicks","purchases","purchaseValue","leads","messages"].forEach(k=>{ byAccount[accId][k] += r[k]||0; });
    byAccount[accId].campaignIds.add(r.campaignId);

    if(!byCampaign[r.campaignId]) byCampaign[r.campaignId] = {id:r.campaignId, campaignName: camp?camp.campaignName:"(ບໍ່ຮູ້ຈັກແຄມເປນ)", status: camp?camp.status:"", accountName: acc?acc.name:"", spend:0, impressions:0, clicks:0, purchases:0, purchaseValue:0, leads:0, messages:0};
    ["spend","impressions","clicks","purchases","purchaseValue","leads","messages"].forEach(k=>{ byCampaign[r.campaignId][k] += r[k]||0; });

    if(!byDay[r.date]) byDay[r.date] = {date:r.date, spend:0, impressions:0, clicks:0, purchases:0, purchaseValue:0, leads:0, messages:0};
    ["spend","impressions","clicks","purchases","purchaseValue","leads","messages"].forEach(k=>{ byDay[r.date][k] += r[k]||0; });
  });

  return {grand, byAccount, byCampaign, byDay};
}

// Adds derived metrics (CTR, ROAS, cost-per-purchase) on top of raw sums — same shape
// works for grand totals, per-account rows, per-campaign rows, and per-day rows.
function withAdSpendDerived(o){
  return {
    ...o,
    ctr: o.impressions>0 ? (o.clicks/o.impressions*100) : 0,
    roas: o.spend>0 ? (o.purchaseValue/o.spend) : 0,
    costPerPurchase: o.purchases>0 ? (o.spend/o.purchases) : 0
  };
}

function computeAdSpendSummary(){
  const {from, to} = adSpendDateRange();
  const campaignById = {};
  STATE.data.adCampaigns.forEach(c=>{ campaignById[c.id] = c; });
  const accountById = {};
  STATE.data.adAccounts.forEach(a=>{ accountById[a.id] = a; });

  const rows = STATE.data.adSpendDaily.filter(r=> (!from || r.date>=from) && (!to || r.date<=to));
  const {grand, byAccount, byCampaign, byDay} = aggregateAdSpendRows(rows, campaignById, accountById);

  return {
    from, to,
    grand: withAdSpendDerived(grand),
    byAccount: Object.values(byAccount).map(a=>withAdSpendDerived({...a, campaignCount:a.campaignIds.size})).sort((a,b)=>b.spend-a.spend),
    byCampaign: Object.values(byCampaign).map(withAdSpendDerived).sort((a,b)=>b.spend-a.spend),
    byDay: Object.values(byDay).map(withAdSpendDerived).sort((a,b)=>b.date<a.date?-1:1)
  };
}

// Fixed 4-period comparison (today / yesterday / trailing 7d / trailing 30d) — independent
// of whatever date range the person has selected above, mirroring the "ວັນນີ້/ເມື່ອວານ/7ວັນ/30ວັນ"
// snapshot table pattern from the reference dashboard.
// Daily spend/revenue/profit series for the trend chart — always ends "today" (Laos time),
// zero-filled for any day with no synced data so the chart doesn't show misleading gaps.
function computeAdSpendDailyTrend(days){
  const todayStr = new Intl.DateTimeFormat("en-CA", {timeZone: LAOS_TZ}).format(new Date());
  const today = new Date(todayStr+"T00:00:00Z");
  const from = new Date(today); from.setUTCDate(from.getUTCDate()-(days-1));
  const fromStr = from.toISOString().slice(0,10);
  const byDay = {};
  STATE.data.adSpendDaily.forEach(r=>{
    if(r.date<fromStr || r.date>todayStr) return;
    if(!byDay[r.date]) byDay[r.date] = {date:r.date, spend:0, purchaseValue:0};
    byDay[r.date].spend += r.spend; byDay[r.date].purchaseValue += r.purchaseValue;
  });
  const out = [];
  for(let i=0;i<days;i++){
    const d = new Date(from); d.setUTCDate(d.getUTCDate()+i);
    const ds = d.toISOString().slice(0,10);
    const row = byDay[ds] || {date:ds, spend:0, purchaseValue:0};
    out.push({...row, profit: row.purchaseValue - row.spend});
  }
  return out;
}

function computeAdSpendPeriods(){
  const campaignById = {};
  STATE.data.adCampaigns.forEach(c=>{ campaignById[c.id] = c; });
  const accountById = {};
  STATE.data.adAccounts.forEach(a=>{ accountById[a.id] = a; });

  const fmtDate = (d)=>d.toISOString().slice(0,10);
  const todayStr = new Intl.DateTimeFormat("en-CA", {timeZone: LAOS_TZ}).format(new Date());
  const today = new Date(todayStr + "T00:00:00Z");
  const y = new Date(today); y.setUTCDate(y.getUTCDate()-1);
  const d7 = new Date(today); d7.setUTCDate(d7.getUTCDate()-6);
  const d30 = new Date(today); d30.setUTCDate(d30.getUTCDate()-29);

  const periods = [
    {key:"today", label:"ວັນນີ້", from:fmtDate(today), to:fmtDate(today)},
    {key:"yesterday", label:"ເມື່ອວານ", from:fmtDate(y), to:fmtDate(y)},
    {key:"week", label:"ຍ້ອນຫຼັງ 7 ວັນ", from:fmtDate(d7), to:fmtDate(today)},
    {key:"month", label:"ຍ້ອນຫຼັງ 30 ວັນ", from:fmtDate(d30), to:fmtDate(today)}
  ];

  return periods.map(p=>{
    const rows = STATE.data.adSpendDaily.filter(r=> r.date>=p.from && r.date<=p.to);
    const {grand} = aggregateAdSpendRows(rows, campaignById, accountById);
    return {...p, ...withAdSpendDerived(grand)};
  });
}

// Merges EVERY synced campaign (STATE.data.adCampaigns — not filtered by the date range,
// so dormant/paused campaigns with zero spend in the selected period still show up for
// management purposes) with its aggregated spend metrics for the currently selected date
// range (0s when the campaign had no activity in that range).
function buildAdSpendCampaignRows(){
  const {from, to} = adSpendDateRange();
  const campaignById = {}; STATE.data.adCampaigns.forEach(c=>{ campaignById[c.id]=c; });
  const accountById = {}; STATE.data.adAccounts.forEach(a=>{ accountById[a.id]=a; });
  const rows = STATE.data.adSpendDaily.filter(r=> (!from || r.date>=from) && (!to || r.date<=to));
  const {byCampaign} = aggregateAdSpendRows(rows, campaignById, accountById); // keyed by campaign id, not yet Object.values()'d

  return STATE.data.adCampaigns.map(camp=>{
    const acc = accountById[camp.adAccountId];
    const agg = byCampaign[camp.id];
    const metrics = withAdSpendDerived(agg || {spend:0, impressions:0, clicks:0, purchases:0, purchaseValue:0, leads:0, messages:0});
    return {
      id: camp.id,
      campaignName: camp.campaignName,
      accountName: acc ? acc.name : "",
      effectiveStatusReal: camp.effectiveStatus || camp.status || "",
      dailyBudget: camp.dailyBudget,
      lifetimeBudget: camp.lifetimeBudget,
      hasOwnBudget: !!(camp.dailyBudget!=null || camp.lifetimeBudget!=null),
      ...metrics
    };
  });
}

    ARCHIVED:"📦 ເກັບຖາວອນ", DELETED:"🗑️ ລຶບແລ້ວ", PENDING_REVIEW:"⏳ ລໍກວດ", DISAPPROVED:"❌ ບໍ່ຜ່ານ",

// Shared metric-picker card — same block reused on both the Dashboard and Campaign
// Management sub-pages so the "report fields" (spend/impressions/clicks/...) look
// identical everywhere, per Tar's request to stop the 3 views feeling inconsistent.
function renderAdSpendMetricCards(summary){
  return `
    <div class="card">
      <div style="display:flex; justify-content:flex-end; margin-bottom:8px;">
        <div id="adspend-card-picker-wrapper" style="position:relative; display:inline-block;">
          <button class="btn btn-sm btn-outline" id="btn-toggle-adspend-card-picker">⚙️ ຕົວຊີ້ວັດ</button>

            <div style="position:absolute; top:100%; right:0; margin-top:6px; background:#fff; border:1px solid #ddd; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15); padding:12px; z-index:20; min-width:260px;">
              <div class="small-muted" style="margin-bottom:8px; font-weight:600;">ເລືອກ ແລະ ຕັ້ງລຳດັບ (1,2,3...)</div>
              ${[...STATE.adSpendCardConfig].sort((a,b)=>a.order-b.order).map(cc=>{
                const def = ADSPEND_CARD_DEFS.find(d=>d.key===cc.key);
                return `
                <div style="display:flex; align-items:center; gap:8px; margin-bottom:6px;">
                  <input type="checkbox" data-toggle-adspend-card="${cc.key}" ${cc.enabled?'checked':''}/>

                  <span style="font-weight:400;">${esc(def?def.label:cc.key)}</span>
                </div>`;
              }).join("")}
            </div>
          ` : ""}
        </div>
      </div>
      <div style="display:flex; gap:24px; flex-wrap:wrap;">
        ${[...STATE.adSpendCardConfig].filter(cc=>cc.enabled).sort((a,b)=>a.order-b.order).map(cc=>{
          const def = ADSPEND_CARD_DEFS.find(d=>d.key===cc.key);

          return `<div><span class="small-muted">${esc(def?def.label:cc.key)}</span><div style="font-size:22px; font-weight:700; color:${color};">${adSpendCardValueHtml(cc.key, summary.grand)}</div></div>`;

}

function attachAdSpendEvents(){
  if(adSpendChartInstance){ adSpendChartInstance.destroy(); adSpendChartInstance = null; }
  const chartCanvas = document.getElementById("adspend-top-campaign-chart");
  if(chartCanvas){
    if(window.Chart){
      const summary = computeAdSpendSummary();
      const top = summary.byCampaign.slice(0, 8);
      adSpendChartInstance = new Chart(chartCanvas, {
        type: "bar",
        data: {
          labels: top.map(c=>c.campaignName.length>18 ? c.campaignName.slice(0,18)+"…" : c.campaignName),
          datasets: [
            {
              label: "ຄ່າໃຊ້ຈ່າຍ",
              data: top.map(c=>Number(c.spend.toFixed(2))),
              backgroundColor: "#e67e22",
              barPercentage: 0.6, categoryPercentage: 0.7
            },
            {
              label: "ກຳໄລ",
              data: top.map(c=>Number((c.purchaseValue-c.spend).toFixed(2))),
              backgroundColor: "#3a7d44",
              barPercentage: 0.6, categoryPercentage: 0.7
            }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: true } },
          scales: { y: { beginAtZero: true } }
        }
      });
    } else {
      const msgEl = document.getElementById("adspend-chart-fallback-msg");
      if(msgEl) msgEl.style.display = "block";
    }
  }

  if(adSpendTrendChartInstance){ adSpendTrendChartInstance.destroy(); adSpendTrendChartInstance = null; }
  const trendCanvas = document.getElementById("adspend-trend-chart");
  if(trendCanvas){
    if(window.Chart){
      const days = Number(STATE.adSpendChartPeriod)||7;
      const trend = computeAdSpendDailyTrend(days);
      adSpendTrendChartInstance = new Chart(trendCanvas, {
        type: "bar",
        data: {
          labels: trend.map(t=>new Date(t.date).toLocaleDateString("en-GB", {timeZone:LAOS_TZ, day:"2-digit", month:"2-digit"})),
          datasets: [
            { label:"ຄ່າໃຊ້ຈ່າຍ", data: trend.map(t=>Number(t.spend.toFixed(2))), backgroundColor:"#e67e22", barPercentage:0.6, categoryPercentage:0.7 },
            { label:"ກຳໄລ", data: trend.map(t=>Number(t.profit.toFixed(2))), backgroundColor:"#3a7d44", barPercentage:0.6, categoryPercentage:0.7 }
          ]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: true } },
          scales: { y: { beginAtZero: true } }
        }
      });
    } else {
      const msgEl = document.getElementById("adspend-trend-chart-fallback-msg");
      if(msgEl) msgEl.style.display = "block";
    }
  }

  document.querySelectorAll("[data-adspend-trend-period]").forEach(el=>{
    el.addEventListener("click", ()=>{ STATE.adSpendChartPeriod = el.getAttribute("data-adspend-trend-period"); render(); });
  });

  // ---- Round E: metric card picker (show/hide + reorder the summary cards) ----
  const btnToggleCardPicker = document.getElementById("btn-toggle-adspend-card-picker");
  if(btnToggleCardPicker) btnToggleCardPicker.addEventListener("click", ()=>{ STATE.adSpendCardPickerOpen = !STATE.adSpendCardPickerOpen; render(); });
  if(!window.__adSpendCardPickerOutsideBound){
    window.__adSpendCardPickerOutsideBound = true;
    document.addEventListener("click", (e)=>{
      if(!STATE.adSpendCardPickerOpen) return;
      if(e.target.closest("#btn-toggle-adspend-card-picker")) return;
      const wrapper = document.getElementById("adspend-card-picker-wrapper");
      if(wrapper && !wrapper.contains(e.target)){ STATE.adSpendCardPickerOpen = false; render(); }
    });
  }
  document.querySelectorAll("[data-toggle-adspend-card]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const key = el.getAttribute("data-toggle-adspend-card");
      const cc = STATE.adSpendCardConfig.find(c=>c.key===key);
      if(cc) cc.enabled = el.checked;
      render();
    });
  });

  const btnSearchFb = document.getElementById("btn-search-fb-accounts");

        render();

      try{
        await dbDeleteAdAccount(id, acc?acc.name:id);
        STATE.data = await loadAllData();

      }catch(e){ showErrorToast("ລຶບບໍ່ສຳເລັດ: " + (e.message||e)); }

/* ====================== WHATSAPP (COEXISTENCE) ======================
   Two-pane inbox: conversation list on the left, open thread on the right. Conversations +
   wa_orders load with everything else in loadAllData(); the message thread for whichever
   conversation is open is fetched on demand (loadWaThread) and kept fresh live via the
   whatsapp_messages Realtime subscription set up in init() — no polling.
   Sending goes through the whatsapp-send Edge Function (never calls the Graph API directly
   from the browser, since that would expose the permanent access token client-side).
   Inbound messages, delivery-status updates, and coexistence "echo" messages (things Tar typed
   from the phone app itself) all arrive via the whatsapp-webhook Edge Function, which writes
   straight to whatsapp_conversations / whatsapp_messages — this page never talks to Meta directly. */
function waInitials(name){
  const n = (name||"").trim();
  if(!n) return "?";
  const parts = n.split(/\s+/);
  return parts.length>1 ? (parts[0][0]+parts[1][0]).toUpperCase() : n.slice(0,2).toUpperCase();
}
function waTimeShort(iso){
  if(!iso) return "";
  const d = new Date(iso);
  const now = new Date();
  const sameDay = d.toLocaleDateString("en-CA",{timeZone:LAOS_TZ})===now.toLocaleDateString("en-CA",{timeZone:LAOS_TZ});
  return sameDay
    ? d.toLocaleTimeString("en-GB",{timeZone:LAOS_TZ, hour:"2-digit", minute:"2-digit"})
    : d.toLocaleDateString("en-GB",{timeZone:LAOS_TZ, day:"2-digit", month:"2-digit"});
}
function renderWhatsapp(){
  const convs = STATE.data.waConversations
    .filter(c=>{
      const q = STATE.waSearch.trim().toLowerCase();
      if(!q) return true;
      return (c.customerName||"").toLowerCase().includes(q) || (c.customerPhone||"").includes(q) || (c.waId||"").includes(q);
    });
  const activeConv = STATE.data.waConversations.find(c=>c.id===STATE.waConversationId);
  return `
    <div class="page-head">
      <h1>&#128241; WhatsApp</h1>
      <p>ສົນທະນາກັບລູກຄ້າຜ່ານ WhatsApp — sync ອັດຕະໂນມັດກັບແອັບໃນມືຖື (Coexistence)</p>
    </div>
    <div class="card" style="padding:0; display:flex; height:72vh; min-height:480px; overflow:hidden;">
      <div style="width:300px; min-width:220px; border-right:1px solid #E9E3D3; display:flex; flex-direction:column;">
        <div style="padding:12px; border-bottom:1px solid #E9E3D3;">
          <input type="text" id="wa-search" placeholder="ຄົ້ນຫາຊື່ ຫຼື ເບີໂທ..." value="${esc(STATE.waSearch)}" style="width:100%;"/>
        </div>
        <div style="flex:1; overflow-y:auto;">
          ${convs.length===0 ? `<div class="small-muted" style="padding:16px; text-align:center;">${STATE.data.waConversations.length===0?"ຍັງບໍ່ມີການສົນທະນາເຂົ້າມາ":"ບໍ່ພົບຜົນການຄົ້ນຫາ"}</div>` : convs.map(c=>`
            <div class="wa-conv-item" data-open-conv="${c.id}" style="display:flex; gap:10px; padding:12px; cursor:pointer; border-bottom:1px solid #F0ECE0; ${c.id===STATE.waConversationId?'background:#FBF6E9;':''}">
              <div style="width:38px; height:38px; border-radius:50%; background:#DDE9DD; color:#2f5c3f; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; flex-shrink:0;">${esc(waInitials(c.customerName||c.customerPhone))}</div>
              <div style="flex:1; min-width:0;">
                <div style="display:flex; justify-content:space-between; gap:6px;">
                  <span style="font-weight:600; font-size:13.5px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(c.customerName||c.customerPhone||c.waId)}</span>
                  <span class="small-muted" style="font-size:11px; flex-shrink:0;">${waTimeShort(c.lastMessageAt)}</span>
                </div>
                <div style="display:flex; justify-content:space-between; gap:6px; margin-top:2px;">
                  <span class="small-muted" style="font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(c.lastMessagePreview||"")}</span>
                  ${c.unreadCount>0 ? `<span style="background:#2f5c3f; color:#fff; font-size:10.5px; border-radius:10px; padding:1px 6px; flex-shrink:0;">${c.unreadCount}</span>` : ""}
                </div>
              </div>
            </div>
          `).join("")}
        </div>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; min-width:0;">
        ${!activeConv ? `
          <div style="flex:1; display:flex; align-items:center; justify-content:center; color:var(--muted);">ເລືອກການສົນທະນາຈາກລາຍການຊ້າຍ</div>
        ` : `
          <div style="padding:12px 16px; border-bottom:1px solid #E9E3D3; display:flex; justify-content:space-between; align-items:center;">
            <div>
              <div style="font-weight:700;">${esc(activeConv.customerName||activeConv.customerPhone)}</div>
              <div class="small-muted" style="font-size:12px;">${esc(activeConv.customerPhone||activeConv.waId)}</div>
            </div>
            <button class="btn btn-sm" id="wa-create-order-btn">&#128717; ສ້າງອໍເດີ</button>
          </div>
          ${(()=>{ const convOrders = STATE.data.waOrders.filter(o=>o.conversationId===activeConv.id);
            if(convOrders.length===0) return "";
            return `<div style="padding:8px 16px; border-bottom:1px solid #E9E3D3; background:#FBF6E9; font-size:12.5px;">
              <span style="font-weight:600;">&#128717; ອໍເດີໃນແຊັດນີ້ (${convOrders.length}):</span>
              ${convOrders.slice(0,3).map(o=>`<span class="pill pill-sage" style="margin-left:6px;">${esc(o.productLabel||"-")} ×${esc(String(o.qty))} — ${esc(o.status)}</span>`).join("")}
            </div>`;
          })()}
          <div id="wa-thread" style="flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:8px; background:#F7F3E8;">
            ${STATE.waMessagesLoading ? `<div class="small-muted" style="text-align:center;">ກຳລັງໂຫຼດ...</div>` : STATE.waThreadMessages.map(m=>{
              const isOut = m.direction==="out" || m.direction==="echo";
              return `
                <div style="display:flex; justify-content:${isOut?'flex-end':'flex-start'};">
                  <div style="max-width:70%; padding:8px 12px; border-radius:12px; ${isOut?'background:#DCF3D8; border-bottom-right-radius:2px;':'background:#fff; border-bottom-left-radius:2px;'} box-shadow:0 1px 1px rgba(0,0,0,.05);">
                    ${m.direction==="echo" ? `<div style="font-size:10px; color:#7a8c7a; margin-bottom:2px;">&#128241; ສົ່ງຈາກແອັບໃນມືຖື</div>` : ""}
                    <div style="font-size:13.5px; white-space:pre-wrap; word-break:break-word;">${esc(m.content)}</div>
                    <div class="small-muted" style="font-size:10px; text-align:right; margin-top:2px;">${waTimeShort(m.createdAt)}</div>
                  </div>
                </div>
              `;
            }).join("")}
          </div>
          <div style="padding:12px; border-top:1px solid #E9E3D3; display:flex; gap:8px;">
            <input type="text" id="wa-msg-input" placeholder="ພິມຂໍ້ຄວາມ..." value="${esc(STATE.waMessageInput)}" style="flex:1;" ${STATE.waSending?"disabled":""}/>
            <button class="btn" id="wa-send-btn" ${STATE.waSending?"disabled":""}>${STATE.waSending?"ກຳລັງສົ່ງ...":"ສົ່ງ"}</button>
          </div>
        `}
      </div>
    </div>
    ${STATE.waOrderModalOpen ? renderWaOrderModal() : ""}
  `;
}

function attachWhatsappEvents(){

  document.querySelectorAll("[data-open-conv]").forEach(el=>{

      const id = el.getAttribute("data-open-conv");
      STATE.waConversationId = id;
      STATE.waThreadMessages = [];
      render();
      loadWaThread(id);
    });
  });
  const threadEl = document.getElementById("wa-thread");
  if(threadEl) threadEl.scrollTop = threadEl.scrollHeight;

  if(msgInput){
    msgInput.addEventListener("input", e=>{ STATE.waMessageInput = e.target.value; });

/* ====================== STUDIO LABEL STATUS TRACKER ======================
   A parallel status lifecycle for labels CREATED IN STUDIO (Pancake-synced ones already have
   their own real status from Pancake, shown in the "📦 ອໍເດີ Pancake" tab — this page
   deliberately excludes those to avoid two different "status" concepts colliding for the same
   entries). Mirrors Pancake's own numbering (0/1/2/3/5/6) purely for consistency, not because
   these labels are connected to Pancake in any way.
   0→1 happens automatically on a successful scan-out (see processScanCode). 1→2, 2→3/5/6 are
   always a manual choice here — Studio has no way to know when a courier physically picks up
   a package or when a customer actually receives it. */
/* Popup timeline for a single label's status changes — who changed it, when, and what it
   changed from/to — mirroring the kind of order-history view Pancake shows. Fetched on demand
   when opened rather than preloaded for every label, since most labels are never inspected. */
function renderLabelHistoryPopup(labelId){
  const label = STATE.data.shippingLabels.find(l=>l.id===labelId);
  const rows = STATE.labelHistoryPopupRows||[];
  return `
    <div class="label-overlay" id="label-history-popup-overlay" style="display:flex; align-items:center; justify-content:center;">
      <div style="background:#fff; border-radius:12px; padding:20px; max-width:480px; width:92%; max-height:80vh; overflow-y:auto;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
          <h3 style="margin:0;">🕐 ປະຫວັດສະຖານະ #${esc((label||{}).labelNumber||"")}</h3>
          <button class="btn btn-sm btn-outline" id="btn-close-label-history-popup">✖️</button>
        </div>
        ${STATE.labelHistoryPopupLoading ? `<p class="small-muted">ກຳລັງໂຫຼດ...</p>` : (
          rows.length===0 ? `<p class="small-muted">ຍັງບໍ່ມີການປ່ຽນສະຖານະ</p>` : `
            <div style="display:flex; flex-direction:column; gap:10px;">
              ${rows.map(r=>`
                <div style="border-left:3px solid #ddd; padding-left:12px;">
                  <div>${esc(labelStatusName(r.old_status))} → <b>${esc(labelStatusName(r.new_status))}</b></div>
                  <div class="small-muted">${esc(r.changed_by||"-")} · ${new Date(r.changed_at).toLocaleString("en-GB", {timeZone: LAOS_TZ})}</div>
                </div>
              `).join("")}
            </div>
          `
        )}
      </div>
    </div>
  `;
}

function renderLabelStatusTracker(){
  const d = STATE.data;
  const studioLabels = d.shippingLabels.filter(l=>!isPancakeLabel(l));
  const tab = STATE.labelStatusTab;
  const q = (STATE.labelStatusSearch||"").toLowerCase();
  const labelStatusRange = resolvePresetDateRange(STATE.labelStatusDateMode||"all", STATE.labelStatusDateFrom, STATE.labelStatusDateTo);
  const dFrom = labelStatusRange.from||"";
  const dTo = labelStatusRange.to||"";

  // Tab counts should reflect the search/date filters too (just not the status filter itself,
  // since that's exactly what the tabs are splitting by) — otherwise the numbers on the tabs
  // silently stop matching what "ທັງໝົດ" and the visible table actually show once a date
  // range is applied, which is confusing rather than useful.
  const dateAndSearchFiltered = studioLabels.filter(l=>{
    if(q && !(String(l.labelNumber).toLowerCase().includes(q) || (l.recipientName||"").toLowerCase().includes(q) || (l.recipientPhone||"").includes(q))) return false;
    if(dFrom && new Date(l.createdAt).toLocaleDateString("en-CA", {timeZone: LAOS_TZ}) < dFrom) return false;
    if(dTo && new Date(l.createdAt).toLocaleDateString("en-CA", {timeZone: LAOS_TZ}) > dTo) return false;
    return true;
  });
  const counts = {all: dateAndSearchFiltered.length};
  LABEL_STATUS_ORDER.forEach(code=>{ counts[code] = dateAndSearchFiltered.filter(l=>(l.status||0)===code).length; });

  let list = tab==="all" ? dateAndSearchFiltered : dateAndSearchFiltered.filter(l=>(l.status||0)===Number(tab));

  // Sortable columns, same click-to-sort pattern as the label history tab.
  const sortBy = STATE.labelStatusSortBy||"createdAt";
  const sortDir = STATE.labelStatusSortDir==="asc" ? 1 : -1;
  const sortVal = (l)=>{
    if(sortBy==="labelNumber") return String(l.labelNumber||"");
    if(sortBy==="courierName") return (l.courierName||"").toLowerCase();
    if(sortBy==="recipientName") return (l.recipientName||l.quickText||"").toLowerCase();
    if(sortBy==="itemText") return (l.itemText||l.quickText||"").toLowerCase();
    if(sortBy==="qty") return Number(l.qty||0);
    if(sortBy==="codAmount") return Number(l.codAmount||0);
    return new Date(l.createdAt||0).getTime();
  };
  list = [...list].sort((a,b)=>{
    const av=sortVal(a), bv=sortVal(b);
    if(av<bv) return -1*sortDir;
    if(av>bv) return 1*sortDir;
    return 0;
  });
  const sortArrow = (col)=> sortBy===col ? (STATE.labelStatusSortDir==="asc"?" ▲":" ▼") : "";
  const sortTh = (col, label)=> `<th data-sort-label-status="${col}" style="cursor:pointer; user-select:none;">${label}${sortArrow(col)}</th>`;

  const selectedIds = STATE.selectedLabelStatusIds;
  const pageSize = STATE.labelStatusPageSize||100;
  const totalPages = Math.max(1, Math.ceil(list.length/pageSize));
  if(STATE.labelStatusPage>totalPages) STATE.labelStatusPage = totalPages;
  const curPage = STATE.labelStatusPage||1;
  const pageOffset = (curPage-1)*pageSize;
  const visibleList = list.slice(pageOffset, pageOffset+pageSize);
  const allVisibleSelected = visibleList.length>0 && visibleList.every(l=>selectedIds.includes(l.id));
  const totalCod = list.reduce((sum,l)=>sum+(Number(l.codAmount)||0), 0);

  const statusColor = (code)=>{
    if(code===3) return "#3a7d44"; // completed — green
    if(code===5 || code===6) return "#c0392b"; // returned/cancelled — red
    if(code===2) return "#e67e22"; // shipped out — orange (matches Pancake's own orange pill)
    if(code===1) return "#2980b9"; // confirmed — blue
    return "#7d7d7d"; // brand new — neutral grey
  };

  const vc = STATE.labelStatusVisibleCols;
  const COLS = [
    {key:"labelNumber", label:"ເລກທີ່", sortable:true},
    {key:"courierName", label:"ຂົນສົ່ງ", sortable:true},
    {key:"recipientName", label:"ລູກຄ້າ", sortable:true},
    {key:"address", label:"ຂໍ້ມູນຈັດສົ່ງ", sortable:false},
    {key:"itemText", label:"ສິນຄ້າ", sortable:true},

    {key:"createdAt", label:"ສ້າງເມື່ອ", sortable:true},
    {key:"codAmount", label:"ຈຳນວນເງິນ", sortable:true},
    {key:"status", label:"ສະຖານະ", sortable:false}
  ];
  const cellHtml = (l, key)=>{
    if(key==="labelNumber") return `<td>#${esc(l.labelNumber)}</td>`;

    return "<td></td>";
  };

  return `

      <h1>📦 ຕິດຕາມສະຖານະບິນ (Studio)</h1>
      <p>ຕິດຕາມສະຖານະບິນທີ່ສ້າງເອງໃນ Studio — ບິນຈາກ Pancake ໃຊ້ສະຖານະຈິງຂອງ Pancake ຢູ່ແລ້ວ (ເບິ່ງໄດ້ທີ່ "📦 ອໍເດີ Pancake")</p>
    </div>
    <div class="two-col-layout">
    <div class="two-col-main">
    <div class="card">
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <div data-status-tab="all" style="cursor:pointer; padding:8px 14px; border-radius:8px; border:2px solid ${tab==='all'?'var(--terracotta)':'#ddd'}; background:${tab==='all'?'var(--terracotta)':'#fff'}; color:${tab==='all'?'#fff':'#333'};">ທັງໝົດ (${fmt(counts.all)})</div>
        ${LABEL_STATUS_ORDER.map(code=>`
          <div data-status-tab="${code}" style="cursor:pointer; padding:8px 14px; border-radius:8px; border:2px solid ${tab==String(code)?'var(--terracotta)':'#ddd'}; background:${tab==String(code)?'var(--terracotta)':'#fff'}; color:${tab==String(code)?'#fff':'#333'};">${esc(labelStatusName(code))} (${fmt(counts[code])})</div>
        `).join("")}
      </div>
      <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px; align-items:center; position:relative;">
        <input type="text" id="label-status-search" placeholder="🔍 ຄົ້ນຫາຕາມເລກທີ່, ຊື່, ຫຼືເບີໂທ..." value="${esc(STATE.labelStatusSearch)}" style="flex:1; min-width:200px; margin-bottom:0;"/>
        <span class="small-muted">ວັນທີ່:</span>

        <button class="btn btn-sm btn-outline" id="btn-refresh-label-status">🔄 Refresh</button>
        <div id="col-picker-wrapper" style="position:relative; display:inline-block;">
          <button class="btn btn-sm btn-outline" id="btn-toggle-col-picker">⚙️ ຄໍລຳ</button>
          ${STATE.labelStatusColPickerOpen ? `
            <div style="position:absolute; top:100%; right:0; margin-top:6px; background:#fff; border:1px solid #ddd; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15); padding:12px; z-index:20; min-width:200px;">
              <div class="small-muted" style="margin-bottom:8px; font-weight:600;">ເລືອກຄໍລຳທີ່ຈະສະແດງ</div>
              ${COLS.map(c=>`
                <label style="display:flex; align-items:center; gap:8px; margin-bottom:6px; font-weight:400; cursor:pointer;">
                  <input type="checkbox" data-toggle-col="${c.key}" ${vc[c.key]?'checked':''}/> ${esc(c.label)}
                </label>
              `).join("")}
            </div>
          ` : ""}
        </div>
        <span class="small-muted">📋 ສະແດງ:</span>
        ${renderPageSizeSelect("label-status-page-size", pageSize)}
        <span class="small-muted">${fmt(list.length)} ໃບທັງໝົດ — ໜ້າ ${fmt(curPage)}/${fmt(totalPages)}</span>
      </div>
    </div>

    ${selectedIds.length>0 ? `
      <div class="card" style="display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;">
        <span>ເລືອກໄວ້ ${selectedIds.length} ໃບ</span>
        <div style="display:flex; gap:8px; align-items:center;">
          <select id="bulk-label-status-select" style="width:auto; margin-bottom:0;">
            ${LABEL_STATUS_ORDER.map(code=>`<option value="${code}">${esc(labelStatusName(code))}</option>`).join("")}

          <button class="btn btn-sm" id="btn-bulk-change-label-status">✅ ປ່ຽນສະຖານະທີ່ເລືອກ</button>

    ${list.length===0 ? `<div class="card empty"><span class="nav-icon">&#128230;</span>ບໍ່ມີບິນໃນສະຖານະນີ້</div>` : `

function attachLabelStatusTrackerEvents(){
  document.querySelectorAll("[data-status-tab]").forEach(el=>{
    el.addEventListener("click", ()=>{ STATE.labelStatusTab = el.getAttribute("data-status-tab"); STATE.labelStatusPage=1; render(); });
  });
  const searchEl = document.getElementById("label-status-search");
  if(searchEl) searchEl.addEventListener("input", ()=>{ STATE.labelStatusSearch = searchEl.value; STATE.labelStatusPage=1; render(); });

  attachDatePresetFilter("label-status-date", "labelStatusDateMode", "labelStatusDateFrom", "labelStatusDateTo", ()=>{ STATE.labelStatusPage=1; });

  const refreshBtn = document.getElementById("btn-refresh-label-status");
  if(refreshBtn) refreshBtn.addEventListener("click", refreshScanOutData);

  const colPickerBtn = document.getElementById("btn-toggle-col-picker");
  if(colPickerBtn) colPickerBtn.addEventListener("click", ()=>{ STATE.labelStatusColPickerOpen = !STATE.labelStatusColPickerOpen; render(); });

  if(!window.__colPickerOutsideBound){
    window.__colPickerOutsideBound = true;
    document.addEventListener("click", (e)=>{
      if(!STATE.labelStatusColPickerOpen) return;
      if(e.target.closest("#btn-toggle-col-picker")) return; // the toggle button's own handler already manages this click
      const wrapper = document.getElementById("col-picker-wrapper");
      if(wrapper && !wrapper.contains(e.target)){
        STATE.labelStatusColPickerOpen = false;
        render();
      }
    });
  }

  const labelStatusPageSizeEl = document.getElementById("label-status-page-size");
  if(labelStatusPageSizeEl) labelStatusPageSizeEl.addEventListener("change", ()=>{ STATE.labelStatusPageSize = Number(labelStatusPageSizeEl.value); STATE.labelStatusPage=1; render(); });
  attachPageNumberNavOnce();
  document.querySelectorAll("[data-toggle-col]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const key = el.getAttribute("data-toggle-col");
      STATE.labelStatusVisibleCols[key] = el.checked;
      render();
    });
  });

  document.querySelectorAll("[data-view-label-history]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-view-label-history");
      STATE.viewingLabelHistoryId = id;
      STATE.labelHistoryPopupRows = [];
      render();
      loadLabelStatusHistory(id);
    });
  });
  const closeHistoryBtn = document.getElementById("btn-close-label-history-popup");
  if(closeHistoryBtn) closeHistoryBtn.addEventListener("click", ()=>{ STATE.viewingLabelHistoryId = ""; render(); });
  const historyOverlay = document.getElementById("label-history-popup-overlay");
  if(historyOverlay) historyOverlay.addEventListener("click", (e)=>{ if(e.target===historyOverlay){ STATE.viewingLabelHistoryId = ""; render(); } });

  attachTableColumnResize("label-status-table", STATE.labelStatusColWidths,
    ["_checkbox", ...Object.keys(STATE.labelStatusVisibleCols).filter(k=>STATE.labelStatusVisibleCols[k]), "_history"]);

  document.querySelectorAll("[data-sort-label-status]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      if(e.target.closest(".col-resizer")) return;
      const col = el.getAttribute("data-sort-label-status");
      if(STATE.labelStatusSortBy===col){
        STATE.labelStatusSortDir = STATE.labelStatusSortDir==="asc" ? "desc" : "asc";
      } else {
        STATE.labelStatusSortBy = col;
        STATE.labelStatusSortDir = col==="createdAt" ? "desc" : "asc";
      }
      render();
    });
  });

  const selectAllEl = document.getElementById("label-status-select-all");
  if(selectAllEl) selectAllEl.addEventListener("change", ()=>{
    const visibleIds = Array.from(document.querySelectorAll("[data-label-status-checkbox]")).map(el=>el.getAttribute("data-label-status-checkbox"));
    if(selectAllEl.checked){
      STATE.selectedLabelStatusIds = [...new Set([...STATE.selectedLabelStatusIds, ...visibleIds])];
    } else {
      STATE.selectedLabelStatusIds = STATE.selectedLabelStatusIds.filter(id=>!visibleIds.includes(id));
    }
    render();
  });
  document.querySelectorAll("[data-label-status-checkbox]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const id = el.getAttribute("data-label-status-checkbox");
      if(el.checked){
        if(!STATE.selectedLabelStatusIds.includes(id)) STATE.selectedLabelStatusIds.push(id);
      } else {
        STATE.selectedLabelStatusIds = STATE.selectedLabelStatusIds.filter(x=>x!==id);
      }
      render();
    });
  });
  const clearSelectionBtn = document.getElementById("btn-clear-label-status-selection");
  if(clearSelectionBtn) clearSelectionBtn.addEventListener("click", ()=>{ STATE.selectedLabelStatusIds = []; render(); });

  const bulkChangeBtn = document.getElementById("btn-bulk-change-label-status");
  if(bulkChangeBtn) bulkChangeBtn.addEventListener("click", async ()=>{
    const selectEl = document.getElementById("bulk-label-status-select");
    const newStatus = Number(selectEl.value);
    const ids = [...STATE.selectedLabelStatusIds];
    if(!(await customConfirm(`ຢືນຢັນປ່ຽນສະຖານະ ${ids.length} ໃບເປັນ "${labelStatusName(newStatus)}"?`))) return;
    ids.forEach(id=>{
      const label = STATE.data.shippingLabels.find(l=>l.id===id);
      if(!label) return;
      const oldStatus = label.status||0;
      label.status = newStatus;
      changeLabelStatus(id, oldStatus, newStatus).catch(err=>{
        console.error(err);
        label.status = oldStatus;
        render();
      });
    });
    STATE.selectedLabelStatusIds = [];
    render();
  });

  document.querySelectorAll("[data-change-label-status]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const id = el.getAttribute("data-change-label-status");
      const newStatus = Number(el.value);
      const label = STATE.data.shippingLabels.find(l=>l.id===id);
      if(!label) return;
      const oldStatus = label.status||0;
      label.status = newStatus;
      render();
      changeLabelStatus(id, oldStatus, newStatus).catch(err=>{
        console.error(err);
        label.status = oldStatus;
        showErrorToast("ປ່ຽນສະຖານະບໍ່ສຳເລັດ ກະລຸນາລອງໃໝ່: "+err.message);
        render();
      });
    });
  });

  // Clicking anywhere on a row (except an interactive control inside it — checkbox, the
  // status <select>, or the 🕐 history button) opens the same full bill preview used
  // elsewhere in the app.
  document.querySelectorAll("[data-view-label-row]").forEach(tr=>{
    tr.addEventListener("click", (e)=>{
      if(e.target.closest("input, select, button, a, label")) return;
      const id = tr.getAttribute("data-view-label-row");
      const label = STATE.data.shippingLabels.find(l=>l.id===id);
      if(!label) return;
      STATE.printingLabels = [label];
      STATE.barcodeStatusMap = {[label.id]: "loading"};
      render();
    });
  });
  if(STATE.printingLabels.length>0) attachLabelPrintPreviewEvents();
}

/* ---------- Deterministic fallback parser (no AI, cannot silently fail) ----------
   Runs synchronously the instant a quick label is saved, so recipientPhone/codAmount/
   address/courierName/recipientName are populated immediately — no waiting on a network
   call that might be slow, blocked, or return text the AI step below can't parse. The AI
   parse afterward only REFINES these (fills gaps), it never blanks out what this found. */
function regexParseQuickText(quickText){
  const text = String(quickText||"");
  const lines = text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  const out = {recipientName:"", recipientPhone:"", address:"", courierName:"", codAmount:0};

  const phoneMatch = text.match(/0\d{1,2}[\s\-]?\d{3,4}[\s\-]?\d{2,4}[\s\-]?\d{0,3}/);
  if(phoneMatch) out.recipientPhone = phoneMatch[0].replace(/[\s\-]/g,"").trim();

  let codMatch = text.match(/(?:COD|ຄອດ)[^\d]{0,12}([\d][\d,\.]{2,})/i);
  if(!codMatch) codMatch = text.match(/([\d]{1,3}(?:,\d{3})+|\d{4,})\s*(?:ກີບ|kip)/i);
  if(codMatch) out.codAmount = Number(String(codMatch[1]).replace(/[,\.]/g,"")) || 0;

  const addrLine = lines.find(l=>/ບ້ານ|ເມືອງ|ແຂວງ|ນະຄອນຫຼວງ|ນະຄອນ/.test(l));
  if(addrLine) out.address = addrLine;

  const nameLine = lines.find(l=> l!==addrLine && !/\d{5,}/.test(l) && !/COD|ກີບ/i.test(l));
  if(nameLine) out.recipientName = nameLine;

  const couriers = (STATE.data.couriers||[]);
  const foundCourier = couriers.find(c=>c.name && text.includes(c.name));
  if(foundCourier) out.courierName = foundCourier.name;

  return out;
}

/* ---------- Parse "ພິມດ່ວນ" pasted chat text into structured fields with AI ----------
   Quick-print labels only ever stored one big blob of pasted chat text (quickText).
   That meant recipientName/recipientPhone/address/codAmount/courierName were always
   blank for quick labels — so the ສະແກນສິນຄ້າອອກ page (which reads exactly those
   fields) had nothing to show for them. This asks the AI to lift those same fields out
   of the pasted text, so the existing scan-out display works for quick labels too,
   with zero changes needed on the scan-out side. Runs in the background after a quick
   label is saved — never blocks the fast "save & next" workflow. */
async function parseQuickTextWithAI(quickText){
  const system = "ທ່ານແມ່ນຜູ້ຊ່ວຍແຍກຂໍ້ມູນ. ອ່ານຂໍ້ຄວາມທີ່ແອັດມິນຮ້ານກ໋ອບຈາກແຊັດລູກຄ້າ (ອາດຈະບໍ່ຮຽງລຳດັບ, ອາດມີ emoji/ຄຳຟຸ່ມເຟືອຍ) ແລ້ວດຶງອອກມາເປັນ JSON ລ້ວນໆເທົ່ານັ້ນ ບໍ່ມີຄຳອະທິບາຍ ບໍ່ມີ markdown code fence. ຮູບແບບ: {\"customerName\":\"\",\"phone\":\"\",\"address\":\"\",\"courierName\":\"\",\"codAmount\":0}. ຖ້າຫາຂໍ້ມູນໃດບໍ່ພົບ ໃຫ້ໃສ່ຄ່າຫວ່າງ \"\" (ຫຼື 0 ສຳລັບ codAmount). codAmount ເອົາສະເພາະຕົວເລກ (ບໍ່ມີ ' ກີບ' ຫຼືເຄື່ອງໝາຍຄັ່ນ).";
  const raw = await callAI(quickText, system);
  // The model doesn't always obey "JSON only" perfectly — it may add a stray
  // sentence before/after. Pull out just the {...} block instead of assuming
  // the whole response is clean JSON, so one extra word doesn't break everything.
  const jsonBlock = String(raw||"").match(/\{[\s\S]*\}/);
  const cleaned = jsonBlock ? jsonBlock[0] : String(raw||"").replace(/```json|```/g, "").trim();
  const parsed = JSON.parse(cleaned);
  return {
    recipientName: String(parsed.customerName||"").trim(),
    recipientPhone: String(parsed.phone||"").trim(),
    address: String(parsed.address||"").trim(),
    courierName: String(parsed.courierName||"").trim(),
    codAmount: Number(parsed.codAmount)||0
  };
}
// Fire-and-forget: parse in background, then patch just those fields locally + in Supabase.
// Never surfaces an error to the person — worst case the scan-out page just stays blank
// for that one label, same as it always was before this feature existed.
function backgroundParseQuickLabel(labelId, quickText){
  parseQuickTextWithAI(quickText).then(aiFields=>{
    const idx = STATE.data.shippingLabels.findIndex(l=>l.id===labelId);
    if(idx===-1) return; // label was deleted/edited away already
    const current = STATE.data.shippingLabels[idx];
    // Only let the AI overwrite a field if it actually found something for it —
    // otherwise keep whatever the instant regex fallback already saved.
    const merged = {
      recipientName: aiFields.recipientName || current.recipientName || "",
      recipientPhone: aiFields.recipientPhone || current.recipientPhone || "",
      address: aiFields.address || current.address || "",
      courierName: aiFields.courierName || current.courierName || "",
      codAmount: aiFields.codAmount || current.codAmount || 0
    };
    STATE.data.shippingLabels[idx] = {...current, ...merged};
    if(STATE.page==="labels" || STATE.page==="scanOut" || STATE.page==="scanOutPancake") render();
    dbUpdateShippingLabelParsedFields(labelId, merged).catch(err=>console.error("background parse save failed:", err));
  }).catch(err=>{ console.error("AI parse of quick label failed (regex fallback values already saved):", err); });
}
async function dbUpdateShippingLabelParsedFields(id, fields){
  const {error} = await sb.from("shipping_labels").update({
    recipient_name:fields.recipientName, recipient_phone:fields.recipientPhone,
    address:fields.address, courier_name:fields.courierName, cod_amount:fields.codAmount
  }).eq("id", id);
  if(error) throw error;
}

/* Almost every text input in this app calls render() on every keystroke (simplest way to
   keep STATE and the DOM in sync everywhere). The problem: render() replaces innerHTML, which
   destroys and recreates the DOM node you're typing into — so the browser drops focus after
   every single character, forcing you to click back into the field each time. This wrapper
   fixes that ONE place instead of touching every input handler in the app: remember which
   element (by id) had focus and where the cursor was, let the real render happen, then put
   focus (and the cursor position) right back where it was. */
function render(){
  const active = document.activeElement;
  let focusId = null, selStart = null, selEnd = null;
  if(active && active.id && (active.tagName==="INPUT" || active.tagName==="TEXTAREA")){
    focusId = active.id;
    if(typeof active.selectionStart === "number"){ selStart = active.selectionStart; selEnd = active.selectionEnd; }
  }
  renderInner();
  if(focusId){
    const el = document.getElementById(focusId);
    if(el && (el.tagName==="INPUT" || el.tagName==="TEXTAREA")){
      el.focus();
      if(selStart!=null && el.setSelectionRange){
        try{ el.setSelectionRange(selStart, selEnd); }catch(e){ /* some input types (number, date) don't support this — harmless */ }
      }
    }
  }
}

function updateNavHighlight(){

      STATE.page = el.getAttribute("data-nav");

  stopIdleTracking();
  // Clear the stored last-activity timestamp too — otherwise a fresh login right after this
  // would call startIdleTracking() -> checkIdleSinceLastSeen() and see the SAME stale timestamp,
  // immediately logging the person straight back out the moment they log in.
  try{ localStorage.removeItem(LAST_ACTIVITY_KEY); }catch(e){}
  render();
  if(auto) showToast("ອອກຈາກລະບົບອັດຕະໂນມັດ ເນື່ອງຈາກບໍ່ມີການໃຊ້ງານ — ກະລຸນາລ໋ອກອິນໃໝ່");
}

function attachSidebarEvents(){
  const logoutBtn = document.getElementById("btn-logout");
  if(logoutBtn) logoutBtn.addEventListener("click", ()=>{ doLogout(false); });

  const reloadBtn = document.getElementById("btn-reload-data");
  if(reloadBtn) reloadBtn.addEventListener("click", ()=>{ refreshAll(); });

  const hamBtn = document.getElementById("btn-mobile-menu");
  if(hamBtn) hamBtn.addEventListener("click", ()=>{
    STATE.mobileMenuOpen ? closeMobileMenu() : openMobileMenu();
  });
  const closeXBtn = document.getElementById("btn-close-mobile-menu");
  if(closeXBtn) closeXBtn.addEventListener("click", closeMobileMenu);
  const overlay = document.getElementById("sidebar-overlay");
  if(overlay) overlay.addEventListener("click", closeMobileMenu);
}

function updateMainContent(){
  const main = document.getElementById("main");
  if(!main) return;
  main.classList.remove("main-fade");
  void main.offsetWidth; // force reflow so the animation restarts every time
  main.innerHTML = renderPage();
  main.classList.add("main-fade");
  attachPageEvents();
}

function renderPage(){
  // Defense in depth: the nav already hides disabled pages, but also block direct
  // rendering in case STATE.page was left pointing at a page an owner just disabled.
  if(BASE_NAV.some(n=>n.id===STATE.page) && !isPageEnabledForCurrentUser(STATE.page)){
    return renderDashboard();
  }
  switch(STATE.page){
    case "dashboard": return renderDashboard();
    case "products": return renderProducts();
    case "content": return renderContent();
    case "productChat": return renderProductChat();
    case "costs": return renderCosts();
    case "admin": return renderAdmin();
    case "insights": return renderInsights();
    case "reports": return renderReports();
    case "feedback": return renderFeedback();
    case "attendance": return renderAttendance();
    case "labels": return renderLabels();
    case "scanOut": return renderScanOut();
    case "scanOutPancake": return renderScanOutPancake();
    case "pancakeCrm": return renderPancakeCrm();
    case "profitDashboard": return renderProfitDashboard();
    case "labelStatusTracker": return renderLabelStatusTracker();
    case "adSpend": return renderAdSpend();
    case "whatsapp": return renderWhatsapp();
    case "users": return isOwner() ? renderUsers() : renderDashboard();
    case "loginHistory": return isOwner() ? renderLoginHistory() : renderDashboard();
    case "deletionLog": return renderDeletionLog();
    case "pagePermissions": return isOwner() ? renderPagePermissions() : renderDashboard();
    default: return "";
  }
}

function renderProductFaqManager(){

  const list = STATE.data.productFaq[productId] || [];

        <div class="card" style="background:var(--cream-2); padding:10px 14px; margin-bottom:8px;">
          <div class="flex-between" style="align-items:flex-start;">
            <div style="flex:1;">
              <div style="font-weight:700; font-size:13.5px;">❓ ${esc(fq.question)}</div>
              <div class="small-muted" style="margin-top:3px;">${esc(fq.answer)}</div>
            </div>
            <button type="button" data-del-faq="${fq.id}" style="border:none; background:none; cursor:pointer; color:var(--terracotta-dark); font-weight:700; padding:0 2px;">&#10005;</button>
          </div>
        </div>
      `).join("")}
      <div class="grid-2" style="margin-top:8px;">
        <div>
          <label style="font-size:12.5px;">ຄຳຖາມ</label>
          <input type="text" id="new-faq-question" placeholder="ເຊັ່ນ: ລາຄາເທົ່າໃດ?" value="${esc(STATE.newFaqQuestion)}"/>
        </div>

          <label style="font-size:12.5px;">ຄຳຕອບແນະນຳ</label>

        </div>
      </div>
      <button class="btn btn-sm btn-outline" id="btn-add-faq" style="margin-top:8px;">+ ເພີ່ມຄຳຖາມ-ຕອບ</button>
    </div>
  `;
}

  if(d.products.length===0) return `<div class="card"><p class="small-muted">ກະລຸນາເພີ່ມສິນຄ້າກ່ອນ ໃນໜ້າ "ສິນຄ້າ"</p></div>`;
  const productId = STATE.selProduct;
  const product = d.products.find(p=>p.id===productId);
  const f = STATE.orderForm;
  const statuses = ["ລໍຖ້າ","ສົ່ງແລ້ວ","ຈ່າຍແລ້ວ","ຍົກເລີກ"];
  let items = d.orders.filter(o=>o.productId===productId);
  if(STATE.orderFilter) items = items.filter(o=>o.status===STATE.orderFilter);
  const csOrderRange = resolvePresetDateRange(STATE.orderDateMode||"all", STATE.orderDateFrom, STATE.orderDateTo);
  if(csOrderRange.from || csOrderRange.to) items = items.filter(o=>{
    if(!o.createdAt) return false;
    const iso = new Date(o.createdAt).toLocaleDateString("en-CA", {timeZone: LAOS_TZ});
    if(csOrderRange.from && iso<csOrderRange.from) return false;
    if(csOrderRange.to && iso>csOrderRange.to) return false;
    return true;
  });
  if(STATE.orderSearch){
    const q = STATE.orderSearch.toLowerCase();
    items = items.filter(o=>o.name.toLowerCase().includes(q) || (o.phone||"").toLowerCase().includes(q));

        <div><label style="font-size:12.5px;">ເບີໂທ</label><input type="text" id="cs-order-phone" placeholder="020..." value="${esc(f.phone)}"/></div>
        <div><label style="font-size:12.5px;">ລາຍລະອຽດສິນຄ້າ</label><input type="text" id="cs-order-productlabel" placeholder="${product?esc(product.name):'ເຊັ່ນ: ຂະໜາດ/ຮຸ່ນ'}" value="${esc(f.productLabel)}"/></div>
        <div><label style="font-size:12.5px;">ຈຳນວນ</label><input type="text" id="cs-order-qty" placeholder="1" value="${esc(f.qty)}"/></div>
        <div><label style="font-size:12.5px;">ລາຄາລວມ</label><input type="text" id="cs-order-price" placeholder="0" value="${esc(f.price)}"/></div>
        <div><label style="font-size:12.5px;">ໝາຍເຫດ (ບໍ່ບັງຄັບ)</label><input type="text" id="cs-order-note" placeholder="ເຊັ່ນ: ມາຈາກ TikTok" value="${esc(f.note)}"/></div>
      </div>
      <button class="btn btn-sm" id="cs-btn-add-order" style="margin-top:12px;">➕ ບັນທຶກອໍເດີ</button>

/* ============ Marketing Studio: 💰 ຄຳນວນກຳໄລ (pricing calculator) ============ */
function renderPricingTab(d){
  if(d.products.length===0) return `<div class="card"><p class="small-muted">ກະລຸນາເພີ່ມສິນຄ້າກ່ອນ ໃນໜ້າ "ສິນຄ້າ"</p></div>`;
  const productId = STATE.selProduct;
  if(STATE.pricingFormProduct !== productId){
    const saved = d.productPricing[productId];
    STATE.pricingForm = saved ? {
      costA:String(saved.costA||""), sellA:String(saved.sellA||""), labelA:saved.labelA||"ແພັກນ້ອຍ",
      costB:String(saved.costB||""), sellB:String(saved.sellB||""), labelB:saved.labelB||"ແພັກໃຫຍ່",
      discountPct:String(saved.discountPct||"")
    } : {costA:"", sellA:"", labelA:"ແພັກນ້ອຍ", costB:"", sellB:"", labelB:"ແພັກໃຫຍ່", discountPct:""};
    STATE.pricingFormProduct = productId;
    STATE.pricingSaved = false;
  }
  const f = STATE.pricingForm;
  const costA = parseFloat(f.costA)||0, sellA = parseFloat(f.sellA)||0;
  const costB = parseFloat(f.costB)||0, sellB = parseFloat(f.sellB)||0;
  const disc = parseFloat(f.discountPct)||0;
  const profitA = sellA-costA, marginA = sellA ? ((profitA/sellA)*100).toFixed(1) : "0.0";
  const profitB = sellB-costB, marginB = sellB ? ((profitB/sellB)*100).toFixed(1) : "0.0";
  const discPriceA = sellA*(1-disc/100), discProfitA = discPriceA-costA;
  return `
    <div class="card">
      <label>ເລືອກສິນຄ້າ</label>
      <select id="cs-pricing-product">

/* ============ Marketing Studio: 🕐 ປະຫວັດ (history — search/filter/export) ============ */
const HISTORY_FILTERABLE_TYPES = ["createPost","video","caption","calendar","closing","analyzer","objection","competitor"];
function renderHistoryTab(d){
  let items = d.contentHistory;
  if(STATE.historyFilter) items = items.filter(c=>c.type===STATE.historyFilter);
  const csHistRange = resolvePresetDateRange(STATE.historyDateMode||"all", STATE.historyDateFrom, STATE.historyDateTo);
  if(csHistRange.from || csHistRange.to) items = items.filter(c=>{
    const iso = dateStrToISO(c.date);
    if(csHistRange.from && iso<csHistRange.from) return false;
    if(csHistRange.to && iso>csHistRange.to) return false;
    return true;
  });
  if(STATE.historySearch){
    const q = STATE.historySearch.toLowerCase();
    items = items.filter(c=>c.productName.toLowerCase().includes(q) || c.content.toLowerCase().includes(q));
  }
  return `
    <div class="card">
      <label>🕐 ປະຫວັດການສ້າງເນື້ອຫາ (${d.contentHistory.length})</label>
      <p class="small-muted" style="margin:6px 0 14px;">ບັນທຶກທຸກອັນທີ່ສ້າງ — ຄົ້ນຫາ ແລະ ກອງໄດ້</p>
      <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;">
        <input type="text" id="cs-hist-search" placeholder="ຄົ້ນຫາໃນປະຫວັດ..." value="${esc(STATE.historySearch)}" style="flex:1; min-width:180px; margin-bottom:0;"/>
        <select id="cs-hist-filter" style="max-width:170px; margin-bottom:0;">
          <option value="">ທຸກປະເພດ</option>
          ${HISTORY_FILTERABLE_TYPES.map(t=>`<option value="${t}" ${STATE.historyFilter===t?'selected':''}>${TAB_LABELS[t]}</option>`).join("")}
        </select>
        ${renderDatePresetFilter("cs-hist-date", STATE.historyDateMode||"all", STATE.historyDateFrom, STATE.historyDateTo)}
        <button class="btn btn-sm btn-outline" id="cs-btn-export-history">📤 Export CSV</button>
        <button class="btn btn-sm btn-outline" id="cs-btn-clear-history" style="color:var(--danger); border-color:var(--danger);">🗑️ ລຶບທັງໝົດ</button>
      </div>
      ${items.length===0 ? `<p class="small-muted">ຍັງບໍ່ມີປະຫວັດ</p>` : items.map(c=>`
        <div style="border:1px solid #EAE3D2; border-radius:9px; padding:12px 14px; margin-bottom:8px;">
          <div style="display:flex; justify-content:space-between; gap:10px; margin-bottom:6px;">
            <span class="pill pill-gray">${esc(TAB_LABELS[c.type]||c.type)}</span>
            <span class="small-muted">${esc(c.date)}</span>
          </div>
          <div style="font-weight:700; font-size:13.5px; margin-bottom:4px;">${esc(c.productName)}</div>
          <div class="small-muted" style="max-height:60px; overflow:hidden; white-space:pre-wrap;">${esc(c.content.slice(0,180))}${c.content.length>180?"...":""}</div>
          <div style="margin-top:8px; display:flex; gap:14px;">
            <button type="button" data-cs-hist-view="${c.id}" style="border:none; background:none; cursor:pointer; color:var(--bg-deep); font-weight:700; font-size:12.5px;">👁️ ເບິ່ງ</button>
            <button type="button" data-cs-hist-copy="${c.id}" style="border:none; background:none; cursor:pointer; color:var(--bg-deep); font-weight:700; font-size:12.5px;">📋 ກັອບປີ້</button>
            <button type="button" data-cs-hist-del="${c.id}" style="border:none; background:none; cursor:pointer; color:var(--terracotta-dark); font-weight:700; font-size:12.5px;">🗑️ ລຶບ</button>
          </div>
        </div>
      `).join("")}
    </div>
  `;
}

async function generateCfgContent(){
  const d = STATE.data;

  if(!product || !cfg || !cfg.content) return;
  const sec = cfg.content;
  STATE.cfg.contentLoading = true; STATE.cfg.contentError = ""; STATE.cfg.contentOut = "";
  render();
  const knowledge = d.productKnowledge[product.id];
  const knowledgeBlock = (knowledge && knowledge.content) ? `\n\nຂໍ້ມູນຄົ້ນຄວ້າເພີ່ມເຕີມ:\n${knowledge.content}` : "";
  const selectedPains = (d.painPointsLib[product.id]||[]).filter(pp=>STATE.selectedPainPointIds.includes(pp.id));
  const selectedPainBlock = selectedPains.length>0 ? `\nບັນຫາລູກຄ້າທີ່ຈະເນັ້ນເປັນພິເສດ: ${selectedPains.map(p=>p.text).join(", ")}` : "";
  const styleLabel = (sec.postStyles||[]).find(o=>o.value===STATE.cfg.postStyle)?.label || STATE.cfg.postStyle;
  const groupLabel = (sec.targetGroups||[]).find(o=>o.value===STATE.cfg.targetGroup)?.label || STATE.cfg.targetGroup;
  const platLabels = (sec.platforms||[]).filter(p=>STATE.cfg.platforms.includes(p.value));
  const platBlock = platLabels.map(p=>`- ${p.label}${p.instruction? ": "+p.instruction : ""}`).join("\n");

  const prompt = `ສ້າງໂພສຂາຍສິນຄ້າ ເປັນພາສາລາວ ສຳລັບສິນຄ້າຕໍ່ໄປນີ້:
ຊື່ສິນຄ້າ: ${product.name}
ໝວດໝູ່: ${product.category}
ລາຍລະອຽດ: ${product.desc}
${product.highlights ? `ຈຸດເດັ່ນ/ສ່ວນປະສົມ: ${product.highlights}` : ""}
${product.benefits ? `ປະໂຫຍດຫຼັກ: ${product.benefits}` : ""}
${product.usage ? `ວິທີໃຊ້: ${product.usage}` : ""}
ລາຄາ: ${product.price ? fmt(product.price)+" ກີບ" : "ບໍ່ລະບຸ"}
ບັນຫາລູກຄ້າ: ${product.painPoints}${selectedPainBlock}${knowledgeBlock}

ຮູບແບບຄອນເທັນ: ${styleLabel}
ກຸ່ມເປົ້າໝາຍ: ${groupLabel}
${STATE.cfg.keyMsg ? "Key message: "+STATE.cfg.keyMsg : ""}
${platBlock ? `ແພລດຟອມ ແລະ ຄຳແນະນຳສະເພາະ:\n${platBlock}` : ""}

ຂຽນໂພສທີ່ເໝາະກັບຮູບແບບ, ກຸ່ມເປົ້າໝາຍ, ແລະ ແພລດຟອມທີ່ລະບຸ (ຖ້າເລືອກຫຼາຍແພລດຟອມ ໃຫ້ແຍກຫົວຂໍ້ຕາມແພລດຟອມ), ມີ hook ດຶງດູດ, emoji ພໍດີ, ແລະ call-to-action ທ້າຍໂພສ.`;

  try{
    const result = await callAI(prompt, LAO_MARKETING_SYSTEM);
    STATE.cfg.contentOut = result;
    const newItem = {id:"c"+Date.now(), type:"content", productName:product.name, content:result, date:new Date().toLocaleString("en-GB",{timeZone:LAOS_TZ})};
    d.contentHistory.unshift(newItem);
    dbInsertContent(newItem).catch(e=>{ console.error(e); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+e.message); });

ບັນຫາລູກຄ້າ (pain points) ທີ່ບັນທຶກໄວ້: ${product.painPoints}${faqBlock}
${knowledge && knowledge.content ? `\nຂໍ້ມູນຄົ້ນຄວ້າຈາກອິນເຕີເນັດ (ຄົ້ນຄວ້າໄວ້ລ່ວງໜ້າ):\n${knowledge.content}` : ""}`;

  try{
    const answer = await callAI(question, system);
    const aiMsg = {id:"pc"+(Date.now()+1), productId:product.id, role:"ai", message:answer, createdAt:new Date().toISOString()};
    STATE.data.productChat.push(aiMsg);
    dbInsertChatMsg(aiMsg).catch(e=>{ console.error(e); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+e.message); });
  }catch(e){
    STATE.chatError = "ເກີດຂໍ້ຜິດພາດ: " + e.message;
  }
  STATE.chatSending = false;
  render();
}

function attachProductChatEvents(){
  const sel = document.getElementById("chat-product");
  if(sel) sel.addEventListener("change", ()=>{
    STATE.chatSelProduct = sel.value;
    STATE.chatKnowledgeOpen = false;
    render();
  });
  const toggleKnowledge = document.getElementById("btn-toggle-knowledge");
  if(toggleKnowledge) toggleKnowledge.addEventListener("click", ()=>{
    STATE.chatKnowledgeOpen = !STATE.chatKnowledgeOpen;
    render();
  });
  const input = document.getElementById("chat-input");
  if(input) input.addEventListener("input", ()=>{ STATE.chatQuestion = input.value; });
  const sendBtn = document.getElementById("btn-chat-send");
  if(sendBtn) sendBtn.addEventListener("click", sendProductChat);
  if(input) input.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendProductChat(); }
  });
  const log = document.getElementById("chat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

/* ---------- INSIGHTS ---------- */
function renderInsights(){
  const d = STATE.data;
  const f = STATE.insightForm;
  const owner = isOwner();
  const viewMode = STATE.insightViewMode || "table";
  const filterReporter = STATE.insightFilterReporter || "";
  const allInsights = d.insights;
  const insightRange = resolvePresetDateRange(STATE.insightDateMode||"all", STATE.insightDateFrom, STATE.insightDateTo);
  const shownInsights = ((owner && filterReporter)
    ? allInsights.filter(i=>i.adminName===filterReporter)
    : allInsights
  ).filter(i=>{
    if(!insightRange.from && !insightRange.to) return true;
    const iso = dateStrToISO(i.date);
    if(insightRange.from && iso<insightRange.from) return false;
    if(insightRange.to && iso>insightRange.to) return false;
    return true;

  const reporterOptions = Array.from(new Set(allInsights.map(i=>i.adminName).filter(Boolean))).sort();

  return `

async function analyzeInsights(){
  const d = STATE.data;
  if(d.insights.length===0){ STATE.analyzeError = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກ ກະລຸນາເພີ່ມບັນຫາລູກຄ້າກ່ອນ"; render(); return; }
  STATE.analyzing = true; STATE.analyzeError = ""; STATE.analysis = "";
  render();
  try{
    const list = d.insights.slice(0,30).map((i,idx)=>`${idx+1}. ຄຳຖາມ: ${i.question} | ຄຳຕອບ: ${i.answer} | ສິນຄ້າ: ${i.productRelated||"-"}`).join("\n");
    const prompt = `ນີ້ແມ່ນບັນທຶກຄຳຖາມ-ຄຳຕອບຈາກລູກຄ້າທີ່ແຊັດເຂົ້າມາໃນຮ້ານອອນລາຍ:

${list}

ກະລຸນາວິເຄາະ:
1. ຮູບແບບ/ແນວໂນ້ມບັນຫາທີ່ລູກຄ້າຖາມເລື້ອຍໆ
2. ຈຸດທີ່ສິນຄ້າປະຈຸບັນຍັງຕອບສະໜອງບໍ່ພໍ
3. ແນວຄິດສິນຄ້າໃໝ່ ຫຼື ການແຕກລາຍສິນຄ້າທີ່ອາດຕອບໂຈດຄວາມຕ້ອງການເຫຼົ່ານີ້ໄດ້ (ສະເໜີ 2-3 ແນວຄິດ)
4. ຄຳແນະນຳສຳລັບການສ້າງ content ໃໝ່ ໂດຍອີງໃສ່ບັນຫາທີ່ພົບ

ຂຽນເປັນພາສາລາວ ຈັດໝວດໝູ່ໃຫ້ຈະແຈ້ງ.`;
    const result = await callAI(prompt, "ທ່ານແມ່ນນັກວິເຄາະການຕະຫຼາດ ຊ່ຽວຊານໃນການອ່ານ pattern ຈາກຄຳຖາມລູກຄ້າ ເພື່ອຄົ້ນພົບໂອກາດສິນຄ້າໃໝ່.");
    STATE.analysis = result;
  }catch(e){
    STATE.analyzeError = "ເກີດຂໍ້ຜິດພາດ: "+e.message;
  }
  STATE.analyzing = false;
  render();
}

function exportInsightsToExcel(){
  const d = STATE.data;
  const rows = d.insights.map(i => ({
    "ຜູ້ລາຍງານ": i.adminName || "",
    "ວັນທີ": i.date || "",
    "ຄຳຖາມ": i.question || "",
    "ຄຳຕອບຂອງແອັດມິນ": i.answer || "",
    "ສິນຄ້າທີ່ກ່ຽວຂ້ອງ": i.productRelated || "",
    "ມີຮູບແນບ": i.imageUrl ? "ມີ" : "ບໍ່ມີ",
    "ອ່ານແລ້ວ": i.readByOwner ? "ອ່ານແລ້ວ" : "ຍັງບໍ່ອ່ານ"
  }));
  if(rows.length===0){
    STATE.importMsg = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກໃຫ້ສົ່ງອອກ";
    render();
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:14},{wch:40},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ບັນຫາລູກຄ້າ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `customer-insights-${stamp}.xlsx`);
}

function importInsightsFromExcel(file){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const wb = XLSX.read(e.target.result, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
      const newItems = [];
      rows.forEach((r, idx) => {
        const question = r["ຄຳຖາມ"] || r["question"] || r["Question"] || "";
        const answer = r["ຄຳຕອບ"] || r["answer"] || r["Answer"] || "";
        const productRelated = r["ສິນຄ້າທີ່ກ່ຽວຂ້ອງ"] || r["product"] || r["Product"] || "";
        const date = r["ວັນທີ"] || r["date"] || r["Date"] || new Date().toLocaleDateString("en-GB", {timeZone: LAOS_TZ});
        if(String(question).trim()){
          newItems.push({
            id:"i"+Date.now()+"-"+idx,
            question:String(question), answer:String(answer),
            productRelated:String(productRelated), date:String(date)
          });
        }
      });
      if(newItems.length>0){
        STATE.data.insights.unshift(...newItems);
        await dbInsertInsightsBulk(newItems);
      }
      STATE.importMsg = newItems.length>0
        ? `ນຳເຂົ້າສຳເລັດ: ເພີ່ມ ${newItems.length} ລາຍການໃໝ່`
        : "ບໍ່ພົບແຖວທີ່ມີຄຳຖາມໃນໄຟລ໌ — ກະລຸນາກວດຫົວຄໍລາມ໌ໃຫ້ກົງກັບ 'ຄຳຖາມ', 'ຄຳຕອບ', 'ສິນຄ້າທີ່ກ່ຽວຂ້ອງ', 'ວັນທີ'";
    }catch(err){
      STATE.importMsg = "ອ່ານໄຟລ໌ບໍ່ສຳເລັດ: " + err.message;
    }
    render();
  };
  reader.readAsArrayBuffer(file);
}

function isOwner(){ return STATE.currentUser && STATE.currentUser.role==="owner"; }
// Page-level permission check: owner always sees everything and can't restrict themself.
// For "admin" role, a page is visible unless the owner explicitly turned it off in
// "⚙️ ຕັ້ງຄ່າສິດ". Missing entry = enabled (safe default, new pages show up automatically).
function isPageEnabledForCurrentUser(pageId){
  if(isOwner()) return true;
  const perms = STATE.data.adminPagePermissions || {};
  return perms[pageId] !== false;
}
async function dbSetAdminPagePermission(pageId, enabled, order){
  const row = {page_id:pageId, enabled};
  if(order!=null) row.sort_order = order;
  const {error} = await sb.from("admin_page_permissions").upsert(row);
  if(error) throw error;
}

/* ---------- ATTENDANCE ---------- */
function fmtTime(ts){
  if(!ts) return "-";
  return new Date(ts).toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", second:"2-digit", timeZone: LAOS_TZ});
}
function fmtDuration(inTs, outTs){
  if(!inTs || !outTs) return "-";
  const ms = new Date(outTs) - new Date(inTs);
  if(ms<=0) return "-";
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${h} ຊມ ${m} ນທ ${s} ວ`;
}
function todayStr(){ return new Date().toLocaleDateString("en-GB", {timeZone: LAOS_TZ}); }
// Decimal hours worked (0 if not yet clocked out) — used for sorting and summing in the summary table.
function attendanceHours(a){
  if(!a.clockIn || !a.clockOut) return 0;
  const ms = new Date(a.clockOut) - new Date(a.clockIn);
  return ms>0 ? ms/3600000 : 0;
}
// "HH:MM" (24h, Asia/Vientiane) of a clock-in/out timestamp, for comparing against the
// standard time setting — also just "HH:MM" strings, so plain string comparison works.
function timeOnlyHHMM(ts){
  if(!ts) return "";
  return new Date(ts).toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", timeZone: LAOS_TZ, hour12:false});
}
function isLateClockIn(a){
  const std = STATE.data.attendanceSettings.clockInTime;
  if(!std || !a.clockIn) return false;
  return timeOnlyHHMM(a.clockIn) > std;
}
function isEarlyClockOut(a){
  const std = STATE.data.attendanceSettings.clockOutTime;
  if(!std || !a.clockOut) return false;
  return timeOnlyHHMM(a.clockOut) < std;
}
function isOutOfRangeAttendance(a){
  return isOutsideShopRadius(a.clockInLat, a.clockInLng)===true || isOutsideShopRadius(a.clockOutLat, a.clockOutLng)===true;
}
/* ແປງ string ວັນທີແບບ "DD/MM/YYYY" ຫຼື "DD/MM/YYYY, HH:MM:SS" (ຮູບແບບທີ່ເກັບໄວ້ໃນ ປະຫວັດ content/insight/attendance)
   ໃຫ້ເປັນ "YYYY-MM-DD" ເພື່ອທຽບກັບຄ່າຈາກ <input type="date"> — ໃຊ້ຮ່ວມກັນທຸກ tab ທີ່ມີຕົວກອງວັນທີ */
function dateStrToISO(str){
  if(!str) return "";
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(!m) return "";
  const dd = m[1].padStart(2,"0"), mm = m[2].padStart(2,"0");
  return `${m[3]}-${mm}-${dd}`;
}
