/* Lightweight refresh used after every scan / search / filter / edit / delete on this page:
   updates ONLY the alert banner + history table regions via targeted innerHTML swaps,
   instead of calling the app-wide render(). This is essential for the camera mode вҖ” a full
   render() would recreate <video id="scan-camera-video">, which would tear down the live
   camera stream and force the person to re-open the camera after every single scan. */
function updateScanOutUI(){
  const alertEl = document.getElementById("scan-alert-region");
  const histEl = document.getElementById("scan-history-region");
  if(!alertEl || !histEl){ render(); return; } // not currently on this page вҖ” fall back safely
  alertEl.innerHTML = renderScanAlertHtml();
  histEl.innerHTML = renderScanHistoryHtml();
  attachScanHistoryRowEvents();
  const hwInput = document.getElementById("scan-hardware-input");
  if(hwInput && hwInput.value !== STATE.scanInputValue) hwInput.value = STATE.scanInputValue;
  const manualInput = document.getElementById("scan-manual-input");
  if(manualInput && manualInput.value !== STATE.scanInputValue) manualInput.value = STATE.scanInputValue;
}

function clearScanAlertLater(){
  if(scanAlertTimer) clearTimeout(scanAlertTimer);
  scanAlertTimer = setTimeout(()=>{ STATE.scanAlert = null; updateScanOutUI(); }, 2600);
}

function refocusScanInput(){
  setTimeout(()=>{
    const hw = document.getElementById("scan-hardware-input");
    if(hw) hw.focus();
  }, 50);
}

function exportScansToExcel(){
  const items = getFilteredScans();
  if(items.length===0) return;
  const rows = items.map((s,idx) => ({
    "аәҘаәіаә”аәұаәҡ": idx+1,
    "аәҘаә°аә«аәұаә”аәҡаәІа»Ӯаә„аә”": s.scannedCode,
    "аәӮаә»аәҷаәӘаә»а»ҲаәҮ": s.courierName || "-",
    "аәҲаәіаәҷаә§аәҷа»ҖаәҮаәҙаәҷ": s.matched ? s.codAmount : "-",
    "аәқаәІаәҒаәҹаәЈаәө/а»ҖаәҒаәұаәҡаәӣаәІаәҚаә—аәІаәҮ": s.matched ? (s.freeShipping?"аәқаәІаәҒаәҹаәЈаәө":"а»ҖаәҒаәұаәҡаәӣаәІаәҚаә—аәІаәҮ") : "-",
    "аәӘаә°аә–аәІаәҷаә°": s.matched ? "аәһаә»аәҡ" : "аәҡа»Қа»Ҳаәһаә»аәҡ",
    "а»Җаә§аәҘаәІ": new Date(s.scannedAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ})
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:8},{wch:16},{wch:18},{wch:14},{wch:16},{wch:10},{wch:22}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "аәӘаә°а»ҒаәҒаәҷаәӘаәҙаәҷаә„а»үаәІаәӯаәӯаәҒ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `package-scans-${stamp}.xlsx`);
}

async function processScanCode(code){
  const trimmed = String(code).trim();
  if(!trimmed) return;

  // Duplicate check: this exact barcode was already successfully matched & scanned before.
  const isDuplicate = STATE.data.packageScans.some(s=>s.scannedCode===trimmed && s.matched);
  if(isDuplicate){
    playScanSound("duplicate");
    STATE.scanAlert = {type:"duplicate", code:trimmed};
    STATE.scanInputValue = "";
    updateScanOutUI();
    clearScanAlertLater();
    refocusScanInput();
    return;
  }

  const label = STATE.data.shippingLabels.find(l=>String(l.labelNumber)===trimmed);
  const scan = {
    id:"sc"+Date.now()+Math.random().toString(36).slice(2,7),
    labelId: label ? label.id : "",
    scannedCode: trimmed,
    matched: !!label,
    recipientName: label ? label.recipientName : "",
    recipientPhone: label ? label.recipientPhone : "",
    address: label ? label.address : "",
    codAmount: label ? label.codAmount : 0,
    courierName: label ? label.courierName : "",
    freeShipping: label ? !!label.freeShipping : false,
    scannedAt: new Date().toISOString(),
    scannedBy: STATE.currentUser ? STATE.currentUser.name : ""
  };
  // Show it immediately (optimistic UI) so scanning feels instant.
  STATE.data.packageScans.unshift(scan);
  STATE.lastScanResult = scan;
  STATE.scanInputValue = "";
  STATE.scanError = "";
  if(label){
    playScanSound("success");
    STATE.scanAlert = {type:"success", code:trimmed};
    clearScanAlertLater();
  } else {
    playScanSound("notfound");
    STATE.scanAlert = {type:"notfound", code:trimmed};
    clearScanAlertLater();
  }
  updateScanOutUI();
  refocusScanInput();

  // Persist to Supabase. IMPORTANT: this must be awaited before any data reload happens вҖ”
  // previously the insert was fired without awaiting and immediately followed by a full
  // silentRefresh() (re-fetching ~17 tables). That reload's SELECT frequently returned
  // before this INSERT had committed, so the fresh data silently overwrote STATE.data
  // WITHOUT the just-scanned row вҖ” making it flash on screen for a couple seconds and
  // then vanish, even though sound played and everything looked fine. Fixed by awaiting
  // the write here, and by no longer doing a full reload after every single scan at all
  // (unnecessary вҖ” the optimistic local row already matches what's in the database once
  // this succeeds; a full 17-table reload per scan was also just wasted load on Supabase).
  try{
    await dbInsertPackageScan(scan);
  }catch(err){
    console.error(err);
    // Roll back the optimistic row вҖ” it was never actually saved вҖ” and tell the person
    // clearly on-screen (not just in the browser console, which they'd never see).
    STATE.data.packageScans = STATE.data.packageScans.filter(s=>s.id!==scan.id);
    STATE.scanAlert = null;
    STATE.scanError = "аәҡаәұаәҷаә—аә¶аәҒаәҘаә»аәҮаәҘаә°аәҡаә»аәҡаәҡа»Қа»ҲаәӘаәіа»ҖаәҘаәұаә” (" + (err && err.message ? err.message : "unknown error") + ") вҖ” аәҘаәӯаәҮаәӘаә°а»ҒаәҒаәҷа»ҖаәҘаәҒаәҷаәөа»үаә„аә·аәҷ";
    playScanSound("notfound");
    updateScanOutUI();
  }
}


function attachScanHistoryRowEvents(){
  document.querySelectorAll("[data-edit-scan]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-edit-scan");
      const s = STATE.data.packageScans.find(x=>x.id===id);
      if(!s) return;
      STATE.editingScanId = id;
      STATE.editScanForm = {courierName:s.courierName||"", codAmount:String(s.codAmount||""), freeShipping:!!s.freeShipping};
      updateScanOutUI();
    });
  });
  document.querySelectorAll("[data-cancel-scan-edit]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.editingScanId = "";
      updateScanOutUI();
    });
  });
  document.querySelectorAll("[data-save-scan]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const id = el.getAttribute("data-save-scan");
      const courierEl = document.getElementById("edit-scan-courier");
      const codEl = document.getElementById("edit-scan-cod");
      const freeEl = document.getElementById("edit-scan-free");
      const patch = {
        courierName: courierEl ? courierEl.value.trim() : "",
        codAmount: codEl ? (parseFloat(codEl.value)||0) : 0,
        freeShipping: freeEl ? freeEl.value==="free" : false
      };
      const s = STATE.data.packageScans.find(x=>x.id===id);
      const prev = s ? {courierName:s.courierName, codAmount:s.codAmount, freeShipping:s.freeShipping} : null;
      if(s){ s.courierName = patch.courierName; s.codAmount = patch.codAmount; s.freeShipping = patch.freeShipping; }
      STATE.editingScanId = "";
      updateScanOutUI();
      try{
        await dbUpdatePackageScan(id, patch);
      }catch(err){
        console.error(err);
        if(s && prev){ s.courierName = prev.courierName; s.codAmount = prev.codAmount; s.freeShipping = prev.freeShipping; }
        STATE.scanError = "аәҡаәұаәҷаә—аә¶аәҒаәҒаәІаәҷа»ҒаәҒа»үа»„аәӮаәҡа»Қа»ҲаәӘаәіа»ҖаәҘаәұаә” вҖ” аәҘаәӯаәҮа»ға»қа»ҲаәӯаәөаәҒаә„аәұа»үаәҮ";
        updateScanOutUI();
      }
    });
  });
  document.querySelectorAll("[data-del-scan]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const id = el.getAttribute("data-del-scan");
      if(!confirm("аәҘаә¶аәҡаәҘаәІаәҚаәҒаәІаәҷаәӘаә°а»ҒаәҒаәҷаәҷаәөа»ү?")) return;
      const removed = STATE.data.packageScans.find(x=>x.id===id);
      const removedIdx = STATE.data.packageScans.indexOf(removed);
      STATE.data.packageScans = STATE.data.packageScans.filter(x=>x.id!==id);
      updateScanOutUI();
      try{
        await dbDeletePackageScan(id);
      }catch(err){
        console.error(err);
        if(removed) STATE.data.packageScans.splice(removedIdx, 0, removed);
        STATE.scanError = "аәҘаә¶аәҡаәҡа»Қа»ҲаәӘаәіа»ҖаәҘаәұаә” вҖ” аәҘаәӯаәҮа»ға»қа»ҲаәӯаәөаәҒаә„аәұа»үаәҮ";
        updateScanOutUI();
      }
    });
  });
}

function stopCamera(){
  if(STATE.cameraScanInterval){ clearInterval(STATE.cameraScanInterval); STATE.cameraScanInterval = null; }
  // codeReader.reset() stops its own internally-managed stream/tracks and detaches the video element.
  if(STATE.zxingReader){ try{ STATE.zxingReader.reset(); }catch(e){ /* already stopped */ } STATE.zxingReader = null; }
  if(STATE.cameraStream){ STATE.cameraStream.getTracks().forEach(t=>t.stop()); STATE.cameraStream = null; }
  STATE.cameraActive = false;
}

function attachScanOutEvents(){
  attachScanHistoryRowEvents();

  document.querySelectorAll("[data-scan-mode]").forEach(el=>{
    el.addEventListener("click", ()=>{
      stopCamera();
      STATE.scanMode = el.getAttribute("data-scan-mode");
      STATE.scanError = "";
      render();
    });
  });

  const hwInput = document.getElementById("scan-hardware-input");
  if(hwInput){
    hwInput.addEventListener("input", ()=>{ STATE.scanInputValue = hwInput.value; });
    hwInput.addEventListener("keydown", (e)=>{
      if(e.key==="Enter"){
        e.preventDefault();
        processScanCode(hwInput.value);
      }
    });
    hwInput.focus();
  }

  const manualInput = document.getElementById("scan-manual-input");
  if(manualInput) manualInput.addEventListener("input", ()=>{ STATE.scanInputValue = manualInput.value; });

  const manualSubmitBtn = document.getElementById("btn-scan-manual-submit");
  if(manualSubmitBtn) manualSubmitBtn.addEventListener("click", ()=>{ processScanCode(STATE.scanInputValue); });

  const startCameraBtn = document.getElementById("btn-start-camera");
  if(startCameraBtn) startCameraBtn.addEventListener("click", async ()=>{
    STATE.scanError = "";
    STATE.cameraActive = true;
    render();
    try{
      // ZXing decodes frames in pure JS instead of relying on the native BarcodeDetector
      // API вҖ” that API is Chrome-only and NEVER available on iPhone (every iOS browser,
      // including Chrome/Firefox for iOS, runs on Apple's WebKit under the hood). ZXing
      // works identically on iOS Safari, Android, and desktop.
      await window.ensureZXingLib();
      const video = document.getElementById("scan-camera-video");
      if(!video){ stopCamera(); render(); return; }
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.CODE_128]);
      const codeReader = new ZXing.BrowserMultiFormatReader(hints);
      STATE.zxingReader = codeReader;
      // decodeFromConstraints requests the camera itself (back camera via facingMode),
      // attaches the stream to our existing <video>, and keeps calling back on every
      // frame until codeReader.reset() is called (only when the person clicks "аәӣаәҙаә”аәҒа»үаәӯаәҮ").
      // The camera intentionally stays open across scans вҖ” processScanCode() below only
      // does a targeted DOM update (updateScanOutUI), never a full render(), so the live
      // video stream is never torn down mid-session.
      await codeReader.decodeFromConstraints(
        {video:{facingMode:"environment"}},
        video,
        (result, err)=>{
          if(!STATE.cameraActive) return;
          if(result){
            const value = result.getText();
            const now = Date.now();
            // Debounce: the same barcode sitting in view fires this callback many times a
            // second вҖ” only act on it once every 2.5s so it doesn't spam sounds/log entries.
            if(value===lastCamScanCode && (now-lastCamScanAt)<2500) return;
            lastCamScanCode = value;
            lastCamScanAt = now;
            processScanCode(value);
          }
          // err fires on every frame with nothing decoded yet (NotFoundException) вҖ”
          // that's expected while aiming the camera, not a real error.
        }
      );
    }catch(e){
      STATE.scanError = "а»Җаәӣаәөаә”аәҒа»үаәӯаәҮаәҡа»Қа»Ҳа»„аә”а»ү: " + e.message;
      STATE.cameraActive = false;
      render();
    }
  });

  const stopCameraBtn = document.getElementById("btn-stop-camera");
  if(stopCameraBtn) stopCameraBtn.addEventListener("click", ()=>{
    stopCamera();
    render();
  });

  const histSearchEl = document.getElementById("scan-hist-search");
  if(histSearchEl) histSearchEl.addEventListener("input", ()=>{ STATE.scanHistSearch = histSearchEl.value; updateScanOutUI(); });

  const histFilterEl = document.getElementById("scan-hist-filter");
  if(histFilterEl) histFilterEl.addEventListener("change", ()=>{ STATE.scanHistFilter = histFilterEl.value; updateScanOutUI(); });

  const histDateFilterEl = document.getElementById("scan-hist-date-filter");
  if(histDateFilterEl) histDateFilterEl.addEventListener("change", ()=>{ STATE.scanHistDateFilter = histDateFilterEl.value; updateScanOutUI(); });

  const exportBtn = document.getElementById("btn-export-scans");
  if(exportBtn) exportBtn.addEventListener("click", exportScansToExcel);
}

function getLocation(highAccuracy, timeoutMs){
  // IMPORTANT: on some mobile browsers (notably iOS Safari when Location
  // Services are off at the OS level), getCurrentPosition() never calls
  // EITHER callback and ignores its own `timeout` option вҖ” leaving the
  // button stuck on "аәҒаәіаәҘаәұаәҮаә«аәІаә•аәіа»Ға»ңа»ҲаәҮ..." forever. We guard against that by
  // racing the browser API against our own hard timeout, so this function
  // is GUARANTEED to resolve within timeoutMs+2s no matter what.
  return new Promise((resolve)=>{
    let settled = false;
    const finish = (result)=>{
      if(settled) return;
      settled = true;
      resolve(result);
    };

    if(!navigator.geolocation){
      finish({lat:null, lng:null, error:"аәӯаәёаәӣаә°аәҒаәӯаәҷ аә«аәјаә· browser аәҷаәөа»үаәҡа»Қа»Ҳаә®аәӯаәҮаә®аәұаәҡ GPS", code:0});
      return;
    }
    if(location.protocol!=="https:" && location.hostname!=="localhost"){
      finish({lat:null, lng:null, error:"а»ңа»үаәІаәҷаәөа»үаә•а»үаәӯаәҮа»Җаәӣаәөаә”аәңа»ҲаәІаәҷ https аәҲаә¶а»ҲаәҮаәҲаә°аәӮа»Қаә•аәіа»Ға»ңа»ҲаәҮа»„аә”а»ү", code:0});
      return;
    }

    const hardTimeout = setTimeout(()=>{
      finish({lat:null, lng:null, error:"аә«аәІаә•аәіа»Ға»ңа»ҲаәҮаәҡа»Қа»Ҳа»„аә”а»үаәһаәІаәҚа»ғаәҷа»Җаә§аәҘаәІ", code:3});
    }, timeoutMs + 2000);

    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        clearTimeout(hardTimeout);
        finish({lat:pos.coords.latitude, lng:pos.coords.longitude, error:null, code:null});
      },
      (err)=>{
        clearTimeout(hardTimeout);
        let msg = "аәҡа»Қа»ҲаәӘаәІаәЎаәІаә”аә«аәІаә•аәіа»Ға»ңа»ҲаәҮа»„аә”а»ү";
        if(err.code===1) msg = "browser аәҡа»Қа»Ҳаәӯаә°аәҷаәёаәҚаәІаә”аә•аәіа»Ға»ңа»ҲаәҮ (Location) а»ғаә«а»үа»ңа»үаәІаәҷаәөа»ү";
        else if(err.code===2) msg = "аәӯаәёаәӣаә°аәҒаәӯаәҷаә«аәІаә•аәіа»Ға»ңа»ҲаәҮаәҡа»Қа»Ҳа»„аә”а»ү (Location Services аәӯаәІаә”аә–аә·аәҒаәӣаәҙаә”)";
        else if(err.code===3) msg = "аә«аәІаә•аәіа»Ға»ңа»ҲаәҮа»ғаәҠа»үа»Җаә§аәҘаәІаә”аә»аәҷа»ҖаәҒаәөаәҷа»„аәӣ";
        finish({lat:null, lng:null, error: msg, code: err.code});
      },
      {enableHighAccuracy: highAccuracy, timeout: timeoutMs, maximumAge:0}
    );
  });
}

// Tries a quick high-accuracy fix first, then falls back to a looser
// network-based fix if that fails. Many devices fail on high-accuracy GPS
// (indoors, GPS chip busy) but succeed instantly with network location.
async function getLocationWithFallback(){
  let loc = await getLocation(true, 8000);
  if(loc.error && loc.code!==1){ // don't bother retrying if permission was denied outright
    loc = await getLocation(false, 6000);
  }
  return loc;
}

// Purely client-side ticking clock (no Supabase calls whatsoever вҖ” safe
// under the no-polling rule). Updates one <div> textContent every second
// while the "clocked in, not out yet" card is on screen; stopped/cleared
// whenever the page re-renders or navigates away so it never stacks up.
if(!window.__attendanceTimerHandle) window.__attendanceTimerHandle = null;
function stopLiveElapsedTimer(){
  if(window.__attendanceTimerHandle){
    clearInterval(window.__attendanceTimerHandle);
    window.__attendanceTimerHandle = null;
  }
}
function startLiveElapsedTimer(){
  stopLiveElapsedTimer();
  const el = document.getElementById("live-elapsed-timer");
  if(!el) return;
  const clockInTs = el.getAttribute("data-clock-in");
  if(!clockInTs) return;
  const clockInMs = new Date(clockInTs).getTime();
  const tick = ()=>{
    const liveEl = document.getElementById("live-elapsed-timer");
    if(!liveEl){ stopLiveElapsedTimer(); return; }
    const ms = Math.max(0, Date.now() - clockInMs);
    const h = String(Math.floor(ms/3600000)).padStart(2,"0");
    const m = String(Math.floor((ms%3600000)/60000)).padStart(2,"0");
    const s = String(Math.floor((ms%60000)/1000)).padStart(2,"0");
    liveEl.textContent = `${h}:${m}:${s}`;
  };
  tick();
  window.__attendanceTimerHandle = setInterval(tick, 1000);
}

function attachTemplateEditorEvents(){
  const tplSettings = STATE.data.labelSettings || {paperSize:"label"};
  const paperMm = PAPER_SIZES[tplSettings.paperSize] || PAPER_SIZES.label;
  const addRowBtn = document.getElementById("btn-tpl-add-row");
  if(addRowBtn) addRowBtn.addEventListener("click", ()=>{
    if(!STATE.labelTemplate) return;
    pushTemplateHistory();
    const newRow = {id:"row"+Date.now(), cells:[{id:"cell"+Date.now(), field:"note", widthPct:100, fontSize:3.2, bold:false, align:"left", border:{top:"thin",right:"none",bottom:"none",left:"none"}}]};
    STATE.labelTemplate.push(newRow);
    STATE.selectedCellIds = [newRow.cells[0].id];
    STATE.selectionAnchorId = newRow.cells[0].id;
    render();
  });

  const undoBtn = document.getElementById("btn-tpl-undo");
  if(undoBtn) undoBtn.addEventListener("click", undoTemplate);
  const redoBtn = document.getElementById("btn-tpl-redo");
  if(redoBtn) redoBtn.addEventListener("click", redoTemplate);

  const thinBtn = document.getElementById("btn-thickness-thin");
  if(thinBtn) thinBtn.addEventListener("click", ()=>{ STATE.tplBorderThickness = "thin"; render(); });
  const thickBtn = document.getElementById("btn-thickness-thick");
  if(thickBtn) thickBtn.addEventListener("click", ()=>{ STATE.tplBorderThickness = "thick"; render(); });

  document.querySelectorAll(".tpl-border-action").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      applyBorderAction(btn.getAttribute("data-border-action"), STATE.tplBorderThickness);
    });
  });

  const clearSelBtn = document.getElementById("btn-tpl-clear-selection");
  if(clearSelBtn) clearSelBtn.addEventListener("click", ()=>{
    STATE.selectedCellIds = [];
    STATE.selectionAnchorId = "";
    render();
  });

  // Click a cell to select it вҖ” like Excel: plain click = select just this cell (and
  // becomes the range anchor), Shift+click = select every cell between the anchor and
  // this one, Ctrl/Cmd+click = add/remove just this cell from the current selection.
  const preview = document.getElementById("tpl-live-preview");
  if(preview) preview.addEventListener("click", (e)=>{
    if(e.target.closest(".tpl-row-resize-handle")) return;
    const td = e.target.closest("[data-cell-id]");
    if(!td) return;
    const id = td.getAttribute("data-cell-id");
    if(e.shiftKey && STATE.selectionAnchorId){
      const flat = flatCellList();
      const anchorIdx = flat.findIndex(f=>f.cell.id===STATE.selectionAnchorId);
      const clickIdx = flat.findIndex(f=>f.cell.id===id);
      if(anchorIdx!==-1 && clickIdx!==-1){
        const lo = Math.min(anchorIdx, clickIdx), hi = Math.max(anchorIdx, clickIdx);
        STATE.selectedCellIds = flat.slice(lo, hi+1).map(f=>f.cell.id);
      }
    } else if(e.ctrlKey || e.metaKey){
      if(STATE.selectedCellIds.includes(id)){
        STATE.selectedCellIds = STATE.selectedCellIds.filter(x=>x!==id);
      } else {
        STATE.selectedCellIds = [...STATE.selectedCellIds, id];
      }
      STATE.selectionAnchorId = id;
    } else {
      STATE.selectedCellIds = [id];
      STATE.selectionAnchorId = id;
    }
    render();
  });

  // Drag the handle along a row's bottom edge to set that row's height with the mouse,
  // instead of typing a number вҖ” the overall label canvas stays fixed to the paper size
  // set in "вҡҷпёҸ аә•аәұа»үаәҮаә„а»ҲаәІа»ғаәҡаәҡаәҙаәҷ" (100x150mm etc); only the individual row grows/shrinks.
  if(preview) preview.addEventListener("pointerdown", (e)=>{
    const handle = e.target.closest(".tpl-row-resize-handle");
    if(!handle) return;
    e.preventDefault();
    const rowId = handle.getAttribute("data-row-id");
    const row = STATE.labelTemplate && STATE.labelTemplate.find(r=>r.id===rowId);
    const rowEl = preview.querySelector(`.tpl-row[data-row-id="${rowId}"]`);
    if(!row || !rowEl) return;
    pushTemplateHistory();
    const pxPerMm = rowEl.getBoundingClientRect().width / paperMm.w;
    const startHeightPx = rowEl.getBoundingClientRect().height;
    const startY = e.clientY;
    const onMove = (ev)=>{
      const dyPx = ev.clientY - startY;
      const newHeightMm = Math.max(3, (startHeightPx + dyPx) / pxPerMm);
      row.heightMm = Math.round(newHeightMm*10)/10;
      updateTemplateLivePreview();
    };
    const onUp = ()=>{
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      render();
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  });

  const selCells = getSelectedCellsInfo();
  const single = selCells.length===1 ? selCells[0] : null;
  if(single){
    const fieldSel = document.getElementById("tpl-cell-field");
    if(fieldSel) fieldSel.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.field = fieldSel.value; render(); });

    const widthInp = document.getElementById("tpl-cell-width");
    if(widthInp){
      widthInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      widthInp.addEventListener("input", ()=>{
        single.cell.widthPct = Math.max(10, Math.min(100, parseFloat(widthInp.value)||100));
        updateTemplateLivePreview();
      });
    }

    const rowHeightInp = document.getElementById("tpl-row-height");
    if(rowHeightInp){
      rowHeightInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      rowHeightInp.addEventListener("input", ()=>{
        const v = parseFloat(rowHeightInp.value);
        single.row.heightMm = (rowHeightInp.value==="" || isNaN(v)) ? null : Math.max(2, Math.min(80, v));
        updateTemplateLivePreview();
      });
    }

    const fontInp = document.getElementById("tpl-cell-fontsize");
    if(fontInp){
      fontInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      fontInp.addEventListener("input", ()=>{
        single.cell.fontSize = parseFloat(fontInp.value)||3.2;
        updateTemplateLivePreview();
      });
    }

    const boldChk = document.getElementById("tpl-cell-bold");
    if(boldChk) boldChk.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.bold = boldChk.checked; render(); });

    const alignSel = document.getElementById("tpl-cell-align");
    if(alignSel) alignSel.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.align = alignSel.value; render(); });

    const splitCellInto = (n)=>{
      pushTemplateHistory();
      const each = single.cell.widthPct/n;
      single.cell.widthPct = each;
      const newCells = [];
      for(let i=1;i<n;i++){
        newCells.push({id:"cell"+Date.now()+"_"+i, field:"note", widthPct:each, fontSize:single.cell.fontSize, bold:false, align:"left", border:{...single.cell.border}});
      }
      single.row.cells.splice(single.cellIndex+1, 0, ...newCells);
      STATE.selectedCellIds = [newCells[0].id];
      STATE.selectionAnchorId = newCells[0].id;
      render();
    };
    const split2Btn = document.getElementById("btn-tpl-split-2");
    if(split2Btn) split2Btn.addEventListener("click", ()=>splitCellInto(2));
    const split3Btn = document.getElementById("btn-tpl-split-3");
    if(split3Btn) split3Btn.addEventListener("click", ()=>splitCellInto(3));

    const mergeBtn = document.getElementById("btn-tpl-merge-cell");
    if(mergeBtn) mergeBtn.addEventListener("click", ()=>{
      const nextCell = single.row.cells[single.cellIndex+1];
      if(!nextCell) return;
      pushTemplateHistory();
      single.cell.widthPct += nextCell.widthPct;
      single.row.cells.splice(single.cellIndex+1, 1);
      render();
    });

    const delCellBtn = document.getElementById("btn-tpl-delete-cell");
    if(delCellBtn) delCellBtn.addEventListener("click", ()=>{
      pushTemplateHistory();
      if(single.row.cells.length===1){
        STATE.labelTemplate = STATE.labelTemplate.filter(r=>r.id!==single.row.id);
      } else {
        single.row.cells.splice(single.cellIndex, 1);
        const neighbour = single.row.cells[single.cellIndex] || single.row.cells[single.cellIndex-1];
        if(neighbour) neighbour.widthPct += single.cell.widthPct;
      }
      STATE.selectedCellIds = [];
      render();
    });

    const rowUpBtn = document.getElementById("btn-tpl-row-up");
    if(rowUpBtn) rowUpBtn.addEventListener("click", ()=>{
      if(single.rowIndex===0) return;
      pushTemplateHistory();
      const [row] = STATE.labelTemplate.splice(single.rowIndex, 1);
      STATE.labelTemplate.splice(single.rowIndex-1, 0, row);
      render();
    });
    const rowDownBtn = document.getElementById("btn-tpl-row-down");
    if(rowDownBtn) rowDownBtn.addEventListener("click", ()=>{
      if(single.rowIndex===STATE.labelTemplate.length-1) return;
      pushTemplateHistory();
      const [row] = STATE.labelTemplate.splice(single.rowIndex, 1);
      STATE.labelTemplate.splice(single.rowIndex+1, 0, row);
      render();
    });
    const mergeRowPrevBtn = document.getElementById("btn-tpl-merge-row-prev");
    if(mergeRowPrevBtn) mergeRowPrevBtn.addEventListener("click", ()=>{
      mergeRowWithNeighbor(single.rowIndex, -1);
    });
    const mergeRowNextBtn = document.getElementById("btn-tpl-merge-row-next");
    if(mergeRowNextBtn) mergeRowNextBtn.addEventListener("click", ()=>{
      mergeRowWithNeighbor(single.rowIndex, 1);
    });
    const delRowBtn = document.getElementById("btn-tpl-delete-row");
    if(delRowBtn) delRowBtn.addEventListener("click", ()=>{
      pushTemplateHistory();
      STATE.labelTemplate = STATE.labelTemplate.filter(r=>r.id!==single.row.id);
      STATE.selectedCellIds = [];
      render();
    });
  }

  const saveTplBtn = document.getElementById("btn-tpl-save");
  if(saveTplBtn) saveTplBtn.addEventListener("click", ()=>{
    if(!STATE.labelTemplate) return;
    const base = STATE.data.labelSettings || {shopName:"", shopPhone:"", footerText:"", paperSize:"label"};
    const s = {...base, templateLayout: STATE.labelTemplate};
    STATE.savingTemplate = true;
    render();
    STATE.data.labelSettings = s;
    dbSaveLabelSettings(s).then(()=>{
      STATE.savingTemplate = false;
      render();
      silentRefresh();
    }).catch(err=>{
      console.error(err);
      STATE.savingTemplate = false;
      render();
    });
  });

  const resetTplBtn = document.getElementById("btn-tpl-reset");
  if(resetTplBtn) resetTplBtn.addEventListener("click", ()=>{
    if(!confirm("аә„аә·аәҷаә„а»ҲаәІ template аәҒаәұаәҡа»Җаәӣаәұаәҷа»Ғаәҡаәҡа»ҖаәҘаәөа»ҲаәЎаә•аә»а»үаәҷ? аәҒаәІаәҷаәӣа»ҲаәҪаәҷа»ҒаәӣаәҮаә—аәөа»ҲаәҚаәұаәҮаәҡа»Қа»Ҳа»„аә”а»үаәҡаәұаәҷаә—аә¶аәҒаәҲаә°аә«аәІаәҚ")) return;
    pushTemplateHistory();
    STATE.labelTemplate = JSON.parse(JSON.stringify(DEFAULT_LABEL_TEMPLATE));
    STATE.selectedCellIds = [];
    render();
  });

  checkTemplateOverflow();
}

      STATE.selectedLabelIds = STATE.selectedLabelIds.filter(id=>!visibleIds.includes(id));
    }
    render();
  });

  document.querySelectorAll("[data-label-checkbox]").forEach(el=>{
    el.addEventListener("change", ()=>{
      const id = el.getAttribute("data-label-checkbox");
      if(el.checked){
        if(!STATE.selectedLabelIds.includes(id)) STATE.selectedLabelIds.push(id);
      } else {
        STATE.selectedLabelIds = STATE.selectedLabelIds.filter(x=>x!==id);
      }
      render();
    });
  });

  const clearSelectionBtn = document.getElementById("btn-clear-label-selection");
  if(clearSelectionBtn) clearSelectionBtn.addEventListener("click", ()=>{ STATE.selectedLabelIds = []; render(); });

  const bulkPrintBtn = document.getElementById("btn-bulk-print-labels");
  if(bulkPrintBtn) bulkPrintBtn.addEventListener("click", ()=>{
    const chosen = STATE.data.shippingLabels.filter(l=>STATE.selectedLabelIds.includes(l.id));
    if(chosen.length===0) return;
    STATE.printingLabels = chosen;
    STATE.barcodeStatusMap = {};
    chosen.forEach(l=>{ STATE.barcodeStatusMap[l.id] = "loading"; });
    render();
  });

  document.querySelectorAll("[data-reprint-label]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-reprint-label");
      const label = STATE.data.shippingLabels.find(l=>l.id===id);
      if(label){
        STATE.printingLabels = [label];
        STATE.barcodeStatusMap = {[label.id]: "loading"};
        render();
      }
    });
  });

  const lsName = document.getElementById("ls-shop-name");
  if(lsName) lsName.addEventListener("input", ()=>{ STATE.labelSettingsForm.shopName = lsName.value; updateLabelSettingsPreview(); });
  const lsPhone = document.getElementById("ls-shop-phone");
  if(lsPhone) lsPhone.addEventListener("input", ()=>{ STATE.labelSettingsForm.shopPhone = lsPhone.value; updateLabelSettingsPreview(); });
  const lsFooter = document.getElementById("ls-footer-text");
  if(lsFooter) lsFooter.addEventListener("input", ()=>{ STATE.labelSettingsForm.footerText = lsFooter.value; updateLabelSettingsPreview(); });

  if(lsPaper) lsPaper.addEventListener("change", ()=>{ STATE.labelSettingsForm.paperSize = lsPaper.value; updateLabelSettingsPreview(); });

  const saveSettingsBtn = document.getElementById("btn-save-label-settings");
  if(saveSettingsBtn) saveSettingsBtn.addEventListener("click", ()=>{
    const existingTemplate = STATE.data.labelSettings ? STATE.data.labelSettings.templateLayout : null;
    const s = {...STATE.labelSettingsForm, templateLayout: existingTemplate};
    if(!s.shopName.trim()) return;
    STATE.savingLabelSettings = true;
    render();
    STATE.data.labelSettings = s;
    dbSaveLabelSettings(s).then(()=>{
      STATE.savingLabelSettings = false;
      STATE.labelView = "create";
      render();
      silentRefresh();
    }).catch(err=>{
      console.error(err);
      STATE.savingLabelSettings = false;
      render();
    });

  const newCourierEl = document.getElementById("new-courier-name");
  if(newCourierEl) newCourierEl.addEventListener("input", ()=>{ STATE.newCourierName = newCourierEl.value; });

  const addCourierBtn = document.getElementById("btn-add-courier");
  if(addCourierBtn) addCourierBtn.addEventListener("click", ()=>{

    STATE.newCourierName = "";
    render();
    dbInsertCourier(newCourier).catch(err=>{ console.error(err); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+err.message); });
  });

  document.querySelectorAll("[data-del-courier]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-courier");
      STATE.data.couriers = STATE.data.couriers.filter(c=>c.id!==id);
      render();
      dbDeleteCourier(id).catch(err=>{ console.error(err); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+err.message); });
    });
  });

  const printBtn = document.getElementById("btn-do-print-label");
  if(printBtn) printBtn.addEventListener("click", ()=>{ window.print(); });

  const closePreviewBtn = document.getElementById("btn-close-label-preview");
  if(closePreviewBtn) closePreviewBtn.addEventListener("click", ()=>{
    STATE.printingLabels = [];
    STATE.barcodeStatusMap = {};
    render();
  });

  document.querySelectorAll("[data-retry-barcode]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-retry-barcode");
      const label = STATE.printingLabels.find(l=>l.id===id);
      if(!label) return;
      STATE.barcodeStatusMap[id] = "loading";
      render();
      drawLabelBarcode(label);
    });
  });

  // Only draw a label's barcode once вҖ” same reasoning as before, just per-label now:
  // re-running render() after a successful draw would create a fresh empty <svg> and
  // wipe out the bars we just drew, so drawLabelBarcode patches the DOM directly instead.
  STATE.printingLabels.forEach(l=>{
    if((STATE.barcodeStatusMap[l.id]||"loading") !== "ready"){
      drawLabelBarcode(l);
    }
  });
}

function checkAllBarcodesReady(){
  const btn = document.getElementById("btn-do-print-label");
  if(!btn) return;
  const allReady = STATE.printingLabels.every(l=>(STATE.barcodeStatusMap[l.id]||"loading")==="ready");
  btn.disabled = !allReady;
}

function drawLabelBarcode(label){
  const svgEl = document.getElementById("label-barcode-"+label.id);
  if(!svgEl) return;
  const markReady = ()=>{
    STATE.barcodeStatusMap[label.id] = "ready";
    svgEl.style.display = "";
    const parent = svgEl.parentElement;
    if(parent) parent.querySelectorAll(".barcode-loading-indicator, .barcode-error-indicator").forEach(el=>el.remove());
    checkAllBarcodesReady();
  };
  if(window.JsBarcode){
    try{
      JsBarcode(svgEl, String(label.labelNumber), {format:"CODE128", displayValue:false, width:2, height:50, margin:0});
      markReady();
      return;
    }catch(e){ console.error(e); }
  }
  STATE.barcodeStatusMap[label.id] = "loading";
  window.ensureBarcodeLib().then(()=>{
    const svg2 = document.getElementById("label-barcode-"+label.id);
    if(!svg2) return;
    try{
      JsBarcode(svg2, String(label.labelNumber), {format:"CODE128", displayValue:false, width:2, height:50, margin:0});
      STATE.barcodeStatusMap[label.id] = "ready";
      svg2.style.display = "";
      const parent = svg2.parentElement;
      if(parent) parent.querySelectorAll(".barcode-loading-indicator, .barcode-error-indicator").forEach(el=>el.remove());
      checkAllBarcodesReady();
    }catch(e){
      console.error(e);
      STATE.barcodeStatusMap[label.id] = "error";
      render();
    }
  }).catch(err=>{
    console.error(err);
    STATE.barcodeStatusMap[label.id] = "error";
    render();
  });
}

      await dbApproveUser(id).catch(e=>{ console.error(e); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+e.message); });
      await loadUsersList();
    });
  });
  document.querySelectorAll("[data-del-user]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const id = el.getAttribute("data-del-user");
      if(!confirm("аәўаә·аәҷаәўаәұаәҷаәҒаәІаәҷаәҘаә¶аәҡаәҡаәұаәҷаәҠаәөаәҷаәөа»ү?")) return;
      el.disabled = true;
      await dbDeleteUser(id).catch(e=>{ console.error(e); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+e.message); });
      await loadUsersList();
    });
  });
}

function attachLoginEvents(){
  const tabLogin = document.getElementById("tab-login");
  const tabReg = document.getElementById("tab-register");
  if(tabLogin) tabLogin.addEventListener("click", ()=>{ STATE.loginMode="login"; STATE.loginError=""; render(); });
  if(tabReg) tabReg.addEventListener("click", ()=>{ STATE.loginMode="register"; STATE.loginError=""; render(); });

  const nameEl = document.getElementById("login-name");
  const passEl = document.getElementById("login-password");
  if(nameEl) nameEl.addEventListener("input", ()=>{ STATE.loginForm.name = nameEl.value; });
  if(passEl) passEl.addEventListener("input", ()=>{ STATE.loginForm.password = passEl.value; });

  const toggleBtn = document.getElementById("btn-toggle-password");
  if(toggleBtn && passEl){
    toggleBtn.addEventListener("click", ()=>{
      if(passEl.type==="password"){
        passEl.type = "text";
        toggleBtn.textContent = "рҹҷҲ";
      } else {
        passEl.type = "password";
        toggleBtn.textContent = "рҹ‘Ғ";
      }
    });
  }

  const submitBtn = document.getElementById("btn-login-submit");
  if(submitBtn) submitBtn.addEventListener("click", async ()=>{
    const name = STATE.loginForm.name.trim();
    const password = STATE.loginForm.password.trim();
    if(!name || !password){ STATE.loginError = "аәҒаә°аәҘаәёаәҷаәІа»ғаәӘа»ҲаәҠаә·а»Ҳ а»ҒаәҘаә° аәҘаә°аә«аәұаә”аәңа»ҲаәІаәҷ"; render(); return; }
    const isRegisterMode = STATE.loginMode === "register";
    const resetBtnLabel = isRegisterMode ? "аәҘаә»аәҮаә—аә°аәҡаәҪаәҷ а»ҒаәҘаә° а»ҖаәӮаә»а»үаәІа»ғаәҠа»ү" : "а»ҖаәӮаә»а»үаәІаәӘаә№а»ҲаәҘаә°аәҡаә»аәҡ";
    submitBtn.disabled = true;
    submitBtn.textContent = "аәҒаәіаәҘаәұаәҮаәҒаә§аә”аәӘаәӯаәҡ...";
    try{
      let user;
      if(isRegisterMode){
        user = await dbRegister(name, password);
      } else {
        user = await dbLogin(name, password);
      }

      // GPS is REQUIRED to enter the system вҖ” this is an explicit owner
      // decision (transparency: every login must be traceable to a real
      // location) over convenience. There is intentionally NO skip option
      // here, unlike the attendance clock-in button. Staff whose browser
      // blocks/spoofs location (commonly caused by a VPN extension being
      // installed, even if not actively connected) must use a Chrome
      // profile without such extensions to log in.
      submitBtn.textContent = "аәҒаәіаәҘаәұаәҮаәӮа»ҚаәӘаәҙаә”а»ҖаәӮаә»а»үаәІа»Җаә–аәҙаәҮаә•аәіа»Ға»ңа»ҲаәҮ GPS...";
      const loc = await getLocationWithFallback();
      if(loc.error){
        STATE.loginError = "вҡ пёҸ " + loc.error + " вҖ” аәҘаә°аәҡаә»аәҡаәҷаәөа»үаә•а»үаәӯаәҮаәҒаәІаәҷаәӯаә°аәҷаәёаәҚаәІаә” GPS аәҲаә¶а»ҲаәҮаәҲаә°а»ҖаәӮаә»а»үаәІа»ғаәҠа»үа»„аә”а»ү (аәҡа»Қа»ҲаәЎаәөаә—аәІаәҮа»ҖаәҘаә·аәӯаәҒаәӮа»үаәІаәЎ, а»Җаәһаә·а»Ҳаәӯаә„аә§аәІаәЎа»Ӯаәӣа»ҲаәҮа»ғаәӘ).\n\n" + gpsHelpText() + "\n\nаә«аәІаәҒ browser аәҷаәөа»үаәЎаәөаәҒаәІаәҷаә•аәҙаә”аә•аәұа»үаәҮ VPN extension а»„аә§а»ү (а»Җаә–аәҙаәҮа»ҒаәЎа»Ҳаәҷаәҡа»Қа»Ҳа»„аә”а»үа»Җаәӣаәөаә”а»ғаәҠа»ү) аәЎаәұаәҷаәӯаәІаә”аәҡаәҘаәұаәӯаәҒ GPS а»Ӯаә”аәҚаәӯаәұаә”аә•аә°а»ӮаәҷаәЎаәұаә” вҖ” а»ғаә«а»үаәҘаәӯаәҮа»ғаәҠа»ү Chrome аәӯаәөаәҒа»ӮаәӣаәЈа»„аәҹаәҘа»Ңаә—аәөа»Ҳаәҡа»Қа»ҲаәЎаәө VPN extension аә•аәҙаә”аә•аәұа»үаәҮ.";
        submitBtn.disabled = false;
        submitBtn.textContent = resetBtnLabel;
        render();
        return;
      }

      STATE.currentUser = user;
      saveSession(user);
      STATE.loginError = "";
      STATE.loginForm = {name:"", password:""};
      render();

      // Fire-and-forget: record this login for the owner's "login history" page.
      dbInsertLoginHistory({
        id: "lh"+Date.now(),
        userId: user.id,
        name: user.name,
        loginAt: new Date().toISOString(),
        lat: loc.lat, lng: loc.lng,
        device: (navigator.userAgent||"").slice(0,180)
      }).catch(()=>{});
    }catch(e){
      STATE.loginError = e.message;
      submitBtn.disabled = false;
      submitBtn.textContent = resetBtnLabel;
      render();
    }
  });
}

function attachPageEvents(){
  // Any [data-nav] button rendered inside the main content area (e.g. dashboard
  // quick-action buttons) navigates the same way sidebar nav buttons do.
  // (Sidebar nav buttons are wired separately in updateNavHighlight().)
  document.querySelectorAll("#main [data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.page = el.getAttribute("data-nav");
      if(STATE.page==="content") STATE.mktScreen = "picker";
      STATE.output = ""; STATE.error = "";
      render();
    });
  });
  if(STATE.page==="products") attachProductEvents();
  if(STATE.page==="content") attachContentEvents();
  if(STATE.page==="productChat") attachProductChatEvents();
  if(STATE.page==="costs") attachCostEvents();
  if(STATE.page==="admin") attachAdminEvents();
  if(STATE.page==="insights") attachInsightEvents();
  if(STATE.page==="reports") attachReportEvents();
  if(STATE.page==="attendance") attachAttendanceEvents();
  if(STATE.page==="users") attachUsersEvents();
  if(STATE.page==="loginHistory") attachLoginHistoryEvents();
  if(STATE.page==="labels") attachLabelsEvents();
  if(STATE.page==="scanOut") attachScanOutEvents();
}

function attachProductEvents(){
  document.querySelectorAll("[data-view-product]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      if(e.target.closest("[data-edit-product]") || e.target.closest("[data-del-product]")) return;
      STATE.viewingProduct = el.getAttribute("data-view-product");
      render();
    });
  });
  const backBtn = document.getElementById("btn-back-to-products") || document.querySelector("[data-back-to-products]");
  if(backBtn) backBtn.addEventListener("click", ()=>{
    STATE.viewingProduct = "";
    render();
  });
  const btnNew = document.getElementById("btn-new-product");
  if(btnNew) btnNew.addEventListener("click", ()=>{
    STATE.productForm = {name:"", category:"", price:"", costPrice:"", desc:"", painPoints:"", imageBase64:"", highlights:"", benefits:"", usage:""};
    STATE.editingProduct = null;
    STATE.knowledgeError = "";
    STATE.newPainPointText = "";
    STATE.aiPainSuggestions = [];
    STATE.aiPainError = "";
    STATE.showProductForm = true;
    render();
  });

  document.querySelectorAll("[data-edit-product]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const id = el.getAttribute("data-edit-product");
      const p = STATE.data.products.find(x=>x.id===id);
      if(p){
        STATE.productForm = {...p, imageBase64: p.imageUrl||""};
        STATE.editingProduct = id;
        STATE.knowledgeError = "";
        STATE.newPainPointText = "";
        STATE.aiPainSuggestions = [];
        STATE.aiPainError = "";
        STATE.newFaqQuestion = "";
        STATE.newFaqAnswer = "";
        STATE.showProductForm = true;
        render();
      }
    });
  });

  document.querySelectorAll("[data-del-product]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const id = el.getAttribute("data-del-product");
      STATE.data.products = STATE.data.products.filter(p=>p.id!==id);
      delete STATE.data.productKnowledge[id];
      render();
      dbDeleteProduct(id).catch(err=>{ console.error(err); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+err.message); });
    });
  });

  const modalBg = document.getElementById("product-modal-bg");
  if(modalBg){
    modalBg.addEventListener("click", (e)=>{
      if(e.target.id==="product-modal-bg"){ STATE.showProductForm = false; render(); }
    });
  }
  const closeBtn = document.getElementById("close-product-modal");
  if(closeBtn) closeBtn.addEventListener("click", ()=>{ STATE.showProductForm = false; render(); });

  const imgEl = document.getElementById("pf-image-input");
  if(imgEl) imgEl.addEventListener("change", ()=>{
    const file = imgEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{ STATE.productForm.imageBase64 = e.target.result; render(); };
    reader.readAsDataURL(file);
  });
  const imgRemoveBtn = document.getElementById("pf-image-remove");
  if(imgRemoveBtn) imgRemoveBtn.addEventListener("click", ()=>{
    STATE.productForm.imageBase64 = "";
    if(imgEl) imgEl.value = "";
    render();
  });

  const saveBtn = document.getElementById("save-product");
  if(saveBtn){
    saveBtn.addEventListener("click", async ()=>{
      const f = {
        name: document.getElementById("pf-name").value,
        category: document.getElementById("pf-category").value,
        price: document.getElementById("pf-price").value,
        costPrice: document.getElementById("pf-costPrice").value,
        desc: document.getElementById("pf-desc").value,
        highlights: document.getElementById("pf-highlights").value,
        benefits: document.getElementById("pf-benefits").value,
        usage: document.getElementById("pf-usage").value,
        painPoints: document.getElementById("pf-painPoints").value,
        imageUrl: STATE.productForm.imageBase64 || ""
      };
      if(!f.name.trim()) return;
      const prevProducts = STATE.data.products;
      saveBtn.disabled = true; saveBtn.textContent = "аәҒаәіаәҘаәұаәҮаәҡаәұаәҷаә—аә¶аәҒ...";
      if(STATE.editingProduct){
        const updated = {...f, id:STATE.editingProduct};
        STATE.data.products = STATE.data.products.map(p=>p.id===STATE.editingProduct ? updated : p);
        STATE.showProductForm = false;
        render();
        try{
          await dbUpdateProduct(updated);
          showToast("аәҡаәұаәҷаә—аә¶аәҒаәӘаәҙаәҷаә„а»үаәІаәӘаәіа»ҖаәҘаәұаә”а»ҒаәҘа»үаә§");
        }catch(err){
          console.error(err);
          STATE.data.products = prevProducts;
          STATE.productForm = {...updated, imageBase64: updated.imageUrl||""};
          STATE.editingProduct = updated.id;
          STATE.showProductForm = true;
          showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: " + err.message);
          render();
        }
      } else {
        const newProduct = {...f, id:"p"+Date.now()};
        STATE.data.products.push(newProduct);
        STATE.showProductForm = false;
        render();
        try{
          await dbInsertProduct(newProduct);
          showToast("а»Җаәһаәөа»ҲаәЎаәӘаәҙаәҷаә„а»үаәІаәӘаәіа»ҖаәҘаәұаә”а»ҒаәҘа»үаә§");
        }catch(err){
          console.error(err);
          STATE.data.products = prevProducts;
          STATE.productForm = {...newProduct, imageBase64: newProduct.imageUrl||""};
          STATE.editingProduct = null;
          STATE.showProductForm = true;
          showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: " + err.message);
          render();
        }
      }
    });
  }

  const pkFileEl = document.getElementById("pk-file-input");
  if(pkFileEl) pkFileEl.addEventListener("change", ()=>{
    const file = pkFileEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{
      const ta = document.getElementById("pk-content");
      if(ta) ta.value = e.target.result;
    };
    reader.readAsText(file);
  });

  const saveKnowledgeBtn = document.getElementById("btn-save-knowledge");
  if(saveKnowledgeBtn){
    saveKnowledgeBtn.addEventListener("click", async ()=>{
      const productId = STATE.editingProduct;
      if(!productId) return;
      const ta = document.getElementById("pk-content");
      const content = (ta ? ta.value : "").trim();
      STATE.savingKnowledge = true;
      STATE.knowledgeError = "";
      render();
      try{
        await dbUpsertProductKnowledge(productId, content);
        STATE.data.productKnowledge[productId] = {content, updatedAt: new Date().toISOString()};
      }catch(e){
        STATE.knowledgeError = "аәҡаәұаәҷаә—аә¶аәҒаәҡа»Қа»ҲаәӘаәіа»ҖаәҘаәұаә”: " + (e?.message||e);
      }
      STATE.savingKnowledge = false;
      render();
    });
  }

  document.querySelectorAll("[data-del-painpoint]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-painpoint");
      const productId = STATE.editingProduct;
      if(STATE.data.painPointsLib[productId]){
        STATE.data.painPointsLib[productId] = STATE.data.painPointsLib[productId].filter(pp=>pp.id!==id);
      }
      render();
      dbDeletePainPoint(id).catch(err=>{ console.error(err); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+err.message); });
    });
  });

  const ppInput = document.getElementById("new-painpoint-text");
  if(ppInput) ppInput.addEventListener("input", ()=>{ STATE.newPainPointText = ppInput.value; });

  const addPpBtn = document.getElementById("btn-add-painpoint");
  if(addPpBtn) addPpBtn.addEventListener("click", ()=>{
    const productId = STATE.editingProduct;
    const text = (STATE.newPainPointText||"").trim();
    if(!productId || !text) return;
    const newPp = {id:"pp"+Date.now(), productId, text, icon:"", createdAt:new Date().toISOString(), createdBy: STATE.currentUser ? STATE.currentUser.name : ""};
    if(!STATE.data.painPointsLib[productId]) STATE.data.painPointsLib[productId] = [];
    STATE.data.painPointsLib[productId].push(newPp);
    STATE.newPainPointText = "";
    render();
    dbInsertPainPoint(newPp).catch(err=>{ console.error(err); showErrorToast("аәҡаәұаәҷаә—аә¶аәҒаәҘаә»а»үаәЎа»Җаә«аәјаә§ аәҒаә°аәҘаәёаәҷаәІаәҘаәӯаәҮа»ға»қа»Ҳ: "+err.message); });
  });

  const aiSuggestBtn = document.getElementById("btn-ai-suggest-painpoints");
  if(aiSuggestBtn){
    aiSuggestBtn.addEventListener("click", async ()=>{
      const productId = STATE.editingProduct;
      const p = STATE.data.products.find(x=>x.id===productId);
      if(!p) return;
      STATE.aiPainLoading = true;
      STATE.aiPainError = "";
      STATE.aiPainSuggestions = [];
      render();
      try{
        const prompt = `аәҷаәөа»үа»ҒаәЎа»ҲаәҷаәӮа»Қа»үаәЎаә№аәҷаәӘаәҙаәҷаә„а»үаәІ:
аәҠаә·а»ҲаәӘаәҙаәҷаә„а»үаәІ: ${p.name}
а»қаә§аә”а»қаә№а»Ҳ: ${p.category}

function exportHistoryToExcel(){
  const d = STATE.data;
  if(d.contentHistory.length===0){ return; }
  const rows = d.contentHistory.map(c => ({
    "аә§аәұаәҷаә—аәө": c.date || "",
    "аәӣаә°а»Җаәһаә”": TAB_LABELS[c.type] || c.type,
    "аәӘаәҙаәҷаә„а»үаәІ": c.productName || "",
    "а»Җаәҷаә·а»үаәӯаә«аәІ": c.content || ""
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:20},{wch:16},{wch:24},{wch:60}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "аәӣаә°аә«аә§аәұаә” Content");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `content-history-${stamp}.xlsx`);
}

function exportCostsToExcel(){
  const d = STATE.data;
  if(d.costs.length===0){ render(); return; }
  const rows = d.costs.map(c => {
    const profit = (Number(c.revenue)||0)-(Number(c.productCost)||0)-(Number(c.adCost)||0)-(Number(c.opCost)||0);
    return {
      "аәҘаәІаәҚаәҒаәІаәҷ": c.label || "",
      "аәҘаәІаәҚаә®аәұаәҡ": Number(c.revenue)||0,
      "аә•аә»а»үаәҷаә—аә¶аәҷаәӘаәҙаәҷаә„а»үаәІ": Number(c.productCost)||0,
      "аә„а»ҲаәІа»Ӯаә„аәӘаә°аәҷаәІ": Number(c.adCost)||0,
      "аә„а»ҲаәІаәҡа»ҚаәҘаәҙаә«аәІаәҷ": Number(c.opCost)||0,
      "аәҒаәіа»„аәҘ": profit
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:28},{wch:12},{wch:14},{wch:12},{wch:12},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "аә•аә»а»үаәҷаә—аә¶аәҷ-аәҒаәіа»„аәҘ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `cost-profit-${stamp}.xlsx`);
}

/* ====================== SESSION PERSISTENCE ====================== */
const SESSION_KEY = "mkt_studio_session_v1";
function saveSession(user){
  try{ localStorage.setItem(SESSION_KEY, JSON.stringify(user)); }catch(e){}
}
function clearSession(){
  try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
}
function loadSavedSession(){
  try{
    const raw = localStorage.getItem(SESSION_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}

function isUserTyping(){
  const el = document.activeElement;
  if(!el) return false;
  const tag = el.tagName;
  if(tag==="TEXTAREA") return true;
  if(tag==="INPUT"){
    // Only text-entry input types actually block updates. A <select> or a
    // file/checkbox input can keep "focus" indefinitely after one click
    // without the person actively typing, which would otherwise freeze
    // auto-refresh forever вҖ” so those are deliberately excluded.
    const t = (el.type||"text").toLowerCase();
    return ["text","password","number","email","search","tel","url"].includes(t);
  }
  return false;
}

/* ====================== INIT ====================== */
async function init(){
  render();
  STATE.data = await loadAllData();
  STATE.ready = true;

  // Restore session if one was saved, but re-verify against DB for fresh role/approved
  const saved = loadSavedSession();
  if(saved && saved.id){
    try{
      const {data} = await sb.from("users").select("*").eq("id", saved.id).limit(1);
      if(data && data.length>0){
        STATE.currentUser = {id:data[0].id, name:data[0].name, role:data[0].role, approved: !!data[0].approved};
        saveSession(STATE.currentUser);
      } else {
        clearSession();
      }
    }catch(e){}
  }

  render();
  if(STATE.currentUser && isOwner() && STATE.page==="users"){ loadUsersList(); }
  // No background polling here on purpose вҖ” see the PERMANENT RULE note
  // above refreshAll(). Data loads once here, and after that only when
  // someone explicitly clicks "а»Ӯаә«аәјаә”аәӮа»Қа»үаәЎаә№аәҷа»ға»қа»Ҳ".
}
init();
