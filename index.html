<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ຮ້ານຕຸກຕາ ສີໄຄ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Serif+Lao:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1F3D2E;
    --bg-deep-2:#27483A;
    --cream:#FAF6EE;
    --cream-2:#F1EAD9;
    --terracotta:#C9683F;
    --terracotta-dark:#A6502E;
    --sage:#A8C0A0;
    --sage-dark:#5F7D58;
    --ink:#23291F;
    --muted:#6F7268;
    --danger:#B0473B;
    --white:#FFFFFF;
    --radius:10px;
    --shadow:0 2px 10px rgba(31,61,46,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Noto Sans Lao','Noto Sans',sans-serif;
    background:var(--cream-2);
    color:var(--ink);
  }
  h1,h2,h3,.serif{font-family:'Noto Serif Lao','Noto Sans Lao',serif;}
  .app{
    display:grid;
    grid-template-columns:240px 1fr;
    min-height:100vh;
  }
  .sidebar{
    background:var(--bg-deep);
    color:var(--cream);
    padding:24px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .brand{
    font-family:'Noto Serif Lao',serif;
    font-size:20px;
    font-weight:700;
    color:var(--cream);
    margin:0 8px 28px 8px;
    line-height:1.3;
  }
  .brand small{
    display:block;
    font-family:'Noto Sans Lao',sans-serif;
    font-size:12px;
    font-weight:400;
    color:var(--sage);
    margin-top:4px;
  }
  .nav-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:none;
    border:none;
    color:var(--cream);
    opacity:0.78;
    text-align:left;
    padding:11px 12px;
    border-radius:8px;
    font-size:14.5px;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s, opacity .15s;
    width:100%;
  }
  .nav-btn:hover{background:var(--bg-deep-2); opacity:1;}
  .nav-btn.active{background:var(--terracotta); opacity:1; font-weight:600;}
  .nav-icon{font-size:17px; width:20px; text-align:center;}
  .sidebar-foot{
    margin-top:auto;
    padding:12px 8px 0 8px;
    font-size:11.5px;
    color:var(--sage);
    border-top:1px solid rgba(255,255,255,0.12);
    padding-top:14px;
  }
  .main{padding:32px 40px; max-width:1180px;}
  .page-head{margin-bottom:24px;}
  .page-head h1{font-size:24px; margin:0 0 4px 0; color:var(--bg-deep);}
  .page-head p{margin:0; color:var(--muted); font-size:14px;}
  .card{
    background:var(--white);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px 22px;
    margin-bottom:18px;
  }
  .card h3{margin:0 0 14px 0; font-size:16px; color:var(--bg-deep);}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .grid-4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  label{display:block; font-size:13px; color:var(--muted); margin:0 0 5px 0; font-weight:600;}
  input[type=text], input[type=number], textarea, select{
    width:100%;
    padding:9px 11px;
    border:1px solid #DCD6C4;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    background:var(--cream);
    color:var(--ink);
    margin-bottom:14px;
  }
  textarea{resize:vertical; min-height:80px;}
  input:focus, textarea:focus, select:focus{
    outline:none; border-color:var(--terracotta); background:var(--white);
  }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    background:var(--terracotta);
    color:var(--white);
    border:none;
    padding:10px 18px;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--terracotta-dark);}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{background:#C9B9A9; cursor:not-allowed;}
  .btn-outline{background:none; border:1.5px solid var(--bg-deep); color:var(--bg-deep);}
  .btn-outline:hover{background:var(--bg-deep); color:var(--cream);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}
  .btn-danger{background:var(--danger);}
  .btn-danger:hover{background:#8E382E;}
  .pill{display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600;}
  .pill-sage{background:#E4ECDF; color:var(--sage-dark);}
  .pill-terra{background:#F4E1D6; color:var(--terracotta-dark);}
  .pill-gray{background:#EAE7DC; color:var(--muted);}
  .product-card{
    border:1px solid #E9E3D3; border-radius:9px; padding:14px;
    display:flex; flex-direction:column; gap:6px; cursor:pointer; transition:border-color .15s;
  }
  .product-card:hover{border-color:var(--terracotta);}
  .product-card h4{margin:0; font-size:15px; color:var(--bg-deep);}
  .product-card .meta{font-size:12.5px; color:var(--muted);}
  .empty{text-align:center; padding:40px 20px; color:var(--muted);}
  .empty .nav-icon{font-size:32px; display:block; margin-bottom:8px; opacity:.5;}
  .stat{background:var(--cream); border-radius:9px; padding:14px; border:1px solid #EAE3D2;}
  .stat .label{font-size:12px; color:var(--muted); margin-bottom:4px;}
  .stat .value{font-size:21px; font-weight:700; color:var(--bg-deep);}
  .stat .value.danger{color:var(--danger);}
  .stat .value.good{color:var(--sage-dark);}
  .content-out{
    background:var(--cream); border:1px solid #E9E3D3; border-radius:8px;
    padding:14px 16px; white-space:pre-wrap; font-size:14px; line-height:1.65;
    margin-top:10px; max-height:420px; overflow-y:auto;
  }
  .toolbar{display:flex; gap:8px; margin-top:10px;}
  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; color:var(--muted); font-weight:600; padding:8px 10px; border-bottom:2px solid #EAE3D2;}
  td{padding:9px 10px; border-bottom:1px solid #F0EBDD; vertical-align:top;}
  tr:hover td{background:#FBF8F1;}
  .badge-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;}
  .loading{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13.5px; padding:10px 0;}
  .spinner{
    width:14px; height:14px; border:2px solid #D9D2BD; border-top-color:var(--terracotta);
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .tabs{display:flex; gap:6px; margin-bottom:18px; border-bottom:1px solid #E2DBC9;}
  .tab{padding:9px 16px; cursor:pointer; font-size:14px; color:var(--muted); border-bottom:2px solid transparent; font-weight:600;}
  .tab.active{color:var(--terracotta-dark); border-bottom-color:var(--terracotta);}
  .modal-bg{
    position:fixed; inset:0; background:rgba(31,61,46,0.45);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:var(--white); border-radius:12px; padding:24px; width:100%; max-width:520px;
    max-height:88vh; overflow-y:auto;
  }
  .modal h3{margin-top:0;}
  .close-x{float:right; background:none; border:none; font-size:18px; cursor:pointer; color:var(--muted);}
  .flex-between{display:flex; justify-content:space-between; align-items:center;}
  .small-muted{font-size:12.5px; color:var(--muted);}
  @media (max-width: 880px){
    .app{grid-template-columns:1fr;}
    .sidebar{flex-direction:row; overflow-x:auto; padding:14px; align-items:center;}
    .brand{display:none;}
    .nav-btn{white-space:nowrap; width:auto;}
    .sidebar-foot{display:none;}
    .main{padding:20px;}
    .grid-2, .grid-3, .grid-4{grid-template-columns:1fr;}
  }
</style>

});
window.addEventListener("unhandledrejection", function(e){
  const root = document.getElementById("root");
  if(root) root.innerHTML = `<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:30px; background:#1a1a1a; color:#fff; font-family:monospace; font-size:13px; text-align:left; white-space:pre-wrap;">ເກີດຂໍ້ຜິດພາດ (Promise):\n\n${(e.reason && e.reason.message) || e.reason}</div>`;

<script>
/* ====================== SUPABASE CONFIG ====================== */
const SUPABASE_URL = "https://jhaocdnbrjfyloamzyyk.supabase.co";
const SUPABASE_KEY = "sb_publishable_Urk20V4zHLxtP7xaAXfbfA_nEIFJsEX";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ====================== STATE & DATA LOADING ====================== */
function emptyData(){
  return {
    products: [],
    contentHistory: [],
    costs: [],
    admins: [],
    insights: []
  };
}

async function loadAllData(){
  const d = emptyData();
  try{
    const [products, content, costs, admins, insights] = await Promise.all([
      sb.from("products").select("*").order("created_at", {ascending:false}),
      sb.from("content_history").select("*").order("created_at", {ascending:false}),
      sb.from("costs").select("*").order("created_at", {ascending:false}),
      sb.from("admins").select("*").order("created_at", {ascending:true}),
      sb.from("insights").select("*").order("created_at", {ascending:false}),
    ]);
    d.products = (products.data||[]).map(rowToProduct);
    d.contentHistory = (content.data||[]).map(rowToContent);
    d.costs = (costs.data||[]).map(rowToCost);
    d.admins = (admins.data||[]).map(rowToAdmin);
    d.insights = (insights.data||[]).map(rowToInsight);
  }catch(e){
    STATE.connError = "ເຊື່ອມຕໍ່ database ບໍ່ໄດ້: " + e.message;
  }
  return d;
}

// row <-> app object mappers (db columns are lowercase, no underscores for product fields)
function rowToProduct(r){ return {id:r.id, name:r.name, category:r.category, price:r.price, costPrice:r.costprice, desc:r.description, painPoints:r.painpoints}; }
function rowToContent(r){ return {id:r.id, type:r.type, productName:r.productname, content:r.content, date:r.date}; }
function rowToCost(r){ return {id:r.id, label:r.label, revenue:r.revenue, productCost:r.productcost, adCost:r.adcost, opCost:r.opcost}; }
function rowToAdmin(r){ return {id:r.id, name:r.name, role:r.role, status:r.status}; }
function rowToInsight(r){ return {id:r.id, question:r.question, answer:r.answer, productRelated:r.productrelated, date:r.date, adminName:r.adminname||""}; }

async function dbInsertProduct(p){ await sb.from("products").insert({id:p.id, name:p.name, category:p.category, price:p.price, costprice:p.costPrice, description:p.desc, painpoints:p.painPoints}); }
async function dbUpdateProduct(p){ await sb.from("products").update({name:p.name, category:p.category, price:p.price, costprice:p.costPrice, description:p.desc, painpoints:p.painPoints}).eq("id", p.id); }
async function dbDeleteProduct(id){ await sb.from("products").delete().eq("id", id); }

async function dbInsertContent(c){ await sb.from("content_history").insert({id:c.id, type:c.type, productname:c.productName, content:c.content, date:c.date}); }

async function dbInsertCost(c){ await sb.from("costs").insert({id:c.id, label:c.label, revenue:c.revenue, productcost:c.productCost, adcost:c.adCost, opcost:c.opCost}); }
async function dbDeleteCost(id){ await sb.from("costs").delete().eq("id", id); }

async function dbInsertAdmin(a){ await sb.from("admins").insert({id:a.id, name:a.name, role:a.role, status:a.status}); }
async function dbUpdateAdminStatus(id, status){ await sb.from("admins").update({status}).eq("id", id); }
async function dbDeleteAdmin(id){ await sb.from("admins").delete().eq("id", id); }

async function dbInsertInsight(i){ await sb.from("insights").insert({id:i.id, question:i.question, answer:i.answer, productrelated:i.productRelated, date:i.date, adminname:i.adminName||""}); }
async function dbDeleteInsight(id){ await sb.from("insights").delete().eq("id", id); }
async function dbInsertInsightsBulk(rows){
  if(rows.length===0) return;
  await sb.from("insights").insert(rows.map(i=>({id:i.id, question:i.question, answer:i.answer, productrelated:i.productRelated, date:i.date, adminname:i.adminName||""})));
}

/* ---------- USER AUTH functions ---------- */
async function dbRegister(name, password){
  const {data} = await sb.from("users").select("id").eq("name", name).limit(1);
  if(data && data.length>0) throw new Error("ຊື່ນີ້ຖືກໃຊ້ແລ້ວ ກະລຸນາເລືອກຊື່ໃໝ່");
  const id = "u"+Date.now();
  await sb.from("users").insert({id, name, password, role:"admin"});
  return {id, name, role:"admin"};
}
async function dbLogin(name, password){
  const {data} = await sb.from("users").select("*").eq("name", name).eq("password", password).limit(1);
  if(!data || data.length===0) throw new Error("ຊື່ ຫຼື ລະຫັດຜ່ານບໍ່ຖືກຕ້ອງ");
  return {id:data[0].id, name:data[0].name, role:data[0].role};
}

function subscribeRealtime(onChange){
  // Poll every 8 seconds — more reliable than websocket realtime for static hosting
  setInterval(async ()=>{
    const fresh = await loadAllData();
    // Only re-render if data actually changed (compare counts + latest id)
    const changed =
      fresh.products.length !== STATE.data.products.length ||
      fresh.insights.length !== STATE.data.insights.length ||
      fresh.costs.length !== STATE.data.costs.length ||
      fresh.admins.length !== STATE.data.admins.length ||
      fresh.contentHistory.length !== STATE.data.contentHistory.length;
    if(changed){ onChange(fresh); }
  }, 8000);
}

function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmt(n){ return Number(n||0).toLocaleString(); }

/* ====================== AI CALL ====================== */
async function callAI(prompt, system){
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 1000,
      system: system || "",
      messages: [{role:"user", content: prompt}]
    })
  });
  const data = await res.json();
  if(data.content && data.content.length){
    return data.content.map(b => b.text || "").join("\n").trim();
  }
  throw new Error("ບໍ່ໄດ້ຮັບຄຳຕອບຈາກ AI");
}

/* ====================== RENDER ====================== */

function render(){
  const root = document.getElementById("root");
  if(!STATE.ready){
    root.innerHTML = `
      <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:14px; background:var(--cream-2);">

        <div style="color:var(--muted); font-size:14px;">ກຳລັງໂຫຼດຂໍ້ມູນ...</div>

      </div>
    `;
    attachLoginEvents();
    return;
  }
  if(!STATE.currentUser){
    root.innerHTML = renderLoginPage();
    attachLoginEvents();
    return;
  }
  root.innerHTML = `
    <div class="app">
      <div class="sidebar">
        <div class="brand">ຮ້ານຕຸກຕາ ສີໄຄ<small>ລະບົບການຕະຫຼາດອັດຕະໂນມັດ</small></div>
        ${NAV.map(n => `
          <button class="nav-btn ${STATE.page===n.id?'active':''}" data-nav="${n.id}">
            <span class="nav-icon">${n.icon}</span>${n.label}
          </button>
        `).join("")}
        <div class="sidebar-foot">
          <div style="margin-bottom:8px;">👤 ${esc(STATE.currentUser?.name||"")}</div>
          <button class="btn btn-sm btn-outline" style="width:100%; justify-content:center; color:var(--cream); border-color:rgba(255,255,255,0.3);" id="btn-logout">ອອກຈາກລະບົບ</button>
        </div>
      </div>
      <div class="main" id="main">${renderPage()}</div>
    </div>
  `;
  attachEvents();
}

function renderPage(){
  switch(STATE.page){
    case "dashboard": return renderDashboard();
    case "products": return renderProducts();
    case "content": return renderContent();
    case "costs": return renderCosts();
    case "admin": return renderAdmin();
    case "insights": return renderInsights();
    default: return "";
  }
}

  STATE.loading = true; STATE.error = ""; STATE.output = "";
  render();

  let prompt = "";
  const tab = STATE.contentTab;
  if(tab==="video"){
    prompt = `ສ້າງ script ວິດີໂອສິນຄ້າ (ສຳລັບ TikTok/Facebook Reels, ຄວາມຍາວ 30-45 ວິນາທີ) ສຳລັບສິນຄ້າຕໍ່ໄປນີ້ ເປັນພາສາລາວ:
ຊື່ສິນຄ້າ: ${product.name}
ໝວດໝູ່: ${product.category}
ລາຍລະອຽດ: ${product.desc}
ບັນຫາລູກຄ້າທີ່ແກ້ໄຂ: ${product.painPoints}
${STATE.extra ? "ຄຳແນະນຳເພີ່ມເຕີມ: "+STATE.extra : ""}

ກະລຸນາສ້າງ script ທີ່ມີ: Hook (3 ວິນາທີທຳອິດ), ເນື້ອຫາ (ບັນຫາ-ວິທີແກ້-ຜົນລັບ), Call-to-action ປິດທ້າຍ. ຂຽນເປັນພາສາລາວແບບເປັນກັນເອງ ເໝາະກັບຕະຫຼາດລາວ.`;
  } else if(tab==="caption"){
    prompt = `ສ້າງແຄບຊັນໂພສ Facebook ສຳລັບສິນຄ້າຕໍ່ໄປນີ້ ເປັນພາສາລາວ ແບບດຶງດູດ ມີ emoji ພໍດີ ແລະ hashtag ທ້າຍ:
ຊື່ສິນຄ້າ: ${product.name}
ໝວດໝູ່: ${product.category}
ລາຍລະອຽດ: ${product.desc}
ບັນຫາລູກຄ້າທີ່ແກ້ໄຂ: ${product.painPoints}
ລາຄາ: ${product.price ? fmt(product.price)+" ກີບ" : "ບໍ່ລະບຸ"}
${STATE.extra ? "ຄຳແນະນຳເພີ່ມເຕີມ: "+STATE.extra : ""}

ສ້າງ 2 ແບບ (version A ແບບເລົ່າເລື່ອງ, version B ແບບສັ້ນກະທັດຮັດເນັ້ນ CTA) ໃຫ້ພ້ອມ copy ໄປໂພສໄດ້ເລີຍ.`;
  } else if(tab==="calendar"){
    prompt = `ສ້າງແຜນ content calendar 7 ວັນ ສຳລັບໂພສ Facebook ຂາຍສິນຄ້ານີ້ ເປັນພາສາລາວ:
ຊື່ສິນຄ້າ: ${product.name}
ໝວດໝູ່: ${product.category}
ລາຍລະອຽດ: ${product.desc}
${STATE.extra ? "ຄຳແນະນຳເພີ່ມເຕີມ: "+STATE.extra : ""}

ສຳລັບແຕ່ລະວັນ ໃຫ້ລະບຸ: ຫົວຂໍ້ໂພສ, ປະເພດ content (ໂພສຂາຍກົງ/ໃຫ້ຄວາມຮູ້/testimonial/ຕະຫຼົກ-engagement), ແລະແນວຄິດສັ້ນໆ.`;
  } else if(tab==="closing"){
    prompt = `ສ້າງ script ສຳລັບຕອບແຊັດປິດການຂາຍ (closing script) ເປັນພາສາລາວ ສຳລັບສິນຄ້ານີ້:
ຊື່ສິນຄ້າ: ${product.name}
ລາຍລະອຽດ: ${product.desc}
ບັນຫາລູກຄ້າ: ${product.painPoints}
ລາຄາ: ${product.price ? fmt(product.price)+" ກີບ" : "ບໍ່ລະບຸ"}
${STATE.extra ? "ສະຖານະການລູກຄ້າ: "+STATE.extra : ""}

ໃຫ້ script ສຳລັບ: ການຕອບຄຳຖາມລາຄາ, ການແກ້ຂໍ້ສົງໄສ (objection handling), ແລະປະໂຫຍກປິດການຂາຍ.`;
  }

  try{
    const result = await callAI(prompt, "ທ່ານແມ່ນຜູ້ຊ່ຽວຊານດ້ານການຕະຫຼາດອອນລາຍສຳລັບຕະຫຼາດລາວ ຂຽນເປັນພາສາລາວທີ່ເປັນທຳມະຊາດ ເຂົ້າໃຈວັດທະນະທຳການຂາຍຂອງລາວ.");
    STATE.output = result;
    const newItem = {
      id:"c"+Date.now(), type:tab, productName:product.name,
      content:result, date:new Date().toLocaleString("lo-LA")
    };
    STATE.data.contentHistory.unshift(newItem);
    dbInsertContent(newItem).catch(e=>console.error(e));
  }catch(e){
    STATE.error = "ເກີດຂໍ້ຜິດພາດ: " + e.message;
  }
  STATE.loading = false;
  render();
}

  return `

async function analyzeInsights(){
  const d = STATE.data;
  if(d.insights.length===0){ STATE.analyzeError = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກ ກະລຸນາເພີ່ມບັນຫາລູກຄ້າກ່ອນ"; render(); return; }
  STATE.analyzing = true; STATE.analyzeError = ""; STATE.analysis = "";
  render();
  try{
    const list = d.insights.slice(0,30).map((i,idx)=>`${idx+1}. ຄຳຖາມ: ${i.question} | ຄຳຕອບ: ${i.answer} | ສິນຄ້າ: ${i.productRelated||"-"}`).join("\n");
    const prompt = `ນີ້ແມ່ນບັນທຶກຄຳຖາມ-ຄຳຕອບຈາກລູກຄ້າທີ່ແຊັດເຂົ້າມາໃນຮ້ານອອນລາຍ:

${list}

ກະລຸນາວິເຄາະ:
1. ຮູບແບບ/ແນວໂນ້ມບັນຫາທີ່ລູກຄ້າຖາມເລື້ອຍໆ
2. ຈຸດທີ່ສິນຄ້າປະຈຸບັນຍັງຕອບສະໜອງບໍ່ພໍ
3. ແນວຄິດສິນຄ້າໃໝ່ ຫຼື ການແຕກລາຍສິນຄ້າທີ່ອາດຕອບໂຈດຄວາມຕ້ອງການເຫຼົ່ານີ້ໄດ້ (ສະເໜີ 2-3 ແນວຄິດ)
4. ຄຳແນະນຳສຳລັບການສ້າງ content ໃໝ່ ໂດຍອີງໃສ່ບັນຫາທີ່ພົບ

ຂຽນເປັນພາສາລາວ ຈັດໝວດໝູ່ໃຫ້ຈະແຈ້ງ.`;
    const result = await callAI(prompt, "ທ່ານແມ່ນນັກວິເຄາະການຕະຫຼາດ ຊ່ຽວຊານໃນການອ່ານ pattern ຈາກຄຳຖາມລູກຄ້າ ເພື່ອຄົ້ນພົບໂອກາດສິນຄ້າໃໝ່.");
    STATE.analysis = result;
  }catch(e){
    STATE.analyzeError = "ເກີດຂໍ້ຜິດພາດ: "+e.message;
  }
  STATE.analyzing = false;
  render();
}

function exportInsightsToExcel(){
  const d = STATE.data;
  const rows = d.insights.map(i => ({
    "ວັນທີ": i.date || "",
    "ຄຳຖາມ": i.question || "",
    "ຄຳຕອບ": i.answer || "",
    "ສິນຄ້າທີ່ກ່ຽວຂ້ອງ": i.productRelated || ""
  }));
  if(rows.length===0){
    STATE.importMsg = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກໃຫ້ສົ່ງອອກ";
    render();
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:14},{wch:40},{wch:40},{wch:20}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ບັນຫາລູກຄ້າ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `customer-insights-${stamp}.xlsx`);
}

function importInsightsFromExcel(file){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const wb = XLSX.read(e.target.result, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
      const newItems = [];
      rows.forEach((r, idx) => {
        const question = r["ຄຳຖາມ"] || r["question"] || r["Question"] || "";
        const answer = r["ຄຳຕອບ"] || r["answer"] || r["Answer"] || "";
        const productRelated = r["ສິນຄ້າທີ່ກ່ຽວຂ້ອງ"] || r["product"] || r["Product"] || "";
        const date = r["ວັນທີ"] || r["date"] || r["Date"] || new Date().toLocaleDateString("lo-LA");
        if(String(question).trim()){
          newItems.push({
            id:"i"+Date.now()+"-"+idx,
            question:String(question), answer:String(answer),
            productRelated:String(productRelated), date:String(date)
          });
        }
      });
      if(newItems.length>0){
        STATE.data.insights.unshift(...newItems);
        await dbInsertInsightsBulk(newItems);
      }
      STATE.importMsg = newItems.length>0
        ? `ນຳເຂົ້າສຳເລັດ: ເພີ່ມ ${newItems.length} ລາຍການໃໝ່`
        : "ບໍ່ພົບແຖວທີ່ມີຄຳຖາມໃນໄຟລ໌ — ກະລຸນາກວດຫົວຄໍລາມ໌ໃຫ້ກົງກັບ 'ຄຳຖາມ', 'ຄຳຕອບ', 'ສິນຄ້າທີ່ກ່ຽວຂ້ອງ', 'ວັນທີ'";
    }catch(err){
      STATE.importMsg = "ອ່ານໄຟລ໌ບໍ່ສຳເລັດ: " + err.message;
    }
    render();
  };
  reader.readAsArrayBuffer(file);
}

function attachLoginEvents(){
  const tabLogin = document.getElementById("tab-login");
  const tabReg = document.getElementById("tab-register");
  if(tabLogin) tabLogin.addEventListener("click", ()=>{ STATE.loginMode="login"; STATE.loginError=""; render(); });
  if(tabReg) tabReg.addEventListener("click", ()=>{ STATE.loginMode="register"; STATE.loginError=""; render(); });

  const nameEl = document.getElementById("login-name");
  const passEl = document.getElementById("login-password");
  if(nameEl) nameEl.addEventListener("input", ()=>{ STATE.loginForm.name = nameEl.value; });
  if(passEl) passEl.addEventListener("input", ()=>{ STATE.loginForm.password = passEl.value; });

  const toggleBtn = document.getElementById("btn-toggle-password");
  if(toggleBtn && passEl){
    toggleBtn.addEventListener("click", ()=>{
      if(passEl.type==="password"){
        passEl.type = "text";
        toggleBtn.textContent = "🙈";
      } else {
        passEl.type = "password";
        toggleBtn.textContent = "👁";
      }
    });
  }

  const submitBtn = document.getElementById("btn-login-submit");
  if(submitBtn) submitBtn.addEventListener("click", async ()=>{
    const name = STATE.loginForm.name.trim();
    const password = STATE.loginForm.password.trim();
    if(!name || !password){ STATE.loginError = "ກະລຸນາໃສ່ຊື່ ແລະ ລະຫັດຜ່ານ"; render(); return; }
    submitBtn.disabled = true;
    submitBtn.textContent = "ກຳລັງດຳເນີນການ...";
    try{
      let user;
      if(STATE.loginMode==="register"){
        user = await dbRegister(name, password);
      } else {
        user = await dbLogin(name, password);
      }
      STATE.currentUser = user;
      STATE.loginError = "";
      STATE.loginForm = {name:"", password:""};
      render();
    }catch(e){
      STATE.loginError = e.message;
      render();
    }
  });
}

function attachProductEvents(){
  const btnNew = document.getElementById("btn-new-product");
  if(btnNew) btnNew.addEventListener("click", ()=>{
    STATE.productForm = {name:"", category:"", price:"", costPrice:"", desc:"", painPoints:""};
    STATE.editingProduct = null;
    STATE.showProductForm = true;
    render();
  });

  document.querySelectorAll("[data-edit-product]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-edit-product");
      const p = STATE.data.products.find(x=>x.id===id);
      if(p){
        STATE.productForm = {...p};
        STATE.editingProduct = id;
        STATE.showProductForm = true;
        render();
      }
    });
  });

  document.querySelectorAll("[data-del-product]").forEach(el=>{
    el.addEventListener("click", (e)=>{
      e.stopPropagation();
      const id = el.getAttribute("data-del-product");
      STATE.data.products = STATE.data.products.filter(p=>p.id!==id);
      render();
      dbDeleteProduct(id).catch(err=>console.error(err));
    });
  });

  const modalBg = document.getElementById("product-modal-bg");
  if(modalBg){
    modalBg.addEventListener("click", (e)=>{
      if(e.target.id==="product-modal-bg"){ STATE.showProductForm = false; render(); }
    });
  }
  const closeBtn = document.getElementById("close-product-modal");
  if(closeBtn) closeBtn.addEventListener("click", ()=>{ STATE.showProductForm = false; render(); });

  const saveBtn = document.getElementById("save-product");
  if(saveBtn){
    saveBtn.addEventListener("click", async ()=>{
      const f = {
        name: document.getElementById("pf-name").value,
        category: document.getElementById("pf-category").value,
        price: document.getElementById("pf-price").value,
        costPrice: document.getElementById("pf-costPrice").value,
        desc: document.getElementById("pf-desc").value,
        painPoints: document.getElementById("pf-painPoints").value
      };
      if(!f.name.trim()) return;
      if(STATE.editingProduct){
        const updated = {...f, id:STATE.editingProduct};
        STATE.data.products = STATE.data.products.map(p=>p.id===STATE.editingProduct ? updated : p);
        STATE.showProductForm = false;
        render();
        dbUpdateProduct(updated).catch(err=>console.error(err));
      } else {
        const newProduct = {...f, id:"p"+Date.now()};
        STATE.data.products.push(newProduct);
        STATE.showProductForm = false;
        render();
        dbInsertProduct(newProduct).catch(err=>console.error(err));
      }
    });
  }
}

function attachContentEvents(){
  document.querySelectorAll("[data-content-tab]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.contentTab = el.getAttribute("data-content-tab");
      STATE.output = ""; STATE.error = "";

  });

  const sel = document.getElementById("content-product");
  if(sel) sel.addEventListener("change", ()=>{ STATE.selProduct = sel.value; });

  const extra = document.getElementById("content-extra");
  if(extra) extra.addEventListener("input", ()=>{ STATE.extra = extra.value; });

  const genBtn = document.getElementById("btn-generate");
  if(genBtn) genBtn.addEventListener("click", generateContent);

  const copyBtn = document.getElementById("btn-copy");
  if(copyBtn) copyBtn.addEventListener("click", ()=>{
    navigator.clipboard.writeText(STATE.output);
  });

  const fbBtn = document.getElementById("btn-open-fb");
  if(fbBtn) fbBtn.addEventListener("click", ()=>{
    navigator.clipboard.writeText(STATE.output);
    window.open("https://www.facebook.com/", "_blank");
  });

  document.querySelectorAll("[data-view-history]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-view-history");
      const item = STATE.data.contentHistory.find(c=>c.id===id);
      if(item){ STATE.output = item.content; render(); }
    });
  });
}

function exportCostsToExcel(){
  const d = STATE.data;
  if(d.costs.length===0){ render(); return; }
  const rows = d.costs.map(c => {
    const profit = (Number(c.revenue)||0)-(Number(c.productCost)||0)-(Number(c.adCost)||0)-(Number(c.opCost)||0);
    return {
      "ລາຍການ": c.label || "",
      "ລາຍຮັບ": Number(c.revenue)||0,
      "ຕົ້ນທຶນສິນຄ້າ": Number(c.productCost)||0,
      "ຄ່າໂຄສະນາ": Number(c.adCost)||0,
      "ຄ່າບໍລິຫານ": Number(c.opCost)||0,
      "ກຳໄລ": profit
    };
  });
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:28},{wch:12},{wch:14},{wch:12},{wch:12},{wch:12}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ຕົ້ນທຶນ-ກຳໄລ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `cost-profit-${stamp}.xlsx`);
}

function attachCostEvents(){
  const exportBtn = document.getElementById("btn-export-costs-excel");
  if(exportBtn) exportBtn.addEventListener("click", exportCostsToExcel);
  ["label","revenue","productCost","adCost","opCost"].forEach(k=>{
    const el = document.getElementById("cf-"+k);
    if(el) el.addEventListener("input", ()=>{ STATE.costForm[k] = el.value; });
  });
  const addBtn = document.getElementById("btn-add-cost");
  if(addBtn) addBtn.addEventListener("click", ()=>{
    const f = STATE.costForm;
    if(!f.label.trim()) return;
    const newCost = {...f, id:"co"+Date.now()};
    STATE.data.costs.unshift(newCost);
    STATE.costForm = {label:"", revenue:"", productCost:"", adCost:"", opCost:""};
    render();
    dbInsertCost(newCost).catch(err=>console.error(err));
  });
  document.querySelectorAll("[data-del-cost]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-cost");
      STATE.data.costs = STATE.data.costs.filter(c=>c.id!==id);
      render();
      dbDeleteCost(id).catch(err=>console.error(err));
    });
  });
}

function attachAdminEvents(){
  ["name","role"].forEach(k=>{
    const el = document.getElementById("af-"+k);
    if(el) el.addEventListener("input", ()=>{ STATE.adminForm[k] = el.value; });
  });
  const statusEl = document.getElementById("af-status");
  if(statusEl) statusEl.addEventListener("change", ()=>{ STATE.adminForm.status = statusEl.value; });

  const addBtn = document.getElementById("btn-add-admin");
  if(addBtn) addBtn.addEventListener("click", ()=>{
    const f = STATE.adminForm;
    if(!f.name.trim()) return;
    const newAdmin = {...f, id:"ad"+Date.now()};
    STATE.data.admins.push(newAdmin);
    STATE.adminForm = {name:"", role:"", status:"ກຳລັງເຮັດວຽກ"};
    render();
    dbInsertAdmin(newAdmin).catch(err=>console.error(err));
  });

  document.querySelectorAll("[data-del-admin]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-admin");
      STATE.data.admins = STATE.data.admins.filter(a=>a.id!==id);
      render();
      dbDeleteAdmin(id).catch(err=>console.error(err));
    });
  });

  document.querySelectorAll("[data-cycle-status]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-cycle-status");
      const order = ["ກຳລັງເຮັດວຽກ","ພັກ","ບໍ່ຢູ່"];
      let newStatus = "";
      STATE.data.admins = STATE.data.admins.map(a=>{
        if(a.id!==id) return a;
        const idx = order.indexOf(a.status);
        newStatus = order[(idx+1)%order.length];
        return {...a, status: newStatus};
      });
      render();
      dbUpdateAdminStatus(id, newStatus).catch(err=>console.error(err));
    });
  });
}

function attachInsightEvents(){
  const qEl = document.getElementById("if-question");
  if(qEl) qEl.addEventListener("input", ()=>{ STATE.insightForm.question = qEl.value; });
  const aEl = document.getElementById("if-answer");
  if(aEl) aEl.addEventListener("input", ()=>{ STATE.insightForm.answer = aEl.value; });
  const pEl = document.getElementById("if-product");
  if(pEl) pEl.addEventListener("change", ()=>{ STATE.insightForm.productRelated = pEl.value; });

  document.querySelectorAll("[data-view-insight]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-view-insight");
      STATE.viewingInsight = STATE.data.insights.find(i=>i.id===id) || null;
      render();
    });
  });

  const modalBg = document.getElementById("insight-modal-bg");
  if(modalBg) modalBg.addEventListener("click", (e)=>{
    if(e.target.id==="insight-modal-bg"){ STATE.viewingInsight=null; render(); }
  });
  const closeModal = document.getElementById("close-insight-modal");
  if(closeModal) closeModal.addEventListener("click", ()=>{ STATE.viewingInsight=null; render(); });
  const closeModalBtn = document.getElementById("close-insight-modal-btn");
  if(closeModalBtn) closeModalBtn.addEventListener("click", ()=>{ STATE.viewingInsight=null; render(); });

  const addBtn = document.getElementById("btn-add-insight");
  if(addBtn) addBtn.addEventListener("click", ()=>{
    const f = STATE.insightForm;
    if(!f.question.trim()) return;
    const newInsight = {
      ...f,
      id:"i"+Date.now(),
      date:new Date().toLocaleDateString("lo-LA"),
      adminName: STATE.currentUser?.name || ""
    };
    STATE.data.insights.unshift(newInsight);
    STATE.insightForm = {question:"", answer:"", productRelated:""};
    render();
    dbInsertInsight(newInsight).catch(err=>console.error(err));
  });

  document.querySelectorAll("[data-del-insight]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-insight");
      STATE.data.insights = STATE.data.insights.filter(i=>i.id!==id);
      render();
      dbDeleteInsight(id).catch(err=>console.error(err));
    });
  });

  const analyzeBtn = document.getElementById("btn-analyze");
  if(analyzeBtn) analyzeBtn.addEventListener("click", analyzeInsights);

  const exportBtn = document.getElementById("btn-export-excel");
  if(exportBtn) exportBtn.addEventListener("click", exportInsightsToExcel);

  const importTrigger = document.getElementById("btn-import-excel-trigger");
  const importInput = document.getElementById("import-excel-input");
  if(importTrigger && importInput){
    importTrigger.addEventListener("click", ()=> importInput.click());
    importInput.addEventListener("change", (e)=>{
      const file = e.target.files[0];
      if(file) importInsightsFromExcel(file);
      importInput.value = "";
    });
  }
}

}
init();
