/* ============ Marketing Studio: 💰 ຄຳນວນກຳໄລ (pricing calculator) ============ */
function renderPricingTab(d){
  if(d.products.length===0) return `<div class="card"><p class="small-muted">ກະລຸນາເພີ່ມສິນຄ້າກ່ອນ ໃນໜ້າ "ສິນຄ້າ"</p></div>`;
  const productId = STATE.selProduct;
  if(STATE.pricingFormProduct !== productId){
    const saved = d.productPricing[productId];
    STATE.pricingForm = saved ? {
      costA:String(saved.costA||""), sellA:String(saved.sellA||""), labelA:saved.labelA||"ແພັກນ້ອຍ",
      costB:String(saved.costB||""), sellB:String(saved.sellB||""), labelB:saved.labelB||"ແພັກໃຫຍ່",
      discountPct:String(saved.discountPct||"")
    } : {costA:"", sellA:"", labelA:"ແພັກນ້ອຍ", costB:"", sellB:"", labelB:"ແພັກໃຫຍ່", discountPct:""};
    STATE.pricingFormProduct = productId;
    STATE.pricingSaved = false;
  }
  const f = STATE.pricingForm;
  const costA = parseFloat(f.costA)||0, sellA = parseFloat(f.sellA)||0;
  const costB = parseFloat(f.costB)||0, sellB = parseFloat(f.sellB)||0;
  const disc = parseFloat(f.discountPct)||0;
  const profitA = sellA-costA, marginA = sellA ? ((profitA/sellA)*100).toFixed(1) : "0.0";
  const profitB = sellB-costB, marginB = sellB ? ((profitB/sellB)*100).toFixed(1) : "0.0";
  const discPriceA = sellA*(1-disc/100), discProfitA = discPriceA-costA;
  return `
    <div class="card">
      <label>ເລືອກສິນຄ້າ</label>
      <select id="cs-pricing-product">
        ${d.products.map(p=>`<option value="${p.id}" ${STATE.selProduct===p.id?'selected':''}>${esc(p.name)}</option>`).join("")}
      </select>
      <p class="small-muted" style="margin:10px 0 14px;">💰 ໃສ່ຕົ້ນທຶນ ແລະ ລາຄາຂາຍ ເພື່ອເບິ່ງກຳໄລ — ຕັ້ງຊື່ແພັກເອງໄດ້ (ເຊັ່ນ ຂະໜາດນ້ອຍ/ໃຫຍ່)</p>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div>
          <label style="font-size:12.5px;">ຊື່ແພັກ A</label>
          <input type="text" id="cs-pc-labelA" value="${esc(f.labelA)}"/>
          <label style="font-size:12.5px; margin-top:8px;">ຕົ້ນທຶນ / ${esc(f.labelA)}</label>
          <input type="text" id="cs-pc-costA" placeholder="0" value="${esc(f.costA)}"/>
          <label style="font-size:12.5px; margin-top:8px;">ລາຄາຂາຍ / ${esc(f.labelA)}</label>
          <input type="text" id="cs-pc-sellA" placeholder="0" value="${esc(f.sellA)}"/>
        </div>
        <div>
          <label style="font-size:12.5px;">ຊື່ແພັກ B</label>
          <input type="text" id="cs-pc-labelB" value="${esc(f.labelB)}"/>
          <label style="font-size:12.5px; margin-top:8px;">ຕົ້ນທຶນ / ${esc(f.labelB)}</label>
          <input type="text" id="cs-pc-costB" placeholder="0" value="${esc(f.costB)}"/>
          <label style="font-size:12.5px; margin-top:8px;">ລາຄາຂາຍ / ${esc(f.labelB)}</label>
          <input type="text" id="cs-pc-sellB" placeholder="0" value="${esc(f.sellB)}"/>
        </div>
      </div>
      <label style="margin-top:10px;">ສ່ວນຫຼຸດໂປຣໂມຊັນ (%)</label>
      <input type="text" id="cs-pc-discount" placeholder="ເຊັ່ນ 10" value="${esc(f.discountPct)}" style="max-width:160px;"/>
      <button class="btn btn-sm" id="cs-btn-save-pricing" style="margin-top:12px;">💾 ບັນທຶກ</button>
      ${STATE.pricingSaved ? `<span class="small-muted" style="margin-left:10px; color:var(--sage-dark);">✓ ບັນທຶກແລ້ວ</span>` : ""}
      <div style="margin-top:18px; padding-top:16px; border-top:1px solid #E9E3D3;">
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px;">
          <div class="stat"><div class="label">ກຳໄລ/${esc(f.labelA)}</div><div class="value good">${fmt(profitA)} (${marginA}%)</div></div>
          <div class="stat"><div class="label">ກຳໄລ/${esc(f.labelB)}</div><div class="value good">${fmt(profitB)} (${marginB}%)</div></div>
          <div class="stat"><div class="label">ລາຄາຫຼັງຫຼຸດ ${disc}% (${esc(f.labelA)})</div><div class="value">${fmt(discPriceA)}</div></div>
          <div class="stat"><div class="label">ກຳໄລຫຼັງຫຼຸດ (${esc(f.labelA)})</div><div class="value ${discProfitA<0?'danger':'good'}">${fmt(discProfitA)}</div></div>
        </div>
      </div>
    </div>
  `;
}

            <span class="small-muted">${esc(c.date)}</span>
          </div>
          <div style="font-weight:700; font-size:13.5px; margin-bottom:4px;">${esc(c.productName)}</div>
          <div class="small-muted" style="max-height:60px; overflow:hidden; white-space:pre-wrap;">${esc(c.content.slice(0,180))}${c.content.length>180?"...":""}</div>

async function generateContent(){
  const d = STATE.data;
  const product = d.products.find(p=>p.id===STATE.selProduct);
  if(!product){ STATE.error = "ກະລຸນາເລືອກສິນຄ້າກ່ອນ"; render(); return; }
  const tab = STATE.contentTab;
  if(tab==="analyzer" && !STATE.analyzerCurrent.trim()){
    STATE.error = "ກະລຸນາວາງຄອນເທນຕ໌ທີ່ຈະວິເຄາະກ່ອນ"; render(); return;
  }
  if(tab==="objection" && !STATE.objectionType){
    STATE.error = "ກະລຸນາເລືອກປະເພດຂໍ້ໂຕ້ແຍ້ງກ່ອນ"; render(); return;
  }
  STATE.loading = true; STATE.error = ""; STATE.output = "";
  render();

  let prompt = "";
  const knowledge = d.productKnowledge[product.id];
  const knowledgeBlock = (knowledge && knowledge.content)
    ? `\n\nຂໍ້ມູນຄົ້ນຄວ້າເພີ່ມເຕີມ (ຈາກອິນເຕີເນັດ, ໃຫ້ໃຊ້ອ້າງອີງເພື່ອໃຫ້ content ຕົງກັບຄວາມເປັນຈິງກ່ຽວກັບສິນຄ້ານີ້ຫຼາຍຂຶ້ນ):\n${knowledge.content}`
    : "";
  const selectedPains = (d.painPointsLib[product.id]||[]).filter(pp=>STATE.selectedPainPointIds.includes(pp.id));
  const selectedPainBlock = selectedPains.length>0
    ? `\nບັນຫາລູກຄ້າທີ່ຈະເນັ້ນເປັນພິເສດ: ${selectedPains.map(p=>p.text).join(", ")}`
    : "";

  if(tab==="createPost"){

async function sendProductChat(){
  const d = STATE.data;
  const product = d.products.find(p=>p.id===STATE.chatSelProduct);
  if(!product) return;
  const questionEl = document.getElementById("chat-input");
  const question = (questionEl ? questionEl.value : STATE.chatQuestion || "").trim();
  if(!question) return;

  const knowledge = d.productKnowledge[product.id];
  const faqList = d.productFaq[product.id] || [];
  const faqBlock = faqList.length>0
    ? `\nຄຳຖາມ-ຕອບດ່ວນທີ່ບັນທຶກໄວ້ (ໃຫ້ໃຊ້ຄຳຕອບເຫຼົ່ານີ້ເປັນຫຼັກ ຖ້າກົງກັບຄຳຖາມ):\n${faqList.map(fq=>`- Q: ${fq.question}\n  A: ${fq.answer}`).join("\n")}`
    : "";
  const userMsg = {id:"pc"+Date.now(), productId:product.id, role:"admin", message:question, createdAt:new Date().toISOString()};
  STATE.data.productChat.push(userMsg);
  STATE.chatQuestion = "";
  STATE.chatSending = true;
  STATE.chatError = "";
  render();
  dbInsertChatMsg(userMsg).catch(e=>{ console.error(e); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+e.message); });

  const system = `ທ່ານແມ່ນຄົນລາວແທ້ໆ ເປັນຜູ້ຊ່ວຍດ້ານການຕະຫຼາດສຳລັບຮ້ານຄ້າອອນລາຍໃນລາວ ຕອບຄຳຖາມກ່ຽວກັບສິນຄ້າຕໍ່ໄປນີ້ໂດຍອີງໃສ່ຂໍ້ມູນທີ່ໃຫ້ໄວ້ເທົ່ານັ້ນ ຫ້າມໃຊ້ຂໍ້ມູນຂອງສິນຄ້າ/ແບຣນອື່ນມາຕອບແທນເດັດຂາດ ເຖິງຈະຄ້າຍຄືກັນກໍ່ຕາມ ຖ້າບໍ່ມີຂໍ້ມູນພຽງພໍ ໃຫ້ບອກຕາມກົງວ່າບໍ່ມີຂໍ້ມູນ ຢ່າກຸກຂໍ້ມູນຂຶ້ນເອງ. ຕອບເປັນພາສາລາວລ້ວນໆ ແບບທີ່ຄົນລາວແທ້ໆເວົ້າກັນຈິງ ບໍ່ແປຄຳຕໍ່ຄຳຈາກພາສາອື່ນ ບໍ່ປົນຄຳສັບ/ໄວຍະກອນຂອງພາສາໄທ ຫຼືພາສາອື່ນ ສັ້ນ ກົງປະເດັນ ອ່ານແລ້ວເປັນທຳມະຊາດ ນຳໃຊ້ໄດ້ຈິງສຳລັບແອັດມິນທີ່ຈະເອົາໄປເຮັດການຕະຫຼາດ.

ຊື່ສິນຄ້າ: ${product.name}
ໝວດໝູ່: ${product.category}
ລາຍລະອຽດ: ${product.desc}
ລາຄາຂາຍ: ${product.price ? fmt(product.price)+" ກີບ" : "ບໍ່ໄດ້ບັນທຶກໄວ້"}
${product.highlights ? `ຈຸດເດັ່ນ/ສ່ວນປະສົມ: ${product.highlights}` : ""}
${product.benefits ? `ປະໂຫຍດຫຼັກ: ${product.benefits}` : ""}
${product.usage ? `ວິທີໃຊ້: ${product.usage}` : ""}
ບັນຫາລູກຄ້າ (pain points) ທີ່ບັນທຶກໄວ້: ${product.painPoints}${faqBlock}
${knowledge && knowledge.content ? `\nຂໍ້ມູນຄົ້ນຄວ້າຈາກອິນເຕີເນັດ (ຄົ້ນຄວ້າໄວ້ລ່ວງໜ້າ):\n${knowledge.content}` : ""}`;

  try{
    const answer = await callAI(question, system);
    const aiMsg = {id:"pc"+(Date.now()+1), productId:product.id, role:"ai", message:answer, createdAt:new Date().toISOString()};
    STATE.data.productChat.push(aiMsg);
    dbInsertChatMsg(aiMsg).catch(e=>{ console.error(e); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+e.message); });
  }catch(e){
    STATE.chatError = "ເກີດຂໍ້ຜິດພາດ: " + e.message;
  }
  STATE.chatSending = false;
  render();
}

function attachProductChatEvents(){
  const sel = document.getElementById("chat-product");
  if(sel) sel.addEventListener("change", ()=>{
    STATE.chatSelProduct = sel.value;
    STATE.chatKnowledgeOpen = false;
    render();
  });
  const toggleKnowledge = document.getElementById("btn-toggle-knowledge");
  if(toggleKnowledge) toggleKnowledge.addEventListener("click", ()=>{
    STATE.chatKnowledgeOpen = !STATE.chatKnowledgeOpen;
    render();
  });
  const input = document.getElementById("chat-input");
  if(input) input.addEventListener("input", ()=>{ STATE.chatQuestion = input.value; });
  const sendBtn = document.getElementById("btn-chat-send");
  if(sendBtn) sendBtn.addEventListener("click", sendProductChat);
  if(input) input.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendProductChat(); }
  });
  const log = document.getElementById("chat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

async function analyzeInsights(){
  const d = STATE.data;
  if(d.insights.length===0){ STATE.analyzeError = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກ ກະລຸນາເພີ່ມບັນຫາລູກຄ້າກ່ອນ"; render(); return; }
  STATE.analyzing = true; STATE.analyzeError = ""; STATE.analysis = "";
  render();
  try{
    const list = d.insights.slice(0,30).map((i,idx)=>`${idx+1}. ຄຳຖາມ: ${i.question} | ຄຳຕອບ: ${i.answer} | ສິນຄ້າ: ${i.productRelated||"-"}`).join("\n");
    const prompt = `ນີ້ແມ່ນບັນທຶກຄຳຖາມ-ຄຳຕອບຈາກລູກຄ້າທີ່ແຊັດເຂົ້າມາໃນຮ້ານອອນລາຍ:

${list}

ກະລຸນາວິເຄາະ:
1. ຮູບແບບ/ແນວໂນ້ມບັນຫາທີ່ລູກຄ້າຖາມເລື້ອຍໆ
2. ຈຸດທີ່ສິນຄ້າປະຈຸບັນຍັງຕອບສະໜອງບໍ່ພໍ
3. ແນວຄິດສິນຄ້າໃໝ່ ຫຼື ການແຕກລາຍສິນຄ້າທີ່ອາດຕອບໂຈດຄວາມຕ້ອງການເຫຼົ່ານີ້ໄດ້ (ສະເໜີ 2-3 ແນວຄິດ)
4. ຄຳແນະນຳສຳລັບການສ້າງ content ໃໝ່ ໂດຍອີງໃສ່ບັນຫາທີ່ພົບ

ຂຽນເປັນພາສາລາວ ຈັດໝວດໝູ່ໃຫ້ຈະແຈ້ງ.`;
    const result = await callAI(prompt, "ທ່ານແມ່ນນັກວິເຄາະການຕະຫຼາດ ຊ່ຽວຊານໃນການອ່ານ pattern ຈາກຄຳຖາມລູກຄ້າ ເພື່ອຄົ້ນພົບໂອກາດສິນຄ້າໃໝ່.");
    STATE.analysis = result;
  }catch(e){
    STATE.analyzeError = "ເກີດຂໍ້ຜິດພາດ: "+e.message;
  }
  STATE.analyzing = false;
  render();
}

function exportInsightsToExcel(){
  const d = STATE.data;
  const rows = d.insights.map(i => ({
    "ຜູ້ລາຍງານ": i.adminName || "",
    "ວັນທີ": i.date || "",
    "ຄຳຖາມ": i.question || "",
    "ຄຳຕອບຂອງແອັດມິນ": i.answer || "",
    "ສິນຄ້າທີ່ກ່ຽວຂ້ອງ": i.productRelated || "",
    "ມີຮູບແນບ": i.imageUrl ? "ມີ" : "ບໍ່ມີ",
    "ອ່ານແລ້ວ": i.readByOwner ? "ອ່ານແລ້ວ" : "ຍັງບໍ່ອ່ານ"
  }));
  if(rows.length===0){
    STATE.importMsg = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກໃຫ້ສົ່ງອອກ";
    render();
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:14},{wch:40},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ບັນຫາລູກຄ້າ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `customer-insights-${stamp}.xlsx`);
}

function importInsightsFromExcel(file){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const wb = XLSX.read(e.target.result, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
      const newItems = [];
      rows.forEach((r, idx) => {
        const question = r["ຄຳຖາມ"] || r["question"] || r["Question"] || "";
        const answer = r["ຄຳຕອບ"] || r["answer"] || r["Answer"] || "";
        const productRelated = r["ສິນຄ້າທີ່ກ່ຽວຂ້ອງ"] || r["product"] || r["Product"] || "";
        const date = r["ວັນທີ"] || r["date"] || r["Date"] || new Date().toLocaleDateString("en-GB", {timeZone: LAOS_TZ});
        if(String(question).trim()){
          newItems.push({
            id:"i"+Date.now()+"-"+idx,
            question:String(question), answer:String(answer),
            productRelated:String(productRelated), date:String(date)
          });
        }
      });
      if(newItems.length>0){
        STATE.data.insights.unshift(...newItems);
        await dbInsertInsightsBulk(newItems);
      }
      STATE.importMsg = newItems.length>0
        ? `ນຳເຂົ້າສຳເລັດ: ເພີ່ມ ${newItems.length} ລາຍການໃໝ່`
        : "ບໍ່ພົບແຖວທີ່ມີຄຳຖາມໃນໄຟລ໌ — ກະລຸນາກວດຫົວຄໍລາມ໌ໃຫ້ກົງກັບ 'ຄຳຖາມ', 'ຄຳຕອບ', 'ສິນຄ້າທີ່ກ່ຽວຂ້ອງ', 'ວັນທີ'";
    }catch(err){
      STATE.importMsg = "ອ່ານໄຟລ໌ບໍ່ສຳເລັດ: " + err.message;
    }
    render();
  };
  reader.readAsArrayBuffer(file);
}

function isOwner(){ return STATE.currentUser && STATE.currentUser.role==="owner"; }
// Page-level permission check: owner always sees everything and can't restrict themself.
// For "admin" role, a page is visible unless the owner explicitly turned it off in
// "⚙️ ຕັ້ງຄ່າສິດ". Missing entry = enabled (safe default, new pages show up automatically).
function isPageEnabledForCurrentUser(pageId){
  if(isOwner()) return true;
  const perms = STATE.data.adminPagePermissions || {};
  return perms[pageId] !== false;
}
async function dbSetAdminPagePermission(pageId, enabled){
  const {error} = await sb.from("admin_page_permissions").upsert({page_id:pageId, enabled});
  if(error) throw error;
}

function exportReportsToExcel(){
  const d = STATE.data;
  const rows = d.reports.map(r => ({
    "ຜູ້ລາຍງານ": r.adminName || "",
    "ຄົນເຮັດຜິດ": r.accusedName || "",
    "ໝວດໝູ່": r.category || "",
    "ລາຍລະອຽດ": r.detail || "",
    "ວັນ-ເວລາ": r.createdAt ? new Date(r.createdAt).toLocaleString("en-GB", {timeZone: LAOS_TZ}) : "",
    "ມີຮູບແນບ": r.imageUrl ? "ມີ" : "ບໍ່ມີ",
    "ອ່ານແລ້ວ": r.readByOwner ? "ອ່ານແລ້ວ" : "ຍັງບໍ່ອ່ານ"
  }));
  if(rows.length===0){ return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:16},{wch:22},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ລາຍງານຂໍ້ຜິດພາດ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `error-reports-${stamp}.xlsx`);
}

function attachReportEvents(){
  const exportRepBtn = document.getElementById("btn-export-reports-excel");
  if(exportRepBtn) exportRepBtn.addEventListener("click", exportReportsToExcel);
  document.querySelectorAll("[data-report-view]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.reportViewMode = el.getAttribute("data-report-view");
      render();
    });
  });

  const filterAccEl = document.getElementById("rep-filter-accused");
  if(filterAccEl) filterAccEl.addEventListener("change", ()=>{
    STATE.reportFilterAccused = filterAccEl.value;
    render();
  });

  const filterReportDateEl = document.getElementById("rep-date-filter");
  if(filterReportDateEl) filterReportDateEl.addEventListener("change", ()=>{ STATE.reportDateFilter = filterReportDateEl.value; render(); });
  const btnClearReportDateFilter = document.getElementById("btn-clear-report-date-filter");
  if(btnClearReportDateFilter) btnClearReportDateFilter.addEventListener("click", ()=>{ STATE.reportDateFilter = ""; render(); });

  const catEl = document.getElementById("rep-category");
  const accEl = document.getElementById("rep-accused");
  const detEl = document.getElementById("rep-detail");
  const imgEl = document.getElementById("rep-image-input");

  if(catEl) catEl.addEventListener("change", ()=>{ STATE.reportForm.category = catEl.value; });
  if(accEl) accEl.addEventListener("change", ()=>{ STATE.reportForm.accusedName = accEl.value; });
  if(detEl) detEl.addEventListener("input", ()=>{ STATE.reportForm.detail = detEl.value; });
  if(imgEl) imgEl.addEventListener("change", ()=>{
    const file = imgEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{ STATE.reportForm.imageBase64 = e.target.result; render(); };
    reader.readAsDataURL(file);
  });
  const imgRemoveBtn = document.getElementById("rep-image-remove");
  if(imgRemoveBtn) imgRemoveBtn.addEventListener("click", ()=>{
    STATE.reportForm.imageBase64 = "";
    if(imgEl) imgEl.value = "";
    render();
  });

  const submitBtn = document.getElementById("btn-submit-report");
  if(submitBtn) submitBtn.addEventListener("click", async ()=>{
    const f = STATE.reportForm;
    if(!f.category){ alert("ກະລຸນາເລືອກໝວດໝູ່ຂໍ້ຜິດພາດ"); return; }
    const newReport = {
      id:"rep"+Date.now(),
      adminName: STATE.currentUser?.name || "",
      category: f.category,
      accusedName: f.accusedName || "",
      detail: f.detail,
      imageUrl: f.imageBase64 || "",
      createdAt: new Date().toISOString(),
      readByOwner: false
    };
    STATE.data.reports.unshift(newReport);
    STATE.reportForm = {category:"", detail:"", imageBase64:"", accusedName:""};
    render();
    dbInsertReport(newReport).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });
  });

  document.querySelectorAll("[data-del-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-report");
      STATE.data.reports = STATE.data.reports.filter(r=>r.id!==id);
      render();
      dbDeleteReport(id).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });
    });
  });

  document.querySelectorAll("[data-view-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-view-report");
      const r = STATE.data.reports.find(x=>x.id===id);
      if(!r) return;
      STATE.viewingReport = r;
      render();
      if(isOwner() && !r.readByOwner){
        r.readByOwner = true;
        dbMarkReportRead(id).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });
      }
    });
  });
  const repModalBg = document.getElementById("report-modal-bg");
  if(repModalBg) repModalBg.addEventListener("click", (e)=>{
    if(e.target.id==="report-modal-bg"){ STATE.viewingReport=null; render(); }
  });
  const closeRepModal = document.getElementById("close-report-modal");
  if(closeRepModal) closeRepModal.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
  const closeRepModalBtn = document.getElementById("close-report-modal-btn");
  if(closeRepModalBtn) closeRepModalBtn.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
}

/* ---------- ATTENDANCE ---------- */
function fmtTime(ts){
  if(!ts) return "-";
  return new Date(ts).toLocaleTimeString("en-GB", {hour:"2-digit", minute:"2-digit", second:"2-digit", timeZone: LAOS_TZ});
}
function fmtDuration(inTs, outTs){
  if(!inTs || !outTs) return "-";
  const ms = new Date(outTs) - new Date(inTs);
  if(ms<=0) return "-";
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${h} ຊມ ${m} ນທ ${s} ວ`;
}
function todayStr(){ return new Date().toLocaleDateString("en-GB", {timeZone: LAOS_TZ}); }
/* ແປງ string ວັນທີແບບ "DD/MM/YYYY" ຫຼື "DD/MM/YYYY, HH:MM:SS" (ຮູບແບບທີ່ເກັບໄວ້ໃນ ປະຫວັດ content/insight/attendance)
   ໃຫ້ເປັນ "YYYY-MM-DD" ເພື່ອທຽບກັບຄ່າຈາກ <input type="date"> — ໃຊ້ຮ່ວມກັນທຸກ tab ທີ່ມີຕົວກອງວັນທີ */
function dateStrToISO(str){
  if(!str) return "";
  const m = String(str).match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
  if(!m) return "";
  const dd = m[1].padStart(2,"0"), mm = m[2].padStart(2,"0");
  return `${m[3]}-${mm}-${dd}`;
}

/* A read-only visual of the label as it currently exists in the database (barcode included) —
   shown next to the edit form so Tar can see exactly what's on the physical label without
   having to open the separate print dialog. It reflects what's SAVED, not unsaved keystrokes
   in the form beside it (updates after "ບັນທຶກການແກ້ໄຂ" like the row data itself does). */
function renderInlineLabelPreviewPanel(label, d){
  const settingsMap = d.labelSettings || {};
  const settings = settingsMap[label.format==="quick"?"quick":"normal"] || {shopName:"", shopPhone:"", footerText:"", paperSize:"label"};
  return `

}

      </button>
    </div>
    ${selectedCount>0 ? `
      <div class="card" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
        <span>ເລືອກໄວ້ ${selectedCount} ອໍເດີ</span>

          <button class="btn btn-sm btn-danger" id="btn-bulk-delete-pancake">🗑️ ລືບທີ່ເລືອກ (${selectedCount})</button>

    ${list.length===0 ? `<div class="card empty"><span class="nav-icon">&#128230;</span>ຍັງບໍ່ມີອໍເດີຈາກ Pancake${(q||fd)?"ທີ່ກົງກັບການຄົ້ນຫາ/ການກອງ":""}</div>` : `

          <tbody>
            ${list.map(l=>`
              <tr>
                <td><input type="checkbox" data-pancake-checkbox="${l.id}" ${STATE.selectedPancakeIds.includes(l.id)?'checked':''}/></td>

        </table>

function paperSizeCssClass(paperSize){

// Converts an old (v1.11-v1.13) block-array template — {id,field,x,y,w,h,fontSize,bold,align,border:bool} —
// into the new row/cell table format, so previously-saved templates keep working instead of breaking.
function normalizeLabelTemplate(raw){
  if(!raw || !raw.length) return null;
  if(raw[0] && Array.isArray(raw[0].cells)) return JSON.parse(JSON.stringify(raw)); // already new format
  return [...raw].sort((a,b)=>(a.y||0)-(b.y||0)).map(b=>({
    id: "row_"+b.id,
    heightMm: b.h || null,
    cells: [{
      id: "cell_"+b.id, field: b.field, widthPct: 100,
      fontSize: b.fontSize||3.2, bold: !!b.bold, align: b.align||"left",
      border: {top:"none", right:"none", bottom: b.border?"thin":"none", left:"none"}
    }]
  }));
}
function labelFieldValue(field, l, settings){
  switch(field){
    case "labelNumber": return String(l.labelNumber||"");
    case "shopName": return settings.shopName||"";
    case "shopPhone": return "ໂທ: " + (settings.shopPhone||"");
    case "createdTime": return "ວັນທີ່ສ້າງ: " + new Date(l.createdAt).toLocaleString("en-GB", {timeZone: LAOS_TZ, hour:"2-digit", minute:"2-digit", day:"2-digit", month:"2-digit", year:"numeric"});
    case "direction": return l.direction || "";
    case "quickBody": return l.quickText || "";
    case "courierName": return l.courierName ? "ຂົນສົ່ງ: "+l.courierName : "";
    case "recipient": return "ຜູ້ຮັບ: " + (l.recipientName||"") + "  " + (l.recipientPhone||"") + "\n" + (l.address||"");
    case "item": return (l.itemText||"") + (l.qty>1 ? " x "+l.qty : "");
    case "note": return l.note ? "ໝາຍເຫດ: "+l.note : "";
    case "cod": return "ເກັບເງິນ(COD): " + fmt(l.codAmount) + " K   [" + (l.freeShipping?"ຝາກຟຣີ":"ເກັບປາຍທາງ") + "]";
    case "footer": return l.customFooter || settings.footerText||"";
    default: return "";

}
function renderLabelCell(cell, l, settings, opts){

  const bcStatus = isRealPrint ? (STATE.barcodeStatusMap[l.id] || "loading") : "ready";

  return `<div class="tpl-cell" data-cell-id="${cell.id}" data-row-id="${opts.rowId||''}" style="${style}">${inner}${resizeHandle}</div>`;
}
function renderLabelTable(rows, l, settings, opts){

// Returns info for every currently-selected cell, in template order (row by row, left to right).
function getSelectedCellsInfo(){
  if(!STATE.labelTemplate) return [];
  const out = [];
  STATE.labelTemplate.forEach((row, ri)=>{
    row.cells.forEach((cell, ci)=>{
      if(STATE.selectedCellIds.includes(cell.id)) out.push({row, rowIndex:ri, cell, cellIndex:ci});
    });
  });
  return out;
}
// Flat, ordered list of every cell (for shift-click range selection).
function flatCellList(){
  const out = [];
  (STATE.labelTemplate||[]).forEach((row, ri)=>{
    row.cells.forEach((cell, ci)=>out.push({row, rowIndex:ri, cell, cellIndex:ci}));
  });
  return out;
}

// ---- Undo / redo for the template editor ----
function pushTemplateHistory(){
  if(!STATE.labelTemplate) return;
  STATE.templateUndoStack.push(JSON.stringify(STATE.labelTemplate));
  if(STATE.templateUndoStack.length>50) STATE.templateUndoStack.shift();
  STATE.templateRedoStack = [];
}
function undoTemplate(){
  if(STATE.templateUndoStack.length===0) return;
  STATE.templateRedoStack.push(JSON.stringify(STATE.labelTemplate));
  STATE.labelTemplate = JSON.parse(STATE.templateUndoStack.pop());
  STATE.selectedCellIds = [];
  render();
}
function redoTemplate(){
  if(STATE.templateRedoStack.length===0) return;
  STATE.templateUndoStack.push(JSON.stringify(STATE.labelTemplate));
  STATE.labelTemplate = JSON.parse(STATE.templateRedoStack.pop());
  STATE.selectedCellIds = [];
  render();
}

// Pulls an adjacent row's cells into the given row, side by side, and removes the now-empty
// adjacent row — e.g. select a cell in the "shop name" row and merge with the next row to
// get shop name + phone on one line, without manually re-splitting/reassigning fields.
function mergeRowWithNeighbor(rowIndex, direction){
  const neighborIndex = rowIndex + direction;
  if(!STATE.labelTemplate || neighborIndex<0 || neighborIndex>=STATE.labelTemplate.length) return;
  pushTemplateHistory();
  const row = STATE.labelTemplate[rowIndex];
  const neighbor = STATE.labelTemplate[neighborIndex];
  const mergedCells = direction<0 ? [...neighbor.cells, ...row.cells] : [...row.cells, ...neighbor.cells];
  const evenWidth = Math.floor(100/mergedCells.length);
  mergedCells.forEach((c,i)=>{ c.widthPct = (i===mergedCells.length-1) ? (100-evenWidth*(mergedCells.length-1)) : evenWidth; });
  const mergedRow = {id:"row"+Date.now(), heightMm:null, cells:mergedCells};
  STATE.labelTemplate.splice(Math.min(rowIndex, neighborIndex), 2, mergedRow);
  STATE.selectedCellIds = mergedCells.map(c=>c.id);
  render();
}

// ---- Excel-style "Borders" button actions, applied to every currently-selected cell ----
const BORDER_ACTIONS = [
  {id:"bottom",  label:"ຂອບລຸ່ມ"},
  {id:"top",     label:"ຂອບເທິງ"},
  {id:"left",    label:"ຂອບຊ້າຍ"},
  {id:"right",   label:"ຂອບຂວາ"},
  {id:"none",    label:"ບໍ່ມີເສັ້ນຂອບ"},
  {id:"all",     label:"ຂອບທັງໝົດ"},
  {id:"outside", label:"ຂອບອ້ອມນອກ"},
  {id:"thickbox",label:"ຂອບໜາອ້ອມນອກ"}
];
function applyBorderAction(actionId, thickness){
  const cells = getSelectedCellsInfo();
  if(cells.length===0) return;
  pushTemplateHistory();
  const w = thickness==="thick" ? "thick" : "thin";
  if(actionId==="none"){
    cells.forEach(({cell})=>{ cell.border = {top:"none",right:"none",bottom:"none",left:"none"}; });
  } else if(actionId==="all"){
    cells.forEach(({cell})=>{ cell.border = {top:w,right:w,bottom:w,left:w}; });
  } else if(actionId==="top" || actionId==="bottom" || actionId==="left" || actionId==="right"){
    cells.forEach(({cell})=>{ cell.border[actionId] = w; });
  } else if(actionId==="outside" || actionId==="thickbox"){
    const outsideW = actionId==="thickbox" ? "thick" : w;
    // Group selected cells by row, in template order, to work out which sides face
    // the outside edge of the selection block (top row / bottom row / first / last in row).
    const byRow = {};
    cells.forEach(info=>{ (byRow[info.rowIndex] = byRow[info.rowIndex]||[]).push(info); });
    const rowIndices = Object.keys(byRow).map(Number).sort((a,b)=>a-b);
    const minRow = rowIndices[0], maxRow = rowIndices[rowIndices.length-1];
    rowIndices.forEach(ri=>{
      const rowCells = byRow[ri].sort((a,b)=>a.cellIndex-b.cellIndex);
      rowCells.forEach((info, idx)=>{
        if(ri===minRow) info.cell.border.top = outsideW;
        if(ri===maxRow) info.cell.border.bottom = outsideW;
        if(idx===0) info.cell.border.left = outsideW;
        if(idx===rowCells.length-1) info.cell.border.right = outsideW;
      });
    });
  }
  render();
}

function updateTemplateLivePreview(){

  el.innerHTML = renderLabelTable(STATE.labelTemplate, sampleLabelForPreview(fmt), settings, {editable:true});
  checkTemplateOverflow();
}

// Warns in the editor when the stacked row heights add up to more than the physical
// paper — this is what causes a label to silently print across 2-3 pages.
function checkTemplateOverflow(){
  const el = document.getElementById("tpl-live-preview");
  const warn = document.getElementById("tpl-overflow-warning");
  if(!el || !warn) return;
  const settings = (STATE.data.labelSettings && STATE.data.labelSettings[STATE.labelTemplateFormat]) || {paperSize:"label"};
  const paperMm = PAPER_SIZES[settings.paperSize] || PAPER_SIZES.label;
  const rect = el.getBoundingClientRect();
  if(rect.width<=0){ warn.style.display = "none"; return; }
  const pxPerMm = rect.width / paperMm.w;
  const contentHeightMm = el.scrollHeight / pxPerMm;
  if(contentHeightMm > paperMm.h + 1){
    warn.style.display = "block";
    warn.textContent = `⚠️ ເນື້ອຫາລວມສູງປະມານ ${contentHeightMm.toFixed(1)}mm ແຕ່ໜ້າເຈ້ຍສູງ ${paperMm.h}mm — ຈະພິມລົ້ນອອກເປັນຫຼາຍໜ້າ, ລອງຫຼຸດຄວາມສູງບາງແຖວ`;
  } else {
    warn.style.display = "none";
  }
}

function renderFakeBarcodeSvg(){
  const widths = [2,1,3,1,2,3,1,1,2,3,1,2,1,3,2,1,1,3,2,1,2,1,3,1,2,3,1,1,2,1];
  let x = 0, bars = "";
  widths.forEach((w,i)=>{
    if(i%2===0) bars += `<rect x="${x}" y="0" width="${w*2}" height="46" fill="#000"/>`;
    x += w*2;
  });
  return `<svg viewBox="0 0 ${x} 46" style="width:180px; height:46px;">${bars}</svg>`;
}

function renderLabelPrintPreview(labels, settingsMap){
  const resolveSettings = (l)=> (settingsMap && settingsMap[l.format==="quick"?"quick":"normal"]) || {shopName:"", shopPhone:"", footerText:"", paperSize:"label"};
  const firstSettings = labels.length>0 ? resolveSettings(labels[0]) : {paperSize:"label"};
  const paperMm = PAPER_SIZES[firstSettings.paperSize] || PAPER_SIZES.label;
  const allReady = labels.every(l=>(STATE.barcodeStatusMap[l.id]||"loading")==="ready");
  const sheetsHtml = labels.map((l, idx)=>{
    const settings = resolveSettings(l);
    const normalized = normalizeLabelTemplate(settings.templateLayout);
    const useTemplate = normalized && normalized.length>0;
    return `
    <div class="label-sheet ${paperSizeCssClass(settings.paperSize)}" style="${idx<labels.length-1?'page-break-after:always;':''}">
      ${useTemplate ? `
        <div class="label-box" style="margin:14px; padding:2mm; box-sizing:border-box;">
          ${renderLabelTable(normalized, l, settings, {isRealPrint:true})}
        </div>
      ` : (()=>{
        const bcStatus = STATE.barcodeStatusMap[l.id] || "loading";
        return `
        <div class="label-box">
          <div class="label-row" style="text-align:center; padding:14px 10px; position:relative;">
            <svg id="label-barcode-${l.id}" style="${bcStatus==='ready'?'':'display:none;'}"></svg>
            ${bcStatus==="loading" ? `<div class="no-print barcode-loading-indicator" style="padding:16px; color:#888; font-size:13px;">⏳ ກຳລັງໂຫຼດ barcode...</div>` : ""}
            ${bcStatus==="error" ? `<div class="no-print barcode-error-indicator" style="padding:12px; color:var(--danger); font-size:13px;">⚠️ Barcode ອອກບໍ່ໄດ້ (ອິນເຕີເນັດຊ້າ/ຂາດ) — ຢ່າພິມກ່ອນລອງໃໝ່<br/><button class="btn btn-sm btn-outline" data-retry-barcode="${l.id}" style="margin-top:8px;">🔄 ລອງໃໝ່</button></div>` : ""}
            <div style="font-size:15px; font-weight:700; margin-top:2px;">${esc(l.labelNumber)}</div>
          </div>
          ${renderLabelInfoRows(l, settings)}
        </div>`;
      })()}
    </div>
  `;
  }).join("");
  return `
    <style>
      @page{ size:${paperMm.w}mm ${paperMm.h}mm; margin:0; }
      /* Force each label sheet to exactly one physical page at print time. Without this,
         any sub-millimeter rounding/padding overflow makes Chrome silently spill a blank
         extra page per label (root cause of the "ເຈ້ຍເປົ່າ" phantom blank-page bug).
         This is the ONLY place height/overflow is set for print — the global stylesheet
         deliberately leaves height/overflow alone so the two rules don't fight. */
      @media print{
        .label-sheet{ height:${paperMm.h}mm !important; max-height:${paperMm.h}mm !important; overflow:hidden !important; break-after:auto; }
        .label-sheet:last-child{ break-after:avoid-page !important; page-break-after:avoid !important; }
      }
    </style>
    <div class="label-overlay" id="label-print-overlay">
      <div class="label-preview-scroll">
        <div id="print-label-area">
          ${sheetsHtml}
        </div>
      </div>
    </div>
    <div class="no-print" style="position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:201; display:flex; gap:10px;">
      <button class="btn" id="btn-do-print-label" ${allReady?'':'disabled'}>🖨️ ພິມ${labels.length>1?` (${labels.length} ໃບ)`:''}</button>
      <button class="btn btn-outline" id="btn-close-label-preview" style="background:#fff;">ປິດ</button>
    </div>
  `;
}

    const bg = isSuccess ? "#E9F1E6" : (isDup ? "#FBEAEA" : "#FCF3E3");
    const color = isSuccess ? "var(--sage-dark)" : "var(--danger)";
    const label = isSuccess ? "✅ ສຳເລັດ" : (isDup ? "⚠️ ເຄື່ອງນີ້ຖືກສະແກນແລ້ວ" : "❌ ບໍ່ພົບຂໍ້ມູນໃບບິນນີ້ໃນລະບົບ");
    html += `
      <div style="background:${bg}; border:2px solid ${color}; border-radius:10px; padding:8px 12px; display:flex; flex-wrap:wrap; align-items:center; justify-content:center; gap:6px; box-shadow:0 3px 10px rgba(0,0,0,.3); margin-bottom:10px;">
        <span style="font-size:14.5px; font-weight:800; color:${color}; line-height:1.2;">${label}</span>
        <span style="font-size:12px; color:${color}; opacity:.85;">(${esc(a.code)})</span>
      </div>
    `;
  }
  if(STATE.scanError){
    html += `<p style="color:var(--danger); font-size:13.5px; margin-bottom:16px;">⚠️ ${esc(STATE.scanError)}</p>`;
  }
  return html;
}

function scanTimeStr(iso){
  return new Date(iso).toLocaleTimeString("en-GB", {timeZone: LAOS_TZ, hour:"2-digit", minute:"2-digit", second:"2-digit", hour12:false});
}

function getFilteredScans(){
  const d = STATE.data;
  let items = d.packageScans;
  if(STATE.scanHistDateFilter){
    items = items.filter(s=>new Date(s.scannedAt).toLocaleDateString("en-CA", {timeZone: LAOS_TZ})===STATE.scanHistDateFilter);
  }
  if(STATE.scanHistFilter==="matched") items = items.filter(s=>s.matched);
  else if(STATE.scanHistFilter==="notfound") items = items.filter(s=>!s.matched);
  if(STATE.scanHistSearch){
    const q = STATE.scanHistSearch.toLowerCase();
    items = items.filter(s=>s.scannedCode.toLowerCase().includes(q));
  }
  return items;
}

/* Lightweight refresh used after every scan / search / filter / edit / delete on this page:
   updates ONLY the alert banner + history table regions via targeted innerHTML swaps,
   instead of calling the app-wide render(). This is essential for the camera mode — a full
   render() would recreate <video id="scan-camera-video">, which would tear down the live
   camera stream and force the person to re-open the camera after every single scan. */
function updateScanOutUI(){
  const alertEl = document.getElementById("scan-alert-region");
  const histEl = document.getElementById("scan-history-region");
  if(!alertEl || !histEl){ render(); return; } // not currently on this page — fall back safely
  alertEl.innerHTML = renderScanAlertHtml();
  histEl.innerHTML = renderScanHistoryHtml();
  attachScanHistoryRowEvents();
  const hwInput = document.getElementById("scan-hardware-input");
  if(hwInput && hwInput.value !== STATE.scanInputValue) hwInput.value = STATE.scanInputValue;
  const manualInput = document.getElementById("scan-manual-input");
  if(manualInput && manualInput.value !== STATE.scanInputValue) manualInput.value = STATE.scanInputValue;
}

function clearScanAlertLater(){
  if(scanAlertTimer) clearTimeout(scanAlertTimer);
  scanAlertTimer = setTimeout(()=>{ STATE.scanAlert = null; updateScanOutUI(); }, 2600);
}

function refocusScanInput(){
  setTimeout(()=>{
    const hw = document.getElementById("scan-hardware-input");
    if(hw) hw.focus();
  }, 50);
}

function exportScansToExcel(){
  const items = getFilteredScans();
  if(items.length===0) return;
  const rows = items.map((s,idx) => ({
    "ລຳດັບ": idx+1,
    "ລະຫັດບາໂຄດ": s.scannedCode,
    "ລູກຄ້າ": s.recipientName || "-",
    "ທີ່ຢູ່": s.address || "-",
    "ຂົນສົ່ງ": s.courierName || "-",
    "ຈຳນວນເງິນ": s.matched ? s.codAmount : "-",
    "ຝາກຟຣີ/ເກັບປາຍທາງ": s.matched ? (s.freeShipping?"ຝາກຟຣີ":"ເກັບປາຍທາງ") : "-",
    "ສະຖານະ": s.matched ? "ພົບ" : "ບໍ່ພົບ",
    "ເວລາ": new Date(s.scannedAt).toLocaleString("en-GB", {timeZone: LAOS_TZ})
  }));
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:8},{wch:16},{wch:18},{wch:26},{wch:18},{wch:14},{wch:16},{wch:10},{wch:22}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ສະແກນສິນຄ້າອອກ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `package-scans-${stamp}.xlsx`);
}

/* "🔄 ຈັບຄູ່ຄືນ" — re-checks every scan history row currently marked matched=false against the
   CURRENT shipping_labels data (freshly reloaded via refreshScanOutData beforehand). This
   fixes the historical case where a scan was done before this code's data-staleness fixes
   existed: the physical package really was in the system at the time, the scanning device's
   in-memory copy just hadn't caught up, so it got wrongly logged as "not found" even though
   nothing was actually wrong with the order. Re-running the same lookup now, with correct
   fresh data, corrects those old records without needing anyone to re-scan the physical item
   (which may already be long gone from the shop). */
async function rematchUnresolvedScans(){
  if(STATE.rematchingScans) return;
  STATE.rematchingScans = true;
  STATE.rematchStatus = "⏳ ກຳລັງໂຫຼດຂໍ້ມູນລ້າສຸດ ແລະ ກວດຄືນ...";
  render();
  try{
    await refreshScanOutData();
    const unresolved = STATE.data.packageScans.filter(s=>!s.matched);
    let fixed = 0;
    for(const scan of unresolved){
      const code = String(scan.scannedCode||"").trim().toLowerCase();
      if(!code) continue;
      const label = STATE.data.shippingLabels.find(l=>String(l.labelNumber).trim().toLowerCase()===code);
      if(!label) continue;
      const patch = {
        labelId: label.id, recipientName: label.recipientName, recipientPhone: label.recipientPhone,
        address: label.address, codAmount: label.codAmount, courierName: label.courierName, freeShipping: !!label.freeShipping
      };
      // Update local state immediately so the list reflects it without waiting on the network.
      scan.matched = true;
      scan.labelId = patch.labelId; scan.recipientName = patch.recipientName; scan.recipientPhone = patch.recipientPhone;
      scan.address = patch.address; scan.codAmount = patch.codAmount; scan.courierName = patch.courierName; scan.freeShipping = patch.freeShipping;
      try{ await dbRematchPackageScan(scan.id, patch); fixed++; }
      catch(err){ console.error("rematch failed for scan", scan.id, err); }
    }
    STATE.rematchStatus = unresolved.length===0
      ? "✅ ບໍ່ມີລາຍການ \"ບໍ່ພົບ\" ໃຫ້ກວດຄືນ"
      : `✅ ກວດ ${unresolved.length} ລາຍການທີ່ "ບໍ່ພົບ" — ແກ້ໄຂໄດ້ ${fixed} ລາຍການ (ອີກ ${unresolved.length-fixed} ລາຍການຍັງບໍ່ພົບ barcode ທີ່ຕົງກັນໃນລະບົບ)`;
  }catch(err){
    console.error(err);
    STATE.rematchStatus = "❌ ຈັບຄູ່ຄືນບໍ່ສຳເລັດ: "+err.message;
  }
  STATE.rematchingScans = false;
  render();
}

async function processScanCode(code){
  const trimmed = String(code).trim();
  if(!trimmed) return;

  // Duplicate check: this exact barcode was already successfully matched & scanned before
  // (case-insensitive, for the same reason the lookup below is — see note there).
  const trimmedLowerForDupe = trimmed.toLowerCase();
  const isDuplicate = STATE.data.packageScans.some(s=>String(s.scannedCode).toLowerCase()===trimmedLowerForDupe && s.matched);
  if(isDuplicate){
    playScanSound("duplicate");
    STATE.scanAlert = {type:"duplicate", code:trimmed};
    STATE.scanInputValue = "";
    updateScanOutUI();
    clearScanAlertLater();
    refocusScanInput();
    return;
  }

  // Case-insensitive match: some USB/Bluetooth barcode scanners emit letters in the wrong
  // case depending on the scanning computer's Caps Lock state at the time (digits are
  // unaffected, which is why purely-numeric codes always worked here) — comparing without
  // regard to case means this never matters, whether the code came from a scanner gun or was
  // typed/pasted by hand.
  const trimmedLower = trimmed.toLowerCase();
  const label = STATE.data.shippingLabels.find(l=>String(l.labelNumber).toLowerCase()===trimmedLower);
  const scan = {
    id:"sc"+Date.now()+Math.random().toString(36).slice(2,7),
    labelId: label ? label.id : "",
    scannedCode: trimmed,
    matched: !!label,
    recipientName: label ? label.recipientName : "",
    recipientPhone: label ? label.recipientPhone : "",
    address: label ? label.address : "",
    codAmount: label ? label.codAmount : 0,
    courierName: label ? label.courierName : "",
    freeShipping: label ? !!label.freeShipping : false,
    scannedAt: new Date().toISOString(),
    scannedBy: STATE.currentUser ? STATE.currentUser.name : ""
  };
  // Show it immediately (optimistic UI) so scanning feels instant.
  STATE.data.packageScans.unshift(scan);
  STATE.lastScanResult = scan;
  STATE.scanInputValue = "";
  STATE.scanError = "";
  if(label){
    playScanSound("success");
    STATE.scanAlert = {type:"success", code:trimmed};
    clearScanAlertLater();
  } else {
    playScanSound("notfound");
    STATE.scanAlert = {type:"notfound", code:trimmed};
    clearScanAlertLater();
  }
  updateScanOutUI();
  refocusScanInput();

  // Persist to Supabase. IMPORTANT: this must be awaited before any data reload happens —
  // previously the insert was fired without awaiting and immediately followed by a full
  // silentRefresh() (re-fetching ~17 tables). That reload's SELECT frequently returned
  // before this INSERT had committed, so the fresh data silently overwrote STATE.data
  // WITHOUT the just-scanned row — making it flash on screen for a couple seconds and
  // then vanish, even though sound played and everything looked fine. Fixed by awaiting
  // the write here, and by no longer doing a full reload after every single scan at all
  // (unnecessary — the optimistic local row already matches what's in the database once
  // this succeeds; a full 17-table reload per scan was also just wasted load on Supabase).
  try{
    await dbInsertPackageScan(scan);
  }catch(err){
    console.error(err);
    // Roll back the optimistic row — it was never actually saved — and tell the person
    // clearly on-screen (not just in the browser console, which they'd never see).
    STATE.data.packageScans = STATE.data.packageScans.filter(s=>s.id!==scan.id);
    STATE.scanAlert = null;
    STATE.scanError = "ບັນທຶກລົງລະບົບບໍ່ສຳເລັດ (" + (err && err.message ? err.message : "unknown error") + ") — ລອງສະແກນເລກນີ້ຄືນ";
    playScanSound("notfound");
    updateScanOutUI();
  }
}


function attachScanHistoryRowEvents(){
  document.querySelectorAll("[data-edit-scan]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-edit-scan");
      const s = STATE.data.packageScans.find(x=>x.id===id);
      if(!s) return;
      STATE.editingScanId = id;
      STATE.editScanForm = {courierName:s.courierName||"", codAmount:String(s.codAmount||""), freeShipping:!!s.freeShipping};
      updateScanOutUI();
    });
  });
  document.querySelectorAll("[data-cancel-scan-edit]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.editingScanId = "";
      updateScanOutUI();
    });
  });
  const editScanCourierEl = document.getElementById("edit-scan-courier");
  if(editScanCourierEl) editScanCourierEl.addEventListener("input", ()=>{ STATE.editScanForm.courierName = editScanCourierEl.value; });
  const editScanCodEl = document.getElementById("edit-scan-cod");
  if(editScanCodEl) editScanCodEl.addEventListener("input", ()=>{ STATE.editScanForm.codAmount = editScanCodEl.value; });
  const editScanFreeEl = document.getElementById("edit-scan-free");
  if(editScanFreeEl) editScanFreeEl.addEventListener("change", ()=>{ STATE.editScanForm.freeShipping = editScanFreeEl.value==="free"; });
  document.querySelectorAll("[data-save-scan]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const id = el.getAttribute("data-save-scan");
      const courierEl = document.getElementById("edit-scan-courier");
      const codEl = document.getElementById("edit-scan-cod");
      const freeEl = document.getElementById("edit-scan-free");
      const patch = {
        courierName: courierEl ? courierEl.value.trim() : "",
        codAmount: codEl ? (parseFloat(codEl.value)||0) : 0,
        freeShipping: freeEl ? freeEl.value==="free" : false
      };
      const s = STATE.data.packageScans.find(x=>x.id===id);
      const prev = s ? {courierName:s.courierName, codAmount:s.codAmount, freeShipping:s.freeShipping} : null;
      if(s){ s.courierName = patch.courierName; s.codAmount = patch.codAmount; s.freeShipping = patch.freeShipping; }
      STATE.editingScanId = "";
      updateScanOutUI();
      try{
        await dbUpdatePackageScan(id, patch);
      }catch(err){
        console.error(err);
        if(s && prev){ s.courierName = prev.courierName; s.codAmount = prev.codAmount; s.freeShipping = prev.freeShipping; }
        STATE.scanError = "ບັນທຶກການແກ້ໄຂບໍ່ສຳເລັດ — ລອງໃໝ່ອີກຄັ້ງ";
        updateScanOutUI();
      }
    });
  });
  document.querySelectorAll("[data-del-scan]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const id = el.getAttribute("data-del-scan");
      if(!confirm("ລຶບລາຍການສະແກນນີ້?")) return;
      const removed = STATE.data.packageScans.find(x=>x.id===id);
      const removedIdx = STATE.data.packageScans.indexOf(removed);
      STATE.data.packageScans = STATE.data.packageScans.filter(x=>x.id!==id);
      updateScanOutUI();
      try{
        await dbDeletePackageScan(id);
      }catch(err){
        console.error(err);
        if(removed) STATE.data.packageScans.splice(removedIdx, 0, removed);
        STATE.scanError = "ລຶບບໍ່ສຳເລັດ — ລອງໃໝ່ອີກຄັ້ງ";
        updateScanOutUI();
      }
    });
  });
}

function stopCamera(){
  if(STATE.cameraScanInterval){ clearInterval(STATE.cameraScanInterval); STATE.cameraScanInterval = null; }
  // codeReader.reset() stops its own internally-managed stream/tracks and detaches the video element.
  if(STATE.zxingReader){ try{ STATE.zxingReader.reset(); }catch(e){ /* already stopped */ } STATE.zxingReader = null; }
  if(STATE.cameraStream){ STATE.cameraStream.getTracks().forEach(t=>t.stop()); STATE.cameraStream = null; }
  STATE.cameraActive = false;
}

function attachScanOutEvents(){
  attachScanHistoryRowEvents();

  const btnRematch = document.getElementById("btn-rematch-scans");
  if(btnRematch) btnRematch.addEventListener("click", rematchUnresolvedScans);

  document.querySelectorAll("[data-scan-mode]").forEach(el=>{
    el.addEventListener("click", ()=>{
      stopCamera();
      STATE.scanMode = el.getAttribute("data-scan-mode");
      STATE.scanError = "";
      render();
    });
  });

  const hwInput = document.getElementById("scan-hardware-input");
  if(hwInput){
    hwInput.addEventListener("input", ()=>{ STATE.scanInputValue = hwInput.value; });
    hwInput.addEventListener("keydown", (e)=>{
      if(e.key==="Enter"){
        e.preventDefault();
        processScanCode(hwInput.value);
      }
    });
    hwInput.focus();
  }

  const manualInput = document.getElementById("scan-manual-input");
  if(manualInput) manualInput.addEventListener("input", ()=>{ STATE.scanInputValue = manualInput.value; });

  const manualSubmitBtn = document.getElementById("btn-scan-manual-submit");
  if(manualSubmitBtn) manualSubmitBtn.addEventListener("click", ()=>{ processScanCode(STATE.scanInputValue); });

  const startCameraBtn = document.getElementById("btn-start-camera");
  if(startCameraBtn) startCameraBtn.addEventListener("click", async ()=>{
    STATE.scanError = "";
    STATE.cameraActive = true;
    render();
    try{
      // ZXing decodes frames in pure JS instead of relying on the native BarcodeDetector
      // API — that API is Chrome-only and NEVER available on iPhone (every iOS browser,
      // including Chrome/Firefox for iOS, runs on Apple's WebKit under the hood). ZXing
      // works identically on iOS Safari, Android, and desktop.
      await window.ensureZXingLib();
      const video = document.getElementById("scan-camera-video");
      if(!video){ stopCamera(); render(); return; }
      const hints = new Map();
      hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [ZXing.BarcodeFormat.CODE_128]);
      const codeReader = new ZXing.BrowserMultiFormatReader(hints);
      STATE.zxingReader = codeReader;
      // decodeFromConstraints requests the camera itself (back camera via facingMode),
      // attaches the stream to our existing <video>, and keeps calling back on every
      // frame until codeReader.reset() is called (only when the person clicks "ປິດກ້ອງ").
      // The camera intentionally stays open across scans — processScanCode() below only
      // does a targeted DOM update (updateScanOutUI), never a full render(), so the live
      // video stream is never torn down mid-session.
      await codeReader.decodeFromConstraints(
        {video:{facingMode:"environment"}},
        video,
        (result, err)=>{
          if(!STATE.cameraActive) return;
          if(result){
            const value = result.getText();
            const now = Date.now();
            // Debounce: the same barcode sitting in view fires this callback many times a
            // second — only act on it once every 2.5s so it doesn't spam sounds/log entries.
            if(value===lastCamScanCode && (now-lastCamScanAt)<2500) return;
            lastCamScanCode = value;
            lastCamScanAt = now;
            processScanCode(value);
          }
          // err fires on every frame with nothing decoded yet (NotFoundException) —
          // that's expected while aiming the camera, not a real error.
        }
      );
    }catch(e){
      STATE.scanError = "ເປີດກ້ອງບໍ່ໄດ້: " + e.message;
      STATE.cameraActive = false;
      render();
    }
  });

  const stopCameraBtn = document.getElementById("btn-stop-camera");
  if(stopCameraBtn) stopCameraBtn.addEventListener("click", ()=>{
    stopCamera();
    render();
  });

  const histSearchEl = document.getElementById("scan-hist-search");
  if(histSearchEl) histSearchEl.addEventListener("input", ()=>{ STATE.scanHistSearch = histSearchEl.value; updateScanOutUI(); });

  const histFilterEl = document.getElementById("scan-hist-filter");
  if(histFilterEl) histFilterEl.addEventListener("change", ()=>{ STATE.scanHistFilter = histFilterEl.value; updateScanOutUI(); });

  const histDateFilterEl = document.getElementById("scan-hist-date-filter");
  if(histDateFilterEl) histDateFilterEl.addEventListener("change", ()=>{ STATE.scanHistDateFilter = histDateFilterEl.value; updateScanOutUI(); });
  const btnClearScanDateFilter = document.getElementById("btn-clear-scan-date-filter");
  if(btnClearScanDateFilter) btnClearScanDateFilter.addEventListener("click", ()=>{ STATE.scanHistDateFilter = ""; updateScanOutUI(); });

  const exportBtn = document.getElementById("btn-export-scans");
  if(exportBtn) exportBtn.addEventListener("click", exportScansToExcel);
}

}

function renderAttendance(){
  const d = STATE.data;

function getLocation(highAccuracy, timeoutMs){
  // IMPORTANT: on some mobile browsers (notably iOS Safari when Location
  // Services are off at the OS level), getCurrentPosition() never calls
  // EITHER callback and ignores its own `timeout` option — leaving the
  // button stuck on "ກຳລັງຫາຕຳແໜ່ງ..." forever. We guard against that by
  // racing the browser API against our own hard timeout, so this function
  // is GUARANTEED to resolve within timeoutMs+2s no matter what.
  return new Promise((resolve)=>{
    let settled = false;
    const finish = (result)=>{
      if(settled) return;
      settled = true;
      resolve(result);
    };

    if(!navigator.geolocation){
      finish({lat:null, lng:null, error:"ອຸປະກອນ ຫຼື browser ນີ້ບໍ່ຮອງຮັບ GPS", code:0});
      return;
    }
    if(location.protocol!=="https:" && location.hostname!=="localhost"){
      finish({lat:null, lng:null, error:"ໜ້ານີ້ຕ້ອງເປີດຜ່ານ https ຈຶ່ງຈະຂໍຕຳແໜ່ງໄດ້", code:0});
      return;
    }

    const hardTimeout = setTimeout(()=>{
      finish({lat:null, lng:null, error:"ຫາຕຳແໜ່ງບໍ່ໄດ້ພາຍໃນເວລາ", code:3});
    }, timeoutMs + 2000);

    navigator.geolocation.getCurrentPosition(
      (pos)=>{
        clearTimeout(hardTimeout);
        finish({lat:pos.coords.latitude, lng:pos.coords.longitude, error:null, code:null});
      },
      (err)=>{
        clearTimeout(hardTimeout);
        let msg = "ບໍ່ສາມາດຫາຕຳແໜ່ງໄດ້";
        if(err.code===1) msg = "browser ບໍ່ອະນຸຍາດຕຳແໜ່ງ (Location) ໃຫ້ໜ້ານີ້";
        else if(err.code===2) msg = "ອຸປະກອນຫາຕຳແໜ່ງບໍ່ໄດ້ (Location Services ອາດຖືກປິດ)";
        else if(err.code===3) msg = "ຫາຕຳແໜ່ງໃຊ້ເວລາດົນເກີນໄປ";
        finish({lat:null, lng:null, error: msg, code: err.code});
      },
      {enableHighAccuracy: highAccuracy, timeout: timeoutMs, maximumAge:0}
    );
  });
}

// Tries a quick high-accuracy fix first, then falls back to a looser
// network-based fix if that fails. Many devices fail on high-accuracy GPS
// (indoors, GPS chip busy) but succeed instantly with network location.
async function getLocationWithFallback(){
  let loc = await getLocation(true, 8000);
  if(loc.error && loc.code!==1){ // don't bother retrying if permission was denied outright
    loc = await getLocation(false, 6000);
  }
  return loc;
}

// Purely client-side ticking clock (no Supabase calls whatsoever — safe
// under the no-polling rule). Updates one <div> textContent every second
// while the "clocked in, not out yet" card is on screen; stopped/cleared
// whenever the page re-renders or navigates away so it never stacks up.
if(!window.__attendanceTimerHandle) window.__attendanceTimerHandle = null;
function stopLiveElapsedTimer(){
  if(window.__attendanceTimerHandle){
    clearInterval(window.__attendanceTimerHandle);
    window.__attendanceTimerHandle = null;
  }
}
function startLiveElapsedTimer(){
  stopLiveElapsedTimer();
  const el = document.getElementById("live-elapsed-timer");
  if(!el) return;
  const clockInTs = el.getAttribute("data-clock-in");
  if(!clockInTs) return;
  const clockInMs = new Date(clockInTs).getTime();
  const tick = ()=>{
    const liveEl = document.getElementById("live-elapsed-timer");
    if(!liveEl){ stopLiveElapsedTimer(); return; }
    const ms = Math.max(0, Date.now() - clockInMs);
    const h = String(Math.floor(ms/3600000)).padStart(2,"0");
    const m = String(Math.floor((ms%3600000)/60000)).padStart(2,"0");
    const s = String(Math.floor((ms%60000)/1000)).padStart(2,"0");
    liveEl.textContent = `${h}:${m}:${s}`;
  };
  tick();
  window.__attendanceTimerHandle = setInterval(tick, 1000);
}

function attachTemplateEditorEvents(){

  const addRowBelowBtn = document.getElementById("btn-tpl-add-row-below");

    if(!STATE.labelTemplate) return;
    pushTemplateHistory();
    const sel = getSelectedCellsInfo();
    const insertAt = sel.length>0 ? Math.max(...sel.map(s=>s.rowIndex))+1 : STATE.labelTemplate.length;
    const newRow = {id:"row"+Date.now(), cells:[{id:"cell"+Date.now(), field:"note", widthPct:100, fontSize:3.2, bold:false, align:"left", border:{top:"thin",right:"none",bottom:"none",left:"none"}}]};
    STATE.labelTemplate.splice(insertAt, 0, newRow);
    STATE.selectedCellIds = [newRow.cells[0].id];
    STATE.selectionAnchorId = newRow.cells[0].id;
    render();
  });

  const undoBtn = document.getElementById("btn-tpl-undo");
  if(undoBtn) undoBtn.addEventListener("click", undoTemplate);
  const redoBtn = document.getElementById("btn-tpl-redo");
  if(redoBtn) redoBtn.addEventListener("click", redoTemplate);

  const thinBtn = document.getElementById("btn-thickness-thin");
  if(thinBtn) thinBtn.addEventListener("click", ()=>{ STATE.tplBorderThickness = "thin"; render(); });
  const thickBtn = document.getElementById("btn-thickness-thick");
  if(thickBtn) thickBtn.addEventListener("click", ()=>{ STATE.tplBorderThickness = "thick"; render(); });

  document.querySelectorAll(".tpl-border-action").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      applyBorderAction(btn.getAttribute("data-border-action"), STATE.tplBorderThickness);
    });
  });

  const clearSelBtn = document.getElementById("btn-tpl-clear-selection");
  if(clearSelBtn) clearSelBtn.addEventListener("click", ()=>{
    STATE.selectedCellIds = [];
    STATE.selectionAnchorId = "";
    render();
  });

  // Click a cell to select it — like Excel: plain click = select just this cell (and
  // becomes the range anchor), Shift+click = select every cell between the anchor and
  // this one, Ctrl/Cmd+click = add/remove just this cell from the current selection.
  const preview = document.getElementById("tpl-live-preview");
  if(preview) preview.addEventListener("click", (e)=>{
    if(e.target.closest(".tpl-row-resize-handle")) return;
    const td = e.target.closest("[data-cell-id]");
    if(!td) return;
    const id = td.getAttribute("data-cell-id");
    if(e.shiftKey && STATE.selectionAnchorId){
      const flat = flatCellList();
      const anchorIdx = flat.findIndex(f=>f.cell.id===STATE.selectionAnchorId);
      const clickIdx = flat.findIndex(f=>f.cell.id===id);
      if(anchorIdx!==-1 && clickIdx!==-1){
        const lo = Math.min(anchorIdx, clickIdx), hi = Math.max(anchorIdx, clickIdx);
        STATE.selectedCellIds = flat.slice(lo, hi+1).map(f=>f.cell.id);
      }
    } else if(e.ctrlKey || e.metaKey){
      if(STATE.selectedCellIds.includes(id)){
        STATE.selectedCellIds = STATE.selectedCellIds.filter(x=>x!==id);
      } else {
        STATE.selectedCellIds = [...STATE.selectedCellIds, id];
      }
      STATE.selectionAnchorId = id;
    } else {
      STATE.selectedCellIds = [id];
      STATE.selectionAnchorId = id;
    }
    render();
  });

  // Drag the handle along a row's bottom edge to set that row's height with the mouse,
  // instead of typing a number — the overall label canvas stays fixed to the paper size
  // set in "⚙️ ຕັ້ງຄ່າໃບບິນ" (100x150mm etc); only the individual row grows/shrinks.
  if(preview) preview.addEventListener("pointerdown", (e)=>{
    const handle = e.target.closest(".tpl-row-resize-handle");
    if(!handle) return;
    e.preventDefault();
    const rowId = handle.getAttribute("data-row-id");
    const row = STATE.labelTemplate && STATE.labelTemplate.find(r=>r.id===rowId);
    const rowEl = preview.querySelector(`.tpl-row[data-row-id="${rowId}"]`);
    if(!row || !rowEl) return;
    pushTemplateHistory();
    const pxPerMm = rowEl.getBoundingClientRect().width / paperMm.w;
    const startHeightPx = rowEl.getBoundingClientRect().height;
    const startY = e.clientY;
    const onMove = (ev)=>{
      const dyPx = ev.clientY - startY;
      const newHeightMm = Math.max(3, (startHeightPx + dyPx) / pxPerMm);
      row.heightMm = Math.round(newHeightMm*10)/10;
      updateTemplateLivePreview();
    };
    const onUp = ()=>{
      document.removeEventListener("pointermove", onMove);
      document.removeEventListener("pointerup", onUp);
      render();
    };
    document.addEventListener("pointermove", onMove);
    document.addEventListener("pointerup", onUp);
  });

  const selCells = getSelectedCellsInfo();
  const single = selCells.length===1 ? selCells[0] : null;
  if(single){
    const fieldSel = document.getElementById("tpl-cell-field");
    if(fieldSel) fieldSel.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.field = fieldSel.value; render(); });

    const widthInp = document.getElementById("tpl-cell-width");
    if(widthInp){
      widthInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      widthInp.addEventListener("input", ()=>{
        single.cell.widthPct = Math.max(10, Math.min(100, parseFloat(widthInp.value)||100));
        updateTemplateLivePreview();
      });
    }

    const rowHeightInp = document.getElementById("tpl-row-height");
    if(rowHeightInp){
      rowHeightInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      rowHeightInp.addEventListener("input", ()=>{
        const v = parseFloat(rowHeightInp.value);
        single.row.heightMm = (rowHeightInp.value==="" || isNaN(v)) ? null : Math.max(2, Math.min(80, v));
        updateTemplateLivePreview();
      });
    }

    const fontInp = document.getElementById("tpl-cell-fontsize");
    if(fontInp){
      fontInp.addEventListener("focus", ()=>pushTemplateHistory(), {once:true});
      fontInp.addEventListener("input", ()=>{
        single.cell.fontSize = parseFloat(fontInp.value)||3.2;
        updateTemplateLivePreview();
      });
    }

    const boldChk = document.getElementById("tpl-cell-bold");
    if(boldChk) boldChk.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.bold = boldChk.checked; render(); });

    const alignSel = document.getElementById("tpl-cell-align");
    if(alignSel) alignSel.addEventListener("change", ()=>{ pushTemplateHistory(); single.cell.align = alignSel.value; render(); });

    const splitCellInto = (n)=>{
      pushTemplateHistory();
      const each = single.cell.widthPct/n;
      single.cell.widthPct = each;
      const newCells = [];
      for(let i=1;i<n;i++){
        newCells.push({id:"cell"+Date.now()+"_"+i, field:"note", widthPct:each, fontSize:single.cell.fontSize, bold:false, align:"left", border:{...single.cell.border}});
      }
      single.row.cells.splice(single.cellIndex+1, 0, ...newCells);
      STATE.selectedCellIds = [newCells[0].id];
      STATE.selectionAnchorId = newCells[0].id;
      render();
    };
    const split2Btn = document.getElementById("btn-tpl-split-2");
    if(split2Btn) split2Btn.addEventListener("click", ()=>splitCellInto(2));
    const split3Btn = document.getElementById("btn-tpl-split-3");
    if(split3Btn) split3Btn.addEventListener("click", ()=>splitCellInto(3));

    const mergeBtn = document.getElementById("btn-tpl-merge-cell");
    if(mergeBtn) mergeBtn.addEventListener("click", ()=>{
      const nextCell = single.row.cells[single.cellIndex+1];
      if(!nextCell) return;
      pushTemplateHistory();
      single.cell.widthPct += nextCell.widthPct;
      single.row.cells.splice(single.cellIndex+1, 1);
      render();
    });

    const delCellBtn = document.getElementById("btn-tpl-delete-cell");
    if(delCellBtn) delCellBtn.addEventListener("click", ()=>{
      pushTemplateHistory();
      if(single.row.cells.length===1){
        STATE.labelTemplate = STATE.labelTemplate.filter(r=>r.id!==single.row.id);
      } else {
        single.row.cells.splice(single.cellIndex, 1);
        const neighbour = single.row.cells[single.cellIndex] || single.row.cells[single.cellIndex-1];
        if(neighbour) neighbour.widthPct += single.cell.widthPct;
      }
      STATE.selectedCellIds = [];
      render();
    });

    const rowUpBtn = document.getElementById("btn-tpl-row-up");
    if(rowUpBtn) rowUpBtn.addEventListener("click", ()=>{
      if(single.rowIndex===0) return;
      pushTemplateHistory();
      const [row] = STATE.labelTemplate.splice(single.rowIndex, 1);
      STATE.labelTemplate.splice(single.rowIndex-1, 0, row);
      render();
    });
    const rowDownBtn = document.getElementById("btn-tpl-row-down");
    if(rowDownBtn) rowDownBtn.addEventListener("click", ()=>{
      if(single.rowIndex===STATE.labelTemplate.length-1) return;
      pushTemplateHistory();
      const [row] = STATE.labelTemplate.splice(single.rowIndex, 1);
      STATE.labelTemplate.splice(single.rowIndex+1, 0, row);
      render();
    });
    const mergeRowPrevBtn = document.getElementById("btn-tpl-merge-row-prev");
    if(mergeRowPrevBtn) mergeRowPrevBtn.addEventListener("click", ()=>{
      mergeRowWithNeighbor(single.rowIndex, -1);
    });
    const mergeRowNextBtn = document.getElementById("btn-tpl-merge-row-next");
    if(mergeRowNextBtn) mergeRowNextBtn.addEventListener("click", ()=>{
      mergeRowWithNeighbor(single.rowIndex, 1);
    });
    const delRowBtn = document.getElementById("btn-tpl-delete-row");
    if(delRowBtn) delRowBtn.addEventListener("click", ()=>{
      pushTemplateHistory();
      STATE.labelTemplate = STATE.labelTemplate.filter(r=>r.id!==single.row.id);
      STATE.selectedCellIds = [];
      render();
    });
  }

  const tplFormatSelect = document.getElementById("tpl-format-select");
  if(tplFormatSelect) tplFormatSelect.addEventListener("change", ()=>{
    STATE.labelTemplateFormat = tplFormatSelect.value;
    STATE.labelTemplate = null;
    STATE.selectedCellIds = [];
    STATE.templateUndoStack = [];
    STATE.templateRedoStack = [];
    render();
  });

  const saveTplBtn = document.getElementById("btn-tpl-save");
  if(saveTplBtn) saveTplBtn.addEventListener("click", ()=>{
    if(!STATE.labelTemplate) return;
    const format = STATE.labelTemplateFormat;
    const base = (STATE.data.labelSettings && STATE.data.labelSettings[format]) || {shopName:"", shopPhone:"", footerText: format==="quick"?DEFAULT_QUICK_FOOTER:"", paperSize:"label"};
    const s = {...base, templateLayout: STATE.labelTemplate};
    STATE.savingTemplate = true;
    render();
    if(!STATE.data.labelSettings) STATE.data.labelSettings = {normal:null, quick:null};
    STATE.data.labelSettings[format] = s;
    dbSaveLabelSettings(format, s).then(()=>{
      STATE.savingTemplate = false;
      render();
      silentRefresh();
    }).catch(err=>{
      console.error(err);
      STATE.savingTemplate = false;
      render();
    });
  });

  const resetTplBtn = document.getElementById("btn-tpl-reset");
  if(resetTplBtn) resetTplBtn.addEventListener("click", ()=>{
    if(!confirm("ຄືນຄ່າ template ກັບເປັນແບບເລີ່ມຕົ້ນ? ການປ່ຽນແປງທີ່ຍັງບໍ່ໄດ້ບັນທຶກຈະຫາຍ")) return;
    pushTemplateHistory();
    STATE.labelTemplate = JSON.parse(JSON.stringify(STATE.labelTemplateFormat==="quick" ? DEFAULT_QUICK_LABEL_TEMPLATE : DEFAULT_LABEL_TEMPLATE));
    STATE.selectedCellIds = [];
    render();
  });

  checkTemplateOverflow();
}

        return;
      }
      const labelNumber = nextStudioLabelNumber();
      const newLabel = {
        id:"lb"+Date.now(), labelNumber, ...quickFields,
        createdAt:new Date().toISOString(), createdBy: STATE.currentUser ? STATE.currentUser.name : ""
      };
      STATE.data.shippingLabels.unshift(newLabel);
      STATE.labelForm = {format:"quick", productId:"", useCustomItem:false, customItemText:"", qty:"1", recipientName:"", recipientPhone:"", address:"", note:"", codAmount:"", courierId:"", freeShipping:false, quickText:"", direction:f.direction||"ປາຍທາງ", quickFooter:f.quickFooter||DEFAULT_QUICK_FOOTER};
      showToast("ບັນທຶກໃບບິນສຳເລັດແລ້ວ — ສ້າງໃບຕໍ່ໄປໄດ້ເລີຍ");
      dbInsertShippingLabel(newLabel).then(()=>{ silentRefresh(); backgroundParseQuickLabel(newLabel.id, newLabel.quickText); }).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });

    const errors = {};

    if(!f.recipientPhone.trim()) errors.recipientPhone = true;
    if(!f.address.trim()) errors.address = true;
    if(!String(f.codAmount).trim()) errors.codAmount = true;
    if(!f.courierId) errors.courierId = true;
    if(!itemText) errors.item = true;
    if(Object.keys(errors).length>0){
      STATE.labelFormErrors = errors;
      STATE.error = "";
      render();
      return;
    }
    STATE.labelFormErrors = {};
    STATE.error = "";
    const courier = STATE.data.couriers.find(c=>c.id===f.courierId);

    if(STATE.editingLabelId){
      const existing = STATE.data.shippingLabels.find(l=>l.id===STATE.editingLabelId);

        ...existing, format:"normal", recipientName:f.recipientName.trim(), recipientPhone:f.recipientPhone.trim(),

        courierName: courier ? courier.name : "", freeShipping: !!f.freeShipping
      };
      const idx = STATE.data.shippingLabels.findIndex(l=>l.id===STATE.editingLabelId);
      if(idx!==-1) STATE.data.shippingLabels[idx] = updatedLabel;
      STATE.editingLabelId = "";

      // Wait for the write to actually finish before pulling fresh data — refreshing too
      // early could overwrite this edit on screen with the still-old row from the DB
      // (this was the "edit doesn't save" bug: save and refresh were racing each other).
      dbUpdateShippingLabel(updatedLabel).then(()=>silentRefresh()).catch(err=>{ console.error(err); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+err.message); });

      address:f.address.trim(), itemText, qty:Number(f.qty)||1, note:f.note||"", codAmount:Number(f.codAmount)||0,
      courierName: courier ? courier.name : "", freeShipping: !!f.freeShipping,

    };

  const pancakeFilterDateEl = document.getElementById("pancake-filter-date");

    } else {

    }

  });

      }
      render();
    });
  });

  if(clearPancakeSelectionBtn) clearPancakeSelectionBtn.addEventListener("click", ()=>{ STATE.selectedPancakeIds = []; render(); });

    const chosenIds = chosen.map(l=>l.id);
    STATE.data.shippingLabels = STATE.data.shippingLabels.filter(l=>!chosenIds.includes(l.id));
    STATE.selectedPancakeIds = [];
    render();
    chosen.forEach(l=>{
      dbDeleteShippingLabel(l.id, `ອໍເດີ Pancake #${l.labelNumber}`).catch(err=>console.error("bulk delete failed for", l.id, err));
    });

  const bulkDeleteBtn = document.getElementById("btn-bulk-delete-labels");
  if(bulkDeleteBtn) bulkDeleteBtn.addEventListener("click", ()=>{
    const chosen = STATE.data.shippingLabels.filter(l=>STATE.selectedLabelIds.includes(l.id));

    });
  });

  const printBtn = document.getElementById("btn-do-print-label");
  if(printBtn) printBtn.addEventListener("click", ()=>{
    window.print();
    // Count this as a print of every label in the current preview (single reprint or bulk
    // batch) so ປະຫວັດ can show "ພິມແລ້ວຈັກເທື່ອ" and admins can spot accidental re-prints.
    STATE.printingLabels.forEach(l=>{
      const idx = STATE.data.shippingLabels.findIndex(x=>x.id===l.id);
      if(idx===-1) return;
      const next = (STATE.data.shippingLabels[idx].printCount||0) + 1;
      STATE.data.shippingLabels[idx] = {...STATE.data.shippingLabels[idx], printCount: next};
      dbSetLabelPrintCount(l.id, next).catch(err=>console.error("print count save failed:", err));
    });
  });

  const closePreviewBtn = document.getElementById("btn-close-label-preview");
  if(closePreviewBtn) closePreviewBtn.addEventListener("click", ()=>{
    STATE.printingLabels = [];
    STATE.barcodeStatusMap = {};
    render();
  });

    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-retry-barcode");
      const label = STATE.printingLabels.find(l=>l.id===id);
      if(!label) return;
      STATE.barcodeStatusMap[id] = "loading";
      render();
      drawLabelBarcode(label);
    });
  });

  // Only draw a label's barcode once — same reasoning as before, just per-label now:
  // re-running render() after a successful draw would create a fresh empty <svg> and
  // wipe out the bars we just drew, so drawLabelBarcode patches the DOM directly instead.
  STATE.printingLabels.forEach(l=>{
    if((STATE.barcodeStatusMap[l.id]||"loading") !== "ready"){
      drawLabelBarcode(l);
    }
  });
}

function checkAllBarcodesReady(){
  const btn = document.getElementById("btn-do-print-label");
  if(!btn) return;
  const allReady = STATE.printingLabels.every(l=>(STATE.barcodeStatusMap[l.id]||"loading")==="ready");
  btn.disabled = !allReady;
}

function drawLabelBarcode(label){
  const svgEl = document.getElementById("label-barcode-"+label.id);
  if(!svgEl) return;
  const markReady = ()=>{
    STATE.barcodeStatusMap[label.id] = "ready";
    svgEl.style.display = "";
    const parent = svgEl.parentElement;
    if(parent) parent.querySelectorAll(".barcode-loading-indicator, .barcode-error-indicator").forEach(el=>el.remove());
    checkAllBarcodesReady();
  };
  if(window.JsBarcode){
    try{
      JsBarcode(svgEl, String(label.labelNumber), {format:"CODE128", displayValue:false, width:2, height:50, margin:0});
      markReady();
      return;
    }catch(e){ console.error(e); }
  }
  STATE.barcodeStatusMap[label.id] = "loading";
  window.ensureBarcodeLib().then(()=>{
    const svg2 = document.getElementById("label-barcode-"+label.id);
    if(!svg2) return;
    try{
      JsBarcode(svg2, String(label.labelNumber), {format:"CODE128", displayValue:false, width:2, height:50, margin:0});
      STATE.barcodeStatusMap[label.id] = "ready";
      svg2.style.display = "";
      const parent = svg2.parentElement;
      if(parent) parent.querySelectorAll(".barcode-loading-indicator, .barcode-error-indicator").forEach(el=>el.remove());
      checkAllBarcodesReady();
    }catch(e){
      console.error(e);
      STATE.barcodeStatusMap[label.id] = "error";
      render();
    }
  }).catch(err=>{
    console.error(err);
    STATE.barcodeStatusMap[label.id] = "error";
    render();
  });
}



function attachAttendanceEvents(){
  startLiveElapsedTimer();
  const clockInBtn = document.getElementById("btn-clock-in");
  if(clockInBtn) clockInBtn.addEventListener("click", async ()=>{
    clockInBtn.disabled = true;
    clockInBtn.textContent = "ກຳລັງຫາຕຳແໜ່ງ...";
    let loc = await getLocationWithFallback();
    if(loc.error){
      const skip = confirm(loc.error + "\n\nຕ້ອງການບັນທຶກ \"ເຂົ້າວຽກ\" ໂດຍບໍ່ມີຕຳແໜ່ງ GPS ບໍ່? (ກົດ OK ເພື່ອບັນທຶກຕໍ່ໄປ, Cancel ເພື່ອລອງໃໝ່ພາຍຫຼັງ)");
      if(!skip){
        clockInBtn.disabled = false;
        clockInBtn.textContent = "🟢 ເຂົ້າວຽກ";
        return;
      }
      loc = {lat:null, lng:null};
    }
    clockInBtn.textContent = "ກຳລັງບັນທຶກ...";
    const now = new Date().toISOString();
    const rec = {
      id:"att"+Date.now(),
      adminName: STATE.currentUser?.name||"",
      clockIn: now,
      clockOut: null,
      date: todayStr(),
      clockInLat: loc.lat,
      clockInLng: loc.lng
    };
    STATE.data.attendance.unshift(rec);
    render();
    dbClockIn(rec).then(error=>{
      if(error){
        STATE.data.attendance = STATE.data.attendance.filter(a=>a.id!==rec.id);
        render();
        alert("ບັນທຶກເຂົ້າວຽກບໍ່ສຳເລັດ (ຖານຂໍ້ມູນປະຕິເສດ): " + (error.message||error));
      }
    }).catch(e=>{
      STATE.data.attendance = STATE.data.attendance.filter(a=>a.id!==rec.id);
      render();
      alert("ບັນທຶກເຂົ້າວຽກບໍ່ສຳເລັດ: " + (e?.message||e));
    });
  });

  const clockOutBtn = document.getElementById("btn-clock-out");
  if(clockOutBtn) clockOutBtn.addEventListener("click", async ()=>{
    clockOutBtn.disabled = true;
    clockOutBtn.textContent = "ກຳລັງຫາຕຳແໜ່ງ...";
    let loc = await getLocationWithFallback();
    if(loc.error){
      const skip = confirm(loc.error + "\n\nຕ້ອງການບັນທຶກ \"ເລີກວຽກ\" ໂດຍບໍ່ມີຕຳແໜ່ງ GPS ບໍ່? (ກົດ OK ເພື່ອບັນທຶກຕໍ່ໄປ, Cancel ເພື່ອລອງໃໝ່ພາຍຫຼັງ)");
      if(!skip){
        clockOutBtn.disabled = false;
        clockOutBtn.textContent = "🔴 ເລີກວຽກ";
        return;
      }
      loc = {lat:null, lng:null};
    }
    clockOutBtn.textContent = "ກຳລັງບັນທຶກ...";
    const me = STATE.currentUser?.name||"";
    const rec = TESTING_MODE
      ? STATE.data.attendance.find(a=>a.adminName===me && !a.clockOut)
      : STATE.data.attendance.find(a=>a.adminName===me && a.date===todayStr() && !a.clockOut);
    if(!rec){ render(); return; }
    const prevClockOut = rec.clockOut, prevLat = rec.clockOutLat, prevLng = rec.clockOutLng;
    const now = new Date().toISOString();
    rec.clockOut = now;
    rec.clockOutLat = loc.lat;
    rec.clockOutLng = loc.lng;
    render();
    dbClockOut(rec.id, now, loc.lat, loc.lng).then(error=>{
      if(error){
        rec.clockOut = prevClockOut; rec.clockOutLat = prevLat; rec.clockOutLng = prevLng;
        render();
        alert("ບັນທຶກເລີກວຽກບໍ່ສຳເລັດ (ຖານຂໍ້ມູນປະຕິເສດ): " + (error.message||error));
      }
    }).catch(e=>{
      rec.clockOut = prevClockOut; rec.clockOutLat = prevLat; rec.clockOutLng = prevLng;
      render();
      alert("ບັນທຶກເລີກວຽກບໍ່ສຳເລັດ: " + (e?.message||e));
    });
  });

  const attendanceDateFilterEl = document.getElementById("attendance-date-filter");
  if(attendanceDateFilterEl) attendanceDateFilterEl.addEventListener("change", ()=>{ STATE.attendanceDateFilter = attendanceDateFilterEl.value; render(); });
  const btnClearAttendanceDateFilter = document.getElementById("btn-clear-attendance-date-filter");
  if(btnClearAttendanceDateFilter) btnClearAttendanceDateFilter.addEventListener("click", ()=>{ STATE.attendanceDateFilter = ""; render(); });

  const exportBtn = document.getElementById("btn-export-attendance");
  if(exportBtn) exportBtn.addEventListener("click", ()=>{
    const rows = STATE.data.attendance.map(a=>({
      "ວັນທີ": a.date,
      "ພະນັກງານ": a.adminName,
      "ເຂົ້າວຽກ": a.clockIn ? new Date(a.clockIn).toLocaleTimeString("en-GB", {timeZone: LAOS_TZ}) : "",
      "ເລີກວຽກ": a.clockOut ? new Date(a.clockOut).toLocaleTimeString("en-GB", {timeZone: LAOS_TZ}) : "ຍັງຢູ່ວຽກ",
      "ຊົ່ວໂມງລວມ": fmtDuration(a.clockIn, a.clockOut)
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    ws["!cols"] = [{wch:14},{wch:16},{wch:12},{wch:12},{wch:18}];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "ລົງໂມງ");
    XLSX.writeFile(wb, `attendance-${new Date().toISOString().slice(0,10)}.xlsx`);
  });

  document.querySelectorAll("[data-del-attendance]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-attendance");
      STATE.data.attendance = STATE.data.attendance.filter(a=>a.id!==id);
      render();
      dbDeleteAttendance(id).catch(e=>{ console.error(e); showErrorToast("ບັນທຶກລົ້ມເຫຼວ ກະລຸນາລອງໃໝ່: "+e.message); });
    });
  });
}

    }
  });

  document.querySelectorAll("[data-approve-user]").forEach(el=>{

    });
  });
  document.querySelectorAll("[data-del-user]").forEach(el=>{
    el.addEventListener("click", async ()=>{
      const id = el.getAttribute("data-del-user");
      const uname = el.getAttribute("data-del-user-name") || "";
      if(!confirm("ຢືນຢັນການລຶບບັນຊີນີ້?")) return;
