<!DOCTYPE html>
<html lang="lo">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>ຮ້ານຕຸກຕາ ສີໄຄ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@400;500;600;700&family=Noto+Serif+Lao:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#1F3D2E;
    --bg-deep-2:#27483A;
    --cream:#FAF6EE;
    --cream-2:#F1EAD9;
    --terracotta:#C9683F;
    --terracotta-dark:#A6502E;
    --sage:#A8C0A0;
    --sage-dark:#5F7D58;
    --ink:#23291F;
    --muted:#6F7268;
    --danger:#B0473B;
    --white:#FFFFFF;
    --radius:10px;
    --shadow:0 2px 10px rgba(31,61,46,0.08);
  }
  *{box-sizing:border-box;}
  html, body{
    max-width:100%;
    overflow-x:hidden;
  }
  body{
    margin:0;
    font-family:'Noto Sans Lao','Noto Sans',sans-serif;
    background:var(--cream-2);
    color:var(--ink);
  }
  h1,h2,h3,.serif{font-family:'Noto Serif Lao','Noto Sans Lao',serif;}
  .app{
    display:grid;
    grid-template-columns:240px 1fr;
    min-height:100vh;
  }
  .main-fade{
    animation: mainFadeIn 220ms ease;
  }
  @keyframes mainFadeIn{
    from{ opacity:0.85; }
    to{ opacity:1; }
  }
  .sidebar{
    background:var(--bg-deep);
    color:var(--cream);
    padding:24px 16px;
    display:flex;
    flex-direction:column;
    gap:4px;
  }
  .brand{
    font-family:'Noto Serif Lao',serif;
    font-size:20px;
    font-weight:700;
    color:var(--cream);
    margin:0 8px 28px 8px;
    line-height:1.3;
  }
  .brand small{
    display:block;
    font-family:'Noto Sans Lao',sans-serif;
    font-size:12px;
    font-weight:400;
    color:var(--sage);
    margin-top:4px;
  }
  .nav-btn{
    display:flex;
    align-items:center;
    gap:10px;
    background:none;
    border:none;
    color:var(--cream);
    opacity:0.78;
    text-align:left;
    padding:11px 12px;
    border-radius:8px;
    font-size:14.5px;
    font-family:inherit;
    cursor:pointer;
    transition:background .15s, opacity .15s;
    width:100%;
  }
  .nav-btn:hover{background:var(--bg-deep-2); opacity:1;}
  .nav-btn.active{background:var(--terracotta); opacity:1; font-weight:600;}
  .nav-icon{font-size:17px; width:20px; text-align:center;}
  .nav-badge{display:inline-flex; align-items:center; justify-content:center; min-width:18px; height:18px; padding:0 5px; margin-left:6px; background:var(--terracotta); color:#fff; border-radius:999px; font-size:10.5px; font-weight:700; vertical-align:middle;}
  .nav-btn.active .nav-badge{background:var(--cream); color:var(--terracotta-dark);}
  .sidebar-foot{
    margin-top:auto;
    padding:12px 8px 0 8px;
    font-size:11.5px;
    color:var(--sage);
    border-top:1px solid rgba(255,255,255,0.12);
    padding-top:14px;
  }
  .main{padding:32px 40px; max-width:1180px;}
  .page-head{margin-bottom:24px;}
  .page-head h1{font-size:24px; margin:0 0 4px 0; color:var(--bg-deep);}
  .page-head p{margin:0; color:var(--muted); font-size:14px;}
  .card{
    background:var(--white);
    border-radius:var(--radius);
    box-shadow:var(--shadow);
    padding:20px 22px;
    margin-bottom:18px;
  }
  .card h3{margin:0 0 14px 0; font-size:16px; color:var(--bg-deep);}
  .grid-2{display:grid; grid-template-columns:1fr 1fr; gap:18px;}
  .grid-3{display:grid; grid-template-columns:repeat(3,1fr); gap:14px;}
  .grid-4{display:grid; grid-template-columns:repeat(4,1fr); gap:14px;}
  label{display:block; font-size:13px; color:var(--muted); margin:0 0 5px 0; font-weight:600;}
  input[type=text], input[type=number], textarea, select{
    width:100%;
    padding:9px 11px;
    border:1px solid #DCD6C4;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    background:var(--cream);
    color:var(--ink);
    margin-bottom:14px;
  }
  textarea{resize:vertical; min-height:80px;}
  input:focus, textarea:focus, select:focus{
    outline:none; border-color:var(--terracotta); background:var(--white);
  }
  .btn{
    display:inline-flex; align-items:center; gap:7px;
    background:var(--terracotta);
    color:var(--white);
    border:none;
    padding:10px 18px;
    border-radius:7px;
    font-family:inherit;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:background .15s, transform .1s;
  }
  .btn:hover{background:var(--terracotta-dark);}
  .btn:active{transform:scale(0.98);}
  .btn:disabled{background:#C9B9A9; cursor:not-allowed;}
  .btn-outline{background:none; border:1.5px solid var(--bg-deep); color:var(--bg-deep);}
  .btn-outline:hover{background:var(--bg-deep); color:var(--cream);}
  .btn-sm{padding:6px 12px; font-size:12.5px;}
  .btn-danger{background:var(--danger);}
  .btn-danger:hover{background:#8E382E;}
  .pill{display:inline-block; padding:3px 10px; border-radius:999px; font-size:11.5px; font-weight:600;}
  .pill-sage{background:#E4ECDF; color:var(--sage-dark);}
  .pill-terra{background:#F4E1D6; color:var(--terracotta-dark);}
  .pill-gray{background:#EAE7DC; color:var(--muted);}
  .product-card{
    border:1px solid #E9E3D3; border-radius:9px; padding:14px;
    display:flex; flex-direction:column; gap:6px; cursor:pointer; transition:border-color .15s;
  }
  .product-card:hover{border-color:var(--terracotta);}
  .product-card h4{margin:0; font-size:15px; color:var(--bg-deep);}
  .product-card .meta{font-size:12.5px; color:var(--muted);}
  .empty{text-align:center; padding:40px 20px; color:var(--muted);}
  .empty .nav-icon{font-size:32px; display:block; margin-bottom:8px; opacity:.5;}
  .stat{background:var(--cream); border-radius:9px; padding:14px; border:1px solid #EAE3D2;}
  .stat .label{font-size:12px; color:var(--muted); margin-bottom:4px;}
  .stat .value{font-size:21px; font-weight:700; color:var(--bg-deep);}
  .stat .value.danger{color:var(--danger);}
  .stat .value.good{color:var(--sage-dark);}
  .content-out{
    background:var(--cream); border:1px solid #E9E3D3; border-radius:8px;
    padding:14px 16px; white-space:pre-wrap; font-size:14px; line-height:1.65;
    margin-top:10px; max-height:420px; overflow-y:auto;
  }
  .toolbar{display:flex; gap:8px; margin-top:10px;}

  /* ---- Shipping label print preview ---- */
  .label-overlay{position:fixed; inset:0; background:rgba(20,15,10,0.6); z-index:200; display:flex; align-items:center; justify-content:center; padding:20px;}
  .label-sheet{background:#fff; color:#111; font-family:'Noto Sans Lao','Noto Sans',sans-serif; overflow-y:auto; max-height:90vh;}
  .label-sheet.size-label{width:100mm;}
  .label-sheet.size-a4{width:210mm;}
  .label-box{border:2px dashed #333; margin:14px;}
  .label-row{border-bottom:1px solid #333; padding:8px 10px;}
  .label-row:last-child{border-bottom:none;}
  .label-cod{font-size:20px; font-weight:800;}
  .label-footer{font-size:10.5px; text-align:center; padding:6px 10px; color:#333;}
  .input-error{border-color:var(--danger) !important;}
  .input-error::placeholder{color:var(--danger); opacity:1;}
  .app-toast{position:fixed; bottom:24px; right:24px; background:#2e7d46; color:#fff; padding:14px 20px; border-radius:10px; box-shadow:0 6px 20px rgba(0,0,0,.25); z-index:500; font-size:14px; display:flex; align-items:center; gap:10px; animation:toastIn .25s ease-out;}
  @keyframes toastIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  .label-preview-scroll{max-height:90vh; overflow-y:auto;}
  @media print{
    body *{visibility:hidden;}
    #print-label-area, #print-label-area *{visibility:visible;}
    #print-label-area{position:absolute; top:0; left:0; width:100%;}
    .label-overlay{position:static; background:none; padding:0;}
    .no-print{display:none !important;}
    /* Fill the physical paper exactly — the on-screen 340px/500px preview widths above
       are for the screen only; at print time the label must stretch to whatever page
       size is selected in the browser's print dialog, with no extra margin/border. */
    .label-sheet{width:100% !important; max-height:none !important; overflow:visible !important;}
    .label-preview-scroll{max-height:none !important; overflow:visible !important;}
    .label-box{margin:0 !important; border:none !important;}
    @page{ margin:0; }
  }

  table{width:100%; border-collapse:collapse; font-size:13.5px;}
  th{text-align:left; color:var(--muted); font-weight:600; padding:8px 10px; border-bottom:2px solid #EAE3D2;}
  td{padding:9px 10px; border-bottom:1px solid #F0EBDD; vertical-align:top;}
  tr:hover td{background:#FBF8F1;}
  .badge-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;}
  .loading{display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13.5px; padding:10px 0;}
  .spinner{
    width:14px; height:14px; border:2px solid #D9D2BD; border-top-color:var(--terracotta);
    border-radius:50%; animation:spin .7s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .tabs{display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; border-bottom:1px solid #E2DBC9;}

  /* ============ Marketing Studio — Yumiko-style scoped theme ============ */
  .mkt-wrap{
    --mkt-green-900:#16331f; --mkt-green-800:#1d4029; --mkt-green-700:#27532f;
    --mkt-gold:#cfa645; --mkt-gold-light:#e8d39a; --mkt-cream:#f7f4ea; --mkt-paper:#fffdf7;
    --mkt-ink:#23291f; --mkt-ink-soft:#5b6555; --mkt-line:#e1ddc8;
    background:var(--mkt-cream); margin:-32px -40px; padding-bottom:24px;
  }
  .mkt-header{
    background:linear-gradient(135deg,var(--mkt-green-900),var(--mkt-green-700));
    color:var(--mkt-cream); padding:20px 24px; display:flex; align-items:center; gap:14px;
    border-bottom:3px solid var(--mkt-gold);
  }
  .mkt-header .mkt-logo{
    width:46px; height:46px; border-radius:50%; flex-shrink:0;
    background:radial-gradient(circle at 30% 30%,var(--mkt-gold-light),var(--mkt-gold));
    display:flex; align-items:center; justify-content:center; font-size:22px;
    box-shadow:0 0 0 3px rgba(255,255,255,.15);
  }
  .mkt-header h1{margin:0; font-size:19px; font-weight:700; letter-spacing:.3px; color:var(--mkt-cream); font-family:'Noto Serif Lao',serif;}
  .mkt-header p{margin:2px 0 0; font-size:12.5px; color:var(--mkt-gold-light);}
  .mkt-tabs{
    display:flex; flex-wrap:wrap; gap:6px; background:var(--mkt-green-800); padding:10px 20px; border:none; margin:0;
  }
  .mkt-tab-btn{
    background:transparent; border:1px solid transparent; color:#cfe0cd;
    padding:8px 14px; border-radius:999px; font-size:13px; cursor:pointer; white-space:nowrap; transition:.15s;
  }
  .mkt-tab-btn:hover{background:rgba(255,255,255,.08);}
  .mkt-tab-btn.active{background:var(--mkt-gold); color:var(--mkt-green-900); font-weight:700; border-color:var(--mkt-gold);}
  .mkt-body{padding:22px 24px 0;}
  .mkt-wrap .card{background:var(--mkt-paper); border:1px solid var(--mkt-line); box-shadow:0 6px 22px rgba(22,51,31,.08);}
  .mkt-wrap .card h2, .mkt-wrap .card h3{color:var(--mkt-green-900); font-family:'Noto Serif Lao',serif;}
  .mkt-wrap label{color:var(--mkt-ink-soft);}
  .mkt-wrap input, .mkt-wrap select, .mkt-wrap textarea{border-color:var(--mkt-line); background:var(--mkt-cream);}
  .mkt-wrap input:focus, .mkt-wrap select:focus, .mkt-wrap textarea:focus{border-color:var(--mkt-gold); outline:none;}
  .mkt-wrap .btn{background:var(--mkt-green-700); color:#fff;}
  .mkt-wrap .btn:hover{background:var(--mkt-green-800);}
  .mkt-wrap .btn-outline{background:transparent; border:1px solid var(--mkt-green-700); color:var(--mkt-green-700);}
  .mkt-wrap .pill-terra{background:var(--mkt-gold-light); color:var(--mkt-green-900);}
  .mkt-wrap .pill-sage{background:#E4ECDF; color:var(--mkt-green-800);}
  .mkt-wrap .content-out{background:var(--mkt-cream); border-color:var(--mkt-line);}
  @media (max-width: 760px){
    .mkt-wrap{margin:-12px -12px 0;}
    .mkt-header{padding:16px;}
    .mkt-tabs{padding:8px 12px;}
    .mkt-body{padding:16px 16px 0;}
  }

  .tab{padding:9px 16px; cursor:pointer; font-size:14px; color:var(--muted); border-bottom:2px solid transparent; font-weight:600;}
  .tab.active{color:var(--terracotta-dark); border-bottom-color:var(--terracotta);}
  .modal-bg{
    position:fixed; inset:0; background:rgba(31,61,46,0.45);
    display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .modal{
    background:var(--white); border-radius:12px; padding:24px; width:100%; max-width:520px;
    max-height:88vh; overflow-y:auto;
  }
  .modal h3{margin-top:0;}
  .close-x{float:right; background:none; border:none; font-size:18px; cursor:pointer; color:var(--muted);}
  .flex-between{display:flex; justify-content:space-between; align-items:center;}
  .small-muted{font-size:12.5px; color:var(--muted);}

  .attendance-big-btn{
    width:100%; justify-content:center;
    font-size:20px; font-weight:700;
    padding:20px 24px; border-radius:14px;
  }
  .attendance-summary-grid{
    display:flex; justify-content:center; gap:28px; flex-wrap:wrap;
  }
  .attendance-summary-item{ min-width:90px; }

  .hamburger-btn{
    display:none;
    position:fixed; top:14px; left:14px; z-index:70;
    width:44px; height:44px; border-radius:10px;
    background:var(--bg-deep); color:var(--cream); border:none;
    font-size:20px; align-items:center; justify-content:center; cursor:pointer;
    box-shadow:0 3px 12px rgba(0,0,0,0.3);
  }
  .sidebar-overlay{
    display:none;
    position:fixed; inset:0; background:rgba(20,30,24,0.5); z-index:65;
    opacity:0; transition:opacity .2s ease;
  }
  .sidebar-overlay.open{ display:block; opacity:1; }
  .mobile-close-x{
    display:none;
    background:none; border:none; color:var(--cream); font-size:20px;
    cursor:pointer; align-self:flex-end; margin-bottom:10px; opacity:.8;
  }

  @media (max-width: 880px){
    .hamburger-btn{ display:flex; }
    .app{grid-template-columns:1fr; max-width:100vw;}
    .sidebar{
      position:fixed; top:0; left:0; bottom:0; z-index:66;
      width:250px; max-width:82vw; height:100vh;
      flex-direction:column; overflow-y:auto; padding:20px 14px;
      transform:translateX(-104%); transition:transform .24s ease;
      box-shadow:4px 0 20px rgba(0,0,0,0.3);
    }
    .sidebar.open{ transform:translateX(0); }
    .mobile-close-x{ display:flex; }
    .brand{display:block; font-size:17px;}
    .nav-btn{white-space:normal; width:100%; padding:9px 10px; font-size:13.5px;}
    .nav-icon{font-size:15px; width:18px;}
    .sidebar-foot{display:block;}
    .main{padding:12px; padding-top:64px; max-width:100vw;}
    .grid-2, .grid-3, .grid-4{grid-template-columns:1fr;}

    /* Tighter page header + cards so more fits on one screen without pinch-zoom */
    .page-head{margin-bottom:14px;}
    .page-head h1{font-size:19px;}
    .page-head p{font-size:12.5px;}
    .card{padding:14px 14px; margin-bottom:12px; border-radius:9px;}
    .card h3{font-size:14.5px; margin-bottom:10px;}
    .btn{padding:9px 14px; font-size:13px;}
    label{font-size:12px;}
    input[type=text], input[type=number], textarea, select{padding:8px 10px; font-size:13.5px; margin-bottom:10px;}
    .stat{padding:11px;}
    .stat .label{font-size:11px;}
    .stat .value{font-size:18px;}
    .tabs{gap:2px; margin-bottom:12px;}
    .tab{padding:7px 10px; font-size:12.5px;}

    .attendance-clock-card{ padding:20px 12px !important; }
    .attendance-big-btn{ font-size:19px; padding:20px 18px; }
    .attendance-summary-grid{ gap:12px; }
    .attendance-summary-item{ min-width:74px; }

    /* Tables: keep readable but compact; scroll horizontally within their
       own card only (the page itself never scrolls sideways). */
    table{ font-size:12px; }
    th, td{ padding:6px 5px; }
  }

  @media (max-width: 400px){
    .page-head h1{font-size:17px;}
    .card{padding:12px;}
    .attendance-big-btn{ font-size:17px; padding:18px 14px; }
  }
</style>
</head>

<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/JsBarcode/3.11.5/JsBarcode.all.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
<script>
/* Robust barcode-library loader: the primary <script> tag above is the fast path.
   If it hasn't finished loading (or failed) by the time we need to draw a barcode,
   ensureBarcodeLib() injects a fallback CDN and waits — so a slow/blocked network
   never results in a silently-blank barcode on a real, physical shipping label. */
window.ensureBarcodeLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.JsBarcode){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.JsBarcode) resolve(); else reject(new Error("loaded but JsBarcode missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    // Poll briefly in case the original head <script> is still mid-flight (most common case).
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.JsBarcode){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){ // ~2s of polling before pulling in the fallback CDN
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};

/* Same robust-loader pattern for ZXing, the pure-JS barcode DECODER used by the camera
   scan-out page. Unlike the native window.BarcodeDetector API (Chrome-only — never
   available on any iPhone browser, since all iOS browsers run on Apple's WebKit),
   ZXing decodes frames itself in JS, so it works identically on iOS Safari, Chrome,
   Android, desktop — anywhere. */
window.ensureZXingLib = function(timeoutMs){
  timeoutMs = timeoutMs || 6000;
  return new Promise(function(resolve, reject){
    if(window.ZXing){ resolve(); return; }
    var settled = false;
    var timer = setTimeout(function(){
      if(settled) return;
      settled = true;
      reject(new Error("timeout"));
    }, timeoutMs);
    var fallback = document.createElement("script");
    fallback.src = "https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js";
    fallback.onload = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      if(window.ZXing) resolve(); else reject(new Error("loaded but ZXing missing"));
    };
    fallback.onerror = function(){
      if(settled) return;
      settled = true;
      clearTimeout(timer);
      reject(new Error("fallback CDN failed"));
    };
    var pollCount = 0;
    var poll = setInterval(function(){
      pollCount++;
      if(window.ZXing){
        clearInterval(poll);
        if(settled) return;
        settled = true;
        clearTimeout(timer);
        resolve();
      } else if(pollCount>=8){
        clearInterval(poll);
        document.head.appendChild(fallback);
      }
    }, 250);
  });
};
</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
window.addEventListener("error", function(e){
  const root = document.getElementById("root");
  if(root) root.innerHTML = `<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; padding:30px; background:#1a1a1a; color:#fff; font-family:monospace; font-size:13px; text-align:left; white-space:pre-wrap;">ເກີດຂໍ້ຜິດພາດ JavaScript:\n\n${(e.message||"")}\n\n${(e.filename||"")}:${e.lineno||""}</div>`;
});

async function loadAllData(){
  const d = emptyData();
  try{
    const [products, content, costs, admins, insights, reports, attendance, knowledge, chat, painPoints, faq, hashtags, labelSettingsRes, shippingLabelsRes, couriersRes, packageScansRes, ordersRes, pricingRes] = await Promise.all([
      sb.from("products").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("content_history").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("costs").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("admins").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("insights").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("reports").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("attendance").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("product_knowledge").select("*"),
      sb.from("product_chat").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("pain_points").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("product_faq").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("product_hashtags").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("label_settings").select("*").limit(1),
      sb.from("shipping_labels").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("couriers").select("*").order("created_at", {ascending:true}).order("id", {ascending:true}),
      sb.from("package_scans").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("orders").select("*").order("created_at", {ascending:false}).order("id", {ascending:false}),
      sb.from("product_pricing").select("*"),
    ]);
    d.products = (products.data||[]).map(rowToProduct);
    d.contentHistory = (content.data||[]).map(rowToContent);
    d.costs = (costs.data||[]).map(rowToCost);
    d.admins = (admins.data||[]).map(rowToAdmin);
    d.insights = (insights.data||[]).map(rowToInsight);
    d.reports = (reports.data||[]).map(rowToReport);
    d.attendance = (attendance.data||[]).map(rowToAttendance);
    const kMap = {};
    (knowledge.data||[]).forEach(r=>{ kMap[r.product_id] = {content:r.content||"", updatedAt:r.updated_at||r.created_at||""}; });
    d.productKnowledge = kMap;
    d.productChat = (chat.data||[]).map(rowToChatMsg);
    const ppMap = {};
    (painPoints.data||[]).forEach(r=>{
      if(!ppMap[r.product_id]) ppMap[r.product_id] = [];
      ppMap[r.product_id].push({id:r.id, text:r.text||"", icon:r.icon||"", createdAt:r.created_at||"", createdBy:r.created_by||""});
    });
    d.painPointsLib = ppMap;
    const faqMap = {};
    (faq.data||[]).forEach(r=>{
      if(!faqMap[r.product_id]) faqMap[r.product_id] = [];
      faqMap[r.product_id].push({id:r.id, question:r.question||"", answer:r.answer||"", createdAt:r.created_at||"", createdBy:r.created_by||""});
    });
    d.productFaq = faqMap;
    const htMap = {};
    (hashtags.data||[]).forEach(r=>{
      if(!htMap[r.product_id]) htMap[r.product_id] = [];
      htMap[r.product_id].push({id:r.id, tag:r.tag||"", createdAt:r.created_at||"", createdBy:r.created_by||""});
    });
    d.productHashtags = htMap;
    const lsRow = (labelSettingsRes.data||[])[0];
    let parsedTemplate = null;
    if(lsRow && lsRow.template_layout){
      try{ parsedTemplate = typeof lsRow.template_layout==="string" ? JSON.parse(lsRow.template_layout) : lsRow.template_layout; }catch(e){ parsedTemplate = null; }
    }
    d.labelSettings = lsRow ? {
      shopName: lsRow.shop_name||"", shopPhone: lsRow.shop_phone||"",
      footerText: lsRow.footer_text||"", paperSize: lsRow.paper_size||"label",
      templateLayout: parsedTemplate
    } : null;
    d.shippingLabels = (shippingLabelsRes.data||[]).map(r=>({
      id:r.id, labelNumber:r.label_number||"", recipientName:r.recipient_name||"", recipientPhone:r.recipient_phone||"",

    d.packageScans = (packageScansRes.data||[]).map(r=>({

      recipientName:r.recipient_name||"", recipientPhone:r.recipient_phone||"", address:r.address||"",

      scannedAt:r.created_at||"", scannedBy:r.scanned_by||""

    d.orders = (ordersRes.data||[]).map(r=>({
      id:r.id, productId:r.product_id||"", name:r.customer_name||"", phone:r.phone||"",
      productLabel:r.product_label||"", qty:r.qty||"1", price:r.price||0, note:r.note||"",
      status:r.status||"ລໍຖ້າ", createdAt:r.created_at||""
    }));
    const pricingMap = {};
    (pricingRes.data||[]).forEach(r=>{
      pricingMap[r.product_id] = {
        costA:r.cost_a||0, sellA:r.sell_a||0, labelA:r.label_a||"ແພັກນ້ອຍ",

        discountPct:r.discount_pct||0, updatedAt:r.updated_at||""
      };
    });
    d.productPricing = pricingMap;
  }catch(e){
    STATE.connError = "ເຊື່ອມຕໍ່ database ບໍ່ໄດ້: " + e.message;
  }
  return d;
}

/* ============================================================
   PERMANENT RULE (do not remove): the screen never auto-refreshes
   on a TIMER and there is NO background polling of Supabase at all.
   Data only refreshes when: (a) someone explicitly clicks
   "ໂຫຼດຂໍ້ມູນໃໝ່" (refreshAll()), or (b) immediately after that same
   user's own action that just wrote to the database (e.g. right after
   AI content generation is saved, or right after a product/pain point
   is added) via silentRefresh() below — this is still 100% action-
   triggered by a real click, never a setInterval/timer. A previous
   background polling mechanism (checking every 15s) was removed
   because it burned through the Supabase free-tier quota and made
   data appear to vanish. Do not add setInterval/polling back without
   explicit confirmation that the Supabase plan can sustain it.
   Any new feature/table added later must be included inside
   loadAllData() only — never in any auto-interval.
   ============================================================ */
async function refreshAll(){
  STATE.refreshing = true;
  render();
  try{
    // 1) Refresh all core data tables.
    const fresh = await loadAllData();
    STATE.data = fresh;

    // 2) Refresh the logged-in user's own approval/role status.
    if(STATE.currentUser){
      try{
        const {data} = await sb.from("users").select("*").eq("id", STATE.currentUser.id).limit(1);
        if(data && data.length>0){
          const u = {id:data[0].id, name:data[0].name, role:data[0].role, approved: !!data[0].approved};
          STATE.currentUser = u;
          saveSession(u);
        }
      }catch(e){}
    }

    // 3) Refresh the owner's user-management list.
    if(STATE.currentUser && isOwner()){
      try{ STATE.usersList = await dbListUsers(); }catch(e){}
    }

    // 4) Refresh the approved-user-names list (report "accused" dropdown).
    if(STATE.currentUser){
      try{ STATE.approvedUserNames = await dbListApprovedUserNames(); }catch(e){}
    }
  }catch(e){}
  STATE.refreshing = false;
  render();
}

/* Quiet version of refreshAll(): re-fetches the data tables in the background
   after the CURRENT user's own action just wrote something (content generated,
   product saved, pain point added, cost/admin/insight/report logged, etc.)
   so the UI is always up to date without anyone needing to press the manual
   reload button. Never shows the full "ກຳລັງໂຫຼດ..." overlay, and is only ever
   called right after a real click — never on a timer. */
async function silentRefresh(onDone){
  try{
    const fresh = await loadAllData();
    STATE.data = fresh;
  }catch(e){ /* ignore — local optimistic state already reflects the change */ }
  if(typeof onDone === "function") onDone(); else render();
}

/* Scan-out audio feedback — 3 clearly distinct beep patterns, synthesized with the Web
   Audio API (no external sound files, works identically on desktop and mobile). */
function playScanSound(type){
  try{
    if(!scanAudioCtx) scanAudioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(scanAudioCtx.state==="suspended") scanAudioCtx.resume();
    const ctx = scanAudioCtx;
    const patterns = {
      success:  [{freq:1400, dur:0.09}],
      duplicate:[{freq:520, dur:0.11},{freq:520, dur:0.11, gap:0.07}],
      notfound: [{freq:280, dur:0.20},{freq:220, dur:0.26, gap:0.06}]
    };
    let t = ctx.currentTime;
    (patterns[type]||patterns.success).forEach(p=>{
      if(p.gap) t += p.gap;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = p.freq;
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.exponentialRampToValueAtTime(0.3, t+0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, t+p.dur);
      osc.connect(gain); gain.connect(ctx.destination);
      osc.start(t); osc.stop(t+p.dur+0.02);
      t += p.dur;
    });
  }catch(e){ /* audio not available on this device/browser — fail silently */ }
}
function fmt(n){ return Number(n||0).toLocaleString(); }
function copyText(text){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).catch(()=>{ fallbackCopy(text); });
  } else {
    fallbackCopy(text);
  }
}
function fallbackCopy(text){
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.select();
  try{ document.execCommand("copy"); }catch(e){}
  document.body.removeChild(ta);
}

function updateNavHighlight(){
  const navContainer = document.getElementById("nav-container");

  if(navContainer.getAttribute("data-page")===STATE.page && navContainer.getAttribute("data-role")===(STATE.currentUser?.role||"")){
    return;
  }
  navContainer.setAttribute("data-page", STATE.page);
  navContainer.setAttribute("data-role", STATE.currentUser?.role||"");
  navContainer.innerHTML = getNav().map(n => `
    <button class="nav-btn ${STATE.page===n.id?'active':''}" data-nav="${n.id}">
      <span class="nav-icon">${n.icon}</span>${n.label}${n.id==="content" && STATE.data.contentHistory.length>0 ? `<span class="nav-badge">${STATE.data.contentHistory.length}</span>` : ""}
    </button>
  `).join("");
  navContainer.querySelectorAll("[data-nav]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.page = el.getAttribute("data-nav");
      STATE.output = ""; STATE.error = "";
      closeMobileMenu();
      render();
      if(STATE.page==="users") loadUsersList();
      if(STATE.page==="reports") loadApprovedUserNames();
      if(STATE.page==="loginHistory") loadLoginHistory();
    });
  });

    </div>
    <div class="grid-4">
      <div class="stat"><div class="label">ສິນຄ້າທັງໝົດ</div><div class="value">${d.products.length}</div></div>

      <div class="stat"><div class="label">ກຳໄລລວມ</div><div class="value ${profit>=0?'good':'danger'}">${fmt(profit)} ກີບ</div></div>
      <div class="stat"><div class="label">ບັນຫາລູກຄ້າທີ່ບັນທຶກ</div><div class="value">${d.insights.length}</div></div>
    </div>
    <div class="card" style="margin-top:18px;">
      <h3>ເລີ່ມຕົ້ນໄວ</h3>

        <button class="btn" data-nav="products">+ ເພີ່ມສິນຄ້າ</button>
        <button class="btn btn-outline" data-nav="content">Marketing Studio</button>
        <button class="btn btn-outline" data-nav="insights">ບັນທຶກບັນຫາລູກຄ້າ</button>
      </div>
    </div>
    ${d.products.length===0 ? `
      <div class="card empty">
        <span class="nav-icon">&#9638;</span>
        ຍັງບໍ່ມີສິນຄ້າໃນລະບົບ — ເລີ່ມໂດຍການເພີ່ມສິນຄ້າທຳອິດຂອງທ່ານ
      </div>` : ""}
  `;
}

/* ---------- PRODUCTS ---------- */
function renderProducts(){
  const d = STATE.data;
  if(STATE.viewingProduct){
    const p = d.products.find(x=>x.id===STATE.viewingProduct);
    if(p) return renderProductDetailPage(p);
    STATE.viewingProduct = "";
  }
  return `
    <div class="page-head flex-between">
      <div>
        <h1>ຄັງສິນຄ້າ</h1>
        <p>ລວມຂໍ້ມູນສິນຄ້າທັງໝົດໄວ້ບ່ອນດຽວ ໃຊ້ອ້າງອີງເວລາສ້າງ content — ກົດເບິ່ງລາຍລະອຽດເຕັມ</p>
      </div>
      <button class="btn" id="btn-new-product">+ ເພີ່ມສິນຄ້າ</button>
    </div>
    ${d.products.length===0 ? `
      <div class="card empty">
        <span class="nav-icon">&#9638;</span>
        ຍັງບໍ່ມີສິນຄ້າ — ກົດ "ເພີ່ມສິນຄ້າ" ເພື່ອເລີ່ມຕົ້ນ
      </div>` : `
      <div class="grid-3">
        ${d.products.map(p => `
          <div class="product-card" data-view-product="${p.id}" style="cursor:pointer;">
            ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%; height:120px; object-fit:cover; border-radius:7px; margin-bottom:2px;"/>` : ""}
            <h4>${esc(p.name)}</h4>
            <div class="meta">${esc(p.category)||"ບໍ່ມີໝວດໝູ່"}</div>
            <div class="badge-row">
              ${p.price ? `<span class="pill pill-terra">ລາຄາ ${fmt(p.price)} ກີບ</span>` : ""}
              ${d.productKnowledge[p.id] ? `<span class="pill pill-sage">📚 ມີຂໍ້ມູນຄວາມຮູ້ແລ້ວ</span>` : ""}
            </div>
            <div class="small-muted" style="margin-top:4px;">${esc((p.desc||"").slice(0,70))}${(p.desc||"").length>70?"...":""}</div>
            <div style="margin-top:8px; display:flex; gap:8px;">
              <button class="btn btn-sm btn-outline" data-edit-product="${p.id}">✎ ແກ້ໄຂ</button>
              <button class="btn btn-sm btn-danger" data-del-product="${p.id}">ລຶບ</button>
            </div>
          </div>
        `).join("")}
      </div>
    `}
    ${STATE.showProductForm ? renderProductModal() : ""}
  `;
}

function linesToBullets(text){
  return (text||"").split("\n").map(l=>l.trim()).filter(l=>l.length>0);
}

function renderProductDetailPage(p){
  const d = STATE.data;
  const highlights = linesToBullets(p.highlights);
  const benefits = linesToBullets(p.benefits);
  const pains = d.painPointsLib[p.id] || [];
  const faqs = d.productFaq[p.id] || [];
  return `
    <div class="page-head">
      <button class="btn btn-sm btn-outline" data-back-to-products="1">&larr; ກັບຄືນຄັງສິນຄ້າ</button>
    </div>
    <div class="card" style="padding:0; overflow:hidden;">
      ${p.imageUrl ? `<img src="${p.imageUrl}" style="width:100%; max-height:340px; object-fit:cover; display:block;"/>` : ""}
      <div style="padding:24px;">
        <div class="flex-between" style="align-items:flex-start;">
          <div>
            <h1 style="margin-bottom:4px;">${esc(p.name)}</h1>
            <div class="badge-row">
              ${p.category ? `<span class="pill pill-gray">${esc(p.category)}</span>` : ""}
              ${p.price ? `<span class="pill pill-terra" style="font-size:14px;">ລາຄາ ${fmt(p.price)} ກີບ</span>` : ""}
            </div>
          </div>
          <button class="btn btn-sm btn-outline" data-edit-product="${p.id}">✎ ແກ້ໄຂຂໍ້ມູນ</button>
        </div>
        ${p.desc ? `<p style="margin-top:16px; font-size:15px; line-height:1.7;">${esc(p.desc)}</p>` : ""}
      </div>
    </div>

    ${highlights.length>0 ? `
      <div class="card">
        <h3>✨ ຈຸດເດັ່ນ/ສ່ວນປະສົມ</h3>
        <ul style="margin:0; padding-left:20px; line-height:1.9;">
          ${highlights.map(h=>`<li>${esc(h)}</li>`).join("")}
        </ul>
      </div>
    ` : ""}

    ${benefits.length>0 ? `
      <div class="card">
        <h3>🌿 ປະໂຫຍດຫຼັກ</h3>
        <ul style="margin:0; padding-left:20px; line-height:1.9;">
          ${benefits.map(b=>`<li>${esc(b)}</li>`).join("")}
        </ul>
      </div>
    ` : ""}

    ${p.usage ? `
      <div class="card">
        <h3>📋 ວິທີໃຊ້/ວິທີກິນ-ທາ</h3>
        <p style="margin:0; line-height:1.8;">${esc(p.usage)}</p>
      </div>
    ` : ""}

    ${pains.length>0 ? `
      <div class="card">
        <h3>💭 ບັນຫາລູກຄ້າ (Pain Points)</h3>
        <div class="badge-row">
          ${pains.map(pp=>`<span class="pill pill-sage">${pp.icon?pp.icon+" ":""}${esc(pp.text)}</span>`).join("")}
        </div>
      </div>
    ` : ""}

    ${faqs.length>0 ? `
      <div class="card">
        <h3>💬 ຄຳຖາມ-ຕອບດ່ວນ</h3>
        ${faqs.map(fq=>`
          <div style="margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid #E9E3D3;">
            <div style="font-weight:700;">❓ ${esc(fq.question)}</div>
            <div class="small-muted" style="margin-top:4px;">${esc(fq.answer)}</div>
          </div>
        `).join("")}
      </div>
    ` : ""}

    ${(!highlights.length && !benefits.length && !p.usage && !pains.length && !faqs.length) ? `
      <div class="card empty">
        <span class="nav-icon">&#9998;</span>
        ຍັງບໍ່ມີຂໍ້ມູນລາຍລະອຽດ — ກົດ "✎ ແກ້ໄຂຂໍ້ມູນ" ເພື່ອເພີ່ມຈຸດເດັ່ນ, ປະໂຫຍດ, ວິທີໃຊ້, ຫຼື ຄຳຖາມ-ຕອບດ່ວນ
      </div>
    ` : ""}

    ${STATE.showProductForm ? renderProductModal() : ""}
  `;
}

function renderPainPointLibrary(){
  const productId = STATE.editingProduct;
  const list = STATE.data.painPointsLib[productId] || [];
  return `
    <div style="margin-top:22px; padding-top:18px; border-top:1px solid #E9E3D3;">
      <label style="margin:0 0 8px 0;">📌 Pain Point Library (ກົດເລືອກໄດ້ຕອນສ້າງ Content)</label>
      <div class="badge-row" style="margin-bottom:10px;">
        ${list.length===0 ? `<span class="small-muted">ຍັງບໍ່ມີ pain point ໃນ library — ພິມເພີ່ມເອງ ຫຼື ໃຫ້ AI ຊ່ວຍຄິດ</span>` : list.map(pp=>`
          <span class="pill pill-sage" style="display:inline-flex; align-items:center; gap:6px; margin:0 6px 6px 0;">
            ${pp.icon?pp.icon+" ":""}${esc(pp.text)}
            <button type="button" data-del-painpoint="${pp.id}" style="border:none; background:none; cursor:pointer; color:var(--terracotta-dark); font-weight:700; padding:0 2px;">&#10005;</button>
          </span>
        `).join("")}
      </div>
      <div style="display:flex; gap:8px; margin-bottom:10px;">
        <input type="text" id="new-painpoint-text" placeholder="ພິມ pain point ໃໝ່..." value="${esc(STATE.newPainPointText)}" style="flex:1; margin-bottom:0;"/>
        <button class="btn btn-sm btn-outline" id="btn-add-painpoint" style="white-space:nowrap;">+ ເພີ່ມ</button>
      </div>
      <button class="btn btn-sm" id="btn-ai-suggest-painpoints" ${STATE.aiPainLoading?'disabled':''}>${STATE.aiPainLoading?'AI ກຳລັງຄິດ...':'✨ ໃຫ້ AI ຊ່ວຍຄິດ'}</button>
      ${STATE.aiPainError ? `<p style="color:var(--danger); font-size:13px; margin-top:8px;">${esc(STATE.aiPainError)}</p>` : ""}
      ${STATE.aiPainSuggestions.length>0 ? `
        <div class="card" style="background:var(--cream-2); margin-top:12px; padding:14px;">
          <p class="small-muted" style="margin-bottom:8px;">AI ແນະນຳ — ເລືອກອັນທີ່ຢາກເພີ່ມ ແລ້ວກົດບັນທຶກ:</p>
          ${STATE.aiPainSuggestions.map((s,i)=>`
            <label style="display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; font-weight:400; cursor:pointer;">
              <input type="checkbox" data-pain-suggestion-idx="${i}" ${s.selected?'checked':''} style="margin-top:3px;"/>
              <span>${esc(s.text)}</span>
            </label>
          `).join("")}
          <div style="display:flex; gap:8px; margin-top:8px;">
            <button class="btn btn-sm" id="btn-save-pain-suggestions">ບັນທຶກທີ່ເລືອກ</button>
            <button class="btn btn-sm btn-outline" id="btn-cancel-pain-suggestions">ຍົກເລີກ</button>
          </div>
        </div>
      ` : ""}
    </div>
  `;
}

function renderProductModal(){
  const f = STATE.productForm;
  const knowledge = STATE.editingProduct ? STATE.data.productKnowledge[STATE.editingProduct] : null;
  return `
    <div class="modal-bg" id="product-modal-bg">
      <div class="modal" id="product-modal">
        <button class="close-x" id="close-product-modal">&#10005;</button>
        <h3>${STATE.editingProduct ? "ແກ້ໄຂສິນຄ້າ" : "ເພີ່ມສິນຄ້າໃໝ່"}</h3>
        <label>ຮູບສິນຄ້າ (ບໍ່ບັງຄັບ)</label>
        <div style="margin-bottom:14px;">
          <input type="file" id="pf-image-input" accept="image/*" style="font-size:13px;"/>
          ${f.imageBase64 ? `<div style="margin-top:8px; position:relative; display:inline-block;">
            <img src="${f.imageBase64}" style="max-width:200px; max-height:140px; border-radius:7px; border:1px solid #E9E3D3; display:block;"/>
            <button type="button" id="pf-image-remove" title="ລົບຮູບ" style="position:absolute; top:-8px; right:-8px; width:26px; height:26px; border-radius:50%; background:var(--danger); color:#fff; border:2px solid #fff; font-size:14px; line-height:1; cursor:pointer; display:flex; align-items:center; justify-content:center;">&#10005;</button>
          </div>` : ""}
        </div>
        <label>ຊື່ສິນຄ້າ</label>
        <input type="text" id="pf-name" value="${esc(f.name)}"/>
        <label>ໝວດໝູ່</label>
        <input type="text" id="pf-category" placeholder="ສຸຂະພາບ / ຄວາມງາມ / ອາຫານ-ເຄື່ອງດື່ມ" value="${esc(f.category)}"/>
        <div class="grid-2">
          <div>
            <label>ລາຄາຂາຍ (ກີບ)</label>
            <input type="number" id="pf-price" value="${esc(f.price)}"/>
          </div>
          <div>
            <label>ຕົ້ນທຶນ/ໜ່ວຍ (ກີບ)</label>
            <input type="number" id="pf-costPrice" value="${esc(f.costPrice)}"/>
          </div>
        </div>
        <label>ລາຍລະອຽດສິນຄ້າ / ຈຸດເດັ່ນ</label>
        <textarea id="pf-desc">${esc(f.desc)}</textarea>
        <label>ຈຸດເດັ່ນ/ສ່ວນປະສົມ (ແຕ່ລະຂໍ້ຂຶ້ນແຖວໃໝ່)</label>
        <textarea id="pf-highlights" placeholder="ເຊັ່ນ: ສານສະກັດຈາກຜັກ 18 ຊະນິດ&#10;0% ນ້ຳຕານ&#10;ບໍ່ມີຄໍເລສເຕີຣອນ">${esc(f.highlights||"")}</textarea>
        <label>ປະໂຫຍດຫຼັກ (ແຕ່ລະຂໍ້ຂຶ້ນແຖວໃໝ່ — ໃສ່ emoji ນຳໜ້າໄດ້)</label>
        <textarea id="pf-benefits" placeholder="ເຊັ່ນ: 🌿 ຊ່ວຍລະບົບຂັບຖ່າຍ ສົມດຸນລຳໄສ້&#10;✨ ຜິວກະຈ່າງໃສຂຶ້ນພາຍໃນ 2 ອາທິດ">${esc(f.benefits||"")}</textarea>
        <label>ວິທີໃຊ້/ວິທີກິນ-ທາ</label>
        <textarea id="pf-usage" placeholder="ເຊັ່ນ: ຊົງ 1 ຊອງ ກັບນ້ຳຮ້ອນ 150ml ດື່ມຕອນເຊົ້າ 30 ນາທີກ່ອນອາຫານ">${esc(f.usage||"")}</textarea>
        <label>ບັນຫາລູກຄ້າ (pain points)</label>
        <textarea id="pf-painPoints" placeholder="ບັນຫາທີ່ສິນຄ້ານີ້ຊ່ວຍແກ້ໄຂ">${esc(f.painPoints)}</textarea>
        <button class="btn" id="save-product">ບັນທຶກ</button>

        ${STATE.editingProduct ? renderPainPointLibrary() : `
          <p class="small-muted" style="margin-top:10px;">ບັນທຶກສິນຄ້ານີ້ກ່ອນ ຈຶ່ງຈະເພີ່ມ Pain Point Library ໄດ້ (ເປີດແກ້ໄຂສິນຄ້ານີ້ອີກຄັ້ງຫຼັງບັນທຶກ)</p>
        `}

        ${STATE.editingProduct ? renderProductFaqManager() : ""}

        <div style="margin-top:22px; padding-top:18px; border-top:1px solid #E9E3D3;">
          <div class="flex-between" style="margin-bottom:8px;">
            <label style="margin:0;">📚 ຄວາມຮູ້ສິນຄ້າ (ໃຊ້ຕອບຄຳຖາມ AI ແລະ ສ້າງ Content)</label>
          </div>
          ${!STATE.editingProduct ? `
            <p class="small-muted">ບັນທຶກສິນຄ້ານີ້ກ່ອນ ຈຶ່ງຈະໃສ່ຂໍ້ມູນຄວາມຮູ້ໄດ້ (ໃສ່ໄດ້ຫຼັງບັນທຶກ ແລະ ເປີດແກ້ໄຂສິນຄ້ານີ້ອີກຄັ້ງ)</p>
          ` : `
            <p class="small-muted" style="margin-bottom:10px;">Tar ຄົ້ນຄວ້າຂໍ້ມູນສິນຄ້ານີ້ເອງ (ຈາກ AI ພາຍນອກ, ອິນເຕີເນັດ, ຫຼືແຫຼ່ງອື່ນ) ແລ້ວແປະ/ພິມໃສ່ນີ້ — ຈະຖືກໃຊ້ອ້າງອີງໃນ "ຖາມ AI" ແລະ "ສ້າງ Content" ໂດຍອັດຕະໂນມັດ</p>
            <label>ອັບໂຫຼດໄຟລ໌ (.txt ຫຼື .md) — ບໍ່ບັງຄັບ, ຈະໃສ່ຂໍ້ຄວາມລົງໃນຊ່ອງລຸ່ມນີ້ໃຫ້ອັດຕະໂນມັດ</label>
            <input type="file" id="pk-file-input" accept=".txt,.md,text/plain,text/markdown" style="font-size:13px; margin-bottom:10px;"/>
            <textarea id="pk-content" placeholder="ວາງ/ພິມຂໍ້ມູນສິນຄ້າທີ່ຄົ້ນຄວ້າໄວ້ທີ່ນີ້..." style="min-height:220px;">${esc(knowledge && knowledge.content ? knowledge.content : "")}</textarea>
            ${knowledge && knowledge.updatedAt ? `<div class="small-muted" style="margin-bottom:10px;">ອັບເດດຫຼ້າສຸດ: ${new Date(knowledge.updatedAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ})}</div>` : ""}
            ${STATE.knowledgeError ? `<p style="color:var(--danger); font-size:13.5px;">${esc(STATE.knowledgeError)}</p>` : ""}
            <button class="btn btn-outline btn-sm" id="btn-save-knowledge" ${STATE.savingKnowledge?'disabled':''}>${STATE.savingKnowledge?'ກຳລັງບັນທຶກ...':'💾 ບັນທຶກຄວາມຮູ້ສິນຄ້າ'}</button>
          `}
        </div>
      </div>
    </div>
  `;
}

function renderProductFaqManager(){
  const productId = STATE.editingProduct;
  const list = STATE.data.productFaq[productId] || [];

        <div class="stat"><div class="label">ເນື້ອຫາທີ່ສ້າງທັງໝົດ</div><div class="value">${totalContent}</div></div>
        <div class="stat"><div class="label">ສ້າງອາທິດນີ້</div><div class="value">${weekCount}</div></div>

        <div class="stat"><div class="label">ຍອດຂາຍລວມ (ຈ່າຍແລ້ວ)</div><div class="value good">${fmt(revenue)}</div></div>
      </div>
    </div>
    <div class="card">
      <label>⚡ ເລີ່ມໄວ</label>
      <p class="small-muted" style="margin:6px 0 14px;">ກົດໄປແທັບທີ່ຕ້ອງການໄດ້ທັນທີ</p>
      <div style="display:flex; flex-wrap:wrap; gap:10px;">
        <button class="btn btn-sm btn-outline" data-goto-tab="createPost">✍️ ສ້າງໂພສ</button>
        <button class="btn btn-sm btn-outline" data-goto-tab="video">🎬 ສ້າງ Script</button>
        <button class="btn btn-sm btn-outline" data-goto-tab="crm">👥 ບັນທຶກອໍເດີ</button>
        <button class="btn btn-sm btn-outline" data-goto-tab="pricing">💰 ຄຳນວນກຳໄລ</button>
      </div>
    </div>
    <div class="card">
      <label>🕐 ກິດຈະກຳລ່າສຸດ</label>
      <div style="margin-top:10px;">
        ${recent.length===0 ? `<p class="small-muted">ຍັງບໍ່ມີກິດຈະກຳ — ເລີ່ມສ້າງເນື້ອຫາໄດ້ເລີຍ</p>` :
          recent.map(c=>`
            <div style="padding:9px 0; border-bottom:1px solid #EAE3D2; display:flex; justify-content:space-between; gap:10px;">
              <span><b>${esc(TAB_LABELS[c.type]||c.type)}</b> — ${esc(c.productName)}</span>
              <span class="small-muted" style="white-space:nowrap;">${esc(c.date)}</span>
            </div>
          `).join("")}
      </div>
    </div>
  `;
}

/* ============ Marketing Studio: 👥 ລູກຄ້າ/ອໍເດີ (mini-CRM) ============ */

  const productId = STATE.selProduct;
  const product = d.products.find(p=>p.id===productId);
  const f = STATE.orderForm;
  const statuses = ["ລໍຖ້າ","ສົ່ງແລ້ວ","ຈ່າຍແລ້ວ","ຍົກເລີກ"];
  let items = d.orders.filter(o=>o.productId===productId);
  if(STATE.orderFilter) items = items.filter(o=>o.status===STATE.orderFilter);
  if(STATE.orderSearch){
    const q = STATE.orderSearch.toLowerCase();
    items = items.filter(o=>o.name.toLowerCase().includes(q) || (o.phone||"").toLowerCase().includes(q));
  }
  return `
    <div class="card">
      <label>ເລືອກສິນຄ້າ</label>
      <select id="cs-crm-product">
        ${d.products.map(p=>`<option value="${p.id}" ${STATE.selProduct===p.id?'selected':''}>${esc(p.name)}</option>`).join("")}
      </select>
      <label style="margin-top:14px;">👥 ບັນທຶກອໍເດີໃໝ່</label>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;">
        <div><label style="font-size:12.5px;">ຊື່ລູກຄ້າ</label><input type="text" id="cs-order-name" placeholder="ຊື່..." value="${esc(f.name)}"/></div>
        <div><label style="font-size:12.5px;">ເບີໂທ</label><input type="text" id="cs-order-phone" placeholder="020..." value="${esc(f.phone)}"/></div>
        <div><label style="font-size:12.5px;">ລາຍລະອຽດສິນຄ້າ</label><input type="text" id="cs-order-productlabel" placeholder="${product?esc(product.name):'ເຊັ່ນ: ຂະໜາດ/ຮຸ່ນ'}" value="${esc(f.productLabel)}"/></div>
        <div><label style="font-size:12.5px;">ຈຳນວນ</label><input type="text" id="cs-order-qty" placeholder="1" value="${esc(f.qty)}"/></div>
        <div><label style="font-size:12.5px;">ລາຄາລວມ</label><input type="text" id="cs-order-price" placeholder="0" value="${esc(f.price)}"/></div>
        <div><label style="font-size:12.5px;">ໝາຍເຫດ (ບໍ່ບັງຄັບ)</label><input type="text" id="cs-order-note" placeholder="ເຊັ່ນ: ມາຈາກ TikTok" value="${esc(f.note)}"/></div>
      </div>
      <button class="btn btn-sm" id="cs-btn-add-order" style="margin-top:12px;">➕ ບັນທຶກອໍເດີ</button>
    </div>
    <div class="card">
      <label>📋 ລາຍການອໍເດີ (${d.orders.filter(o=>o.productId===productId).length})</label>
      <div style="display:flex; flex-wrap:wrap; gap:8px; margin:10px 0 14px;">
        <input type="text" id="cs-order-search" placeholder="ຄົ້ນຫາຊື່/ເບີໂທ..." value="${esc(STATE.orderSearch)}" style="flex:1; min-width:160px; margin-bottom:0;"/>
        <select id="cs-order-filter" style="max-width:160px; margin-bottom:0;">
          <option value="">ທຸກສະຖານະ</option>
          ${statuses.map(s=>`<option value="${s}" ${STATE.orderFilter===s?'selected':''}>${s}</option>`).join("")}
        </select>
      </div>
      ${items.length===0 ? `<p class="small-muted">ຍັງບໍ່ມີອໍເດີ — ບັນທຶກອໍເດີໃໝ່ດ້ານເທິງ</p>` : items.map(o=>`
        <div style="border:1px solid #EAE3D2; border-radius:9px; padding:12px 14px; margin-bottom:8px;">
          <div style="display:flex; justify-content:space-between; gap:10px; align-items:flex-start;">
            <div>
              <div style="font-weight:700;">${esc(o.name)}</div>
              <div class="small-muted">${esc(o.phone||"-")} · ${esc(o.productLabel||"-")} × ${esc(String(o.qty))}</div>
              ${o.note ? `<div class="small-muted">📝 ${esc(o.note)}</div>` : ""}
            </div>
            <div style="text-align:right; flex-shrink:0;">
              <div style="font-weight:700;">${fmt(o.price)}</div>
              <span class="pill ${o.status==='ຈ່າຍແລ້ວ'?'pill-sage':o.status==='ຍົກເລີກ'?'pill-terra':'pill-gray'}" data-cs-cycle-order="${o.id}" style="cursor:pointer; user-select:none;" title="ກົດເພື່ອປ່ຽນສະຖານະ">${o.status}</span>

/* ============ Marketing Studio: 💰 ຄຳນວນກຳໄລ (pricing calculator) ============ */
function renderPricingTab(d){
  if(d.products.length===0) return `<div class="card"><p class="small-muted">ກະລຸນາເພີ່ມສິນຄ້າກ່ອນ ໃນໜ້າ "ສິນຄ້າ"</p></div>`;
  const productId = STATE.selProduct;
  if(STATE.pricingFormProduct !== productId){
    const saved = d.productPricing[productId];
    STATE.pricingForm = saved ? {
      costA:String(saved.costA||""), sellA:String(saved.sellA||""), labelA:saved.labelA||"ແພັກນ້ອຍ",
      costB:String(saved.costB||""), sellB:String(saved.sellB||""), labelB:saved.labelB||"ແພັກໃຫຍ່",
      discountPct:String(saved.discountPct||"")
    } : {costA:"", sellA:"", labelA:"ແພັກນ້ອຍ", costB:"", sellB:"", labelB:"ແພັກໃຫຍ່", discountPct:""};
    STATE.pricingFormProduct = productId;
    STATE.pricingSaved = false;
  }
  const f = STATE.pricingForm;
  const costA = parseFloat(f.costA)||0, sellA = parseFloat(f.sellA)||0;
  const costB = parseFloat(f.costB)||0, sellB = parseFloat(f.sellB)||0;
  const disc = parseFloat(f.discountPct)||0;
  const profitA = sellA-costA, marginA = sellA ? ((profitA/sellA)*100).toFixed(1) : "0.0";
  const profitB = sellB-costB, marginB = sellB ? ((profitB/sellB)*100).toFixed(1) : "0.0";
  const discPriceA = sellA*(1-disc/100), discProfitA = discPriceA-costA;
  return `
    <div class="card">
      <label>ເລືອກສິນຄ້າ</label>
      <select id="cs-pricing-product">
        ${d.products.map(p=>`<option value="${p.id}" ${STATE.selProduct===p.id?'selected':''}>${esc(p.name)}</option>`).join("")}
      </select>
      <p class="small-muted" style="margin:10px 0 14px;">💰 ໃສ່ຕົ້ນທຶນ ແລະ ລາຄາຂາຍ ເພື່ອເບິ່ງກຳໄລ — ຕັ້ງຊື່ແພັກເອງໄດ້ (ເຊັ່ນ ຂະໜາດນ້ອຍ/ໃຫຍ່)</p>
      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div>
          <label style="font-size:12.5px;">ຊື່ແພັກ A</label>
          <input type="text" id="cs-pc-labelA" value="${esc(f.labelA)}"/>
          <label style="font-size:12.5px; margin-top:8px;">ຕົ້ນທຶນ / ${esc(f.labelA)}</label>
          <input type="text" id="cs-pc-costA" placeholder="0" value="${esc(f.costA)}"/>
          <label style="font-size:12.5px; margin-top:8px;">ລາຄາຂາຍ / ${esc(f.labelA)}</label>
          <input type="text" id="cs-pc-sellA" placeholder="0" value="${esc(f.sellA)}"/>
        </div>
        <div>
          <label style="font-size:12.5px;">ຊື່ແພັກ B</label>
          <input type="text" id="cs-pc-labelB" value="${esc(f.labelB)}"/>
          <label style="font-size:12.5px; margin-top:8px;">ຕົ້ນທຶນ / ${esc(f.labelB)}</label>
          <input type="text" id="cs-pc-costB" placeholder="0" value="${esc(f.costB)}"/>
          <label style="font-size:12.5px; margin-top:8px;">ລາຄາຂາຍ / ${esc(f.labelB)}</label>
          <input type="text" id="cs-pc-sellB" placeholder="0" value="${esc(f.sellB)}"/>
        </div>
      </div>
      <label style="margin-top:10px;">ສ່ວນຫຼຸດໂປຣໂມຊັນ (%)</label>
      <input type="text" id="cs-pc-discount" placeholder="ເຊັ່ນ 10" value="${esc(f.discountPct)}" style="max-width:160px;"/>
      <button class="btn btn-sm" id="cs-btn-save-pricing" style="margin-top:12px;">💾 ບັນທຶກ</button>
      ${STATE.pricingSaved ? `<span class="small-muted" style="margin-left:10px; color:var(--sage-dark);">✓ ບັນທຶກແລ້ວ</span>` : ""}
      <div style="margin-top:18px; padding-top:16px; border-top:1px solid #E9E3D3;">
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:12px;">
          <div class="stat"><div class="label">ກຳໄລ/${esc(f.labelA)}</div><div class="value good">${fmt(profitA)} (${marginA}%)</div></div>
          <div class="stat"><div class="label">ກຳໄລ/${esc(f.labelB)}</div><div class="value good">${fmt(profitB)} (${marginB}%)</div></div>
          <div class="stat"><div class="label">ລາຄາຫຼັງຫຼຸດ ${disc}% (${esc(f.labelA)})</div><div class="value">${fmt(discPriceA)}</div></div>
          <div class="stat"><div class="label">ກຳໄລຫຼັງຫຼຸດ (${esc(f.labelA)})</div><div class="value ${discProfitA<0?'danger':'good'}">${fmt(discProfitA)}</div></div>
        </div>
      </div>
    </div>
  `;
}

/* ============ Marketing Studio: 🕐 ປະຫວັດ (history — search/filter/export) ============ */

        </select>
        <button class="btn btn-sm btn-outline" id="cs-btn-export-history">📤 Export CSV</button>

          <div style="margin-top:8px; display:flex; gap:14px;">
            <button type="button" data-cs-hist-view="${c.id}" style="border:none; background:none; cursor:pointer; color:var(--bg-deep); font-weight:700; font-size:12.5px;">👁️ ເບິ່ງ</button>
            <button type="button" data-cs-hist-copy="${c.id}" style="border:none; background:none; cursor:pointer; color:var(--bg-deep); font-weight:700; font-size:12.5px;">📋 ກັອບປີ້</button>
            <button type="button" data-cs-hist-del="${c.id}" style="border:none; background:none; cursor:pointer; color:var(--terracotta-dark); font-weight:700; font-size:12.5px;">🗑️ ລຶບ</button>

function renderContent(){

  if(!STATE.selProduct && d.products.length>0) STATE.selProduct = d.products[0].id;

  if(!STATE.postPlatform) STATE.postPlatform = POST_PLATFORMS[0];
  if(!STATE.postAudience) STATE.postAudience = GENERAL_AUDIENCES[0];

  const managementTabs = {dashboard: renderDashboardTab, painMgr: renderPainMgrTab, quickReply: renderQuickReplyTab, hashtag: renderHashtagTab, crm: renderCrmTab, pricing: renderPricingTab, history: renderHistoryTab};
  const selProductObj = d.products.find(p=>p.id===STATE.selProduct);
  const mktSubtitle = selProductObj ? `${esc(selProductObj.category||"")}${selProductObj.category?" · ":""}ສ້າງເນື້ອຫາການຕະຫຼາດດ້ວຍ AI` : "ສ້າງເນື້ອຫາການຕະຫຼາດດ້ວຍ AI";

        <div class="mkt-logo">🎨</div>

        <label>ເລືອກສິນຄ້າ</label>
        <select id="content-product">
          ${d.products.map(p=>`<option value="${p.id}" ${STATE.selProduct===p.id?'selected':''}>${esc(p.name)}</option>`).join("")}
        </select>
        ${renderPainPointChips()}
        ${TABS_WITH_POST_OPTIONS.includes(STATE.contentTab) ? `
          <label>ຮູບແບບໂພສ</label>
          <select id="post-format">
            ${POST_FORMATS.map(o=>`<option value="${esc(o)}" ${STATE.postFormat===o?'selected':''}>${esc(o)}</option>`).join("")}
          </select>
          <label>ກຸ່ມເປົ້າໝາຍ</label>
          <select id="post-audience">
            ${(d.painPointsLib[STATE.selProduct]||[]).length>0 ? `
              <optgroup label="🎯 Pain Point ຂອງສິນຄ້ານີ້">
                ${(d.painPointsLib[STATE.selProduct]||[]).map(pp=>`<option value="${esc(pp.text)}" ${STATE.postAudience===pp.text?'selected':''}>${pp.icon?pp.icon+" ":""}${esc(pp.text)}</option>`).join("")}
              </optgroup>
            ` : ""}
            <optgroup label="👥 ກຸ່ມທົ່ວໄປ">
              ${GENERAL_AUDIENCES.map(o=>`<option value="${esc(o)}" ${STATE.postAudience===o?'selected':''}>${esc(o)}</option>`).join("")}
            </optgroup>
          </select>
          <label>ລາຍລະອຽດເພີ່ມເຕີມ (ບໍ່ບັງຄັບ)</label>
          <textarea id="post-extra" placeholder="ເຊັ່ນ: ມີໂປຣຫຼຸດ 20% ອາທິດນີ້...">${esc(STATE.postExtra)}</textarea>

${STATE.postExtra ? `ຂໍ້ມູນຄູ່ແຂ່ງທີ່ຮູ້ (ຊື່ແບຣນ, ຈຸດເດັ່ນ, ລາຄາ ຖ້າມີ):\n${STATE.postExtra}` : "ບໍ່ມີຂໍ້ມູນຄູ່ແຂ່ງສະເພາະ — ໃຫ້ວິເຄາະຈາກປະເພດສິນຄ້າ ແລະ ຕະຫຼາດລາວ/ໄທໂດຍທົ່ວໄປ"}

ກະລຸນາເຮັດຕາຕະລາງປຽບທຽບຈຸດເດັ່ນ-ຈຸດອ່ອນສັ້ນໆ ແລ້ວແນະນຳ marketing angle 3-5 ຂໍ້ ທີ່ສິນຄ້ານີ້ຄວນເນັ້ນເພື່ອແຂ່ງຂັນ ໂດຍສະເພາະຖ້າມີຈຸດອ່ອນທຽບກັບຄູ່ແຂ່ງ ໃຫ້ຫາວິທີຫັນຈຸດອ່ອນນັ້ນໃຫ້ເປັນຈຸດແຂງແທນ.`;
  }

  try{
    const result = await callAI(prompt, "ທ່ານແມ່ນຄົນລາວແທ້ໆ ເປັນຜູ້ຊ່ຽວຊານດ້ານການຕະຫຼາດອອນລາຍສຳລັບຕະຫຼາດລາວ. ຂຽນເປັນພາສາລາວລ້ວນໆ ແບບທີ່ຄົນລາວແທ້ໆເວົ້າ/ພິມກັນຈິງໃນຊີວິດປະຈຳວັນ ແລະ ໃນການຂາຍເທິງ Facebook — ບໍ່ແມ່ນແປຄຳຕໍ່ຄຳຈາກພາສາອື່ນ ຫຼືປົນຄຳສັບ/ໄວຍະກອນຂອງພາສາໄທ ຫຼືພາສາອື່ນເຂົ້າມາ. ໃຫ້ໃຊ້ໂຄງສ້າງປະໂຫຍກ ແລະ ຄຳສັບທີ່ຄົນລາວໃຊ້ຈິງ ອ່ານແລ້ວລື່ນໄຫຼເປັນທຳມະຊາດ ບໍ່ແຂງກະດ້າງ ບໍ່ຄືການແປ. ຖ້າບໍ່ແນ່ໃຈວ່າຄຳໃດຖືກຕ້ອງ ໃຫ້ເລືອກຄຳທີ່ຄົນລາວທົ່ວໄປໃຊ້ຈິງ ແທນທີ່ຈະສ້າງຄຳໃໝ່ຂຶ້ນເອງ.");
    STATE.output = result;
    const newItem = {
      id:"c"+Date.now(), type:tab, productName:product.name,
      content:result, date:new Date().toLocaleString("lo-LA", {timeZone: LAOS_TZ})
    };
    STATE.data.contentHistory.unshift(newItem);
    dbInsertContent(newItem).catch(e=>console.error(e));
    STATE.loading = false;
    render();
    silentRefresh();
    return;
  }catch(e){
    STATE.error = "ເກີດຂໍ້ຜິດພາດ: " + e.message;
  }
  STATE.loading = false;
  render();
}

/* ---------- PRODUCT AI CHAT (Q&A grounded in the product's researched knowledge) ---------- */
function renderProductChat(){
  const d = STATE.data;
  if(!STATE.chatSelProduct && d.products.length>0) STATE.chatSelProduct = d.products[0].id;
  const product = d.products.find(p=>p.id===STATE.chatSelProduct);
  const knowledge = product ? d.productKnowledge[product.id] : null;
  const messages = product ? d.productChat.filter(m=>m.productId===product.id) : [];

  return `
    <div class="page-head">
      <h1>ຖາມ AI ກ່ຽວກັບສິນຄ້າ</h1>
      <p>ຖາມຫຍັງກໍ່ໄດ້ກ່ຽວກັບສິນຄ້າ — AI ຈະຕອບໂດຍອີງໃສ່ຖານຂໍ້ມູນທີ່ຄົ້ນຄວ້າໄວ້</p>
    </div>
    <div class="card">
      ${d.products.length===0 ? `<p class="small-muted">ກະລຸນາເພີ່ມສິນຄ້າກ່ອນ ໃນໜ້າ "ສິນຄ້າ"</p>` : `
        <label>ເລືອກສິນຄ້າ</label>
        <select id="chat-product">
          ${d.products.map(p=>`<option value="${p.id}" ${STATE.chatSelProduct===p.id?'selected':''}>${esc(p.name)}</option>`).join("")}
        </select>
        ${knowledge && knowledge.content ? `
          <div style="margin-top:6px; margin-bottom:14px;">
            <button type="button" class="btn btn-sm btn-outline" id="btn-toggle-knowledge">${STATE.chatKnowledgeOpen ? "▲ ເຊື່ອງຖານຂໍ້ມູນ" : "▼ ເບິ່ງຖານຂໍ້ມູນສິນຄ້ານີ້"}</button>
            ${STATE.chatKnowledgeOpen ? `<div class="content-out" style="max-height:220px; margin-top:8px;">${esc(knowledge.content)}</div>` : ""}
          </div>
        ` : `<p class="small-muted" style="margin:8px 0 14px 0;">⚠️ ສິນຄ້ານີ້ຍັງບໍ່ມີຂໍ້ມູນຄວາມຮູ້ — ໄປທີ່ໜ້າ "ສິນຄ້າ" → ແກ້ໄຂສິນຄ້ານີ້ → ໃສ່ຂໍ້ມູນໃນຊ່ອງ "ຄວາມຮູ້ສິນຄ້າ" ກ່ອນ (AI ຍັງຕອບໄດ້ ແຕ່ຈະອີງໃສ່ຂໍ້ມູນທີ່ພິມໄວ້ໃນ ລາຍລະອຽດ/pain points ເທົ່ານັ້ນ)</p>`}

        <div id="chat-log" style="max-height:400px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; margin-bottom:14px;">
          ${messages.length===0 ? `<p class="small-muted">ຍັງບໍ່ມີການສົນທະນາ — ພິມຄຳຖາມຂ້າງລຸ່ມເພື່ອເລີ່ມ</p>` : messages.map(m=>`
            <div style="align-self:${m.role==='admin'?'flex-end':'flex-start'}; max-width:80%;">
              <div style="font-size:11px; color:var(--muted); margin-bottom:2px; text-align:${m.role==='admin'?'right':'left'};">${m.role==='admin' ? '👤 ' + esc(STATE.currentUser?.name||'') : '🤖 AI'}</div>
              <div style="background:${m.role==='admin'?'var(--terracotta)':'var(--cream)'}; color:${m.role==='admin'?'#fff':'var(--ink)'}; border:1px solid ${m.role==='admin'?'transparent':'#E9E3D3'}; border-radius:10px; padding:10px 13px; font-size:14px; white-space:pre-wrap; line-height:1.55;">${esc(m.message)}</div>

          `).join("")}

        <button class="btn" id="btn-chat-send" ${STATE.chatSending?'disabled':''}>${STATE.chatSending?'ກຳລັງສົ່ງ...':'ສົ່ງຄຳຖາມ'}</button>
      `}
    </div>
  `;
}

async function sendProductChat(){
  const d = STATE.data;
  const product = d.products.find(p=>p.id===STATE.chatSelProduct);
  if(!product) return;
  const questionEl = document.getElementById("chat-input");
  const question = (questionEl ? questionEl.value : STATE.chatQuestion || "").trim();
  if(!question) return;

  const knowledge = d.productKnowledge[product.id];
  const faqList = d.productFaq[product.id] || [];
  const faqBlock = faqList.length>0
    ? `\nຄຳຖາມ-ຕອບດ່ວນທີ່ບັນທຶກໄວ້ (ໃຫ້ໃຊ້ຄຳຕອບເຫຼົ່ານີ້ເປັນຫຼັກ ຖ້າກົງກັບຄຳຖາມ):\n${faqList.map(fq=>`- Q: ${fq.question}\n  A: ${fq.answer}`).join("\n")}`
    : "";
  const userMsg = {id:"pc"+Date.now(), productId:product.id, role:"admin", message:question, createdAt:new Date().toISOString()};
  STATE.data.productChat.push(userMsg);
  STATE.chatQuestion = "";
  STATE.chatSending = true;
  STATE.chatError = "";
  render();
  dbInsertChatMsg(userMsg).catch(e=>console.error(e));

  const system = `ທ່ານແມ່ນຄົນລາວແທ້ໆ ເປັນຜູ້ຊ່ວຍດ້ານການຕະຫຼາດສຳລັບຮ້ານຄ້າອອນລາຍໃນລາວ ຕອບຄຳຖາມກ່ຽວກັບສິນຄ້າຕໍ່ໄປນີ້ໂດຍອີງໃສ່ຂໍ້ມູນທີ່ໃຫ້ໄວ້ເທົ່ານັ້ນ ຫ້າມໃຊ້ຂໍ້ມູນຂອງສິນຄ້າ/ແບຣນອື່ນມາຕອບແທນເດັດຂາດ ເຖິງຈະຄ້າຍຄືກັນກໍ່ຕາມ ຖ້າບໍ່ມີຂໍ້ມູນພຽງພໍ ໃຫ້ບອກຕາມກົງວ່າບໍ່ມີຂໍ້ມູນ ຢ່າກຸກຂໍ້ມູນຂຶ້ນເອງ. ຕອບເປັນພາສາລາວລ້ວນໆ ແບບທີ່ຄົນລາວແທ້ໆເວົ້າກັນຈິງ ບໍ່ແປຄຳຕໍ່ຄຳຈາກພາສາອື່ນ ບໍ່ປົນຄຳສັບ/ໄວຍະກອນຂອງພາສາໄທ ຫຼືພາສາອື່ນ ສັ້ນ ກົງປະເດັນ ອ່ານແລ້ວເປັນທຳມະຊາດ ນຳໃຊ້ໄດ້ຈິງສຳລັບແອັດມິນທີ່ຈະເອົາໄປເຮັດການຕະຫຼາດ.

ຊື່ສິນຄ້າ: ${product.name}
ໝວດໝູ່: ${product.category}
ລາຍລະອຽດ: ${product.desc}
ລາຄາຂາຍ: ${product.price ? fmt(product.price)+" ກີບ" : "ບໍ່ໄດ້ບັນທຶກໄວ້"}
${product.highlights ? `ຈຸດເດັ່ນ/ສ່ວນປະສົມ: ${product.highlights}` : ""}
${product.benefits ? `ປະໂຫຍດຫຼັກ: ${product.benefits}` : ""}
${product.usage ? `ວິທີໃຊ້: ${product.usage}` : ""}
ບັນຫາລູກຄ້າ (pain points) ທີ່ບັນທຶກໄວ້: ${product.painPoints}${faqBlock}
${knowledge && knowledge.content ? `\nຂໍ້ມູນຄົ້ນຄວ້າຈາກອິນເຕີເນັດ (ຄົ້ນຄວ້າໄວ້ລ່ວງໜ້າ):\n${knowledge.content}` : ""}`;

  try{
    const answer = await callAI(question, system);
    const aiMsg = {id:"pc"+(Date.now()+1), productId:product.id, role:"ai", message:answer, createdAt:new Date().toISOString()};
    STATE.data.productChat.push(aiMsg);
    dbInsertChatMsg(aiMsg).catch(e=>console.error(e));
  }catch(e){
    STATE.chatError = "ເກີດຂໍ້ຜິດພາດ: " + e.message;
  }
  STATE.chatSending = false;
  render();
}

function attachProductChatEvents(){
  const sel = document.getElementById("chat-product");
  if(sel) sel.addEventListener("change", ()=>{
    STATE.chatSelProduct = sel.value;
    STATE.chatKnowledgeOpen = false;
    render();
  });
  const toggleKnowledge = document.getElementById("btn-toggle-knowledge");
  if(toggleKnowledge) toggleKnowledge.addEventListener("click", ()=>{
    STATE.chatKnowledgeOpen = !STATE.chatKnowledgeOpen;
    render();
  });
  const input = document.getElementById("chat-input");
  if(input) input.addEventListener("input", ()=>{ STATE.chatQuestion = input.value; });
  const sendBtn = document.getElementById("btn-chat-send");
  if(sendBtn) sendBtn.addEventListener("click", sendProductChat);
  if(input) input.addEventListener("keydown", (e)=>{
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendProductChat(); }
  });
  const log = document.getElementById("chat-log");
  if(log) log.scrollTop = log.scrollHeight;
}

async function analyzeInsights(){
  const d = STATE.data;
  if(d.insights.length===0){ STATE.analyzeError = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກ ກະລຸນາເພີ່ມບັນຫາລູກຄ້າກ່ອນ"; render(); return; }
  STATE.analyzing = true; STATE.analyzeError = ""; STATE.analysis = "";
  render();
  try{
    const list = d.insights.slice(0,30).map((i,idx)=>`${idx+1}. ຄຳຖາມ: ${i.question} | ຄຳຕອບ: ${i.answer} | ສິນຄ້າ: ${i.productRelated||"-"}`).join("\n");
    const prompt = `ນີ້ແມ່ນບັນທຶກຄຳຖາມ-ຄຳຕອບຈາກລູກຄ້າທີ່ແຊັດເຂົ້າມາໃນຮ້ານອອນລາຍ:

${list}

ກະລຸນາວິເຄາະ:
1. ຮູບແບບ/ແນວໂນ້ມບັນຫາທີ່ລູກຄ້າຖາມເລື້ອຍໆ
2. ຈຸດທີ່ສິນຄ້າປະຈຸບັນຍັງຕອບສະໜອງບໍ່ພໍ
3. ແນວຄິດສິນຄ້າໃໝ່ ຫຼື ການແຕກລາຍສິນຄ້າທີ່ອາດຕອບໂຈດຄວາມຕ້ອງການເຫຼົ່ານີ້ໄດ້ (ສະເໜີ 2-3 ແນວຄິດ)
4. ຄຳແນະນຳສຳລັບການສ້າງ content ໃໝ່ ໂດຍອີງໃສ່ບັນຫາທີ່ພົບ

ຂຽນເປັນພາສາລາວ ຈັດໝວດໝູ່ໃຫ້ຈະແຈ້ງ.`;
    const result = await callAI(prompt, "ທ່ານແມ່ນນັກວິເຄາະການຕະຫຼາດ ຊ່ຽວຊານໃນການອ່ານ pattern ຈາກຄຳຖາມລູກຄ້າ ເພື່ອຄົ້ນພົບໂອກາດສິນຄ້າໃໝ່.");
    STATE.analysis = result;
  }catch(e){
    STATE.analyzeError = "ເກີດຂໍ້ຜິດພາດ: "+e.message;
  }
  STATE.analyzing = false;
  render();
}

/* ---------- EXCEL EXPORT / IMPORT (insights) ---------- */
function exportInsightsToExcel(){
  const d = STATE.data;
  const rows = d.insights.map(i => ({
    "ຜູ້ລາຍງານ": i.adminName || "",
    "ວັນທີ": i.date || "",
    "ຄຳຖາມ": i.question || "",
    "ຄຳຕອບຂອງແອັດມິນ": i.answer || "",
    "ສິນຄ້າທີ່ກ່ຽວຂ້ອງ": i.productRelated || "",
    "ມີຮູບແນບ": i.imageUrl ? "ມີ" : "ບໍ່ມີ",
    "ອ່ານແລ້ວ": i.readByOwner ? "ອ່ານແລ້ວ" : "ຍັງບໍ່ອ່ານ"
  }));
  if(rows.length===0){
    STATE.importMsg = "ຍັງບໍ່ມີຂໍ້ມູນບັນທຶກໃຫ້ສົ່ງອອກ";
    render();
    return;
  }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:14},{wch:40},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ບັນຫາລູກຄ້າ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `customer-insights-${stamp}.xlsx`);
}

function importInsightsFromExcel(file){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try{
      const wb = XLSX.read(e.target.result, {type:"array"});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:""});
      const newItems = [];
      rows.forEach((r, idx) => {
        const question = r["ຄຳຖາມ"] || r["question"] || r["Question"] || "";
        const answer = r["ຄຳຕອບ"] || r["answer"] || r["Answer"] || "";
        const productRelated = r["ສິນຄ້າທີ່ກ່ຽວຂ້ອງ"] || r["product"] || r["Product"] || "";
        const date = r["ວັນທີ"] || r["date"] || r["Date"] || new Date().toLocaleDateString("lo-LA", {timeZone: LAOS_TZ});
        if(String(question).trim()){
          newItems.push({
            id:"i"+Date.now()+"-"+idx,
            question:String(question), answer:String(answer),
            productRelated:String(productRelated), date:String(date)
          });
        }
      });
      if(newItems.length>0){
        STATE.data.insights.unshift(...newItems);
        await dbInsertInsightsBulk(newItems);
      }
      STATE.importMsg = newItems.length>0
        ? `ນຳເຂົ້າສຳເລັດ: ເພີ່ມ ${newItems.length} ລາຍການໃໝ່`
        : "ບໍ່ພົບແຖວທີ່ມີຄຳຖາມໃນໄຟລ໌ — ກະລຸນາກວດຫົວຄໍລາມ໌ໃຫ້ກົງກັບ 'ຄຳຖາມ', 'ຄຳຕອບ', 'ສິນຄ້າທີ່ກ່ຽວຂ້ອງ', 'ວັນທີ'";
    }catch(err){
      STATE.importMsg = "ອ່ານໄຟລ໌ບໍ່ສຳເລັດ: " + err.message;
    }
    render();
  };
  reader.readAsArrayBuffer(file);
}

function exportReportsToExcel(){
  const d = STATE.data;
  const rows = d.reports.map(r => ({
    "ຜູ້ລາຍງານ": r.adminName || "",
    "ຄົນເຮັດຜິດ": r.accusedName || "",
    "ໝວດໝູ່": r.category || "",
    "ລາຍລະອຽດ": r.detail || "",
    "ວັນ-ເວລາ": r.createdAt ? new Date(r.createdAt).toLocaleString("lo-LA", {timeZone: LAOS_TZ}) : "",
    "ມີຮູບແນບ": r.imageUrl ? "ມີ" : "ບໍ່ມີ",
    "ອ່ານແລ້ວ": r.readByOwner ? "ອ່ານແລ້ວ" : "ຍັງບໍ່ອ່ານ"
  }));
  if(rows.length===0){ return; }
  const ws = XLSX.utils.json_to_sheet(rows);
  ws['!cols'] = [{wch:16},{wch:16},{wch:22},{wch:40},{wch:20},{wch:12},{wch:14}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "ລາຍງານຂໍ້ຜິດພາດ");
  const stamp = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `error-reports-${stamp}.xlsx`);
}

function attachReportEvents(){
  const exportRepBtn = document.getElementById("btn-export-reports-excel");
  if(exportRepBtn) exportRepBtn.addEventListener("click", exportReportsToExcel);
  document.querySelectorAll("[data-report-view]").forEach(el=>{
    el.addEventListener("click", ()=>{
      STATE.reportViewMode = el.getAttribute("data-report-view");
      render();
    });
  });

  const filterAccEl = document.getElementById("rep-filter-accused");
  if(filterAccEl) filterAccEl.addEventListener("change", ()=>{
    STATE.reportFilterAccused = filterAccEl.value;
    render();
  });

  const catEl = document.getElementById("rep-category");
  const accEl = document.getElementById("rep-accused");
  const detEl = document.getElementById("rep-detail");
  const imgEl = document.getElementById("rep-image-input");

  if(catEl) catEl.addEventListener("change", ()=>{ STATE.reportForm.category = catEl.value; });
  if(accEl) accEl.addEventListener("change", ()=>{ STATE.reportForm.accusedName = accEl.value; });
  if(detEl) detEl.addEventListener("input", ()=>{ STATE.reportForm.detail = detEl.value; });
  if(imgEl) imgEl.addEventListener("change", ()=>{
    const file = imgEl.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e)=>{ STATE.reportForm.imageBase64 = e.target.result; render(); };
    reader.readAsDataURL(file);
  });
  const imgRemoveBtn = document.getElementById("rep-image-remove");
  if(imgRemoveBtn) imgRemoveBtn.addEventListener("click", ()=>{
    STATE.reportForm.imageBase64 = "";
    if(imgEl) imgEl.value = "";
    render();
  });

  const submitBtn = document.getElementById("btn-submit-report");
  if(submitBtn) submitBtn.addEventListener("click", async ()=>{
    const f = STATE.reportForm;
    if(!f.category){ alert("ກະລຸນາເລືອກໝວດໝູ່ຂໍ້ຜິດພາດ"); return; }
    const newReport = {
      id:"rep"+Date.now(),
      adminName: STATE.currentUser?.name || "",
      category: f.category,
      accusedName: f.accusedName || "",
      detail: f.detail,
      imageUrl: f.imageBase64 || "",
      createdAt: new Date().toISOString(),
      readByOwner: false
    };
    STATE.data.reports.unshift(newReport);
    STATE.reportForm = {category:"", detail:"", imageBase64:"", accusedName:""};
    render();
    dbInsertReport(newReport).catch(err=>console.error(err));
    silentRefresh();
  });

  document.querySelectorAll("[data-del-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-del-report");
      STATE.data.reports = STATE.data.reports.filter(r=>r.id!==id);
      render();
      dbDeleteReport(id).catch(err=>console.error(err));
    });
  });

  document.querySelectorAll("[data-view-report]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const id = el.getAttribute("data-view-report");
      const r = STATE.data.reports.find(x=>x.id===id);
      if(!r) return;
      STATE.viewingReport = r;
      render();
      if(isOwner() && !r.readByOwner){
        r.readByOwner = true;
        dbMarkReportRead(id).catch(err=>console.error(err));
      }
    });
  });
  const repModalBg = document.getElementById("report-modal-bg");
  if(repModalBg) repModalBg.addEventListener("click", (e)=>{
    if(e.target.id==="report-modal-bg"){ STATE.viewingReport=null; render(); }
  });
  const closeRepModal = document.getElementById("close-report-modal");
  if(closeRepModal) closeRepModal.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
  const closeRepModalBtn = document.getElementById("close-report-modal-btn");
  if(closeRepModalBtn) closeRepModalBtn.addEventListener("click", ()=>{ STATE.viewingReport=null; render(); });
}

function fmtTime(ts){
  if(!ts) return "-";
  return new Date(ts).toLocaleTimeString("lo-LA", {hour:"2-digit", minute:"2-digit", second:"2-digit", timeZone: LAOS_TZ});
}
function fmtDuration(inTs, outTs){
  if(!inTs || !outTs) return "-";
  const ms = new Date(outTs) - new Date(inTs);
  if(ms<=0) return "-";
  const h = Math.floor(ms/3600000);
  const m = Math.floor((ms%3600000)/60000);
  const s = Math.floor((ms%60000)/1000);
  return `${h} ຊມ ${m} ນທ ${s} ວ`;
}
function todayStr(){ return new Date().toLocaleDateString("lo-LA", {timeZone: LAOS_TZ}); }
